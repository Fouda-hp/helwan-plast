                  var d = parseFloat(row.debit || 0); var c = parseFloat(row.credit || 0);
                  totalDebit += d; totalCredit += c;
                  html += '<tr><td>' + (row.account_name || '') + '</td><td class="text-right">' + (d > 0 ? fmtCurr(d) : '-') + '</td><td class="text-right">' + (c > 0 ? fmtCurr(c) : '-') + '</td></tr>';
