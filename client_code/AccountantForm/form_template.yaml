                  html += '<tr class="total-row"><td></td><td><strong>' + t('Total Equity', 'اجمالي حقوق الملكية') + '</strong></td><td class="text-right"><strong>' + fmtCurr(data.total_equity || 0) + '</strong></td></tr>';
