                var data = res.data || [];
                if (data.length === 0) { tbody.innerHTML = '<tr><td colspan="3" class="empty-msg">' + t('No data', 'لا توجد بيانات') + '</td></tr>'; return; }
                var html = '';
                var totalDebit = 0, totalCredit = 0;
