components: []
container:
  properties:
    html: |
      <style>
        * {
          box-sizing: border-box;
          font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
          margin: 0;
          padding: 0;
        }

        html, body {
          margin: 0;
          padding: 0;
          background: #f5f7fa;
          height: 100%;
          width: 100%;
          overflow: hidden;
        }

        /* نحسب ارتفاع هيدر Anvil */
        :root {
          --anvil-header-height: 64px;
        }


        .anvil-root-container,
        .anvil-container,
        .column-panel {
          padding: 0 !important;
          margin: 0 !important;
        }

        /* ================= LAYOUT ================= */
        .admin-container {
          display: flex;
          height: calc(100vh - var(--anvil-header-height));
          width: 100vw;
          position: fixed;
          top: var(--anvil-header-height);
          left: 0;
          right: 0;
          bottom: 0;
          overflow: hidden;
        }

        /* ================= SIDEBAR ================= */
        .sidebar {
          width: 260px;
          min-width: 260px;
          max-width: 260px;
          background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
          color: #fff;
          padding: 0;
          position: fixed;
          left: 0;
          top: var(--anvil-header-height);
          height: calc(100vh - var(--anvil-header-height));
          overflow: hidden;
          z-index: 100;
          transition: transform 0.3s ease;
          display: flex;
          flex-direction: column;
        }

        .sidebar-header {
          padding: 20px 15px;
          border-bottom: 1px solid rgba(255,255,255,0.1);
          text-align: center;
          flex-shrink: 0;
        }

        .sidebar-header img {
          height: 55px;
          margin-bottom: 8px;
        }

        .sidebar-header h2 {
          margin: 0;
          font-size: 16px;
          font-weight: 600;
        }

        .sidebar-header p {
          margin: 5px 0 0;
          font-size: 11px;
          opacity: 0.7;
        }

        /* اسم المستخدم تحت اللوجو */
        .sidebar-user-welcome {
          padding: 12px 15px;
          background: rgba(102,126,234,0.15);
          border-bottom: 1px solid rgba(255,255,255,0.1);
          text-align: center;
          flex-shrink: 0;
        }

        .sidebar-user-welcome .welcome-text {
          font-size: 11px;
          opacity: 0.7;
          margin-bottom: 4px;
        }

        .sidebar-user-welcome .user-name-display {
          font-size: 14px;
          font-weight: 600;
          color: #667eea;
        }

        .sidebar-nav {
          padding: 15px 0;
          flex: 1;
          overflow-y: auto;
          min-height: 0;
        }

        .nav-section {
          padding: 10px 20px 5px;
          font-size: 11px;
          text-transform: uppercase;
          letter-spacing: 1px;
          opacity: 0.5;
        }

        .nav-item {
          display: flex;
          align-items: center;
          padding: 12px 20px;
          color: rgba(255,255,255,0.8);
          text-decoration: none;
          cursor: pointer;
          transition: all 0.2s ease;
          border-left: 3px solid transparent;
        }

        .nav-item:hover {
          background: rgba(255,255,255,0.1);
          color: #fff;
        }

        .nav-item.active {
          background: rgba(102,126,234,0.2);
          border-left-color: #667eea;
          color: #fff;
        }

        .nav-item svg {
          width: 20px;
          height: 20px;
          margin-right: 12px;
          opacity: 0.8;
        }

        .nav-item .badge {
          margin-left: auto;
          background: #e74c3c;
          color: #fff;
          font-size: 11px;
          padding: 2px 8px;
          border-radius: 10px;
        }

        .sidebar-footer {
          padding: 12px 15px;
          border-top: 1px solid rgba(255,255,255,0.1);
          background: #16213e;
          flex-shrink: 0;
          margin-top: auto;
        }

        .user-info {
          display: flex;
          align-items: center;
        }

        .user-avatar {
          width: 36px;
          height: 36px;
          background: linear-gradient(135deg, #667eea, #764ba2);
          border-radius: 50%;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 14px;
          font-weight: 600;
          margin-right: 10px;
          flex-shrink: 0;
        }

        .user-details {
          overflow: hidden;
        }

        .user-details h4 {
          margin: 0;
          font-size: 13px;
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
        }

        .user-details p {
          margin: 2px 0 0;
          font-size: 11px;
          opacity: 0.7;
        }

        .logout-btn {
          width: 100%;
          margin-top: 12px;
          padding: 10px;
          background: rgba(231,76,60,0.2);
          border: 1px solid rgba(231,76,60,0.3);
          color: #e74c3c;
          border-radius: 8px;
          cursor: pointer;
          font-size: 13px;
          transition: all 0.2s ease;
        }

        .logout-btn:hover {
          background: #e74c3c;
          color: #fff;
        }

        /* ================= MAIN CONTENT ================= */
        .main-content {
          position: relative;
          flex: 1;
          padding: 24px 32px;
          padding-left: calc(260px + 32px); /* 👈 ده اللي هيزق الداش يمين */
          height: 100%;
          overflow: auto;
          box-sizing: border-box;
        }


        .page-header {
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 30px;
        }

        .page-header h1 {
          margin: 0;
          font-size: 28px;
          color: #1a1a2e;
        }

        .page-header p {
          margin: 5px 0 0;
          color: #666;
          font-size: 14px;
        }

        /* ================= CARDS ================= */
        .stats-grid {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
          gap: 20px;
          margin-bottom: 30px;
        }

        .stat-card {
          background: #fff;
          border-radius: 16px;
          padding: 24px;
          box-shadow: 0 2px 12px rgba(0,0,0,0.08);
          transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .stat-card:hover {
          transform: translateY(-4px);
          box-shadow: 0 8px 25px rgba(0,0,0,0.12);
        }

        .stat-card .icon {
          width: 50px;
          height: 50px;
          border-radius: 12px;
          display: flex;
          align-items: center;
          justify-content: center;
          margin-bottom: 15px;
        }

        .stat-card .icon svg {
          width: 24px;
          height: 24px;
        }

        .stat-card .icon.blue { background: linear-gradient(135deg, #667eea, #764ba2); }
        .stat-card .icon.green { background: linear-gradient(135deg, #11998e, #38ef7d); }
        .stat-card .icon.orange { background: linear-gradient(135deg, #f2994a, #f2c94c); }
        .stat-card .icon.red { background: linear-gradient(135deg, #eb3349, #f45c43); }

        .stat-card .value {
          font-size: 32px;
          font-weight: 700;
          color: #1a1a2e;
          margin-bottom: 5px;
        }

        .stat-card .label {
          font-size: 14px;
          color: #666;
        }

        /* ================= PANELS ================= */
        .panel {
          background: #fff;
          border-radius: 16px;
          box-shadow: 0 2px 12px rgba(0,0,0,0.08);
          margin-bottom: 30px;
          overflow: hidden;
          display: none;
        }

        .panel.active {
          display: block;
          animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
          from { opacity: 0; transform: translateY(10px); }
          to { opacity: 1; transform: translateY(0); }
        }

        .panel-header {
          display: flex;
          justify-content: space-between;
          align-items: center;
          padding: 20px 24px;
          border-bottom: 1px solid #eee;
        }

        .panel-header h3 {
          margin: 0;
          font-size: 18px;
          color: #1a1a2e;
        }

        .panel-body {
          padding: 24px;
        }

        /* ================= SEARCH & FILTERS ================= */
        .toolbar {
          display: flex;
          gap: 15px;
          margin-bottom: 20px;
          flex-wrap: wrap;
        }

        .search-box {
          flex: 1;
          min-width: 250px;
          position: relative;
        }

        .search-box input {
          width: 100%;
          padding: 12px 16px 12px 44px;
          border: 2px solid #e0e0e0;
          border-radius: 10px;
          font-size: 14px;
          transition: all 0.2s ease;
        }

        .search-box input:focus {
          outline: none;
          border-color: #667eea;
          box-shadow: 0 0 0 4px rgba(102,126,234,0.15);
        }

        .search-box svg {
          position: absolute;
          left: 14px;
          top: 50%;
          transform: translateY(-50%);
          width: 20px;
          height: 20px;
          color: #999;
        }

        .filter-btn, .action-btn {
          padding: 12px 20px;
          border-radius: 10px;
          border: none;
          font-size: 14px;
          font-weight: 500;
          cursor: pointer;
          display: flex;
          align-items: center;
          gap: 8px;
          transition: all 0.2s ease;
        }

        .filter-btn {
          background: #f0f2f5;
          color: #444;
        }

        .filter-btn:hover {
          background: #e0e2e5;
        }

        .action-btn {
          background: linear-gradient(135deg, #667eea, #764ba2);
          color: #fff;
        }

        .action-btn:hover {
          transform: translateY(-2px);
          box-shadow: 0 6px 20px rgba(102,126,234,0.4);
        }

        .action-btn.green {
          background: linear-gradient(135deg, #11998e, #38ef7d);
        }

        .action-btn.red {
          background: linear-gradient(135deg, #eb3349, #f45c43);
        }

        /* ================= TABLE ================= */
        .data-table {
          width: 100%;
          border-collapse: collapse;
        }

        .data-table th,
        .data-table td {
          padding: 14px 16px;
          text-align: left;
          border-bottom: 1px solid #eee;
        }

        .data-table th {
          background: #f8f9fa;
          font-weight: 600;
          font-size: 13px;
          color: #666;
          text-transform: uppercase;
          letter-spacing: 0.5px;
        }

        .data-table tr:hover {
          background: #f8f9fa;
        }

        .data-table .status {
          display: inline-block;
          padding: 4px 12px;
          border-radius: 20px;
          font-size: 12px;
          font-weight: 500;
        }

        .status.active { background: #e8f5e9; color: #2e7d32; }
        .status.pending { background: #fff3e0; color: #ef6c00; }
        .status.inactive { background: #ffebee; color: #c62828; }
        .status.deleted { background: #fce4ec; color: #ad1457; }

        .data-table .actions {
          display: flex;
          gap: 8px;
        }

        .data-table .btn-sm {
          padding: 6px 12px;
          border: none;
          border-radius: 6px;
          font-size: 12px;
          cursor: pointer;
          transition: all 0.2s ease;
        }

        .btn-sm.approve { background: #e8f5e9; color: #2e7d32; }
        .btn-sm.reject { background: #ffebee; color: #c62828; }
        .btn-sm.edit { background: #e3f2fd; color: #1565c0; }
        .btn-sm.delete { background: #ffebee; color: #c62828; }
        .btn-sm.restore { background: #e8f5e9; color: #2e7d32; }

        .btn-sm:hover {
          filter: brightness(0.95);
          transform: translateY(-1px);
        }

        /* ================= PAGINATION ================= */
        .pagination {
          display: flex;
          justify-content: center;
          align-items: center;
          gap: 8px;
          margin-top: 20px;
          padding-top: 20px;
          border-top: 1px solid #eee;
        }

        .pagination button {
          padding: 8px 14px;
          border: 1px solid #ddd;
          background: #fff;
          border-radius: 8px;
          cursor: pointer;
          font-size: 14px;
          transition: all 0.2s ease;
        }

        .pagination button:hover:not(:disabled) {
          background: #667eea;
          color: #fff;
          border-color: #667eea;
        }

        .pagination button:disabled {
          opacity: 0.5;
          cursor: not-allowed;
        }

        .pagination .page-info {
          padding: 8px 16px;
          color: #666;
          font-size: 14px;
        }

        /* ================= MODAL ================= */
        .modal-overlay {
          position: fixed;
          inset: 0;
          background: rgba(0,0,0,0.5);
          backdrop-filter: blur(4px);
          display: none;
          align-items: center;
          justify-content: center;
          z-index: 1000;
        }

        .modal-overlay.show {
          display: flex;
        }

        .modal-box {
          background: #fff;
          border-radius: 16px;
          width: 90%;
          max-width: 500px;
          max-height: 90vh;
          overflow-y: auto;
          animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
          from { opacity: 0; transform: scale(0.95) translateY(20px); }
          to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-header {
          padding: 20px 24px;
          border-bottom: 1px solid #eee;
          display: flex;
          justify-content: space-between;
          align-items: center;
        }

        .modal-header h3 {
          margin: 0;
          font-size: 18px;
        }

        .modal-close {
          background: none;
          border: none;
          font-size: 24px;
          cursor: pointer;
          color: #999;
        }

        .modal-body {
          padding: 24px;
        }

        .modal-footer {
          padding: 16px 24px;
          border-top: 1px solid #eee;
          display: flex;
          justify-content: flex-end;
          gap: 12px;
        }

        .form-group {
          margin-bottom: 20px;
        }

        .form-group label {
          display: block;
          font-size: 13px;
          font-weight: 600;
          color: #444;
          margin-bottom: 6px;
        }

        .form-group input,
        .form-group select {
          width: 100%;
          padding: 12px 14px;
          border: 2px solid #e0e0e0;
          border-radius: 10px;
          font-size: 14px;
          transition: all 0.2s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
          outline: none;
          border-color: #667eea;
        }

        /* ================= LOADING ================= */
        .loading-spinner {
          display: flex;
          justify-content: center;
          align-items: center;
          padding: 40px;
        }

        .spinner {
          width: 40px;
          height: 40px;
          border: 4px solid #e0e0e0;
          border-top-color: #667eea;
          border-radius: 50%;
          animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
          to { transform: rotate(360deg); }
        }

        /* ================= EMPTY STATE ================= */
        .empty-state {
          text-align: center;
          padding: 60px 20px;
          color: #666;
        }

        .empty-state svg {
          width: 80px;
          height: 80px;
          margin-bottom: 20px;
          opacity: 0.4;
        }

        .empty-state h4 {
          margin: 0 0 10px;
          color: #444;
        }

        /* ================= CHECKBOX ================= */
        .checkbox-label {
          display: flex;
          align-items: center;
          gap: 10px;
          cursor: pointer;
          font-size: 14px;
        }

        .checkbox-label input[type="checkbox"] {
          width: 18px;
          height: 18px;
          cursor: pointer;
        }

        /* ================= RESPONSIVE ================= */
        @media (max-width: 768px) {

          .mobile-menu-btn {
            display: inline-block;
          }

          .sidebar {
            transform: translateX(-100%);
            top: var(--anvil-header-height);
            height: calc(100vh - var(--anvil-header-height));
          }

          .sidebar.open {
            transform: translateX(0);
          }

          .main-content {
            margin-left: 0;
            width: 100%;
            height: calc(100vh - var(--anvil-header-height));
            overflow: hidden;
          }
          .stats-grid {
            grid-template-columns: 1fr;
          }

          .toolbar {
            flex-direction: column;
          }

          .search-box {
            min-width: 100%;
          }

          .data-table {
            display: block;
            overflow-x: auto;
          }
        }

        /* ================= AUTO-FIT FOR LAPTOPS 13"+ ================= */
        @media (min-width: 1024px) {
          .main-content {
            flex: 1;
            margin-left: 260px;
            padding: 20px;
            height: 100%;
            overflow: hidden; /* مهم */
            display: flex;
            flex-direction: column;
          }


          .panel-body {
            flex: 1;
            overflow-y: auto;
          }

          .stats-grid {
            grid-template-columns: repeat(4, 1fr);
          }

          .stat-card {
            padding: 16px;
          }

          .stat-card .value {
            font-size: 24px;
          }

          .page-header {
            flex-shrink: 0;
          }
        }

        /* ================= SMALL LAPTOP OPTIMIZATION ================= */
        @media (min-width: 1024px) and (max-height: 800px) {
          .page-header {
            margin-bottom: 15px;
          }

          .page-header h1 {
            font-size: 22px;
          }

          .stats-grid {
            gap: 12px;
            margin-bottom: 15px;
          }

          .stat-card {
            padding: 16px;
          }

          .stat-card .value {
            font-size: 24px;
          }

          .stat-card .icon {
            width: 40px;
            height: 40px;
            margin-bottom: 10px;
          }

          .panel-header {
            padding: 15px 20px;
          }

          .panel-body {
            padding: 15px;
            max-height: calc(100vh - 280px);
          }

          .data-table th,
          .data-table td {
            padding: 10px 12px;
            font-size: 13px;
          }

          .sidebar-header {
            padding: 12px;
          }

          .sidebar-header img {
            height: 40px;
          }

          .nav-item {
            padding: 10px 15px;
            font-size: 13px;
          }

          .sidebar-footer {
            padding: 10px 12px;
          }
        }
        .mobile-menu-btn {
          display: none;
          background: #667eea;
          color: #fff;
          border: none;
          padding: 10px 14px;
          border-radius: 8px;
          font-size: 18px;
          cursor: pointer;
          margin-bottom: 12px;
        }

        /* ================= NOTIFICATION STYLES ================= */
        .notification-toast {
          background: white;
          padding: 15px 20px;
          border-radius: 10px;
          box-shadow: 0 4px 20px rgba(0,0,0,0.15);
          display: flex;
          align-items: center;
          gap: 12px;
          min-width: 300px;
          max-width: 450px;
          animation: slideIn 0.3s ease;
          border-left: 4px solid #667eea;
        }

        .notification-toast.success { border-left-color: #4caf50; }
        .notification-toast.error { border-left-color: #f44336; }
        .notification-toast.warning { border-left-color: #ff9800; }
        .notification-toast.info { border-left-color: #2196f3; }

        .notification-toast .icon { font-size: 20px; }
        .notification-toast .content { flex: 1; }
        .notification-toast .title { font-weight: 600; margin-bottom: 3px; color: #333; }
        .notification-toast .message { font-size: 13px; color: #666; }
        .notification-toast .close-btn {
          background: none;
          border: none;
          font-size: 18px;
          cursor: pointer;
          color: #999;
          padding: 0;
        }
        .notification-toast .close-btn:hover { color: #333; }

        @keyframes slideIn {
          from { transform: translateX(100%); opacity: 0; }
          to { transform: translateX(0); opacity: 1; }
        }

        @keyframes slideOut {
          from { transform: translateX(0); opacity: 1; }
          to { transform: translateX(100%); opacity: 0; }
        }

        /* ================= LANGUAGE SWITCHER IN SIDEBAR ================= */
        .sidebar-lang-switcher {
          padding: 8px 15px;
          border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .lang-toggle-btn {
          width: 100%;
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 10px;
          padding: 12px 16px;
          background: linear-gradient(135deg, rgba(102,126,234,0.3) 0%, rgba(118,75,162,0.3) 100%);
          border: 1px solid rgba(255,255,255,0.15);
          border-radius: 10px;
          color: #fff;
          cursor: pointer;
          font-size: 14px;
          font-weight: 500;
          transition: all 0.3s ease;
        }

        .lang-toggle-btn:hover {
          background: linear-gradient(135deg, rgba(102,126,234,0.5) 0%, rgba(118,75,162,0.5) 100%);
          transform: translateY(-2px);
          box-shadow: 0 4px 15px rgba(102,126,234,0.3);
        }

        .lang-toggle-btn .lang-flag {
          font-size: 18px;
        }

        /* RTL Specific Styles */
        body.rtl .sidebar {
          left: auto;
          right: 0;
        }

        body.rtl .main-content {
          padding-left: 32px;
          padding-right: calc(260px + 32px);
        }

        body.rtl .nav-item {
          border-left: none;
          border-right: 3px solid transparent;
          flex-direction: row-reverse;
        }

        body.rtl .nav-item.active {
          border-right-color: #667eea;
        }

        body.rtl .nav-item svg {
          margin-right: 0;
          margin-left: 12px;
        }

        body.rtl .nav-item .badge {
          margin-left: 0;
          margin-right: auto;
        }

        body.rtl .user-avatar {
          margin-right: 0;
          margin-left: 10px;
        }

        body.rtl .data-table th,
        body.rtl .data-table td {
          text-align: right;
        }

        body.rtl .page-header {
          flex-direction: row-reverse;
        }

        body.rtl .page-header div {
          text-align: right;
        }

        body.rtl .toolbar {
          flex-direction: row-reverse;
        }

        body.rtl .search-box svg {
          left: auto;
          right: 14px;
        }

        body.rtl .search-box input {
          padding-left: 16px;
          padding-right: 44px;
          text-align: right;
        }

        body.rtl .modal-header,
        body.rtl .modal-footer {
          flex-direction: row-reverse;
        }

        body.rtl .form-group label {
          text-align: right;
        }

        body.rtl #notificationContainer {
          right: auto;
          left: 20px;
        }

        body.rtl .notification-toast {
          border-left: none;
          border-right: 4px solid #667eea;
          flex-direction: row-reverse;
          text-align: right;
        }

        body.rtl .notification-toast.success { border-right-color: #4caf50; }
        body.rtl .notification-toast.error { border-right-color: #f44336; }
        body.rtl .notification-toast.warning { border-right-color: #ff9800; }
        body.rtl .notification-toast.info { border-right-color: #2196f3; }

        body.rtl .stat-card {
