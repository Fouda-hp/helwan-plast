                <button class="action-btn" style="background:#ff9800;color:#fff;padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-size:13px;" onclick="runDailyCheck()">🔔 Run Daily Notification Check</button>
                <button class="action-btn" style="background:#4caf50;color:#fff;padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-size:13px;" onclick="exportInventoryExcel()">📦 Export Inventory</button>
                <button class="action-btn" style="background:#2196f3;color:#fff;padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-size:13px;" onclick="exportPurchaseInvoicesExcel()">📋 Export Purchase Invoices</button>
              </div>
