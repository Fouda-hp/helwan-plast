              <h3>Audit Log</h3>
              <button class="action-btn" onclick="loadAuditLogs()">Refresh</button>
            </div>
            <div class="panel-body">
              <div id="auditContent">
                <div style="text-align:center;padding:30px;"><div class="hp-code-loader" style="font-size:1.5em;font-weight:900;"><span>&lt;</span><span>LOADING...</span><span>/&gt;</span></div></div>
              </div>
