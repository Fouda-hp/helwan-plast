gn-items:center;\">';\n              html += '<input type=\"text\" id=\"setting_anilox_type_en\" value=\"' + (settings.anilox_type_en || 'Ceramic anilox') + '\" style=\"flex:1;\">';\n              html += '<button class=\"action-btn\" onclick=\"saveSettingText(\\'anilox_type_en\\')\">Save</button>';\n              html += '</div></div>';\n\n              html += '</div>'; // End Machine Defaults\n\n              // ==========================================\n              // Technical Specs Table Rules Section\n              // ==========================================\n              html += '<div style=\"background:#fff;padding:15px;border-radius:8px;margin-top:15px;\">';\n              html += '<h5 style=\"margin:0 0 10px;color:#1a1a2e;\">📊 Technical Specs Table Rules</h5>';\n              html += '<p style=\"margin:0 0 15px;color:#666;font-size:12px;\">Configure the calculation rules for the technical specifications table in the quotation PDF.</p>';\n\n              // Belt Drive Speed Settings\n              html += '<div style=\"background:#f5f5f5;padding:10px;border-radius:6px;margin-bottom:10px;\">';\n              html += '<h6 style=\"margin:0 0 8px;color:#333;\">Belt Drive Settings</h6>';\n\n              html += '<div class=\"form-group\" style=\"margin-bottom:8px;\">';\n              html += '<label style=\"font-size:12px;\">Max Machine Speed (m/min)</label>';\n              html += '<div style=\"display:flex;gap:10px;align-items:center;\">';\n              html += '<input type=\"number\" id=\"setting_belt_max_machine_speed\" value=\"' + (settings.belt_max_machine_speed || 120) + '\" style=\"flex:1;\">';\n              html += '<button class=\"action-btn\" style=\"padding:6px 12px;\" onclick=\"saveSetting(\\'belt_max_machine_speed\\')\">Save</button>';\n              html += '</div></div>';\n\n              html += '<div class=\"form-group\" style=\"margin-bottom:8px;\">';\n              html += '<label style=\"font-size:12px;\">Max Printing Speed (m/min