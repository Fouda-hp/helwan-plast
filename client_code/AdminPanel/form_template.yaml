components: []
container:
  properties:
    html: |
      <style>
        * {
          box-sizing: border-box;
          font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
          margin: 0;
          padding: 0;
        }

        html, body {
          margin: 0;
          padding: 0;
          background: #f5f7fa;
          height: 100%;
          width: 100%;
          overflow: hidden;
        }

        /* ================= LAYOUT ================= */
        .admin-container {
          display: flex;
          height: 100vh;
          width: 100vw;
          overflow: hidden;
          position: fixed;
          top: 0;
          left: 0;
          right: 0;
          bottom: 0;
        }

        /* ================= SIDEBAR ================= */
        .sidebar {
          width: 260px;
          min-width: 260px;
          max-width: 260px;
          background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
          color: #fff;
          padding: 0;
          position: fixed;
          left: 0;
          top: 0;
          height: 100vh;
          overflow: hidden;
          z-index: 100;
          transition: transform 0.3s ease;
          display: flex;
          flex-direction: column;
        }

        .sidebar-header {
          padding: 20px 15px;
          border-bottom: 1px solid rgba(255,255,255,0.1);
          text-align: center;
          flex-shrink: 0;
        }

        .sidebar-header img {
          height: 55px;
          margin-bottom: 8px;
        }

        .sidebar-header h2 {
          margin: 0;
          font-size: 16px;
          font-weight: 600;
        }

        .sidebar-header p {
          margin: 5px 0 0;
          font-size: 11px;
          opacity: 0.7;
        }

        /* اسم المستخدم تحت اللوجو */
        .sidebar-user-welcome {
          padding: 12px 15px;
          background: rgba(102,126,234,0.15);
          border-bottom: 1px solid rgba(255,255,255,0.1);
          text-align: center;
          flex-shrink: 0;
        }

        .sidebar-user-welcome .welcome-text {
          font-size: 11px;
          opacity: 0.7;
          margin-bottom: 4px;
        }

        .sidebar-user-welcome .user-name-display {
          font-size: 14px;
          font-weight: 600;
          color: #667eea;
        }

        .sidebar-nav {
          padding: 15px 0;
          flex: 1;
          overflow-y: auto;
          min-height: 0;
        }

        .nav-section {
          padding: 10px 20px 5px;
          font-size: 11px;
          text-transform: uppercase;
          letter-spacing: 1px;
          opacity: 0.5;
        }

        .nav-item {
          display: flex;
          align-items: center;
          padding: 12px 20px;
          color: rgba(255,255,255,0.8);
          text-decoration: none;
          cursor: pointer;
          transition: all 0.2s ease;
          border-left: 3px solid transparent;
        }

        .nav-item:hover {
          background: rgba(255,255,255,0.1);
          color: #fff;
        }

        .nav-item.active {
          background: rgba(102,126,234,0.2);
          border-left-color: #667eea;
          color: #fff;
        }

        .nav-item svg {
          width: 20px;
          height: 20px;
          margin-right: 12px;
          opacity: 0.8;
        }

        .nav-item .badge {
          margin-left: auto;
          background: #e74c3c;
          color: #fff;
          font-size: 11px;
          padding: 2px 8px;
          border-radius: 10px;
        }

        .sidebar-footer {
          padding: 12px 15px;
          border-top: 1px solid rgba(255,255,255,0.1);
          background: #16213e;
          flex-shrink: 0;
          margin-top: auto;
        }

        .user-info {
          display: flex;
          align-items: center;
        }

        .user-avatar {
          width: 36px;
          height: 36px;
          background: linear-gradient(135deg, #667eea, #764ba2);
          border-radius: 50%;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 14px;
          font-weight: 600;
          margin-right: 10px;
          flex-shrink: 0;
        }

        .user-details {
          overflow: hidden;
        }

        .user-details h4 {
          margin: 0;
          font-size: 13px;
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
        }

        .user-details p {
          margin: 2px 0 0;
          font-size: 11px;
          opacity: 0.7;
        }

        .logout-btn {
          width: 100%;
          margin-top: 12px;
          padding: 10px;
          background: rgba(231,76,60,0.2);
          border: 1px solid rgba(231,76,60,0.3);
          color: #e74c3c;
          border-radius: 8px;
          cursor: pointer;
          font-size: 13px;
          transition: all 0.2s ease;
        }

        .logout-btn:hover {
          background: #e74c3c;
          color: #fff;
        }

        /* ================= MAIN CONTENT ================= */
        .main-content {
          flex: 1;
          margin-left: 260px;
          padding: 25px;
          height: 100vh;
          width: calc(100vw - 260px);
          overflow-y: auto;
          overflow-x: hidden;
          box-sizing: border-box;
        }

        .page-header {
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 30px;
        }

        .page-header h1 {
          margin: 0;
          font-size: 28px;
          color: #1a1a2e;
        }

        .page-header p {
          margin: 5px 0 0;
          color: #666;
          font-size: 14px;
        }

        /* ================= CARDS ================= */
        .stats-grid {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
          gap: 20px;
          margin-bottom: 30px;
        }

        .stat-card {
          background: #fff;
          border-radius: 16px;
          padding: 24px;
          box-shadow: 0 2px 12px rgba(0,0,0,0.08);
          transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .stat-card:hover {
          transform: translateY(-4px);
          box-shadow: 0 8px 25px rgba(0,0,0,0.12);
        }

        .stat-card .icon {
          width: 50px;
          height: 50px;
          border-radius: 12px;
          display: flex;
          align-items: center;
          justify-content: center;
          margin-bottom: 15px;
        }

        .stat-card .icon svg {
          width: 24px;
          height: 24px;
        }

        .stat-card .icon.blue { background: linear-gradient(135deg, #667eea, #764ba2); }
        .stat-card .icon.green { background: linear-gradient(135deg, #11998e, #38ef7d); }
        .stat-card .icon.orange { background: linear-gradient(135deg, #f2994a, #f2c94c); }
        .stat-card .icon.red { background: linear-gradient(135deg, #eb3349, #f45c43); }

        .stat-card .value {
          font-size: 32px;
          font-weight: 700;
          color: #1a1a2e;
          margin-bottom: 5px;
        }

        .stat-card .label {
          font-size: 14px;
          color: #666;
        }

        /* ================= PANELS ================= */
        .panel {
          background: #fff;
          border-radius: 16px;
          box-shadow: 0 2px 12px rgba(0,0,0,0.08);
          margin-bottom: 30px;
          overflow: hidden;
          display: none;
        }

        .panel.active {
          display: block;
          animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
          from { opacity: 0; transform: translateY(10px); }
          to { opacity: 1; transform: translateY(0); }
        }

        .panel-header {
          display: flex;
          justify-content: space-between;
          align-items: center;
          padding: 20px 24px;
          border-bottom: 1px solid #eee;
        }

        .panel-header h3 {
          margin: 0;
          font-size: 18px;
          color: #1a1a2e;
        }

        .panel-body {
          padding: 24px;
        }

        /* ================= SEARCH & FILTERS ================= */
        .toolbar {
          display: flex;
          gap: 15px;
          margin-bottom: 20px;
          flex-wrap: wrap;
        }

        .search-box {
          flex: 1;
          min-width: 250px;
          position: relative;
        }

        .search-box input {
          width: 100%;
          padding: 12px 16px 12px 44px;
          border: 2px solid #e0e0e0;
          border-radius: 10px;
          font-size: 14px;
          transition: all 0.2s ease;
        }

        .search-box input:focus {
          outline: none;
          border-color: #667eea;
          box-shadow: 0 0 0 4px rgba(102,126,234,0.15);
        }

        .search-box svg {
          position: absolute;
          left: 14px;
          top: 50%;
          transform: translateY(-50%);
          width: 20px;
          height: 20px;
          color: #999;
        }

        .filter-btn, .action-btn {
          padding: 12px 20px;
          border-radius: 10px;
          border: none;
          font-size: 14px;
          font-weight: 500;
          cursor: pointer;
          display: flex;
          align-items: center;
          gap: 8px;
          transition: all 0.2s ease;
        }

        .filter-btn {
          background: #f0f2f5;
          color: #444;
        }

        .filter-btn:hover {
          background: #e0e2e5;
        }

        .action-btn {
          background: linear-gradient(135deg, #667eea, #764ba2);
          color: #fff;
        }

        .action-btn:hover {
          transform: translateY(-2px);
          box-shadow: 0 6px 20px rgba(102,126,234,0.4);
        }

        .action-btn.green {
          background: linear-gradient(135deg, #11998e, #38ef7d);
        }

        .action-btn.red {
          background: linear-gradient(135deg, #eb3349, #f45c43);
        }

        /* ================= TABLE ================= */
        .data-table {
          width: 100%;
          border-collapse: collapse;
        }

        .data-table th,
        .data-table td {
          padding: 14px 16px;
          text-align: left;
          border-bottom: 1px solid #eee;
        }

        .data-table th {
          background: #f8f9fa;
          font-weight: 600;
          font-size: 13px;
          color: #666;
          text-transform: uppercase;
          letter-spacing: 0.5px;
        }

        .data-table tr:hover {
          background: #f8f9fa;
        }

        .data-table .status {
          display: inline-block;
          padding: 4px 12px;
          border-radius: 20px;
          font-size: 12px;
          font-weight: 500;
        }

        .status.active { background: #e8f5e9; color: #2e7d32; }
        .status.pending { background: #fff3e0; color: #ef6c00; }
        .status.inactive { background: #ffebee; color: #c62828; }
        .status.deleted { background: #fce4ec; color: #ad1457; }

        .data-table .actions {
          display: flex;
          gap: 8px;
        }

        .data-table .btn-sm {
          padding: 6px 12px;
          border: none;
          border-radius: 6px;
          font-size: 12px;
          cursor: pointer;
          transition: all 0.2s ease;
        }

        .btn-sm.approve { background: #e8f5e9; color: #2e7d32; }
        .btn-sm.reject { background: #ffebee; color: #c62828; }
        .btn-sm.edit { background: #e3f2fd; color: #1565c0; }
        .btn-sm.delete { background: #ffebee; color: #c62828; }
        .btn-sm.restore { background: #e8f5e9; color: #2e7d32; }

        .btn-sm:hover {
          filter: brightness(0.95);
          transform: translateY(-1px);
        }

        /* ================= PAGINATION ================= */
        .pagination {
          display: flex;
          justify-content: center;
          align-items: center;
          gap: 8px;
          margin-top: 20px;
          padding-top: 20px;
          border-top: 1px solid #eee;
        }

        .pagination button {
          padding: 8px 14px;
          border: 1px solid #ddd;
          background: #fff;
          border-radius: 8px;
          cursor: pointer;
          font-size: 14px;
          transition: all 0.2s ease;
        }

        .pagination button:hover:not(:disabled) {
          background: #667eea;
          color: #fff;
          border-color: #667eea;
        }

        .pagination button:disabled {
          opacity: 0.5;
          cursor: not-allowed;
        }

        .pagination .page-info {
          padding: 8px 16px;
          color: #666;
          font-size: 14px;
        }

        /* ================= MODAL ================= */
        .modal-overlay {
          position: fixed;
          inset: 0;
          background: rgba(0,0,0,0.5);
          backdrop-filter: blur(4px);
          display: none;
          align-items: center;
          justify-content: center;
          z-index: 1000;
        }

        .modal-overlay.show {
          display: flex;
        }

        .modal-box {
          background: #fff;
          border-radius: 16px;
          width: 90%;
          max-width: 500px;
          max-height: 90vh;
          overflow-y: auto;
          animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
          from { opacity: 0; transform: scale(0.95) translateY(20px); }
          to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-header {
          padding: 20px 24px;
          border-bottom: 1px solid #eee;
          display: flex;
          justify-content: space-between;
          align-items: center;
        }

        .modal-header h3 {
          margin: 0;
          font-size: 18px;
        }

        .modal-close {
          background: none;
          border: none;
          font-size: 24px;
          cursor: pointer;
          color: #999;
        }

        .modal-body {
          padding: 24px;
        }

        .modal-footer {
          padding: 16px 24px;
          border-top: 1px solid #eee;
          display: flex;
          justify-content: flex-end;
          gap: 12px;
        }

        .form-group {
          margin-bottom: 20px;
        }

        .form-group label {
          display: block;
          font-size: 13px;
          font-weight: 600;
          color: #444;
          margin-bottom: 6px;
        }

        .form-group input,
        .form-group select {
          width: 100%;
          padding: 12px 14px;
          border: 2px solid #e0e0e0;
          border-radius: 10px;
          font-size: 14px;
          transition: all 0.2s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
          outline: none;
          border-color: #667eea;
        }

        /* ================= LOADING ================= */
        .loading-spinner {
          display: flex;
          justify-content: center;
          align-items: center;
          padding: 40px;
        }

        .spinner {
          width: 40px;
          height: 40px;
          border: 4px solid #e0e0e0;
          border-top-color: #667eea;
          border-radius: 50%;
          animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
          to { transform: rotate(360deg); }
        }

        /* ================= EMPTY STATE ================= */
        .empty-state {
          text-align: center;
          padding: 60px 20px;
          color: #666;
        }

        .empty-state svg {
          width: 80px;
          height: 80px;
          margin-bottom: 20px;
          opacity: 0.4;
        }

        .empty-state h4 {
          margin: 0 0 10px;
          color: #444;
        }

        /* ================= CHECKBOX ================= */
        .checkbox-label {
          display: flex;
          align-items: center;
          gap: 10px;
          cursor: pointer;
          font-size: 14px;
        }

        .checkbox-label input[type="checkbox"] {
          width: 18px;
          height: 18px;
          cursor: pointer;
        }

        /* ================= RESPONSIVE ================= */
        @media (max-width: 768px) {
          .sidebar {
            transform: translateX(-100%);
          }

          .sidebar.open {
            transform: translateX(0);
          }

          .main-content {
            margin-left: 0;
            padding: 20px;
          }

          .stats-grid {
            grid-template-columns: 1fr;
          }

          .toolbar {
            flex-direction: column;
          }

          .search-box {
            min-width: 100%;
          }

          .data-table {
            display: block;
            overflow-x: auto;
          }
        }

        /* ================= AUTO-FIT FOR LAPTOPS 13"+ ================= */
        @media (min-width: 1024px) {
          .main-content {
            overflow-y: auto;
            display: flex;
            flex-direction: column;
          }

          .panel-body {
            max-height: calc(100vh - 250px);
            overflow-y: auto;
          }

          .stats-grid {
            flex-shrink: 0;
          }

          .page-header {
            flex-shrink: 0;
          }
        }

        /* ================= SMALL LAPTOP OPTIMIZATION ================= */
        @media (min-width: 1024px) and (max-height: 800px) {
          .page-header {
            margin-bottom: 15px;
          }

          .page-header h1 {
            font-size: 22px;
          }

          .stats-grid {
            gap: 12px;
            margin-bottom: 15px;
          }

          .stat-card {
            padding: 16px;
          }

          .stat-card .value {
            font-size: 24px;
          }

          .stat-card .icon {
            width: 40px;
            height: 40px;
            margin-bottom: 10px;
          }

          .panel-header {
            padding: 15px 20px;
          }

          .panel-body {
            padding: 15px;
            max-height: calc(100vh - 280px);
          }

          .data-table th,
          .data-table td {
            padding: 10px 12px;
            font-size: 13px;
          }

          .sidebar-header {
            padding: 12px;
          }

          .sidebar-header img {
            height: 40px;
          }

          .nav-item {
            padding: 10px 15px;
            font-size: 13px;
          }

          .sidebar-footer {
            padding: 10px 12px;
          }
        }
      </style>

      <div class="admin-container">

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
          <div class="sidebar-header">
            <img src="_/theme/helwan_logo.png" alt="Logo">
            <h2>Admin Panel</h2>
            <p>Helwan Plast System</p>
          </div>

          <!-- اسم المستخدم تحت اللوجو -->
          <div class="sidebar-user-welcome">
            <div class="welcome-text">Welcome back,</div>
            <div class="user-name-display" id="sidebarUserName">Admin</div>
          </div>

          <nav class="sidebar-nav">
            <div class="nav-section">Main</div>
            <a class="nav-item active" data-panel="dashboard">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
              Dashboard
            </a>

            <div class="nav-section">User Management</div>
            <a class="nav-item" data-panel="pending">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
              Pending Approvals
              <span class="badge" id="pendingBadge">0</span>
            </a>
            <a class="nav-item" data-panel="users">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
              All Users
            </a>

            <div class="nav-section">Data Management</div>
            <a class="nav-item" data-panel="clients">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"/></svg>
              Clients
            </a>
            <a class="nav-item" data-panel="quotations">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
              Quotations
            </a>

            <div class="nav-section">System</div>
            <a class="nav-item" data-panel="settings">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
              Settings
            </a>
            <a class="nav-item" data-panel="audit">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
              Audit Log
            </a>

            <div class="nav-section">Tools</div>
            <a class="nav-item" id="goToDataImport">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
              Data Import
            </a>

            <div class="nav-section">Application</div>
            <a class="nav-item" id="goToLauncher" style="background: rgba(102,126,234,0.3);">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 19H5V5h7V3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/></svg>
              Go to Launcher
            </a>
          </nav>

          <div class="sidebar-footer">
            <div class="user-info">
              <div class="user-avatar" id="userAvatar">A</div>
              <div class="user-details">
                <h4 id="userName">Admin</h4>
                <p id="userRole">Administrator</p>
              </div>
            </div>
            <button class="logout-btn" id="logoutBtn">Logout</button>
          </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">

          <!-- Dashboard Panel -->
          <div class="panel active" id="dashboard-panel">
            <div class="page-header">
              <div>
                <h1>Dashboard</h1>
                <p>Welcome back! Here's what's happening today.</p>
              </div>
            </div>

            <div class="stats-grid" id="statsGrid">
              <div class="stat-card">
                <div class="icon blue">
                  <svg viewBox="0 0 24 24" fill="#fff"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3z"/></svg>
                </div>
                <div class="value" id="statClients">-</div>
                <div class="label">Total Clients</div>
              </div>

              <div class="stat-card">
                <div class="icon green">
                  <svg viewBox="0 0 24 24" fill="#fff"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6z"/></svg>
                </div>
                <div class="value" id="statQuotations">-</div>
                <div class="label">Total Quotations</div>
              </div>

              <div class="stat-card">
                <div class="icon orange">
                  <svg viewBox="0 0 24 24" fill="#fff"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/></svg>
                </div>
                <div class="value" id="statValue">-</div>
                <div class="label">Total Value (EGP)</div>
              </div>

              <div class="stat-card">
                <div class="icon red">
                  <svg viewBox="0 0 24 24" fill="#fff"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
                </div>
                <div class="value" id="statMonthly">-</div>
                <div class="label">This Month Quotations</div>
              </div>
            </div>
          </div>

          <!-- Pending Users Panel -->
          <div class="panel" id="pending-panel">
            <div class="panel-header">
              <h3>Pending User Approvals</h3>
              <button class="action-btn" onclick="loadPendingUsers()">Refresh</button>
            </div>
            <div class="panel-body">
              <div id="pendingContent">
                <div class="loading-spinner"><div class="spinner"></div></div>
              </div>
            </div>
          </div>

          <!-- All Users Panel -->
          <div class="panel" id="users-panel">
            <div class="panel-header">
              <h3>All Users</h3>
              <button class="action-btn" onclick="loadAllUsers()">Refresh</button>
            </div>
            <div class="panel-body">
              <div id="usersContent">
                <div class="loading-spinner"><div class="spinner"></div></div>
              </div>
            </div>
          </div>

          <!-- Clients Panel -->
          <div class="panel" id="clients-panel">
            <div class="panel-header">
              <h3>Clients Management</h3>
            </div>
            <div class="panel-body">
              <div class="toolbar">
                <div class="search-box">
                  <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                  <input type="text" id="clientSearch" placeholder="Search clients..." oninput="searchClients()">
                </div>
                <label class="checkbox-label">
                  <input type="checkbox" id="showDeletedClients" onchange="loadClients()">
                  Show Deleted
                </label>
                <button class="action-btn green" onclick="exportClients()">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                  Export Excel
                </button>
              </div>
              <div id="clientsContent">
                <div class="loading-spinner"><div class="spinner"></div></div>
              </div>
            </div>
          </div>

          <!-- Quotations Panel -->
          <div class="panel" id="quotations-panel">
            <div class="panel-header">
              <h3>Quotations Management</h3>
            </div>
            <div class="panel-body">
              <div class="toolbar">
                <div class="search-box">
                  <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                  <input type="text" id="quotationSearch" placeholder="Search quotations..." oninput="searchQuotations()">
                </div>
                <label class="checkbox-label">
                  <input type="checkbox" id="showDeletedQuotations" onchange="loadQuotations()">
                  Show Deleted
                </label>
                <button class="action-btn green" onclick="exportQuotations()">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                  Export Excel
                </button>
              </div>
              <div id="quotationsContent">
                <div class="loading-spinner"><div class="spinner"></div></div>
              </div>
            </div>
          </div>

          <!-- Audit Log Panel -->
          <div class="panel" id="audit-panel">
            <div class="panel-header">
              <h3>Audit Log</h3>
              <button class="action-btn" onclick="loadAuditLogs()">Refresh</button>
            </div>
            <div class="panel-body">
              <div id="auditContent">
                <div class="loading-spinner"><div class="spinner"></div></div>
              </div>
            </div>
          </div>

          <!-- Settings Panel -->
          <div class="panel" id="settings-panel">
            <div class="panel-header">
              <h3>System Settings</h3>
              <button class="action-btn" onclick="loadSettings()">Refresh</button>
            </div>
            <div class="panel-body">
              <div id="settingsContent">
                <div class="loading-spinner"><div class="spinner"></div></div>
              </div>
            </div>
          </div>

        </main>
      </div>

      <!-- Role Modal -->
      <div class="modal-overlay" id="roleModal">
        <div class="modal-box">
          <div class="modal-header">
            <h3>Change User Role</h3>
            <button class="modal-close" onclick="closeModal('roleModal')">&times;</button>
          </div>
          <div class="modal-body">
            <div class="form-group">
              <label>Select Role</label>
              <select id="newRole">
                <option value="admin">Admin</option>
                <option value="manager">Manager</option>
                <option value="sales">Sales</option>
                <option value="viewer">Viewer</option>
              </select>
            </div>
          </div>
          <div class="modal-footer">
            <button class="filter-btn" onclick="closeModal('roleModal')">Cancel</button>
            <button class="action-btn" onclick="confirmRoleChange()">Save Changes</button>
          </div>
        </div>
      </div>

      <!-- Password Reset Modal -->
      <div class="modal-overlay" id="passwordModal">
        <div class="modal-box">
          <div class="modal-header">
            <h3>Reset Password</h3>
            <button class="modal-close" onclick="closeModal('passwordModal')">&times;</button>
          </div>
          <div class="modal-body">
            <div class="form-group">
              <label>New Password</label>
              <input type="password" id="newPassword" placeholder="Enter new password (min 6 characters)">
            </div>
          </div>
          <div class="modal-footer">
            <button class="filter-btn" onclick="closeModal('passwordModal')">Cancel</button>
            <button class="action-btn" onclick="confirmPasswordReset()">Reset Password</button>
          </div>
        </div>
      </div>

      <script>
        (function() {

          // State
          var currentPanel = 'dashboard';
          var clientsPage = 1;
          var quotationsPage = 1;
          var auditPage = 1;
          var selectedUserId = null;
          var searchTimeout = null;

          // ============================================
          // INIT - Will be called at the end of script
          // ============================================
          function init() {
            console.log('Initializing Admin Panel...');
            initUser();
            initNavigation();
            // Wait a bit for Python bridge functions then load dashboard
            setTimeout(function() {
              if (window.loadDashboard) {
                window.loadDashboard();
              }
            }, 500);
          }

          function initUser() {
            var name = sessionStorage.getItem('user_name') || 'Admin';
            var role = sessionStorage.getItem('user_role') || 'admin';

            document.getElementById('userName').textContent = name;
            document.getElementById('userRole').textContent = role.charAt(0).toUpperCase() + role.slice(1);
            document.getElementById('userAvatar').textContent = name.charAt(0).toUpperCase();

            // تحديث اسم المستخدم تحت اللوجو
            var sidebarUserName = document.getElementById('sidebarUserName');
            if (sidebarUserName) {
              sidebarUserName.textContent = name;
            }
          }

          // ============================================
          // NAVIGATION
          // ============================================
          function initNavigation() {
            console.log('Setting up navigation...');
            var navItems = document.querySelectorAll('.nav-item[data-panel]');
            console.log('Found nav items:', navItems.length);

            navItems.forEach(function(item) {
              item.style.cursor = 'pointer';
              item.onclick = function(e) {
                e.preventDefault();
                e.stopPropagation();
                var panel = item.dataset.panel;
                console.log('Nav clicked:', panel);
                if (!panel) return;

                // Update active state
                document.querySelectorAll('.nav-item').forEach(function(i) { i.classList.remove('active'); });
                item.classList.add('active');

                // Show panel
                document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
                var panelEl = document.getElementById(panel + '-panel');
                if (panelEl) {
                  panelEl.classList.add('active');
                  console.log('Activated panel:', panel + '-panel');
                }

                currentPanel = panel;

                // Load data
                if (panel === 'dashboard') loadDashboard();
                else if (panel === 'pending') loadPendingUsers();
                else if (panel === 'users') loadAllUsers();
                else if (panel === 'clients') loadClients();
                else if (panel === 'quotations') loadQuotations();
                else if (panel === 'audit') loadAuditLogs();
                else if (panel === 'settings') loadSettings();
              };
            });

            // Go to Launcher
            var launcherBtn = document.getElementById('goToLauncher');
            if (launcherBtn) {
              console.log('Setting up Launcher button');
              launcherBtn.style.cursor = 'pointer';
              launcherBtn.onclick = function(e) {
                e.preventDefault();
                console.log('Going to Launcher');
                window.location.hash = '#launcher';
              };
            }

            // Go to Data Import
            var importBtn = document.getElementById('goToDataImport');
            if (importBtn) {
              importBtn.style.cursor = 'pointer';
              importBtn.onclick = function(e) {
                e.preventDefault();
                if (window.openDataImport) {
                  window.openDataImport();
                }
              };
            }

            // Logout
            var logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) {
              logoutBtn.onclick = async function() {
                console.log('Logging out...');
                if (window.logoutUser) {
                  await window.logoutUser();
                }
                sessionStorage.clear();
                window.location.hash = '#login';
              };
            }
          }

          // ============================================
          // DASHBOARD
          // ============================================
          window.loadDashboard = async function() {
            try {
              // Wait for Python bridge to be ready
              if (!window.getDashboardStats) {
                console.log('Waiting for bridge functions...');
                setTimeout(loadDashboard, 500);
                return;
              }

              var stats = await window.getDashboardStats();
              if (stats) {
                document.getElementById('statClients').textContent = (stats.total_clients || 0).toLocaleString();
                document.getElementById('statQuotations').textContent = (stats.total_quotations || 0).toLocaleString();
                document.getElementById('statValue').textContent = (stats.total_value || 0).toLocaleString();
                document.getElementById('statMonthly').textContent = (stats.this_month_quotations || 0).toLocaleString();
              }

              // Update pending badge
              if (window.getPendingUsers) {
                var pending = await window.getPendingUsers();
                if (pending && pending.success && pending.users) {
                  document.getElementById('pendingBadge').textContent = pending.users.length;
                }
              }
            } catch (e) {
              console.error('Dashboard error:', e);
              // Show zeros on error
              document.getElementById('statClients').textContent = '0';
              document.getElementById('statQuotations').textContent = '0';
              document.getElementById('statValue').textContent = '0';
              document.getElementById('statMonthly').textContent = '0';
            }
          };

          // ============================================
          // PENDING USERS
          // ============================================
          window.loadPendingUsers = async function() {
            var container = document.getElementById('pendingContent');
            container.innerHTML = '<div class="loading-spinner"><div class="spinner"></div></div>';

            try {
              var result = await window.getPendingUsers();
              if (!result.success) {
                container.innerHTML = '<div class="empty-state"><h4>' + result.message + '</h4></div>';
                return;
              }

              if (result.users.length === 0) {
                container.innerHTML = '<div class="empty-state"><h4>No pending approvals</h4><p>All users have been reviewed</p></div>';
                return;
              }

              var html = '<table class="data-table"><thead><tr><th>Name</th><th>Email</th><th>Registered</th><th>Actions</th></tr></thead><tbody>';
              result.users.forEach(function(u) {
                html += '<tr>';
                html += '<td>' + u.full_name + '</td>';
                html += '<td>' + u.email + '</td>';
                html += '<td>' + u.created_at.split('T')[0] + '</td>';
                html += '<td class="actions">';
                html += '<button class="btn-sm approve" onclick="approveUser(\'' + u.user_id + '\')">Approve</button>';
                html += '<button class="btn-sm reject" onclick="rejectUser(\'' + u.user_id + '\')">Reject</button>';
                html += '</td></tr>';
              });
              html += '</tbody></table>';
              container.innerHTML = html;

              document.getElementById('pendingBadge').textContent = result.users.length;
            } catch (e) {
              container.innerHTML = '<div class="empty-state"><h4>Error loading users</h4></div>';
            }
          };

          window.approveUser = async function(userId) {
            if (!confirm('Approve this user?')) return;
            var result = await window.approveUser(userId, 'sales');
            if (result.success) {
              loadPendingUsers();
              loadDashboard();
            } else {
              alert(result.message);
            }
          };

          window.rejectUser = async function(userId) {
            if (!confirm('Reject and delete this user?')) return;
            var result = await window.rejectUser(userId);
            if (result.success) {
              loadPendingUsers();
            } else {
              alert(result.message);
            }
          };

          // ============================================
          // ALL USERS
          // ============================================
          window.loadAllUsers = async function() {
            var container = document.getElementById('usersContent');
            container.innerHTML = '<div class="loading-spinner"><div class="spinner"></div></div>';

            try {
              var result = await window.getAllUsers();
              if (!result.success) {
                container.innerHTML = '<div class="empty-state"><h4>' + result.message + '</h4></div>';
                return;
              }

              if (result.users.length === 0) {
                container.innerHTML = '<div class="empty-state"><h4>No users found</h4></div>';
                return;
              }

              var html = '<table class="data-table"><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Last Login</th><th>Actions</th></tr></thead><tbody>';
              result.users.forEach(function(u) {
                var status = u.is_approved ? (u.is_active ? 'active' : 'inactive') : 'pending';
                html += '<tr>';
                html += '<td>' + u.full_name + '</td>';
                html += '<td>' + u.email + '</td>';
                html += '<td>' + u.role + '</td>';
                html += '<td><span class="status ' + status + '">' + status.charAt(0).toUpperCase() + status.slice(1) + '</span></td>';
                html += '<td>' + (u.last_login === 'Never' ? 'Never' : u.last_login.split('T')[0]) + '</td>';
                html += '<td class="actions">';
                html += '<button class="btn-sm edit" onclick="showRoleModal(\'' + u.user_id + '\', \'' + u.role + '\')">Role</button>';
                html += '<button class="btn-sm edit" onclick="showPasswordModal(\'' + u.user_id + '\')">Password</button>';
                if (u.is_approved) {
                  html += '<button class="btn-sm ' + (u.is_active ? 'reject' : 'approve') + '" onclick="toggleActive(\'' + u.user_id + '\')">' + (u.is_active ? 'Disable' : 'Enable') + '</button>';
                }
                html += '</td></tr>';
              });
              html += '</tbody></table>';
              container.innerHTML = html;
            } catch (e) {
              container.innerHTML = '<div class="empty-state"><h4>Error loading users</h4></div>';
            }
          };

          window.showRoleModal = function(userId, currentRole) {
            selectedUserId = userId;
            document.getElementById('newRole').value = currentRole;
            document.getElementById('roleModal').classList.add('show');
          };

          window.showPasswordModal = function(userId) {
            selectedUserId = userId;
            document.getElementById('newPassword').value = '';
            document.getElementById('passwordModal').classList.add('show');
          };

          window.closeModal = function(id) {
            document.getElementById(id).classList.remove('show');
          };

          window.confirmRoleChange = async function() {
            var role = document.getElementById('newRole').value;
            var result = await window.updateUserRole(selectedUserId, role);
            closeModal('roleModal');
            if (result.success) {
              loadAllUsers();
            } else {
              alert(result.message);
            }
          };

          window.confirmPasswordReset = async function() {
            var password = document.getElementById('newPassword').value;
            if (password.length < 6) {
              alert('Password must be at least 6 characters');
              return;
            }
            var result = await window.resetUserPassword(selectedUserId, password);
            closeModal('passwordModal');
            if (result.success) {
              alert('Password reset successfully');
            } else {
              alert(result.message);
            }
          };

          window.toggleActive = async function(userId) {
            var result = await window.toggleUserActive(userId);
            if (result.success) {
              loadAllUsers();
            } else {
              alert(result.message);
            }
          };

          // ============================================
          // CLIENTS
          // ============================================
          window.loadClients = async function(page) {
            clientsPage = page || 1;
            var container = document.getElementById('clientsContent');
            container.innerHTML = '<div class="loading-spinner"><div class="spinner"></div></div>';

            var search = document.getElementById('clientSearch').value;
            var showDeleted = document.getElementById('showDeletedClients').checked;

            try {
              var result = await window.getAllClients(clientsPage, 15, search, showDeleted);
              renderClientsTable(result, container);
            } catch (e) {
              container.innerHTML = '<div class="empty-state"><h4>Error loading clients</h4></div>';
            }
          };

          function renderClientsTable(result, container) {
            if (result.data.length === 0) {
              container.innerHTML = '<div class="empty-state"><h4>No clients found</h4></div>';
              return;
            }

            var html = '<table class="data-table"><thead><tr><th>Code</th><th>Name</th><th>Company</th><th>Phone</th><th>Country</th><th>Status</th><th>Actions</th></tr></thead><tbody>';
            result.data.forEach(function(c) {
              var status = c.is_deleted ? 'deleted' : 'active';
              html += '<tr>';
              html += '<td>' + c['Client Code'] + '</td>';
              html += '<td>' + c['Client Name'] + '</td>';
              html += '<td>' + c['Company'] + '</td>';
              html += '<td>' + c['Phone'] + '</td>';
              html += '<td>' + (c['Country'] || '-') + '</td>';
              html += '<td><span class="status ' + status + '">' + status.charAt(0).toUpperCase() + status.slice(1) + '</span></td>';
              html += '<td class="actions">';
              if (c.is_deleted) {
                html += '<button class="btn-sm restore" onclick="restoreClient(\'' + c['Client Code'] + '\')">Restore</button>';
              } else {
                html += '<button class="btn-sm delete" onclick="deleteClient(\'' + c['Client Code'] + '\')">Delete</button>';
              }
              html += '</td></tr>';
            });
            html += '</tbody></table>';

            // Pagination
            html += '<div class="pagination">';
            html += '<button ' + (result.page <= 1 ? 'disabled' : '') + ' onclick="loadClients(' + (result.page - 1) + ')">Previous</button>';
            html += '<span class="page-info">Page ' + result.page + ' of ' + result.total_pages + ' (' + result.total + ' items)</span>';
            html += '<button ' + (result.page >= result.total_pages ? 'disabled' : '') + ' onclick="loadClients(' + (result.page + 1) + ')">Next</button>';
            html += '</div>';

            container.innerHTML = html;
          }

          window.searchClients = function() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(function() { loadClients(1); }, 300);
          };

          window.deleteClient = async function(code) {
            if (!confirm('Delete this client?')) return;
            var result = await window.softDeleteClient(code);
            if (result.success) {
              loadClients(clientsPage);
            } else {
              alert(result.message);
            }
          };

          window.restoreClient = async function(code) {
            var result = await window.restoreClient(code);
            if (result.success) {
              loadClients(clientsPage);
            } else {
              alert(result.message);
            }
          };

          window.exportClients = async function() {
            var showDeleted = document.getElementById('showDeletedClients').checked;
            var data = await window.exportClientsData(showDeleted);
            downloadCSV(data, 'clients_export.csv');
          };

          // ============================================
          // QUOTATIONS
          // ============================================
          window.loadQuotations = async function(page) {
            quotationsPage = page || 1;
            var container = document.getElementById('quotationsContent');
            container.innerHTML = '<div class="loading-spinner"><div class="spinner"></div></div>';

            var search = document.getElementById('quotationSearch').value;
            var showDeleted = document.getElementById('showDeletedQuotations').checked;

            try {
              var result = await window.getAllQuotations(quotationsPage, 15, search, showDeleted);
              renderQuotationsTable(result, container);
            } catch (e) {
              container.innerHTML = '<div class="empty-state"><h4>Error loading quotations</h4></div>';
            }
          };

          function renderQuotationsTable(result, container) {
            if (result.data.length === 0) {
              container.innerHTML = '<div class="empty-state"><h4>No quotations found</h4></div>';
              return;
            }

            var html = '<table class="data-table"><thead><tr><th>#</th><th>Date</th><th>Client</th><th>Model</th><th>Agreed Price</th><th>Status</th><th>Actions</th></tr></thead><tbody>';
            result.data.forEach(function(q) {
              var status = q.is_deleted ? 'deleted' : 'active';
              html += '<tr>';
              html += '<td>' + q['Quotation#'] + '</td>';
              html += '<td>' + q['Date'] + '</td>';
              html += '<td>' + q['Client Name'] + '</td>';
              html += '<td>' + (q['Model'] || '-') + '</td>';
              html += '<td>' + (q['Agreed Price'] ? q['Agreed Price'].toLocaleString() : '-') + '</td>';
              html += '<td><span class="status ' + status + '">' + status.charAt(0).toUpperCase() + status.slice(1) + '</span></td>';
              html += '<td class="actions">';
              if (q.is_deleted) {
                html += '<button class="btn-sm restore" onclick="restoreQuotation(' + q['Quotation#'] + ')">Restore</button>';
              } else {
                html += '<button class="btn-sm delete" onclick="deleteQuotation(' + q['Quotation#'] + ')">Delete</button>';
              }
              html += '</td></tr>';
            });
            html += '</tbody></table>';

            // Pagination
            html += '<div class="pagination">';
            html += '<button ' + (result.page <= 1 ? 'disabled' : '') + ' onclick="loadQuotations(' + (result.page - 1) + ')">Previous</button>';
            html += '<span class="page-info">Page ' + result.page + ' of ' + result.total_pages + ' (' + result.total + ' items)</span>';
            html += '<button ' + (result.page >= result.total_pages ? 'disabled' : '') + ' onclick="loadQuotations(' + (result.page + 1) + ')">Next</button>';
            html += '</div>';

            container.innerHTML = html;
          }

          window.searchQuotations = function() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(function() { loadQuotations(1); }, 300);
          };

          window.deleteQuotation = async function(num) {
            if (!confirm('Delete this quotation?')) return;
            var result = await window.softDeleteQuotation(num);
            if (result.success) {
              loadQuotations(quotationsPage);
            } else {
              alert(result.message);
            }
          };

          window.restoreQuotation = async function(num) {
            var result = await window.restoreQuotation(num);
            if (result.success) {
              loadQuotations(quotationsPage);
            } else {
              alert(result.message);
            }
          };

          window.exportQuotations = async function() {
            var showDeleted = document.getElementById('showDeletedQuotations').checked;
            var data = await window.exportQuotationsData(showDeleted);
            downloadCSV(data, 'quotations_export.csv');
          };

          // ============================================
          // AUDIT LOG
          // ============================================
          window.loadAuditLogs = async function(page) {
            auditPage = page || 1;
            var container = document.getElementById('auditContent');
            container.innerHTML = '<div class="loading-spinner"><div class="spinner"></div></div>';

            try {
              var result = await window.getAuditLogs(50, (auditPage - 1) * 50, null);
              if (!result.success) {
                container.innerHTML = '<div class="empty-state"><h4>' + result.message + '</h4></div>';
                return;
              }

              if (result.logs.length === 0) {
                container.innerHTML = '<div class="empty-state"><h4>No audit logs found</h4></div>';
                return;
              }

              var html = '<table class="data-table"><thead><tr><th>Time</th><th>User</th><th>Action</th><th>Table</th><th>Record ID</th></tr></thead><tbody>';
              result.logs.forEach(function(l) {
                html += '<tr>';
                html += '<td>' + l.timestamp.replace('T', ' ').substring(0, 19) + '</td>';
                html += '<td>' + l.user_email + '</td>';
                html += '<td>' + l.action + '</td>';
                html += '<td>' + l.table_name + '</td>';
                html += '<td>' + (l.record_id || '-') + '</td>';
                html += '</tr>';
              });
              html += '</tbody></table>';

              container.innerHTML = html;
            } catch (e) {
              container.innerHTML = '<div class="empty-state"><h4>Error loading audit logs</h4></div>';
            }
          };

          // ============================================
          // SETTINGS
          // ============================================
          window.loadSettings = async function() {
            var container = document.getElementById('settingsContent');
            container.innerHTML = '<div class="loading-spinner"><div class="spinner"></div></div>';

            try {
              var result = await window.getAllSettings();
              if (!result || !result.success) {
                container.innerHTML = '<div class="empty-state"><h4>' + (result ? result.message : 'Error loading settings') + '</h4></div>';
                return;
              }

              var settings = result.settings || {};

              var html = '<div style="max-width: 800px;">';

              // Exchange Rate Section
              html += '<div style="background:#f8f9fa;padding:20px;border-radius:12px;margin-bottom:20px;">';
              html += '<h4 style="margin:0 0 15px;color:#1a1a2e;">💱 Exchange Rate</h4>';
              html += '<div class="form-group" style="margin-bottom:0;">';
              html += '<label>USD to EGP Rate</label>';
              html += '<div style="display:flex;gap:10px;align-items:center;">';
              html += '<input type="number" step="0.01" id="setting_exchange_rate" value="' + (settings.exchange_rate || 47.5) + '" style="flex:1;">';
              html += '<button class="action-btn" onclick="saveSetting(\'exchange_rate\')">Save</button>';
              html += '</div></div></div>';

              // Shipping & Expenses Section
              html += '<div style="background:#f8f9fa;padding:20px;border-radius:12px;margin-bottom:20px;">';
              html += '<h4 style="margin:0 0 15px;color:#1a1a2e;">🚢 Shipping & Expenses (USD)</h4>';

              html += '<div class="form-group">';
              html += '<label>Sea Shipping Cost</label>';
              html += '<div style="display:flex;gap:10px;align-items:center;">';
              html += '<input type="number" step="1" id="setting_shipping_sea" value="' + (settings.shipping_sea || 3200) + '" style="flex:1;">';
              html += '<button class="action-btn" onclick="saveSetting(\'shipping_sea\')">Save</button>';
              html += '</div></div>';

              html += '<div class="form-group">';
              html += '<label>THS Cost</label>';
              html += '<div style="display:flex;gap:10px;align-items:center;">';
              html += '<input type="number" step="1" id="setting_ths_cost" value="' + (settings.ths_cost || 1000) + '" style="flex:1;">';
              html += '<button class="action-btn" onclick="saveSetting(\'ths_cost\')">Save</button>';
              html += '</div></div>';

              html += '<div class="form-group">';
              html += '<label>Clearance Expenses</label>';
              html += '<div style="display:flex;gap:10px;align-items:center;">';
              html += '<input type="number" step="1" id="setting_clearance_expenses" value="' + (settings.clearance_expenses || 1400) + '" style="flex:1;">';
              html += '<button class="action-btn" onclick="saveSetting(\'clearance_expenses\')">Save</button>';
              html += '</div></div>';

              html += '<div class="form-group">';
              html += '<label>Tax Rate (%)</label>';
              html += '<div style="display:flex;gap:10px;align-items:center;">';
              html += '<input type="number" step="0.01" id="setting_tax_rate" value="' + ((settings.tax_rate || 0.15) * 100) + '" style="flex:1;">';
              html += '<button class="action-btn" onclick="saveSetting(\'tax_rate\', true)">Save</button>';
              html += '</div></div>';

              html += '<div class="form-group" style="margin-bottom:0;">';
              html += '<label>Bank Commission (%)</label>';
              html += '<div style="display:flex;gap:10px;align-items:center;">';
              html += '<input type="number" step="0.001" id="setting_bank_commission" value="' + ((settings.bank_commission || 0.0132) * 100) + '" style="flex:1;">';
              html += '<button class="action-btn" onclick="saveSetting(\'bank_commission\', true)">Save</button>';
              html += '</div></div>';

              html += '</div>';

              // Cylinder Prices Section
              html += '<div style="background:#f8f9fa;padding:20px;border-radius:12px;margin-bottom:20px;">';
              html += '<h4 style="margin:0 0 15px;color:#1a1a2e;">🔧 Cylinder Prices (USD per cm)</h4>';

              var widths = [80, 100, 120, 130, 140, 160];
              var defaultPrices = {80:3.49, 100:3.59, 120:4.05, 130:4.5, 140:5.026, 160:5.4};

              widths.forEach(function(w, i) {
                var isLast = (i === widths.length - 1);
                html += '<div class="form-group"' + (isLast ? ' style="margin-bottom:0;"' : '') + '>';
                html += '<label>Width ' + w + ' cm</label>';
                html += '<div style="display:flex;gap:10px;align-items:center;">';
                html += '<input type="number" step="0.001" id="setting_cylinder_price_' + w + '" value="' + (settings['cylinder_price_' + w] || defaultPrices[w]) + '" style="flex:1;">';
                html += '<button class="action-btn" onclick="saveSetting(\'cylinder_price_' + w + '\')">Save</button>';
                html += '</div></div>';
              });

              html += '</div>';

              html += '</div>';

              container.innerHTML = html;
            } catch (e) {
              console.error('Settings error:', e);
              container.innerHTML = '<div class="empty-state"><h4>Error loading settings</h4></div>';
            }
          };

          window.saveSetting = async function(key, isPercent) {
            var input = document.getElementById('setting_' + key);
            if (!input) return;

            var value = parseFloat(input.value);
            if (isNaN(value)) {
              alert('Please enter a valid number');
              return;
            }

            // تحويل النسبة المئوية
            if (isPercent) {
              value = value / 100;
            }

            try {
              var result = await window.updateSetting(key, value);
              if (result && result.success) {
                alert('Setting saved successfully!');
              } else {
                alert(result ? result.message : 'Error saving setting');
              }
            } catch (e) {
              alert('Error saving setting: ' + e);
            }
          };

          // ============================================
          // CSV EXPORT
          // ============================================
          function downloadCSV(data, filename) {
            if (!data || data.length === 0) {
              alert('No data to export');
              return;
            }

            var headers = Object.keys(data[0]);
            var csv = headers.join(',') + '\n';

            data.forEach(function(row) {
              var values = headers.map(function(h) {
                var val = row[h] || '';
                if (typeof val === 'string' && (val.includes(',') || val.includes('"'))) {
                  val = '"' + val.replace(/"/g, '""') + '"';
                }
                return val;
              });
              csv += values.join(',') + '\n';
            });

            var blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
            var link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            link.click();
          }

          // ============================================
          // RUN INIT at the end after all functions are defined
          // ============================================
          if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
          } else {
            // Small delay to ensure everything is ready
            setTimeout(init, 100);
          }

        })();
      </script>
