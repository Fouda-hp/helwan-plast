oup\" style=\"margin-bottom:8px;\">';\n              html += '<label style=\"font-size:12px;\">Max Printing Speed (m/min)</label>';\n              html += '<div style=\"display:flex;gap:10px;align-items:center;\">';\n              html += '<input type=\"number\" id=\"setting_gear_max_print_speed\" value=\"' + (settings.gear_max_print_speed || 80) + '\" style=\"flex:1;\">';\n              html += '<button class=\"action-btn\" style=\"padding:6px 12px;\" onclick=\"saveSetting(\\'gear_max_print_speed\\')\">Save</button>';\n              html += '</div></div>';\n\n              html += '<div class=\"form-group\" style=\"margin-bottom:0;\">';\n              html += '<label style=\"font-size:12px;\">Printing Length Range</label>';\n              html += '<div style=\"display:flex;gap:10px;align-items:center;\">';\n              html += '<input type=\"text\" id=\"setting_gear_print_length\" value=\"' + (settings.gear_print_length || '240mm - 1000mm') + '\" style=\"flex:1;\">';\n              html += '<button class=\"action-btn\" style=\"padding:6px 12px;\" onclick=\"saveSettingText(\\'gear_print_length\\')\">Save</button>';\n              html += '</div></div>';\n              html += '</div>';\n\n              // Winder Settings\n              html += '<div style=\"background:#f5f5f5;padding:10px;border-radius:6px;margin-bottom:10px;\">';\n              html += '<h6 style=\"margin:0 0 8px;color:#333;\">Winder Type Settings</h6>';\n\n              html += '<div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px;\">';\n\n              html += '<div class=\"form-group\" style=\"margin-bottom:0;\">';\n              html += '<label style=\"font-size:12px;\">Single Winder - Max Roll Diameter (mm)</label>';\n              html += '<div style=\"display:flex;gap:10px;align-items:center;\">';\n              html += '<input type=\"number\" id=\"setting_single_winder_roll_dia\" value=\"' + (settings.single_winder_roll_dia || 1200) + '\" style=\"flex:1;\">';\n              html += '<button class=\"action-btn\" style=\"padding:6px 12px;\" onclick=\"saveSetting(\\'single_winder_roll_dia\\')\">Save</button>';\n              html += '</div></div>';\n\n              html += '<div class=\"form-group\" style=\"margin-bottom:0;\">';\n              html += '<label style=\"font-size:12px;\">Double Winder - Max Roll Diameter (mm)</label>';\n              html += '<div style=\"display:flex;gap:10px;align-items:center;\">';\n              html += '<input type=\"number\" id=\"setting_double_winder_roll_dia\" value=\"' + (settings.double_winder_roll_dia || 800) + '\" style=\"flex:1;\">';\n              html += '<button class=\"action-btn\" style=\"padding:6px 12px;\" onclick=\"saveSetting(\\'double_winder_roll_dia\\')\">Save</button>';\n              html += '</div></div>';\n\n              html += '</div>';\n              html += '</div>';\n\n              // Other Fixed Values\n              html += '<div style=\"background:#f5f5f5;padding:10px;border-radius:6px;\">';\n              html += '<h6 style=\"margin:0 0 8px;color:#333;\">Other Fixed Values</h6>';\n\n              html += '<div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px;\">';\n\n              html += '<div class=\"form-group\" style=\"margin-bottom:0;\">';\n              html += '<label style=\"font-size:12px;\">Dryer Capacity</label>';\n              html += '<div style=\"display:flex;gap:10px;align-items:center;\">';\n              html += '<input type=\"text\" id=\"setting_dryer_capacity\" value=\"' + (settings.dryer_capacity || '2.2kw air blower × 2 units') + '\" style=\"flex:1;\">';\n              html += '<button class=\"action-btn\" style=\"padding:6px 12px;\" onclick=\"saveSettingText(\\'dryer_capacity\\')\">Save</button>';\n              html += '</div></div>';\n\n              html += '<div class=\"form-group\" style=\"margin-bottom:0;\">';\n              html += '<label style=\"font-size:12px;\">Main Motor Power</label>';\n              html += '<div style=\"display:flex;gap:10px;align-items:center;\">';\n              html += '<input type=\"text\" id=\"setting_main_motor_power\" value=\"' + (settings.main_motor_power || '5 HP') + '\" style=\"flex:1;\">';\n              html += '<button class=\"action-btn\" style=\"padding:6px 12px;\" onclick=\"saveSettingText(\\'main_motor_power\\')\">Save</button>';\n              html += '</div></div>';\n\n              html += '</div>';\n              html += '</div>';\n\n              html += '</div>'; // End Technical Specs Table Rules\n\n              html += '</div>'; // End Quotation Template Settings\n\n              html += '</div>';\n\n              container.innerHTML = html;\n            } catch (e) {\n              console.error('Settings error:', e);\n              container.innerHTML = '<div class=\"empty-state\"><h4>Error loading settings</h4></div>';\n            }\n          };\n\n          // Toggle value configuration based on source type\n          window.toggleValueConfig = function(specNum) {\n            var sourceSelect = document.getElementById('tech_' + specNum + '_source');\n            var fixedDiv = document.getElementById('tech_' + specNum + '_fixed_div');\n            var rulesDiv = document.getElementById('tech_' + specNum + '_rules_div');\n\n            if (sourceSelect && fixedDiv && rulesDiv) {\n              var val = sourceSelect.value;\n              fixedDiv.style.display = (val === 'fixed') ? 'block' : 'none';\n              rulesDiv.style.display = (val === 'conditional') ? 'block' : 'none';\n            }\n          };\n\n          // Rule counter for each spec\n          window.ruleCounters = {};\n\n          // Add a new rule\n          window.addRule = function(specNum) {\n            var rulesList = document.getElementById('tech_' + specNum + '_rules_list');\n            if (!rulesList) return;\n\n            if (!window.ruleCounters[specNum]) {\n              window.ruleCounters[specNum] = rulesList.children.length;\n            }\n            var ruleIdx = window.ruleCounters[specNum]++;\n\n            var ruleHtml = window.renderRuleRow(specNum, ruleIdx, {}, window.quotationFields);\n            var div = document.createElement('div');\n            div.innerHTML = ruleHtml;\n            rulesList.appendChild(div.firstChild);\n          };\n\n          // Remove a rule\n          window.removeRule = function(specNum, ruleIdx) {\n            var ruleRow = document.getElementById('rule_' + specNum + '_' + ruleIdx);\n            if (ruleRow) {\n              ruleRow.remove();\n            }\n          };\n\n          // Collect rules for a spec\n          function collectRules(specNum) {\n            var rules = [];\n            var rulesList = document.getElementById('tech_' + specNum + '_rules_list');\n            if (!rulesList) return rules;\n\n            var ruleRows = rulesList.querySelectorAll('.rule-row');\n            ruleRows.forEach(function(row) {\n              var id = row.id; // rule_X_Y\n              var parts = id.split('_');\n              var idx = parts[2];\n\n              var field = document.getElementById('rule_' + specNum + '_' + idx + '_field');\n              var op = document.getElementById('rule_' + specNum + '_' + idx + '_op');\n              var val = document.getElementById('rule_' + specNum + '_' + idx + '_val');\n              var result = document.getElementById('rule_' + specNum + '_' + idx + '_result');\n\n              if (field && op && val && result) {\n                rules.push({\n                  field: field.value,\n                  operator: op.value,\n                  value: val.value,\n                  result: result.value\n                });\n              }\n            });\n            return rules;\n          }\n\n          // Save all technical specs\n          window.saveTechSpecs = async function() {\n            var specsData = {};\n\n            for (var i = 1; i <= 20; i++) {\n              var labelAr = document.getElementById('tech_' + i + '_label_ar');\n              var labelEn = document.getElementById('tech_' + i + '_label_en');\n              var source = document.getElementById('tech_' + i + '_source');\n              var fixedValue = document.getElementById('tech_' + i + '_fixed');\n              var defaultValue = document.getElementById('tech_' + i + '_default');\n              var active = document.getElementById('tech_' + i + '_active');\n\n              if (labelAr && labelEn && source && active) {\n                var specData = {\n                  label_ar: labelAr.value,\n                  label_en: labelEn.value,\n                  source: source.value,\n                  active: active.checked\n                };\n\n                // Add fixed/default value\n                if (source.value === 'fixed' && fixedValue) {\n                  specData.default_value = fixedValue.value;\n                } else if (source.value === 'conditional') {\n                  specData.rules = collectRules(i);\n                  if (defaultValue) {\n                    specData.default_value = defaultValue.value;\n                  }\n                }\n\n                specsData['tech_spec_' + i] = specData;\n              }\n            }\n\n            try {\n              var result = await window.updateSetting('technical_specs', JSON.stringify(specsData));\n              if (result && result.success) {\n                alert('Technical Specifications saved successfully!');\n              } else {\n                alert(result ? result.message : 'Error saving settings');\n              }\n            } catch (e) {\n              alert('Error saving: ' + e);\n            }\n          };\n\n          // Save text setting (not percentage)\n          window.saveSettingText = async function(key) {\n            var input = document.getElementById('setting_' + key);\n            if (!input) return;\n\n            var value = input.value.trim();\n            if (!value) {\n              alert('Please enter a value');\n              return;\n            }\n\n            try {\n              var result = await window.updateSetting(key, value);\n              if (result && result.success) {\n                alert('Setting saved successfully!');\n              } else {\n                alert(result ? result.message : 'Error saving setting');\n              }\n            } catch (e) {\n              alert('Error saving setting: ' + e);\n            }\n          };\n\n          window.saveSetting = async function(key, isPercent) {\n            var input = document.getElementById('setting_' + key);\n            if (!input) return;\n\n            var value = parseFloat(input.value);\n            if (isNaN(value)) {\n              alert('Please enter a valid number');\n              return;\n            }\n\n            // تحويل النسبة المئوية\n            if (isPercent) {\n              value = value / 100;\n            }\n\n            try {\n              var result = await window.updateSetting(key, value);\n              if (result && result.success) {\n                alert('Setting saved successfully!');\n              } else {\n                alert(result ? result.message : 'Error saving setting');\n              }\n            } catch (e) {\n              alert('Error saving setting: ' + e);\n            }\n          };\n\n          // ============================================\n          // CSV EXPORT\n          // ============================================\n          function downloadCSV(data, filename) {\n            if (!data || data.length === 0) {\n              alert('No data to export');\n              return;\n            }\n\n            var headers = Object.keys(data[0]);\n            var csv = headers.join(',') + '\\n';\n\n            data.forEach(function(row) {\n              var values = headers.map(function(h) {\n                var val = row[h] || '';\n                if (typeof val === 'string' && (val.includes(',') || val.includes('\"'))) {\n                  val = '\"' + val.replace(/\"/g, '\"\"') + '\"';\n                }\n                return val;\n              });\n              csv += values.join(',') + '\\n';\n            });\n\n            var blob = new Blob(['\\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });\n            var link = document.createElement('a');\n            link.href = URL.createObjectURL(blob);\n            link.download = filename;\n            link.click();\n          }\n\n          // ============================================\n          // LANGUAGE SYSTEM\n          // ============================================\n          var adminLang = localStorage.getItem('hp_language') || 'en';\n\n          var adminTranslations = {\n            en: {\n\n              sidebarSubtitle: 'Helwan Plast System',\n              welcomeText: 'Welcome back,',\n              adminLangText: 'العربية',\n              navMain: 'Main',\n              navDashboard: 'Dashboard',\n              navUserMgmt: 'User Management',\n              navPending: 'Pending Approvals',\n              navAllUsers: 'All Users',\n              navDataMgmt: 'Data Management',\n              navClients: 'Clients',\n              navQuotations: 'Quotations',\n              navSystem: 'System',\n              navSettings: 'Settings',\n              navAudit: 'Audit Log',\n              navTools: 'Tools',\n              navDataImport: 'Data Import',\n              navApplication: 'Application',\n              navGoToLauncher: 'Go to Launcher',\n              navLogout: 'Logout',\n              dashboardTitle: 'Dashboard',\n              dashboardSubtitle: \"Welcome back! Here's what's happening today.\",\n              pendingTitle: 'Pending User Approvals',\n              usersTitle: 'All Users',\n              clientsTitle: 'Clients Management',\n              quotationsTitle: 'Quotations Management',\n              settingsTitle: 'System Settings',\n              auditTitle: 'Audit Log',\n              refresh: 'Refresh',\n              approve: 'Approve',\n              reject: 'Reject',\n              approvalTitle: 'Approve User',\n              selectRole: 'Select Role for this User',\n              roleViewer: 'Viewer (Read Only)',\n              roleSales: 'Sales (Create & Edit Own)',\n              roleManager: 'Manager (Full except Admin)',\n              roleAdmin: 'Admin (Full Access)',\n              rolePermissions: 'Role Permissions:',\n              approveUser: 'Approve User',\n              processing: 'Processing',\n              userApproved: 'User Approved!',\n              userRejected: 'User Rejected',\n              searchClients: 'Search clients...',\n              searchQuotations: 'Search quotations...',\n              showDeleted: 'Show Deleted',\n              exportExcel: 'Export',\n              // Dashboard Labels\n              lblTotalClients: 'Total Clients',\n              lblTotalQuotations: 'Total Quotations',\n              lblTotalValue: 'Total Value (EGP)',\n              lblThisMonth: 'This Month Quotations',\n              // Buttons\n              btnRefresh: 'Refresh',\n              txtShowDeleted: 'Show Deleted',\n              txtExportExcel: 'Export'\n            },\n            ar: {\n              sidebarTitle: 'لوحة التحكم',\n              sidebarSubtitle: 'نظام حلوان بلاست',\n              welcomeText: 'مرحباً بعودتك،',\n              adminLangText: 'English',\n              navMain: 'الرئيسية',\n              navDashboard: 'لوحة المعلومات',\n              navUserMgmt: 'إدارة المستخدمين',\n              navPending: 'طلبات الانتظار',\n              navAllUsers: 'جميع المستخدمين',\n              navDataMgmt: 'إدارة البيانات',\n              navClients: 'العملاء',\n              navQuotations: 'عروض الأسعار',\n              navSystem: 'النظام',\n              navSettings: 'الإعدادات',\n              navAudit: 'سجل العمليات',\n              navTools: 'الأدوات',\n              navDataImport: 'استيراد البيانات',\n              navApplication: 'التطبيق',\n              navGoToLauncher: 'الذهاب للقائمة',\n              navLogout: 'تسجيل الخروج',\n              dashboardTitle: 'لوحة المعلومات',\n              dashboardSubtitle: 'مرحباً بعودتك! إليك ما يحدث اليوم.',\n              statClients: 'إجمالي العملاء',\n              statQuotations: 'إجمالي العروض',\n              statValue: 'إجمالي القيمة (ج.م)',\n              statMonthly: 'عروض هذا الشهر',\n              pendingTitle: 'طلبات تسجيل المستخدمين',\n              usersTitle: 'جميع المستخدمين',\n              clientsTitle: 'إدارة العملاء',\n              quotationsTitle: 'إدارة عروض الأسعار',\n              settingsTitle: 'إعدادات النظام',\n              auditTitle: 'سجل العمليات',\n              refresh: 'تحديث',\n              approve: 'موافقة',\n              reject: 'رفض',\n              approvalTitle: 'الموافقة على المستخدم',\n              selectRole: 'اختر الدور لهذا المستخدم',\n              roleViewer: 'مشاهد (قراءة فقط)',\n              roleSales: 'مبيعات (إنشاء وتعديل)',\n              roleManager: 'مدير (كل شيء ما عدا الإدارة)',\n              roleAdmin: 'مسؤول (صلاحيات كاملة)',\n              rolePermissions: 'صلاحيات الدور:',\n              approveUser: 'الموافقة على المستخدم',\n              processing: 'جاري المعالجة',\n              userApproved: 'تمت الموافقة!',\n              userRejected: 'تم الرفض',\n              searchClients: 'البحث في العملاء...',\n              searchQuotations: 'البحث في العروض...',\n              showDeleted: 'عرض المحذوفين',\n              exportExcel: 'تصدير',\n              // Dashboard Labels\n              dashboardTitle: 'لوحة المعلومات',\n              dashboardSubtitle: 'مرحباً بعودتك! إليك ما يحدث اليوم.',\n              lblTotalClients: 'إجمالي العملاء',\n              lblTotalQuotations: 'إجمالي العروض',\n              lblTotalValue: 'إجمالي القيمة (ج.م)',\n              lblThisMonth: 'عروض هذا الشهر',\n              // Panel Titles\n              pendingTitle: 'طلبات تسجيل المستخدمين',\n              usersTitle: 'جميع المستخدمين',\n              clientsTitle: 'إدارة العملاء',\n              quotationsTitle: 'إدارة عروض الأسعار',\n              settingsTitle: 'إعدادات النظام',\n              auditTitle: 'سجل العمليات',\n              // Buttons\n              btnRefresh: 'تحديث',\n              txtShowDeleted: 'عرض المحذوفين',\n              txtExportExcel: 'تصدير',\n              // Table Headers\n              thName: 'الاسم',\n              thEmail: 'البريد الإلكتروني',\n              thPhone: 'الهاتف',\n              thRegistered: 'تاريخ التسجيل',\n              thActions: 'الإجراءات',\n              thRole: 'الدور',\n              thStatus: 'الحالة',\n              thLastLogin: 'آخر دخول',\n              thCode: 'الكود',\n              thCompany: 'الشركة',\n              thCountry: 'الدولة',\n              thDate: 'التاريخ',\n              thClient: 'العميل',\n              thModel: 'الموديل',\n              thAgreedPrice: 'السعر المتفق',\n              // Status\n              statusActive: 'نشط',\n              statusInactive: 'غير نشط',\n              statusPending: 'قيد الانتظار',\n              statusDeleted: 'محذوف',\n              // Actions\n              approve: 'موافقة',\n              reject: 'رفض',\n              restore: 'استعادة',\n              disable: 'تعطيل',\n              enable: 'تفعيل',\n              // Empty States\n              noData: 'لا توجد بيانات',\n              noPendingApprovals: 'لا توجد طلبات انتظار',\n              allReviewed: 'تمت مراجعة جميع المستخدمين',\n              noUsersFound: 'لا يوجد مستخدمين',\n              noClientsFound: 'لا يوجد عملاء',\n              noQuotationsFound: 'لا توجد عروض أسعار',\n              // Pagination\n              page: 'صفحة',\n              of: 'من',\n              items: 'عنصر'\n            }\n          };\n\n          function tAdmin(key) {\n            return adminTranslations[adminLang][key] || adminTranslations['en'][key] || key;\n          }\n\n          function applyAdminTranslations() {\n            // Apply RTL/LTR\n            if (adminLang === 'ar') {\n              document.body.classList.add('rtl');\n              document.documentElement.dir = 'rtl';\n              document.documentElement.lang = 'ar';\n            } else {\n              document.body.classList.remove('rtl');\n              document.documentElement.dir = 'ltr';\n              document.documentElement.lang = 'en';\n            }\n\n            // ALL translatable elements\n            var textElements = [\n              'lblTotalClients',\n              'lblTotalQuotations',\n              'lblTotalValue',\n              'lblThisMonth',\n              'pendingTitle',\n              'usersTitle',\n              'clientsTitle',\n              'quotationsTitle',\n              'settingsTitle'\n            ];\n\n\n            textElements.forEach(function(id) {\n              var el = document.getElementById(id);\n              if (el) el.textContent = tAdmin(id);\n            });\n\n            // Update language flag\n            var langFlag = document.getElementById('langFlag');\n            if (langFlag) {\n              langFlag.textContent = adminLang === 'ar' ? '🇬🇧' : '🇸🇦';\n            }\n\n            // Update placeholders\n            var clientSearch = document.getElementById('clientSearch');\n            var quotationSearch = document.getElementById('quotationSearch');\n            if (clientSearch) clientSearch.placeholder = tAdmin('searchClients');\n            if (quotationSearch) quotationSearch.placeholder = tAdmin('searchQuotations');\n\n            // Update refresh buttons\n            document.querySelectorAll('.action-btn').forEach(function(btn) {\n              if (btn.textContent.trim() === 'Refresh' || btn.textContent.trim() === 'تحديث') {\n                btn.textContent = tAdmin('btnRefresh');\n              }\n            });\n          }\n\n          window.toggleAdminLanguage = function() {\n            adminLang = adminLang === 'en' ? 'ar' : 'en';\n            localStorage.setItem('hp_language', adminLang);\n            applyAdminTranslations();\n            // Reload current panel to update dynamic content with new language\n            if (currentPanel === 'dashboard') loadDashboard();\n            else if (currentPanel === 'pending') loadPendingUsers();\n            else if (currentPanel === 'users') loadAllUsers();\n            else if (currentPanel === 'clients') loadClients();\n            else if (currentPanel === 'quotations') loadQuotations();\n            else if (currentPanel === 'settings') loadSettings();\n            else if (currentPanel === 'audit') loadAuditLogs();\n          };\n\n          // ============================================\n          // RUN INIT at the end after all functions are defined\n          // ============================================\n          if (document.readyState === 'loading') {\n            document.addEventListener('DOMContentLoaded', function() {\n              init();\n              setTimeout(applyAdminTranslations, 200);\n            });\n          } else {\n            // Small delay to ensure everything is ready\n            setTimeout(function() {\n              init();\n              applyAdminTranslations();\n            }, 100);\n          }\n\n          window.toggleMobileMenu = function () {\n            document.getElementById('mobileMenu').classList.toggle('open');\n          };\n\n        })();\n      </script>\n"
