container:
  properties:
    html: "<style>\n  * {\n  box-sizing: border-box;\n  font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;\n  margin: 0;\n  padding: 0;\n  }\n\n  html, body {\n  margin: 0;\n  padding: 0;\n  background: #f5f7fa;\n  height: 100%;\n  width: 100%;\n  overflow: hidden;\n  }\n\n  /* نحسب ارتفاع هيدر Anvil */\n  :root {\n  --anvil-header-height: 64px;\n  }\n\n\n  .anvil-root-container,\n  .anvil-container,\n  .column-panel {\n  padding: 0 !important;\n  margin: 0 !important;\n  }\n\n  /* ================= LAYOUT ================= */\n  .admin-container { \n  width: 100vw;\n  height: 100vh;\n  left: 0;\n  right: 0;\n  bottom: 0;\n  overflow: hidden;\n  }\n  .main-content {\n   position: absolute;\n    top: calc(var(--anvil-header-height) + 64px);\n    left: 0;\n    right: 0;\n    bottom: 0;\n    padding: 24px 32px;\n    overflow-y: auto;\n    overflow-x: hidden;\n  }\n\n\n  body.rtl .main-content {\n    padding-left: 32px;\n    padding-right: 32px;\n\n  }\n\n  body.rtl .nav-item {\n  border-left: none;\n  border-right: 3px solid transparent;\n  flex-direction: row-reverse;\n  }\n\n  body.rtl .nav-item.active {\n  border-right-color: #667eea;\n  }\n\n  body.rtl .nav-item svg {\n  margin-right: 0;\n  margin-left: 12px;\n  }\n\n  body.rtl .nav-item .badge {\n  margin-left: 0;\n  margin-right: auto;\n  }\n\n  body.rtl .user-avatar {\n  margin-right: 0;\n  margin-left: 10px;\n  }\n\n  body.rtl .data-table th,\n  body.rtl .data-table td {\n  text-align: right;\n  }\n\n  body.rtl .page-header {\n  flex-direction: row-reverse;\n  }\n\n  body.rtl .page-header div {\n  text-align: right;\n  }\n\n  body.rtl .toolbar {\n  flex-direction: row-reverse;\n  }\n\n  body.rtl .search-box svg {\n  left: auto;\n  right: 14px;\n  }\n\n  body.rtl .search-box input {\n  padding-left: 16px;\n  padding-right: 44px;\n  text-align: right;\n  }\n\n  body.rtl .modal-header,\n  body.rtl .modal-footer {\n  flex-direction: row-reverse;\n  }\n\n  body.rtl .form-group label {\n  text-align: right;\n  }\n\n  body.rtl #notificationContainer {\n  right: auto;\n  left: 20px;\n  }\n\n  body.rtl .notification-toast {\n  border-left: none;\n  border-right: 4px solid #667eea;\n  flex-direction: row-reverse;\n  text-align: right;\n  }\n\n  body.rtl .notification-toast.success { border-right-color: #4caf50; }\n  body.rtl .notification-toast.error { border-right-color: #f44336; }\n  body.rtl .notification-toast.warning { border-right-color: #ff9800; }\n  body.rtl .notification-toast.info { border-right-color: #2196f3; }\n\n  body.rtl .stat-card {\n  text-align: right;\n  }\n\n  body.rtl .pagination {\n  flex-direction: row-reverse;\n  }\n\n  @media (min-width: 1024px) {\n  body.rtl .main-content {\n   padding-left: 32px;\n  padding-right: 32px;\n  }\n  }\n  /* ====== GLOBAL POLISH ====== */\n  .main-content {\n    background: linear-gradient(180deg, #f5f6fa 0%, #eef1f7 100%);\n  }\n\n  /* Soft container feeling */\n  .panel {\n    backdrop-filter: blur(6px);\n    background: rgba(255,255,255,0.92);\n  }\n\n  /* Better depth */\n  .stat-card,\n  .panel {\n    box-shadow:\n      0 8px 20px rgba(0,0,0,0.06),\n      0 2px 6px rgba(0,0,0,0.04);\n  }\n  .nav-item {\n    position: relative;\n  }\n\n  .nav-item::after {\n    content: \"\";\n    position: absolute;\n    inset: 0;\n    background: linear-gradient(90deg, rgba(102,126,234,0.15), transparent);\n    opacity: 0;\n    transition: opacity 0.2s ease;\n  }\n\n  .nav-item:hover::after {\n    opacity: 1;\n  }\n\n  .nav-item.active {\n    box-shadow: inset 4px 0 0 #667eea;\n  }\n  .main-content .panel.active {\n    max-width: 1280px;\n    margin-left: auto;\n    margin-right: auto;\n  }\n\n\n  .panel.active {\n    animation: panelEnter 0.35s cubic-bezier(.2,.8,.2,1);\n  }\n\n  @keyframes panelEnter {\n    from {\n      opacity: 0;\n      transform: translateY(12px) scale(0.98);\n    }\n    to {\n      opacity: 1;\n      transform: none;\n    }\n  }\n  .action-btn:active {\n    transform: scale(0.97);\n  }\n  .data-table thead th {\n    position: sticky;\n    top: 0;\n    z-index: 1;\n  }\n\n  .data-table tbody tr:nth-child(even) {\n    background: #fafbfc;\n  }\n\n\n    .mobile-menu-btn {\n      position: sticky;\n      top: 0;\n      z-index: 20;\n    }\n  }\n  .page-header h1 {\n    letter-spacing: -0.5px;\n  }\n\n  .stat-card .label {\n    opacity: 0.75;\n  }\n\n\n  @media (max-width: 768px) {\n\n    .main-content {\n      padding: 12px;\n      left: 0 !important;\n    }\n\n    .page-header h1 {\n      font-size: 20px;\n    }\n\n    .page-header p {\n      font-size: 13px;\n    }\n  }\n  @media (max-width: 768px) {\n\n    .stat-card {\n      padding: 14px;\n      border-radius: 14px;\n    }\n\n    .stat-card .value {\n      font-size: 22px;\n    }\n\n    .stat-card .label {\n      font-size: 13px;\n    }\n  }\n  @media (max-width: 768px) {\n\n    .panel-body {\n      overflow-x: auto;\n    }\n\n    .data-table {\n      min-width: 720px;\n    }\n\n    .data-table th,\n    .data-table td {\n      white-space: nowrap;\n      font-size: 13px;\n    }\n  }\n  @media (max-width: 768px) {\n\n    .toolbar {\n      gap: 10px;\n    }\n\n    .action-btn,\n    .filter-btn {\n      width: 100%;\n      justify-content: center;\n    }\n  }\n  @media (max-width: 768px) {\n\n    .mobile-menu-btn {\n      display: block;\n      position: sticky;\n      top: 0;\n      background: #667eea;\n      z-index: 20;\n    }\n  }\n  /* ================= SETTINGS LAYOUT ================= */\n  .settings-grid {\n    display: grid;\n    grid-template-columns: 1fr 1fr; /* 50% - 50% */\n    gap: 20px;\n    align-items: start;\n  }\n\n  /* كل بلوك إعدادات */\n  .settings-block {\n    background: #fff;\n    border-radius: 12px;\n  }\n\n  /* Mobile: عمود واحد */\n  @media (max-width: 768px) {\n    .settings-grid {\n      grid-template-columns: 1fr;\n    }\n  }\n  .top-header {\n    position: fixed;\n    top: var(--anvil-header-height);\n    left: 0;\n    right: 0;\n    height: 64px;\n    background: #1a1a2e;\n    display: flex;\n    align-items: center;\n    padding: 0 24px;\n    z-index: 2000;\n  }\n\n  .header-left {\n    display: flex;\n    align-items: center;\n    gap: 12px;\n  }\n\n  .header-logo {\n    height: 36px;\n  }\n\n  .header-title {\n    color: #fff;\n    font-weight: 600;\n  }\n\n  .header-nav {\n    display: flex;\n    gap: 20px;\n    margin-left: 40px;\n  }\n\n  .header-nav .nav-item {\n    color: rgba(255,255,255,0.8);\n    cursor: pointer;\n  }\n\n  .header-nav .nav-item.active {\n    color: #fff;\n    border-bottom: 2px solid #667eea;\n  }\n\n  .mobile-menu-btn {\n    display: none;\n    margin-left: auto;\n    background: #667eea;\n    color: #fff;\n    border: none;\n    padding: 10px 14px;\n    border-radius: 8px;\n    font-size: 18px;\n  }\n  @media (max-width: 768px) {\n    .header-nav {\n      display: none;\n    }\n\n    .mobile-menu-btn {\n      display: block;\n    }\n\n    .mobile-menu {\n      position: fixed;\n      inset: 0;\n      background: #1a1a2e;\n      display: none;\n      flex-direction: column;\n      padding: 80px 24px;\n      z-index: 3000;\n    }\n\n    .mobile-menu.open {\n      display: flex;\n    }\n\n    .mobile-menu .nav-item {\n      color: #fff;\n      padding: 14px 0;\n      font-size: 18px;\n    }\n  }\n  .panel {\n    display: none;\n  }\n\n  .panel.active {\n    display: block;\n  }\n  .panel { display: none; }\n  .panel.active { display: block; }\n  \n  .stats-grid {\n    display: grid;\n    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));\n    gap: 20px;\n    margin-top: 20px;\n  }\n\n  /* ===== ICON FIX ===== */\n  .icon {\n    width: 44px;\n    height: 44px;\n    border-radius: 12px;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    flex-shrink: 0;\n  }\n\n  .icon svg {\n    width: 22px;\n    height: 22px;\n  }\n\n  /* Colors */\n  .icon.blue   { background: #667eea; }\n  .icon.green  { background: #4caf50; }\n  .icon.orange { background: #ff9800; }\n  .icon.red    { background: #f44336; }\n  .top-header {\n    z-index: 5000;\n  }\n\n  .mobile-menu {\n    z-index: 6000;\n  }\n  /* ===== DASHBOARD TYPOGRAPHY ===== */\n  .page-header h1 {\n    font-size: 34px;\n    font-weight: 800;\n    color: #1a1a2e;\n  }\n\n  .page-header p {\n    font-size: 16px;\n    margin-top: 6px;\n    color: #555;\n  }\n  /* ===== STAT CARDS ===== */\n  .stat-card {\n    padding: 26px;\n    border-radius: 18px;\n  }\n\n  .stat-card .value {\n    font-size: 32px;\n    font-weight: 800;\n    margin-top: 12px;\n    color: #1a1a2e;\n  }\n\n  .stat-card .label {\n    font-size: 15px;\n    font-weight: 600;\n    margin-top: 4px;\n    color: #666;\n  }\n  /* ===== SEARCH BOX FIX ===== */\n  .search-box {\n    position: relative;\n  }\n\n  .search-box svg {\n    width: 18px;\n    height: 18px;\n    position: absolute;\n    left: 14px;\n    top: 50%;\n    transform: translateY(-50%);\n    opacity: 0.55;\n  }\n\n  .search-box input {\n    padding-left: 44px;\n    height: 40px;\n    font-size: 14px;\n  }\n  /* ===== PANELS POLISH ===== */\n  .panel-header h3 {\n    font-size: 22px;\n    font-weight: 700;\n    color: #1a1a2e;\n  }\n\n  .toolbar {\n    margin-bottom: 16px;\n  }\n\n  .data-table th {\n    font-size: 13px;\n    font-weight: 700;\n  }\n\n  .data-table td {\n    font-size: 13px;\n  }\n  .header-user {\n    margin-left: auto;\n    display: flex;\n    align-items: center;\n    gap: 12px;\n  }\n\n  .user-name {\n    color: #fff;\n    font-weight: 600;\n  }\n\n  .logout-btn {\n    background: #e53935;\n    color: #fff;\n    border: none;\n    padding: 6px 12px;\n    border-radius: 6px;\n    cursor: pointer;\n  }\n  .panel-header {\n    margin-bottom: 20px;\n  }\n\n  .panel-body {\n    padding-top: 10px;\n  }\n\n</style>\n\n<!-- Load i18n Script with inline fallback -->\n<script>\n  // Inline i18n to avoid 404 issues\n  (function(){\n  'use strict';\n  return;\n  const translations={en:{save:'Save',cancel:'Cancel',delete:'Delete',edit:'Edit',add:'Add',search:'Search',refresh:'Refresh',export:'Export',loading:'Loading...',error:'Error',success:'Success',warning:'Warning',yes:'Yes',no:'No',confirm:'Confirm',close:'Close',actions:'Actions',status:'Status',name:'Name',email:'Email',phone:'Phone',role:'Role',active:'Active',inactive:'Inactive',admin_title:'Admin Panel',nav_dashboard:'Dashboard',nav_pending_approvals:'Pending Approvals',nav_all_users:'All Users',nav_clients:'Clients',nav_quotations:'Quotations',nav_settings:'Settings',nav_audit_log:'Audit Log',nav_logout:'Logout',dashboard_total_clients:'Total Clients',dashboard_total_quotations:'Total Quotations',pending_title:'Pending User Approvals',pending_approve:'Approve',pending_reject:'Reject',users_title:'All Users',clients_title:'Clients Management',quotations_title:'Quotations Management',settings_title:'System Settings'},ar:{save:'حفظ',cancel:'إلغاء',delete:'حذف',edit:'تعديل',add:'إضافة',search:'بحث',refresh:'تحديث',export:'تصدير',loading:'جاري التحميل...',error:'خطأ',success:'نجاح',warning:'تحذير',yes:'نعم',no:'لا',confirm:'تأكيد',close:'إغلاق',actions:'الإجراءات',status:'الحالة',name:'الاسم',email:'البريد الإلكتروني',phone:'الهاتف',role:'الدور',active:'نشط',inactive:'غير نشط',admin_title:'لوحة التحكم',nav_dashboard:'لوحة المعلومات',nav_pending_approvals:'طلبات الانتظار',nav_all_users:'جميع المستخدمين',nav_clients:'العملاء',nav_quotations:'عروض الأسعار',nav_settings:'الإعدادات',nav_audit_log:'سجل العمليات',nav_logout:'تسجيل الخروج',dashboard_total_clients:'إجمالي العملاء',dashboard_total_quotations:'إجمالي عروض الأسعار',pending_title:'طلبات تسجيل المستخدمين',pending_approve:'موافقة',pending_reject:'رفض',users_title:'جميع المستخدمين',clients_title:'إدارة العملاء',quotations_title:'إدارة عروض الأسعار',settings_title:'إعدادات النظام'}};\n  class I18n{constructor(){this.currentLang=localStorage.getItem('hp_language')||'en';this.listeners=[]}getLang(){return this.currentLang}setLang(lang){if(lang!=='en'&&lang!=='ar')return;this.currentLang=lang;localStorage.setItem('hp_language',lang);document.documentElement.dir=lang==='ar'?'rtl':'ltr';document.documentElement.lang=lang;if(lang==='ar'){document.body.classList.add('rtl')}else{document.body.classList.remove('rtl')}this.listeners.forEach(fn=>fn(lang));window.dispatchEvent(new CustomEvent('languageChanged',{detail:{lang}}))}toggleLang(){this.setLang(this.currentLang==='en'?'ar':'en')}t(key,replacements={}){let text=translations[this.currentLang][key]||translations['en'][key]||key;Object.keys(replacements).forEach(k=>{text=text.replace(new RegExp(`\\\\{${k}\\\\}`,'g'),replacements[k])});return text}isRTL(){return this.currentLang==='ar'}onLangChange(callback){this.listeners.push(callback)}init(){this.setLang(this.currentLang)}}\n  window.i18n=new I18n();\n  if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',()=>window.i18n.init())}else{window.i18n.init()}\n  })();\n</script>\n\n<div class=\"admin-container\">\n  <header class=\"top-header\">\n    <div class=\"header-left\">\n      <img src=\"_/theme/helwan_logo.png\" class=\"header-logo\">\n      <span class=\"header-title\">Admin Panel</span>\n    </div>\n\n    <nav class=\"header-nav\">\n      <a class=\"nav-item active\" data-panel=\"dashboard\">Dashboard</a>\n      <a class=\"nav-item\" data-panel=\"pending\">Pending</a>\n      <a class=\"nav-item\" data-panel=\"users\">Users</a>\n      <a class=\"nav-item\" data-panel=\"clients\">Clients</a>\n      <a class=\"nav-item\" data-panel=\"quotations\">Quotations</a>\n      <a class=\"nav-item\" data-panel=\"settings\">Settings</a>\n      <a class=\"nav-item\" data-panel=\"audit\">Audit</a>\n    </nav>\n\n    <div class=\"header-user\">\n      <span id=\"userName\" class=\"user-name\"></span>\n      <button class=\"logout-btn\" id=\"logoutBtn\">Logout</button>\n      <button class=\"mobile-menu-btn\" onclick=\"toggleMobileMenu()\">☰</button>\n    </div>\n    <button class=\"mobile-menu-btn\" onclick=\"toggleMobileMenu()\">☰</button>\n  </header>\n  <div class=\"mobile-menu\" id=\"mobileMenu\">\n    <a class=\"nav-item\" data-panel=\"dashboard\">Dashboard</a>\n    <a class=\"nav-item\" data-panel=\"pending\">Pending</a>\n    <a class=\"nav-item\" data-panel=\"users\">Users</a>\n    <a class=\"nav-item\" data-panel=\"clients\">Clients</a>\n    <a class=\"nav-item\" data-panel=\"quotations\">Quotations</a>\n    <a class=\"nav-item\" data-panel=\"settings\">Settings</a>\n    <a class=\"nav-item\" data-panel=\"audit\">Audit</a>\n\n    <button class=\"logout-btn\" id=\"logoutBtn\">Logout</button>\n  </div>\n\n  <!-- Sidebar -->\n \n  <!-- Main Content -->\n  <main class=\"main-content\">\n\n    <!-- Dashboard Panel -->\n    <div class=\"panel active\" id=\"dashboard-panel\">\n      <div class=\"page-header\">\n        <div>\n          <h1 id=\"dashboardTitle\">Dashboard</h1>\n          <p id=\"dashboardSubtitle\">Welcome back! Here's what's happening today.</p>\n        </div>\n      </div>\n\n      <div class=\"stats-grid\" id=\"statsGrid\">\n        <div class=\"stat-card\">\n          <div class=\"icon blue\">\n            <svg viewBox=\"0 0 24 24\" fill=\"#fff\"><path d=\"M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3z\"/></svg>\n          </div>\n          <div class=\"value\" id=\"statClients\">-</div>\n          <div class=\"label\" id=\"lblTotalClients\">Total Clients</div>\n        </div>\n\n        <div class=\"stat-card\">\n          <div class=\"icon green\">\n            <svg viewBox=\"0 0 24 24\" fill=\"#fff\"><path d=\"M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6z\"/></svg>\n          </div>\n          <div class=\"value\" id=\"statQuotations\">-</div>\n          <div class=\"label\" id=\"lblTotalQuotations\">Total Quotations</div>\n        </div>\n\n        <div class=\"stat-card\">\n          <div class=\"icon orange\">\n            <svg viewBox=\"0 0 24 24\" fill=\"#fff\"><path d=\"M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z\"/></svg>\n          </div>\n          <div class=\"value\" id=\"statValue\">-</div>\n          <div class=\"label\" id=\"lblTotalValue\">Total Value (EGP)</div>\n        </div>\n\n        <div class=\"stat-card\">\n          <div class=\"icon red\">\n            <svg viewBox=\"0 0 24 24\" fill=\"#fff\"><path d=\"M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z\"/></svg>\n          </div>\n          <div class=\"value\" id=\"statMonthly\">-</div>\n          <div class=\"label\" id=\"lblThisMonth\">This Month Quotations</div>\n        </div>\n      </div>\n    </div>\n\n    <!-- Pending Users Panel -->\n    <div class=\"panel\" id=\"pending-panel\">\n      <div class=\"panel-header\">\n        <h3 id=\"pendingTitle\">Pending User Approvals</h3>\n        <button class=\"action-btn\" onclick=\"loadPendingUsers()\" id=\"btnRefreshPending\">Refresh</button>\n      </div>\n      <div class=\"panel-body\">\n        <div id=\"pendingContent\">\n          <div class=\"loading-spinner\"><div class=\"spinner\"></div></div>\n        </div>\n      </div>\n    </div>\n\n    <!-- All Users Panel -->\n    <div class=\"panel\" id=\"users-panel\">\n      <div class=\"panel-header\">\n        <h3 id=\"usersTitle\">All Users</h3>\n        <button class=\"action-btn\" onclick=\"loadAllUsers()\" id=\"btnRefreshUsers\">Refresh</button>\n      </div>\n      <div class=\"panel-body\">\n        <div id=\"usersContent\">\n          <div class=\"loading-spinner\"><div class=\"spinner\"></div></div>\n        </div>\n      </div>\n    </div>\n\n    <!-- Clients Panel -->\n    <div class=\"panel\" id=\"clients-panel\">\n      <div class=\"panel-header\">\n        <h3 id=\"clientsTitle\">Clients Management</h3>\n      </div>\n      <div class=\"panel-body\">\n        <div class=\"toolbar\">\n          <div class=\"search-box\">\n            <svg viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z\"/></svg>\n            <input type=\"text\" id=\"clientSearch\" placeholder=\"Search clients...\" oninput=\"searchClients()\">\n          </div>\n          <label class=\"checkbox-label\" id=\"lblShowDeletedClients\">\n            <input type=\"checkbox\" id=\"showDeletedClients\" onchange=\"loadClients()\">\n            <span id=\"txtShowDeleted\">Show Deleted</span>\n          </label>\n          <button class=\"action-btn green\" onclick=\"exportClients()\" id=\"btnExportClients\">\n            <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z\"/></svg>\n            <span id=\"txtExportExcel\">Export Excel</span>\n          </button>\n        </div>\n        <div id=\"clientsContent\">\n          <div class=\"loading-spinner\"><div class=\"spinner\"></div></div>\n        </div>\n      </div>\n    </div>\n\n    <!-- Quotations Panel -->\n    <div class=\"panel\" id=\"quotations-panel\">\n      <div class=\"panel-header\">\n        <h3 id=\"quotationsTitle\">Quotations Management</h3>\n      </div>\n      <div class=\"panel-body\">\n        <div class=\"toolbar\">\n          <div class=\"search-box\">\n            <svg viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z\"/></svg>\n            <input type=\"text\" id=\"quotationSearch\" placeholder=\"Search quotations...\" oninput=\"searchQuotations()\">\n          </div>\n          <label class=\"checkbox-label\">\n            <input type=\"checkbox\" id=\"showDeletedQuotations\" onchange=\"loadQuotations()\">\n            Show Deleted\n          </label>\n          <button class=\"action-btn green\" onclick=\"exportQuotations()\">\n            <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z\"/></svg>\n                  Export Excel\n                </button>\n              </div>\n              <div id=\"quotationsContent\">\n                <div class=\"loading-spinner\"><div class=\"spinner\"></div></div>\n              </div>\n            </div>\n          </div>\n\n          <!-- Audit Log Panel -->\n          <div class=\"panel\" id=\"audit-panel\">\n            <div class=\"panel-header\">\n              <h3>Audit Log</h3>\n              <button class=\"action-btn\" onclick=\"loadAuditLogs()\">Refresh</button>\n            </div>\n            <div class=\"panel-body\">\n              <div id=\"auditContent\">\n                <div class=\"loading-spinner\"><div class=\"spinner\"></div></div>\n              </div>\n            </div>\n          </div>\n\n          <!-- Settings Panel -->\n          <div class=\"panel\" id=\"settings-panel\">\n            <div class=\"panel-header\">\n              <h3>System Settings</h3>\n              <button class=\"action-btn\" onclick=\"loadSettings()\">Refresh</button>\n            </div>\n            <div class=\"panel-body\">\n              <div id=\"settingsContent\">\n                <div class=\"loading-spinner\"><div class=\"spinner\"></div></div>\n              </div>\n            </div>\n          </div>\n\n        </main>\n      </div>\n\n      <!-- Role Modal -->\n      <div class=\"modal-overlay\" id=\"roleModal\">\n        <div class=\"modal-box\">\n          <div class=\"modal-header\">\n            <h3>Change User Role</h3>\n            <button class=\"modal-close\" onclick=\"closeModal('roleModal')\">&times;</button>\n          </div>\n          <div class=\"modal-body\">\n            <div class=\"form-group\">\n              <label>Select Role</label>\n              <select id=\"newRole\">\n                <option value=\"admin\">Admin</option>\n                <option value=\"manager\">Manager</option>\n                <option value=\"sales\">Sales</option>\n                <option value=\"viewer\">Viewer</option>\n              </select>\n            </div>\n          </div>\n          <div class=\"modal-footer\">\n            <button class=\"filter-btn\" onclick=\"closeModal('roleModal')\">Cancel</button>\n            <button class=\"action-btn\" onclick=\"confirmRoleChange()\">Save Changes</button>\n          </div>\n        </div>\n      </div>\n\n      <!-- Password Reset Modal -->\n      <div class=\"modal-overlay\" id=\"passwordModal\">\n        <div class=\"modal-box\">\n          <div class=\"modal-header\">\n            <h3>Reset Password</h3>\n            <button class=\"modal-close\" onclick=\"closeModal('passwordModal')\">&times;</button>\n          </div>\n          <div class=\"modal-body\">\n            <div class=\"form-group\">\n              <label>New Password</label>\n              <input type=\"password\" id=\"newPassword\" placeholder=\"Enter new password (min 6 characters)\">\n            </div>\n          </div>\n          <div class=\"modal-footer\">\n            <button class=\"filter-btn\" onclick=\"closeModal('passwordModal')\">Cancel</button>\n            <button class=\"action-btn\" onclick=\"confirmPasswordReset()\">Reset Password</button>\n          </div>\n        </div>\n      </div>\n\n      <!-- Approval Modal with Role Selection -->\n      <div class=\"modal-overlay\" id=\"approvalModal\">\n        <div class=\"modal-box\">\n          <div class=\"modal-header\">\n            <h3>✅ Approve User</h3>\n            <button class=\"modal-close\" onclick=\"closeModal('approvalModal')\">&times;</button>\n          </div>\n          <div class=\"modal-body\">\n            <div style=\"background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px;\">\n              <p style=\"margin: 5px 0;\"><strong>Name:</strong> <span id=\"approvalUserName\">-</span></p>\n              <p style=\"margin: 5px 0;\"><strong>Email:</strong> <span id=\"approvalUserEmail\">-</span></p>\n              <p style=\"margin: 5px 0;\"><strong>Phone:</strong> <span id=\"approvalUserPhone\">-</span></p>\n              <p style=\"margin: 5px 0;\"><strong>Registered:</strong> <span id=\"approvalUserDate\">-</span></p>\n            </div>\n            <div class=\"form-group\">\n              <label>Select Role for this User</label>\n              <select id=\"approvalRole\" onchange=\"updateRolePermissions()\">\n                <option value=\"viewer\">Viewer (Read Only)</option>\n                <option value=\"sales\" selected>Sales (Create & Edit Own)</option>\n                <option value=\"manager\">Manager (Full except Admin)</option>\n                <option value=\"admin\">Admin (Full Access)</option>\n              </select>\n            </div>\n            <div style=\"background: #e3f2fd; padding: 10px; border-radius: 5px; font-size: 13px;\">\n              <strong>Role Permissions:</strong>\n              <ul id=\"rolePermissionsList\" style=\"margin: 5px 0 0 0; padding-left: 20px;\">\n                <li>View, Create, Edit own records</li>\n              </ul>\n            </div>\n          </div>\n          <div class=\"modal-footer\">\n            <button class=\"filter-btn\" onclick=\"closeModal('approvalModal')\">Cancel</button>\n            <button class=\"action-btn\" onclick=\"confirmApproval()\" style=\"background: linear-gradient(135deg, #4caf50, #45a049);\">✓ Approve User</button>\n          </div>\n        </div>\n      </div>\n\n      <!-- Notification Toast Container -->\n      <div id=\"notificationContainer\" style=\"position: fixed; top: 20px; right: 20px; z-index: 10000; display: flex; flex-direction: column; gap: 10px;\"></div>\n\n      <script>\n        (function() {\n\n          // State\n          var currentPanel = 'dashboard';\n          var clientsPage = 1;\n          var quotationsPage = 1;\n          var auditPage = 1;\n          var selectedUserId = null;\n          var searchTimeout = null;\n          var pendingUsersData = {};\n\n          // ============================================\n          // NOTIFICATION SYSTEM\n          // ============================================\n          window.showNotification = function(type, title, message, duration) {\n            duration = duration || 5000;\n            var container = document.getElementById('notificationContainer');\n            if (!container) return;\n\n            var icons = { 'success': '✓', 'error': '✕', 'warning': '⚠', 'info': 'ℹ' };\n\n            var toast = document.createElement('div');\n            toast.className = 'notification-toast ' + type;\n            toast.innerHTML =\n              '<span class=\"icon\">' + icons[type] + '</span>' +\n              '<div class=\"content\">' +\n                '<div class=\"title\">' + title + '</div>' +\n                '<div class=\"message\">' + message + '</div>' +\n              '</div>' +\n              '<button class=\"close-btn\" onclick=\"this.parentElement.remove()\">×</button>';\n\n            container.appendChild(toast);\n\n            setTimeout(function() {\n              if (toast.parentElement) {\n                toast.style.animation = 'slideOut 0.3s ease';\n                setTimeout(function() { if (toast.parentElement) toast.remove(); }, 300);\n              }\n            }, duration);\n          };\n\n          // ============================================\n          // INIT - Will be called at the end of script\n          // ============================================\n          function init() {\n            console.log('Initializing Admin Panel...');\n            initUser();\n            initNavigation();\n            setupAutoLogout();\n            // Wait a bit for Python bridge functions then load dashboard\n            setTimeout(function() {\n              if (window.loadDashboard) {\n                window.loadDashboard();\n              }\n            }, 500);\n          }\n\n          // ============================================\n          // AUTO LOGOUT ON TAB CLOSE\n          // ============================================\n          function setupAutoLogout() {\n            // Logout when tab/browser is closed\n            window.addEventListener('beforeunload', function(e) {\n              // Use sendBeacon for reliable logout on tab close\n              var token = localStorage.getItem('auth_token');\n              if (token && window.logoutUser) {\n                // Try synchronous logout\n                try {\n                  window.logoutUser();\n                } catch(err) {\n                  console.log('Logout on close:', err);\n                }\n              }\n            });\n\n            // Also handle visibility change (tab hidden for long time)\n            document.addEventListener('visibilitychange', function() {\n              if (document.visibilityState === 'hidden') {\n                // Store timestamp when tab became hidden\n                sessionStorage.setItem('tab_hidden_at', Date.now());\n              } else if (document.visibilityState === 'visible') {\n                // Check if tab was hidden for more than 30 minutes\n                var hiddenAt = sessionStorage.getItem('tab_hidden_at');\n                if (hiddenAt) {\n                  var hiddenDuration = Date.now() - parseInt(hiddenAt);\n                  if (hiddenDuration > 30 * 60 * 1000) { // 30 minutes\n                    // Auto logout after long inactivity\n                    if (window.logoutUser) {\n                      window.logoutUser();\n                      localStorage.clear();\n                      window.location.hash = '#login';\n                    }\n                  }\n                  sessionStorage.removeItem('tab_hidden_at');\n                }\n              }\n            });\n          }\n\n          function initUser() {\n            var name = localStorage.getItem('user_name') || 'Admin';\n            var role = localStorage.getItem('user_role') || 'admin';\n\n            var userNameEl = document.getElementById('userName');\n            if (userNameEl) {\n              userNameEl.textContent = name;\n            }\n\n            var userRoleEl = document.getElementById('userRole');\n            if (userRoleEl) {\n              userRoleEl.textContent = role.charAt(0).toUpperCase() + role.slice(1);\n            }\n\n            var userAvatarEl = document.getElementById('userAvatar');\n            if (userAvatarEl) {\n              userAvatarEl.textContent = name.charAt(0).toUpperCase();\n            }\n          }\n\n\n          // ============================================\n          // NAVIGATION\n          // ============================================\n          function initNavigation() {\n            console.log('Setting up navigation...');\n\n            var navItems = document.querySelectorAll(\n              '.header-nav .nav-item, .mobile-menu .nav-item'\n            );\n\n            console.log('Found nav items:', navItems.length);\n\n            navItems.forEach(function(item) {\n              item.style.cursor = 'pointer';\n              item.onclick = function(e) {\n                e.preventDefault();\n                e.stopPropagation();\n\n                var panel = item.dataset.panel;\n                if (!panel) return;\n\n                // Active state (Header + Mobile)\n                navItems.forEach(function(i) {\n                  if (i.dataset.panel === panel) {\n                    i.classList.add('active');\n                  } else {\n                    i.classList.remove('active');\n                  }\n                });\n\n                // Panels\n                document.querySelectorAll('.panel').forEach(function(p) {\n                  p.classList.remove('active');\n                });\n\n                var panelEl = document.getElementById(panel + '-panel');\n                if (panelEl) panelEl.classList.add('active');\n\n                currentPanel = panel;\n\n                // Load data\n                if (panel === 'dashboard') loadDashboard();\n                else if (panel === 'pending') loadPendingUsers();\n                else if (panel === 'users') loadAllUsers();\n                else if (panel === 'clients') loadClients();\n                else if (panel === 'quotations') loadQuotations();\n                else if (panel === 'audit') loadAuditLogs();\n                else if (panel === 'settings') loadSettings();\n\n                // Close mobile menu\n                document.getElementById('mobileMenu')?.classList.remove('open');\n              };\n            });\n          }\n\n\n          // ============================================\n          // DASHBOARD\n          // ============================================\n          window.loadDashboard = async function() {\n            // Helper function to safely set text content\n            function setStatText(id, value) {\n              var el = document.getElementById(id);\n              if (el) el.textContent = value;\n            }\n\n            try {\n              // Wait for Python bridge to be ready\n              if (!window.getDashboardStats) {\n                console.log('Waiting for bridge functions...');\n                setTimeout(loadDashboard, 500);\n                return;\n              }\n\n              var stats = await window.getDashboardStats();\n              if (stats) {\n                setStatText('statClients', (stats.total_clients || 0).toLocaleString());\n                setStatText('statQuotations', (stats.total_quotations || 0).toLocaleString());\n                setStatText('statValue', (stats.total_value || 0).toLocaleString());\n                setStatText('statMonthly', (stats.this_month_quotations || 0).toLocaleString());\n              }\n\n              // Update pending badge\n              if (window.getPendingUsers) {\n                var pending = await window.getPendingUsers();\n                if (pending && pending.success && pending.users) {\n                  setStatText('pendingBadge', pending.users.length);\n                }\n              }\n            } catch (e) {\n              console.error('Dashboard error:', e);\n              // Show zeros on error (safely)\n              setStatText('statClients', '0');\n              setStatText('statQuotations', '0');\n              setStatText('statValue', '0');\n              setStatText('statMonthly', '0');\n            }\n          };\n\n          // ============================================\n          // PENDING USERS\n          // ============================================\n          window.loadPendingUsers = async function() {\n            var container = document.getElementById('pendingContent');\n            container.innerHTML = '<div class=\"loading-spinner\"><div class=\"spinner\"></div></div>';\n\n            try {\n              var result = await window.getPendingUsers();\n              if (!result.success) {\n                container.innerHTML = '<div class=\"empty-state\"><h4>' + result.message + '</h4></div>';\n                return;\n              }\n\n              if (result.users.length === 0) {\n                container.innerHTML = '<div class=\"empty-state\"><h4>No pending approvals</h4><p>All users have been reviewed</p></div>';\n                pendingUsersData = {};\n                return;\n              }\n\n              // Store user data for modal\n              pendingUsersData = {};\n              result.users.forEach(function(u) { pendingUsersData[u.user_id] = u; });\n\n              var html = '<table class=\"data-table\"><thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Registered</th><th>Actions</th></tr></thead><tbody>';\n              result.users.forEach(function(u) {\n                html += '<tr>';\n                html += '<td>' + u.full_name + '</td>';\n                html += '<td>' + u.email + '</td>';\n                html += '<td>' + (u.phone || '-') + '</td>';\n                html += '<td>' + u.created_at.split('T')[0] + '</td>';\n                html += '<td class=\"actions\">';\n                html += '<button class=\"btn-sm approve\" onclick=\"showApprovalModal(\\'' + u.user_id + '\\')\" style=\"background:#e8f5e9;color:#2e7d32;\">✓ Approve</button>';\n                html += '<button class=\"btn-sm reject\" onclick=\"rejectUserAction(\\'' + u.user_id + '\\')\">✕ Reject</button>';\n                html += '</td></tr>';\n              });\n              html += '</tbody></table>';\n              container.innerHTML = html;\n\n              document.getElementById('pendingBadge').textContent = result.users.length;\n            } catch (e) {\n              container.innerHTML = '<div class=\"empty-state\"><h4>Error loading users</h4></div>';\n            }\n          };\n\n          // ============================================\n          // APPROVAL MODAL FUNCTIONS\n          // ============================================\n          window.showApprovalModal = function(userId) {\n            var user = pendingUsersData[userId];\n            if (!user) {\n              showNotification('error', 'Error', 'User data not found');\n              return;\n            }\n            selectedUserId = userId;\n            document.getElementById('approvalUserName').textContent = user.full_name;\n            document.getElementById('approvalUserEmail').textContent = user.email;\n            document.getElementById('approvalUserPhone').textContent = user.phone || 'Not provided';\n            document.getElementById('approvalUserDate').textContent = user.created_at.split('T')[0];\n            document.getElementById('approvalRole').value = 'sales';\n            updateRolePermissions();\n            document.getElementById('approvalModal').classList.add('show');\n          };\n\n          window.updateRolePermissions = function() {\n            var role = document.getElementById('approvalRole').value;\n            var permissions = {\n              'viewer': ['View all records'],\n              'sales': ['View all records', 'Create new records', 'Edit own records'],\n              'manager': ['View all records', 'Create records', 'Edit all records', 'Export data', 'Delete own records'],\n              'admin': ['Full access to all features', 'Manage users', 'System settings', 'Audit logs']\n            };\n            var list = document.getElementById('rolePermissionsList');\n            list.innerHTML = '';\n            (permissions[role] || []).forEach(function(perm) {\n              list.innerHTML += '<li>' + perm + '</li>';\n            });\n          };\n\n          window.confirmApproval = async function() {\n            var role = document.getElementById('approvalRole').value;\n            closeModal('approvalModal');\n            showNotification('info', 'Processing', 'Approving user...');\n\n            try {\n              var result = await window.approveUserWithRole(selectedUserId, role);\n              if (result.success) {\n                showNotification('success', 'User Approved! ✓', 'Role: ' + role.charAt(0).toUpperCase() + role.slice(1));\n                loadPendingUsers();\n                loadDashboard();\n              } else {\n                showNotification('error', 'Error', result.message);\n              }\n            } catch (e) {\n              showNotification('error', 'Error', 'Failed to approve user');\n            }\n          };\n\n          window.rejectUserAction = async function(userId) {\n            var user = pendingUsersData[userId];\n            var userName = user ? user.full_name : 'this user';\n            if (!confirm('Are you sure you want to reject ' + userName + '?\\\\nThis action cannot be undone.')) return;\n\n            showNotification('info', 'Processing', 'Rejecting user...');\n            try {\n              var result = await window.rejectUserAPI(userId);\n              if (result.success) {\n                showNotification('success', 'User Rejected', userName + ' has been removed');\n                loadPendingUsers();\n                loadDashboard();\n              } else {\n                showNotification('error', 'Error', result.message);\n              }\n            } catch (e) {\n              showNotification('error', 'Error', 'Failed to reject user');\n            }\n          };\n\n          // ============================================\n          // ALL USERS\n          // ============================================\n          window.loadAllUsers = async function() {\n            var container = document.getElementById('usersContent');\n            container.innerHTML = '<div class=\"loading-spinner\"><div class=\"spinner\"></div></div>';\n\n            try {\n              var result = await window.getAllUsers();\n              if (!result.success) {\n                container.innerHTML = '<div class=\"empty-state\"><h4>' + result.message + '</h4></div>';\n                return;\n              }\n\n              if (result.users.length === 0) {\n                container.innerHTML = '<div class=\"empty-state\"><h4>No users found</h4></div>';\n                return;\n              }\n\n              var html = '<table class=\"data-table\"><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Last Login</th><th>Actions</th></tr></thead><tbody>';\n              result.users.forEach(function(u) {\n                var status = u.is_approved ? (u.is_active ? 'active' : 'inactive') : 'pending';\n                html += '<tr>';\n                html += '<td>' + u.full_name + '</td>';\n                html += '<td>' + u.email + '</td>';\n                html += '<td>' + u.role + '</td>';\n                html += '<td><span class=\"status ' + status + '\">' + status.charAt(0).toUpperCase() + status.slice(1) + '</span></td>';\n                html += '<td>' + (u.last_login === 'Never' ? 'Never' : u.last_login.split('T')[0]) + '</td>';\n                html += '<td class=\"actions\">';\n                html += '<button class=\"btn-sm edit\" onclick=\"showRoleModal(\\'' + u.user_id + '\\', \\'' + u.role + '\\')\">Role</button>';\n                html += '<button class=\"btn-sm edit\" onclick=\"showPasswordModal(\\'' + u.user_id + '\\')\">Password</button>';\n                if (u.is_approved) {\n                  html += '<button class=\"btn-sm ' + (u.is_active ? 'reject' : 'approve') + '\" onclick=\"toggleActive(\\'' + u.user_id + '\\')\">' + (u.is_active ? 'Disable' : 'Enable') + '</button>';\n                }\n                html += '<button class=\"btn-sm reject\" onclick=\"confirmDeleteUser(\\'' + u.user_id + '\\', \\'' + u.full_name + '\\')\">Delete</button>';\n                html += '</td></tr>';\n              });\n              html += '</tbody></table>';\n              container.innerHTML = html;\n            } catch (e) {\n              container.innerHTML = '<div class=\"empty-state\"><h4>Error loading users</h4></div>';\n            }\n          };\n\n          window.showRoleModal = function(userId, currentRole) {\n            selectedUserId = userId;\n            document.getElementById('newRole').value = currentRole;\n            document.getElementById('roleModal').classList.add('show');\n          };\n\n          window.showPasswordModal = function(userId) {\n            selectedUserId = userId;\n            document.getElementById('newPassword').value = '';\n            document.getElementById('passwordModal').classList.add('show');\n          };\n\n          window.closeModal = function(id) {\n            document.getElementById(id).classList.remove('show');\n          };\n\n          window.confirmRoleChange = async function() {\n            var role = document.getElementById('newRole').value;\n            var result = await window.updateUserRole(selectedUserId, role);\n            closeModal('roleModal');\n            if (result.success) {\n              loadAllUsers();\n            } else {\n              alert(result.message);\n            }\n          };\n\n          window.confirmPasswordReset = async function() {\n            var password = document.getElementById('newPassword').value;\n            if (password.length < 6) {\n              alert('Password must be at least 6 characters');\n              return;\n            }\n            var result = await window.resetUserPassword(selectedUserId, password);\n            closeModal('passwordModal');\n            if (result.success) {\n              alert('Password reset successfully');\n            } else {\n              alert(result.message);\n            }\n          };\n\n          window.toggleActive = async function(userId) {\n            var result = await window.toggleUserActive(userId);\n            if (result.success) {\n              loadAllUsers();\n            } else {\n              alert(result.message);\n            }\n          };\n\n          window.confirmDeleteUser = function(userId, userName) {\n            if (confirm('⚠️ Are you sure you want to DELETE user \"' + userName + '\"?\\n\\nThis will permanently remove the user and all their data. This action cannot be undone!')) {\n              deleteUserPermanently(userId);\n            }\n          };\n\n          window.deleteUserPermanently = async function(userId) {\n            try {\n              var result = await window.deleteUser(userId);\n              if (result.success) {\n                showNotification('success', 'User Deleted', 'User has been permanently deleted');\n                loadAllUsers();\n                loadDashboard();\n              } else {\n                alert(result.message);\n              }\n            } catch (e) {\n              alert('Error deleting user: ' + e.message);\n            }\n          };\n\n          // ============================================\n          // CLIENTS\n          // ============================================\n          window.loadClients = async function(page) {\n            clientsPage = page || 1;\n            var container = document.getElementById('clientsContent');\n            container.innerHTML = '<div class=\"loading-spinner\"><div class=\"spinner\"></div></div>';\n\n            var search = document.getElementById('clientSearch').value;\n            var showDeleted = document.getElementById('showDeletedClients').checked;\n\n            try {\n              var result = await window.getAllClients(clientsPage, 15, search, showDeleted);\n              renderClientsTable(result, container);\n            } catch (e) {\n              container.innerHTML = '<div class=\"empty-state\"><h4>Error loading clients</h4></div>';\n            }\n          };\n\n          function renderClientsTable(result, container) {\n            // ✅ SORT ASCENDING BY CLIENT CODE\n            result.data.sort(function(a, b) {\n              return Number(a['Client Code']) - Number(b['Client Code']);\n            });\n            if (result.data.length === 0) {\n              container.innerHTML = '<div class=\"empty-state\"><h4>No clients found</h4></div>';\n              return;\n            }\n\n            var html = '<table class=\"data-table\"><thead><tr><th>Code</th><th>Name</th><th>Company</th><th>Phone</th><th>Country</th><th>Status</th><th>Actions</th></tr></thead><tbody>';\n            result.data.forEach(function(c) {\n              var status = c.is_deleted ? 'deleted' : 'active';\n              html += '<tr>';\n              html += '<td>' + c['Client Code'] + '</td>';\n              html += '<td>' + c['Client Name'] + '</td>';\n              html += '<td>' + c['Company'] + '</td>';\n              html += '<td>' + c['Phone'] + '</td>';\n              html += '<td>' + (c['Country'] || '-') + '</td>';\n              html += '<td><span class=\"status ' + status + '\">' + status.charAt(0).toUpperCase() + status.slice(1) + '</span></td>';\n              html += '<td class=\"actions\">';\n              if (c.is_deleted) {\n                html += '<button class=\"btn-sm restore\" onclick=\"restoreClient(\\'' + c['Client Code'] + '\\')\">Restore</button>';\n              } else {\n                html += '<button class=\"btn-sm delete\" onclick=\"deleteClient(\\'' + c['Client Code'] + '\\')\">Delete</button>';\n              }\n              html += '</td></tr>';\n            });\n            html += '</tbody></table>';\n\n            // Pagination\n            html += '<div class=\"pagination\">';\n            html += '<button ' + (result.page <= 1 ? 'disabled' : '') + ' onclick=\"loadClients(' + (result.page - 1) + ')\">Previous</button>';\n            html += '<span class=\"page-info\">Page ' + result.page + ' of ' + result.total_pages + ' (' + result.total + ' items)</span>';\n            html += '<button ' + (result.page >= result.total_pages ? 'disabled' : '') + ' onclick=\"loadClients(' + (result.page + 1) + ')\">Next</button>';\n            html += '</div>';\n\n            container.innerHTML = html;\n          }\n\n          window.searchClients = function() {\n            clearTimeout(searchTimeout);\n            searchTimeout = setTimeout(function() { loadClients(1); }, 300);\n          };\n\n          window.deleteClient = async function(code) {\n            if (!confirm('Delete this client?')) return;\n            var result = await window.softDeleteClient(code);\n            if (result.success) {\n              loadClients(clientsPage);\n            } else {\n              alert(result.message);\n            }\n          };\n\n          window.restoreClient = async function(code) {\n            var result = await window.restoreClient(code);\n            if (result.success) {\n              loadClients(clientsPage);\n            } else {\n              alert(result.message);\n            }\n          };\n\n          window.exportClients = async function() {\n            var showDeleted = document.getElementById('showDeletedClients').checked;\n            var data = await window.exportClientsData(showDeleted);\n            downloadCSV(data, 'clients_export.csv');\n          };\n\n          // ============================================\n          // QUOTATIONS\n          // ============================================\n          window.loadQuotations = async function(page) {\n            quotationsPage = page || 1;\n            var container = document.getElementById('quotationsContent');\n            container.innerHTML = '<div class=\"loading-spinner\"><div class=\"spinner\"></div></div>';\n\n            var search = document.getElementById('quotationSearch').value;\n            var showDeleted = document.getElementById('showDeletedQuotations').checked;\n\n            try {\n              var result = await window.getAllQuotations(quotationsPage, 15, search, showDeleted);\n              renderQuotationsTable(result, container);\n            } catch (e) {\n              container.innerHTML = '<div class=\"empty-state\"><h4>Error loading quotations</h4></div>';\n            }\n          };\n\n          function renderQuotationsTable(result, container) {\n            if (result.data.length === 0) {\n              container.innerHTML = '<div class=\"empty-state\"><h4>No quotations found</h4></div>';\n              return;\n            }\n\n            var html = '<table class=\"data-table\"><thead><tr><th>#</th><th>Date</th><th>Client</th><th>Model</th><th>Agreed Price</th><th>Status</th><th>Actions</th></tr></thead><tbody>';\n            result.data.forEach(function(q) {\n              var status = q.is_deleted ? 'deleted' : 'active';\n              html += '<tr>';\n              html += '<td>' + q['Quotation#'] + '</td>';\n              html += '<td>' + q['Date'] + '</td>';\n              html += '<td>' + q['Client Name'] + '</td>';\n              html += '<td>' + (q['Model'] || '-') + '</td>';\n              html += '<td>' + (q['Agreed Price'] ? q['Agreed Price'].toLocaleString() : '-') + '</td>';\n              html += '<td><span class=\"status ' + status + '\">' + status.charAt(0).toUpperCase() + status.slice(1) + '</span></td>';\n              html += '<td class=\"actions\">';\n              if (q.is_deleted) {\n                html += '<button class=\"btn-sm restore\" onclick=\"restoreQuotation(' + q['Quotation#'] + ')\">Restore</button>';\n              } else {\n                html += '<button class=\"btn-sm delete\" onclick=\"deleteQuotation(' + q['Quotation#'] + ')\">Delete</button>';\n              }\n              html += '</td></tr>';\n            });\n            html += '</tbody></table>';\n\n            // Pagination\n            html += '<div class=\"pagination\">';\n            html += '<button ' + (result.page <= 1 ? 'disabled' : '') + ' onclick=\"loadQuotations(' + (result.page - 1) + ')\">Previous</button>';\n            html += '<span class=\"page-info\">Page ' + result.page + ' of ' + result.total_pages + ' (' + result.total + ' items)</span>';\n            html += '<button ' + (result.page >= result.total_pages ? 'disabled' : '') + ' onclick=\"loadQuotations(' + (result.page + 1) + ')\">Next</button>';\n            html += '</div>';\n\n            container.innerHTML = html;\n          }\n\n          window.searchQuotations = function() {\n            clearTimeout(searchTimeout);\n            searchTimeout = setTimeout(function() { loadQuotations(1); }, 300);\n          };\n\n          window.deleteQuotation = async function(num) {\n            if (!confirm('Delete this quotation?')) return;\n            var result = await window.softDeleteQuotation(num);\n            if (result.success) {\n              loadQuotations(quotationsPage);\n            } else {\n              alert(result.message);\n            }\n          };\n\n          window.restoreQuotation = async function(num) {\n            var result = await window.restoreQuotation(num);\n            if (result.success) {\n              loadQuotations(quotationsPage);\n            } else {\n              alert(result.message);\n            }\n          };\n\n          window.exportQuotations = async function() {\n            var showDeleted = document.getElementById('showDeletedQuotations').checked;\n            var data = await window.exportQuotationsData(showDeleted);\n            downloadCSV(data, 'quotations_export.csv');\n          };\n\n          // ============================================\n          // AUDIT LOG\n          // ============================================\n          window.loadAuditLogs = async function(page) {\n            auditPage = page || 1;\n            var container = document.getElementById('auditContent');\n            container.innerHTML = '<div class=\"loading-spinner\"><div class=\"spinner\"></div></div>';\n\n            try {\n              var result = await window.getAuditLogs(50, (auditPage - 1) * 50, null);\n              if (!result.success) {\n                container.innerHTML = '<div class=\"empty-state\"><h4>' + result.message + '</h4></div>';\n                return;\n              }\n\n              if (result.logs.length === 0) {\n                container.innerHTML = '<div class=\"empty-state\"><h4>No audit logs found</h4></div>';\n                return;\n              }\n\n              var html = '<table class=\"data-table\"><thead><tr><th>Time</th><th>User</th><th>Action</th><th>Table</th><th>Record ID</th></tr></thead><tbody>';\n              result.logs.forEach(function(l) {\n                html += '<tr>';\n                html += '<td>' + l.timestamp.replace('T', ' ').substring(0, 19) + '</td>';\n                html += '<td>' + l.user_email + '</td>';\n                html += '<td>' + l.action + '</td>';\n                html += '<td>' + l.table_name + '</td>';\n                html += '<td>' + (l.record_id || '-') + '</td>';\n                html += '</tr>';\n              });\n              html += '</tbody></table>';\n\n              container.innerHTML = html;\n            } catch (e) {\n              container.innerHTML = '<div class=\"empty-state\"><h4>Error loading audit logs</h4></div>';\n            }\n          };\n\n          // ============================================\n          // SETTINGS\n          // ============================================\n          window.loadSettings = async function() {\n            var container = document.getElementById('settingsContent');\n            container.innerHTML = '<div class=\"loading-spinner\"><div class=\"spinner\"></div></div>';\n\n            try {\n              // Check if bridge function is ready\n              if (!window.getAllSettings) {\n                container.innerHTML = '<div class=\"empty-state\"><h4>System is loading, please wait...</h4></div>';\n                setTimeout(loadSettings, 1000);\n                return;\n              }\n\n              var result = await window.getAllSettings();\n              console.log('Settings result:', result);\n\n              if (!result || !result.success) {\n                var errorMsg = result ? result.message : 'Error loading settings';\n                // Check if it's an admin access error\n                if (errorMsg && errorMsg.indexOf('Admin access') !== -1) {\n                  errorMsg = 'Admin access required. Please make sure you are logged in as an admin.';\n                }\n                container.innerHTML = '<div class=\"empty-state\"><h4>' + errorMsg + '</h4><p style=\"margin-top:10px;color:#666;\">Try logging out and logging in again.</p></div>';\n                return;\n              }\n\n              var settings = result.settings || {};\n\n              var html = '<div class=\"settings-grid\">';\n\n              // Exchange Rate Section\n              html += '<div class=\"settings-block\" style=\"background:#f8f9fa;padding:20px;\">';\n              html += '<h4 style=\"margin:0 0 15px;color:#1a1a2e;\">💱 Exchange Rate</h4>';\n              html += '<div class=\"form-group\" style=\"margin-bottom:0;\">';\n              html += '<label>USD to EGP Rate</label>';\n              html += '<div style=\"display:flex;gap:10px;align-items:center;\">';\n              html += '<input type=\"number\" step=\"0.01\" id=\"setting_exchange_rate\" value=\"' + (settings.exchange_rate || 47.5) + '\" style=\"flex:1;\">';\n              html += '<button class=\"action-btn\" onclick=\"saveSetting(\\'exchange_rate\\')\">Save</button>';\n              html += '</div></div></div>';\n\n              // ==========================================\n              // Technical Specifications Table Settings\n              // ==========================================\n              html += '<div style=\"background:#e3f2fd;padding:20px;border-radius:12px;margin-bottom:20px;border:2px solid #2196f3;\">';\n              html += '<h4 style=\"margin:0 0 15px;color:#1565c0;\">📋 Technical Specifications Table Settings</h4>';\n              html += '<p style=\"margin:0 0 15px;color:#666;font-size:13px;\">Configure which fields appear in the Technical Specifications table. Use <b>Conditional Rules</b> to show different values based on quotation data.</p>';\n\n              // Get saved tech specs from settings\n              var savedTechSpecs = {};\n              try {\n                if (settings.technical_specs) {\n                  savedTechSpecs = JSON.parse(settings.technical_specs);\n                }\n              } catch(e) { savedTechSpecs = {}; }\n\n              html += '<div style=\"background:#fff;padding:15px;border-radius:8px;overflow-x:auto;\">';\n              html += '<table style=\"width:100%;border-collapse:collapse;font-size:13px;\">';\n              html += '<thead><tr style=\"background:#f5f5f5;\">';\n              html += '<th style=\"padding:10px;border:1px solid #ddd;text-align:center;width:40px;\">#</th>';\n              html += '<th style=\"padding:10px;border:1px solid #ddd;text-align:right;width:120px;\">Label (AR)</th>';\n              html += '<th style=\"padding:10px;border:1px solid #ddd;text-align:left;width:120px;\">Label (EN)</th>';\n              html += '<th style=\"padding:10px;border:1px solid #ddd;text-align:center;\">Value Configuration</th>';\n              html += '<th style=\"padding:10px;border:1px solid #ddd;text-align:center;width:60px;\">Active</th>';\n              html += '</tr></thead><tbody>';\n\n              // Define the 20 technical specs rows\n              var techSpecs = [\n                {num: 1, ar: 'الموديل', en: 'Model', field: 'model'},\n                {num: 2, ar: 'عدد الألوان', en: 'Number of Colors', field: 'colors_count'},\n                {num: 3, ar: 'نوع الطباعة', en: 'Printing Sides', field: 'printing_sides'},\n                {num: 4, ar: 'وحدات التحكم في الشد', en: 'Tension Control Units', field: 'tension_control'},\n                {num: 5, ar: 'وحدات الكورونا', en: 'Corona Units', field: 'corona_units'},\n                {num: 6, ar: 'نظام التحكم في مسجل الطباعة', en: 'Print Register Control', field: 'print_register'},\n                {num: 7, ar: 'سكاكين الدكتور', en: 'Doctor Blades', field: 'doctor_blades'},\n                {num: 8, ar: 'نوع رولات الانيلوكس', en: 'Anilox Type', field: 'anilox_type'},\n                {num: 9, ar: 'مراقبة الطباعة بالفيديو', en: 'Video Inspection', field: 'video_inspection'},\n                {num: 10, ar: 'PLC', en: 'PLC', field: 'plc'},\n                {num: 11, ar: 'HMI شاشة', en: 'HMI Screen', field: 'hmi_screen'},\n                {num: 12, ar: 'سليتر', en: 'Slitter', field: 'slitter'},\n                {num: 13, ar: 'قدرة المجفف', en: 'Dryer Capacity', field: 'dryer_capacity'},\n                {num: 14, ar: 'الموتورات', en: 'Motors', field: 'motors'},\n                {num: 15, ar: 'سرعة الماكينة', en: 'Machine Speed', field: 'machine_speed'},\n                {num: 16, ar: 'عرض الطباعة', en: 'Printing Width', field: 'printing_width'},\n                {num: 17, ar: 'قطر الرول الأم', en: 'Parent Roll Diameter', field: 'roll_diameter'},\n                {num: 18, ar: 'قطر البوبينة', en: 'Bobbin Diameter', field: 'bobbin_diameter'},\n                {num: 19, ar: 'سمك المادة', en: 'Material Thickness', field: 'material_thickness'},\n                {num: 20, ar: 'الوندر', en: 'Winder', field: 'winder'}\n              ];\n\n              // Available quotation fields for conditions\n              var quotationFields = [\n                'model', 'colors_count', 'machine_width', 'winder', 'video_inspection',\n                'plc', 'slitter', 'hmi_screen', 'corona', 'tension_control'\n              ];\n\n              techSpecs.forEach(function(spec) {\n                var key = 'tech_spec_' + spec.num;\n                var savedSpec = savedTechSpecs[key] || {};\n                var isActive = savedSpec.active !== false;\n                var valueSource = savedSpec.source || 'field';\n                var rules = savedSpec.rules || [];\n                var defaultValue = savedSpec.default_value || '';\n                var labelAr = savedSpec.label_ar || spec.ar;\n                var labelEn = savedSpec.label_en || spec.en;\n\n                html += '<tr id=\"row_' + spec.num + '\">';\n                html += '<td style=\"padding:8px;border:1px solid #ddd;text-align:center;font-weight:bold;vertical-align:top;\">' + spec.num + '</td>';\n                html += '<td style=\"padding:8px;border:1px solid #ddd;vertical-align:top;\"><input type=\"text\" id=\"tech_' + spec.num + '_label_ar\" value=\"' + labelAr + '\" style=\"width:100%;padding:6px;border:1px solid #ddd;border-radius:4px;\" dir=\"rtl\"></td>';\n                html += '<td style=\"padding:8px;border:1px solid #ddd;vertical-align:top;\"><input type=\"text\" id=\"tech_' + spec.num + '_label_en\" value=\"' + labelEn + '\" style=\"width:100%;padding:6px;border:1px solid #ddd;border-radius:4px;\"></td>';\n\n                // Value Configuration Cell\n                html += '<td style=\"padding:8px;border:1px solid #ddd;\">';\n                html += '<select id=\"tech_' + spec.num + '_source\" style=\"width:100%;padding:6px;border:1px solid #ddd;border-radius:4px;margin-bottom:5px;\" onchange=\"toggleValueConfig(' + spec.num + ')\">';\n                html += '<option value=\"field\"' + (valueSource === 'field' ? ' selected' : '') + '>📊 From Quotation Field</option>';\n                html += '<option value=\"fixed\"' + (valueSource === 'fixed' ? ' selected' : '') + '>📝 Fixed Value</option>';\n                html += '<option value=\"yes_no\"' + (valueSource === 'yes_no' ? ' selected' : '') + '>✅ Yes/No Field</option>';\n                html += '<option value=\"conditional\"' + (valueSource === 'conditional' ? ' selected' : '') + '>🔀 Conditional Rules</option>';\n                html += '</select>';\n\n                // Fixed value input\n                html += '<div id=\"tech_' + spec.num + '_fixed_div\" style=\"display:' + (valueSource === 'fixed' ? 'block' : 'none') + ';\">';\n                html += '<input type=\"text\" id=\"tech_' + spec.num + '_fixed\" value=\"' + defaultValue + '\" placeholder=\"Enter fixed value...\" style=\"width:100%;padding:6px;border:1px solid #ddd;border-radius:4px;\">';\n                html += '</div>';\n\n                // Conditional rules container\n                html += '<div id=\"tech_' + spec.num + '_rules_div\" style=\"display:' + (valueSource === 'conditional' ? 'block' : 'none') + ';background:#f9f9f9;padding:8px;border-radius:4px;margin-top:5px;\">';\n                html += '<div id=\"tech_' + spec.num + '_rules_list\">';\n\n                // Render existing rules\n                if (rules.length > 0) {\n                  rules.forEach(function(rule, idx) {\n                    html += renderRuleRow(spec.num, idx, rule, quotationFields);\n                  });\n                }\n\n                html += '</div>';\n                html += '<button type=\"button\" onclick=\"addRule(' + spec.num + ')\" style=\"margin-top:5px;padding:4px 10px;background:#2196f3;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:12px;\">+ Add Rule</button>';\n                html += '<div style=\"margin-top:8px;padding-top:8px;border-top:1px dashed #ddd;\">';\n                html += '<label style=\"font-size:11px;color:#666;\">Default value (if no rule matches):</label>';\n                html += '<input type=\"text\" id=\"tech_' + spec.num + '_default\" value=\"' + defaultValue + '\" placeholder=\"Default value...\" style=\"width:100%;padding:4px;border:1px solid #ddd;border-radius:4px;font-size:12px;\">';\n                html += '</div>';\n                html += '</div>';\n\n                html += '</td>';\n\n                html += '<td style=\"padding:8px;border:1px solid #ddd;text-align:center;vertical-align:top;\">';\n                html += '<input type=\"checkbox\" id=\"tech_' + spec.num + '_active\"' + (isActive ? ' checked' : '') + ' style=\"width:20px;height:20px;cursor:pointer;\">';\n                html += '</td>';\n                html += '</tr>';\n              });\n\n              html += '</tbody></table>';\n              html += '</div>';\n\n              // Help section\n              html += '<div style=\"margin-top:15px;padding:12px;background:#fff3cd;border-radius:8px;border:1px solid #ffc107;\">';\n              html += '<h5 style=\"margin:0 0 8px;color:#856404;\">💡 How Conditional Rules Work:</h5>';\n              html += '<ul style=\"margin:0;padding-left:20px;font-size:12px;color:#856404;\">';\n              html += '<li><b>IF</b> [field] <b>=</b> [value] <b>THEN</b> show [result]</li>';\n              html += '<li>Example: IF colors_count = 8 THEN show \"8 ألوان\"</li>';\n              html += '<li>Rules are checked in order - first match wins</li>';\n              html += '<li>If no rule matches, the default value is shown</li>';\n              html += '</ul>';\n              html += '</div>';\n\n              html += '<div style=\"margin-top:15px;text-align:center;\">';\n              html += '<button class=\"action-btn green\" onclick=\"saveTechSpecs()\" style=\"padding:12px 30px;\">💾 Save All Technical Specs</button>';\n              html += '</div>';\n\n              html += '</div>'; // End Technical Specs Section\n\n              // Helper function to render a rule row\n              function renderRuleRow(specNum, ruleIdx, rule, fields) {\n                rule = rule || {field: '', operator: '=', value: '', result: ''};\n                var rowHtml = '<div class=\"rule-row\" id=\"rule_' + specNum + '_' + ruleIdx + '\" style=\"display:flex;gap:5px;align-items:center;margin-bottom:5px;flex-wrap:wrap;\">';\n                rowHtml += '<span style=\"font-size:11px;color:#666;\">IF</span>';\n                rowHtml += '<select id=\"rule_' + specNum + '_' + ruleIdx + '_field\" style=\"padding:4px;border:1px solid #ddd;border-radius:3px;font-size:11px;\">';\n                fields.forEach(function(f) {\n                  rowHtml += '<option value=\"' + f + '\"' + (rule.field === f ? ' selected' : '') + '>' + f + '</option>';\n                });\n                rowHtml += '</select>';\n                rowHtml += '<select id=\"rule_' + specNum + '_' + ruleIdx + '_op\" style=\"padding:4px;border:1px solid #ddd;border-radius:3px;font-size:11px;\">';\n                rowHtml += '<option value=\"=\"' + (rule.operator === '=' ? ' selected' : '') + '>=</option>';\n                rowHtml += '<option value=\"!=\"' + (rule.operator === '!=' ? ' selected' : '') + '>≠</option>';\n                rowHtml += '<option value=\">\"' + (rule.operator === '>' ? ' selected' : '') + '>></option>';\n                rowHtml += '<option value=\"<\"' + (rule.operator === '<' ? ' selected' : '') + '><</option>';\n                rowHtml += '<option value=\">=\"' + (rule.operator === '>=' ? ' selected' : '') + '>≥</option>';\n                rowHtml += '<option value=\"<=\"' + (rule.operator === '<=' ? ' selected' : '') + '>≤</option>';\n                rowHtml += '<option value=\"contains\"' + (rule.operator === 'contains' ? ' selected' : '') + '>contains</option>';\n                rowHtml += '</select>';\n                rowHtml += '<input type=\"text\" id=\"rule_' + specNum + '_' + ruleIdx + '_val\" value=\"' + (rule.value || '') + '\" placeholder=\"value\" style=\"width:60px;padding:4px;border:1px solid #ddd;border-radius:3px;font-size:11px;\">';\n                rowHtml += '<span style=\"font-size:11px;color:#666;\">THEN</span>';\n                rowHtml += '<input type=\"text\" id=\"rule_' + specNum + '_' + ruleIdx + '_result\" value=\"' + (rule.result || '') + '\" placeholder=\"show this\" style=\"flex:1;min-width:80px;padding:4px;border:1px solid #ddd;border-radius:3px;font-size:11px;\">';\n                rowHtml += '<button type=\"button\" onclick=\"removeRule(' + specNum + ',' + ruleIdx + ')\" style=\"padding:2px 6px;background:#f44336;color:#fff;border:none;border-radius:3px;cursor:pointer;font-size:11px;\">✕</button>';\n                rowHtml += '</div>';\n                return rowHtml;\n              }\n              window.renderRuleRow = renderRuleRow;\n              window.quotationFields = quotationFields;\n\n              // Shipping & Expenses Section\n              html += '<div class=\"settings-block\" style=\"background:#f8f9fa;padding:20px;\">';\n              html += '<h4 style=\"margin:0 0 15px;color:#1a1a2e;\">🚢 Shipping & Expenses (USD)</h4>';\n\n              html += '<div class=\"form-group\"