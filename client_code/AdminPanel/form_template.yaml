div class=\"value\" id=\"statValue\">-</div>\n          <div class=\"label\" id=\"lblTotalValue\">Total Value (EGP)</div>\n        </div>\n\n        <div class=\"stat-card\">\n          <div class=\"icon red\">\n            <svg viewBox=\"0 0 24 24\"><path d=\"M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z\"/></svg>\n          </div>\n          <div class=\"value\" id=\"statMonthly\">-</div>\n          <div class=\"label\" id=\"lblThisMonth\">This Month Quotations</div>\n        </div>\n      </div>\n    </div>\n\n    <!-- Other panels remain the same but hidden by default -->\n    <div class=\"panel\" id=\"pending-panel\">\n      <div class=\"panel-header\">\n        <h3>Pending User Approvals</h3>\n        <button class=\"action-btn\" onclick=\"loadPendingUsers()\">Refresh</button>\n      </div>\n      <div class=\"panel-body\">\n        <div id=\"pendingContent\">\n          <div class=\"loading-spinner\"><div class=\"spinner\"></div></div>\n        </div>\n      </div>\n    </div>\n\n    <div class=\"panel\" id=\"users-panel\">\n      <div class=\"panel-header\">\n        <h3>All Users</h3>\n        <button class=\"action-btn\" onclick=\"loadAllUsers()\">Refresh</button>\n      </div>\n      <div class=\"panel-body\">\n        <div id=\"usersContent\">\n          <div class=\"loading-spinner\"><div class=\"spinner\"></div></div>\n        </div>\n      </div>\n    </div>\n\n    <div class=\"panel\" id=\"clients-panel\">\n      <div class=\"panel-header\">\n        <h3>Clients Management</h3>\n      </div>\n      <div class=\"panel-body\">\n        <div class=\"toolbar\">\n          <div class=\"search-box\">\n            <svg viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z\"/></svg>\n            <input type=\"text\" id=\"clientSearch\" placeholder=\"Search clients...\" oninput=\"searchClients()\">\n          </div>\n          <label class=\"checkbox-label\">\n            <input type=\"checkbox\" id=\"showDeletedClients\" onchange=\"loadClients()\">\n            <span>Show Deleted</span>\n          </label>\n          <button class=\"action-btn green\" onclick=\"exportClients()\">\n            <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z\"/></svg>\n            Export\n          </button>\n        </div>\n        <div id=\"clientsContent\">\n          <div class=\"loading-spinner\"><div class=\"spinner\"></div></div>\n        </div>\n      </div>\n    </div>\n\n    <div class=\"panel\" id=\"quotations-panel\">\n      <div class=\"panel-header\">\n        <h3>Quotations Management</h3>\n      </div>\n      <div class=\"panel-body\">\n        <div class=\"toolbar\">\n          <div class=\"search-box\">\n            <svg viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z\"/></svg>\n            <input type=\"text\" id=\"quotationSearch\" placeholder=\"Search quotations...\" oninput=\"searchQuotations()\">\n          </div>\n          <label class=\"checkbox-label\">\n            <input type=\"checkbox\" id=\"showDeletedQuotations\" onchange=\"loadQuotations()\">\n            Show Deleted\n          </label>\n          <button class=\"action-btn green\" onclick=\"exportQuotations()\">\n            <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z\"/></svg>\n            Export\n          </button>\n        </div>\n        <div id=\"quotationsContent\">\n          <div class=\"loading-spinner\"><div class=\"spinner\"></div></div>\n        </div>\n      </div>\n    </div>\n\n    <div class=\"panel\" id=\"settings-panel\">\n      <div class=\"panel-header\">\n        <h3>System Settings</h3>\n        <button class=\"action-btn\" onclick=\"loadSettings()\">Refresh</button>\n      </div>\n      <div class=\"panel-body\">\n        <div id=\"settingsContent\">\n          <div class=\"loading-spinner\"><div class=\"spinner\"></div></div>\n        </div>\n      </div>\n    </div>\n\n    <div class=\"panel\" id=\"audit-panel\">\n      <div class=\"panel-header\">\n        <h3>Audit Log</h3>\n        <button class=\"action-btn\" onclick=\"loadAuditLogs()\">Refresh</button>\n      </div>\n      <div class=\"panel-body\">\n        <div id=\"auditContent\">\n          <div class=\"loading-spinner\"><div class=\"spinner\"></div></div>\n        </div>\n      </div>\n    </div>\n  </main>\n</div>\n\n<!-- Modals -->\n<div class=\"modal-overlay\" id=\"roleModal\">\n  <div class=\"modal-box\">\n    <div class=\"modal-header\">\n      <h3>Change User Role</h3>\n      <button class=\"modal-close\" onclick=\"closeModal('roleModal')\">&times;</button>\n    </div>\n    <div class=\"modal-body\">\n      <div class=\"form-group\">\n        <label>Select Role</label>\n        <select id=\"newRole\">\n          <option value=\"admin\">Admin</option>\n          <option value=\"manager\">Manager</option>\n          <option value=\"sales\">Sales</option>\n          <option value=\"viewer\">Viewer</option>\n        </select>\n      </div>\n    </div>\n    <div class=\"modal-footer\">\n      <button class=\"filter-btn\" onclick=\"closeModal('roleModal')\">Cancel</button>\n      <button class=\"action-btn\" onclick=\"confirmRoleChange()\">Save</button>\n    </div>\n  </div>\n</div>\n\n<div class=\"modal-overlay\" id=\"passwordModal\">\n  <div class=\"modal-box\">\n    <div class=\"modal-header\">\n      <h3>Reset Password</h3>\n      <button class=\"modal-close\" onclick=\"closeModal('passwordModal')\">&times;</button>\n    </div>\n    <div class=\"modal-body\">\n      <div class=\"form-group\">\n        <label>New Password</label>\n        <input type=\"password\" id=\"newPassword\" placeholder=\"Min 6 characters\">\n      </div>\n    </div>\n    <div class=\"modal-footer\">\n      <button class=\"filter-btn\" onclick=\"closeModal('passwordModal')\">Cancel</button>\n      <button class=\"action-btn\" onclick=\"confirmPasswordReset()\">Reset</button>\n    </div>\n  </div>\n</div>\n\n<div class=\"modal-overlay\" id=\"approvalModal\">\n  <div class=\"modal-box\">\n    <div class=\"modal-header\">\n      <h3>✅ Approve User</h3>\n      <button class=\"modal-close\" onclick=\"closeModal('approvalModal')\">&times;</button>\n    </div>\n    <div class=\"modal-body\">\n      <div style=\"background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px;\">\n        <p style=\"margin: 5px 0;\"><strong>Name:</strong> <span id=\"approvalUserName\">-</span></p>\n        <p style=\"margin: 5px 0;\"><strong>Email:</strong> <span id=\"approvalUserEmail\">-</span></p>\n        <p style=\"margin: 5px 0;\"><strong>Phone:</strong> <span id=\"approvalUserPhone\">-</span></p>\n        <p style=\"margin: 5px 0;\"><strong>Registered:</strong> <span id=\"approvalUserDate\">-</span></p>\n      </div>\n      <div class=\"form-group\">\n        <label>Select Role</label>\n        <select id=\"approvalRole\" onchange=\"updateRolePermissions()\">\n          <option value=\"viewer\">Viewer (Read Only)</option>\n          <option value=\"sales\" selected>Sales (Create & Edit Own)</option>\n          <option value=\"manager\">Manager (Full except Admin)</option>\n          <option value=\"admin\">Admin (Full Access)</option>\n        </select>\n      </div>\n      <div style=\"background: #e3f2fd; padding: 10px; border-radius: 5px; font-size: 13px;\">\n        <strong>Permissions:</strong>\n        <ul id=\"rolePermissionsList\" style=\"margin: 5px 0 0 0; padding-left: 20px;\"></ul>\n      </div>\n    </div>\n    <div class=\"modal-footer\">\n      <button class=\"filter-btn\" onclick=\"closeModal('approvalModal')\">Cancel</button>\n      <button class=\"action-btn\" onclick=\"confirmApproval()\">✓ Approve</button>\n    </div>\n  </div>\n</div>\n\n<div id=\"notificationContainer\"></div>\n\n<script>\n  (function() {\n  // State\n  var currentPanel = 'dashboard';\n  var clientsPage = 1;\n  var quotationsPage = 1;\n  var auditPage = 1;\n  var selectedUserId = null;\n  var searchTimeout = null;\n  var pendingUsersData = {};\n\n  // ============================================\n  // NOTIFICATION SYSTEM\n  // ============================================\n  window.showNotification = function(type, title, message, duration) {\n  duration = duration || 5000;\n  var container = document.getElementById('notificationContainer');\n  if (!container) return;\n\n  var icons = { 'success': '✓', 'error': '✕', 'warning': '⚠', 'info': 'ℹ' };\n\n  var toast = document.createElement('div');\n  toast.className = 'notification-toast ' + type;\n  toast.innerHTML =\n  '<span class=\"icon\">' + icons[type] + '</span>' +\n  '<div class=\"content\">' +\n  '<div class=\"title\">' + title + '</div>' +\n  '<div class=\"message\">' + message + '</div>' +\n  '</div>' +\n  '<button class=\"close-btn\" onclick=\"this.parentElement.remove()\">×</button>';\n\n  container.appendChild(toast);\n\n  setTimeout(function() {\n  if (toast.parentElement) {\n  toast.style.animation = 'slideOut 0.3s ease';\n  setTimeout(function() { if (toast.parentElement) toast.remove(); }, 300);\n  }\n  }, duration);\n  };\n\n  // ============================================\n  // INIT\n  // ============================================\n  function init() {\n  console.log('=== Initializing Admin Panel ===');\n\n  // Check panels exist\n  console.log('Checking panels:');\n  var panels = ['dashboard', 'pending', 'users', 'clients', 'quotations', 'settings', 'audit'];\n  panels.forEach(function(name) {\n  var panel = document.getElementById(name + '-panel');\n  if (panel) {\n  console.log('✓ Panel exists:', name);\n  } else {\n  console.error('✗ Panel MISSING:', name);\n  }\n  });\n\n  initUser();\n  initNavigation();\n  setupLogoutButton();\n\n  console.log('Waiting for Python bridge...');\n  setTimeout(function() {\n  console.log('Loading dashboard...');\n  if (window.loadDashboard) {\n  window.loadDashboard();\n  } else {\n  console.warn('loadDashboard not available yet');\n  }\n  }, 500);\n  }\n\n  // Test function - can be called from console\n  window.testPanel = function(panelName) {\n  console.log('=== Testing panel:', panelName);\n\n  // Hide all\n  document.querySelectorAll('.panel').forEach(function(p) {\n  p.classList.remove('active');\n  p.style.display = 'none';\n  });\n\n  // Show target\n  var panel = document.getElementById(panelName + '-panel');\n  if (panel) {\n  panel.classList.add('active');\n  panel.style.display = 'block';\n  console.log('✓ Panel shown successfully');\n  } else {\n  console.error('✗ Panel not found');\n  }\n  };\n\n  function initUser() {\n  var name = localStorage.getItem('user_name') || 'Admin';\n  var userNameEl = document.getElementById('userName');\n  if (userNameEl) {\n  userNameEl.textContent = name;\n  }\n  }\n\n  // ============================================\n  // NAVIGATION\n  // ============================================\n  function initNavigation() {\n  console.log('Setting up navigation...');\n\n  // Get all nav items\n  var navItems = document.querySelectorAll('.nav-item[data-panel]');\n  console.log('Found nav items:', navItems.length);\n\n  navItems.forEach(function(item) {\n  var panel = item.getAttribute('data-panel');\n  console.log('Setting up nav item for panel:', panel);\n\n  // Remove any existing listeners\n  item.onclick = null;\n\n  // Add event listener\n  item.addEventListener('click', function(e) {\n  e.preventDefault();\n  e.stopPropagation();\n\n  console.log('>>> NAV ITEM CLICKED:', panel);\n\n  // Update active states on ALL nav items\n  document.querySelectorAll('.nav-item[data-panel]').forEach(function(i) {\n  i.classList.remove('active');\n  });\n\n  // Add active to current item and its mobile counterpart\n  document.querySelectorAll('.nav-item[data-panel=\"' + panel + '\"]').forEach(function(i) {\n  i.classList.add('active');\n  });\n\n  // Hide all panels\n  document.querySelectorAll('.panel').forEach(function(p) {\n  p.classList.remove('active');\n  p.style.display = 'none';\n  });\n\n  // Show selected panel\n  var panelEl = document.getElementById(panel + '-panel');\n  if (panelEl) {\n  panelEl.classList.add('active');\n  panelEl.style.display = 'block';\n  console.log('>>> Panel shown:', panel);\n  } else {\n  console.error('>>> Panel NOT found:', panel + '-panel');\n  }\n\n  currentPanel = panel;\n\n  // Load data\n  console.log('>>> Loading data for:', panel);\n  try {\n  if (panel === 'dashboard') loadDashboard();\n  else if (panel === 'pending') loadPendingUsers();\n  else if (panel === 'users') loadAllUsers();\n  else if (panel === 'clients') loadClients();\n  else if (panel === 'quotations') loadQuotations();\n  else if (panel === 'audit') loadAuditLogs();\n  else if (panel === 'settings') loadSettings();\n  } catch(err) {\n  console.error('>>> Error loading panel data:', err);\n  }\n\n  // Close mobile menu\n  var mobileMenu = document.getElementById('mobileMenu');\n  if (mobileMenu) {\n  mobileMenu.classList.remove('open');\n  }\n  });\n  });\n\n  console.log('Navigation setup complete!');\n  }\n\n  // ============================================\n  // LAUNCHER\n  // ============================================\n  window.goToLauncher = function() {\n  console.log('Navigating to launcher...');\n  window.location.hash = '#launcher';\n  };\n\n  // ============================================\n  // DASHBOARD\n  // ============================================\n  window.loadDashboard = async function() {\n  function setStatText(id, value) {\n  var el = document.getElementById(id);\n  if (el) el.textContent = value;\n  }\n\n  try {\n  if (!window.getDashboardStats) {\n  console.log('Waiting for bridge functions...');\n  setTimeout(loadDashboard, 500);\n  return;\n  }\n\n  var stats = await window.getDashboardStats();\n  if (stats) {\n  setStatText('statClients', (stats.total_clients || 0).toLocaleString());\n  setStatText('statQuotations', (stats.total_quotations || 0).toLocaleString());\n  setStatText('statValue', (stats.total_value || 0).toLocaleString());\n  setStatText('statMonthly', (stats.this_month_quotations || 0).toLocaleString());\n  }\n\n  if (window.getPendingUsers) {\n  var pending = await window.getPendingUsers();\n  if (pending && pending.success && pending.users) {\n  setStatText('pendingBadge', pending.users.length);\n  }\n  }\n  } catch (e) {\n  console.error('Dashboard error:', e);\n  setStatText('statClients', '0');\n  setStatText('statQuotations', '0');\n  setStatText('statValue', '0');\n  setStatText('statMonthly', '0');\n  }\n  };\n\n  // ============================================\n  // PENDING USERS\n  // ============================================\n  window.loadPendingUsers = async function() {\n  var container = document.getElementById('pendingContent');\n  container.innerHTML = '<div class=\"loading-spinner\"><div class=\"spinner\"></div></div>';\n\n  try {\n  var result = await window.getPendingUsers();\n  if (!result.success) {\n  container.innerHTML = '<div class=\"empty-state\"><h4>' + result.message + '</h4></div>';\n  return;\n  }\n\n  if (result.users.length === 0) {\n  container.innerHTML = '<div class=\"empty-state\"><h4>No pending approvals</h4><p>All users have been reviewed</p></div>';\n  pendingUsersData = {};\n  return;\n  }\n\n  pendingUsersData = {};\n  result.users.forEach(function(u) { pendingUsersData[u.user_id] = u; });\n\n  var html = '<table class=\"data-table\"><thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Registered</th><th>Actions</th></tr></thead><tbody>';\n  result.users.forEach(function(u) {\n  html += '<tr>';\n  html += '<td>' + u.full_name + '</td>';\n  html += '<td>' + u.email + '</td>';\n  html += '<td>' + (u.phone || '-') + '</td>';\n  html += '<td>' + u.created_at.split('T')[0] + '</td>';\n  html += '<td class=\"actions\">';\n  html += '<button class=\"btn-sm approve\" onclick=\"showApprovalModal(\\'' + u.user_id + '\\')\" style=\"background:#e8f5e9;color:#2e7d32;\">✓ Approve</button>';\n  html += '<button class=\"btn-sm reject\" onclick=\"rejectUserAction(\\'' + u.user_id + '\\')\">✕ Reject</button>';\n  html += '</td></tr>';\n  });\n  html += '</tbody></table>';\n  container.innerHTML = html;\n  } catch (e) {\n  container.innerHTML = '<div class=\"empty-state\"><h4>Error loading users</h4></div>';\n  }\n  };\n\n  // ============================================\n  // APPROVAL MODAL FUNCTIONS\n  // ============================================\n  window.showApprovalModal = function(userId) {\n  var user = pendingUsersData[userId];\n  if (!user) {\n  showNotification('error', 'Error', 'User data not found');\n  return;\n  }\n  selectedUserId = userId;\n  document.getElementById('approvalUserName').textContent = user.full_name;\n  document.getElementById('approvalUserEmail').textContent = user.email;\n  document.getElementById('approvalUserPhone').textContent = user.phone || 'Not provided';\n  document.getElementById('approvalUserDate').textContent = user.created_at.split('T')[0];\n  document.getElementById('approvalRole').value = 'sales';\n  updateRolePermissions();\n  document.getElementById('approvalModal').classList.add('show');\n  };\n\n  window.updateRolePermissions = function() {\n  var role = document.getElementById('approvalRole').value;\n  var permissions = {\n  'viewer': ['View all records'],\n  'sales': ['View all records', 'Create new records', 'Edit own records'],\n  'manager': ['View all records', 'Create records', 'Edit all records', 'Export data', 'Delete own records'],\n  'admin': ['Full access to all features', 'Manage users', 'System settings', 'Audit logs']\n  };\n  var list = document.getElementById('rolePermissionsList');\n  list.innerHTML = '';\n  (permissions[role] || []).forEach(function(perm) {\n  list.innerHTML += '<li>' + perm + '</li>';\n  });\n  };\n\n  window.confirmApproval = async function() {\n  var role = document.getElementById('approvalRole').value;\n  closeModal('approvalModal');\n  showNotification('info', 'Processing', 'Approving user...');\n\n  try {\n  var result = await window.approveUserWithRole(selectedUserId, role);\n  if (result.success) {\n  showNotification('success', 'User Approved! ✓', 'Role: ' + role.charAt(0).toUpperCase() + role.slice(1));\n  loadPendingUsers();\n  loadDashboard();\n  } else {\n  showNotification('error', 'Error', result.message);\n  }\n  } catch (e) {\n  showNotification('error', 'Error', 'Failed to approve user');\n  }\n  };\n\n  window.rejectUserAction = async function(userId) {\n  var user = pendingUsersData[userId];\n  var userName = user ? user.full_name : 'this user';\n  if (!confirm('Are you sure you want to reject ' + userName + '?\\\\nThis action cannot be undone.')) return;\n\n  showNotification('info', 'Processing', 'Rejecting user...');\n  try {\n  var result = await window.rejectUserAPI(userId);\n  if (result.success) {\n  showNotification('success', 'User Rejected', userName + ' has been removed');\n  loadPendingUsers();\n  loadDashboard();\n  } else {\n  showNotification('error', 'Error', result.message);\n  }\n  } catch (e) {\n  showNotification('error', 'Error', 'Failed to reject user');\n  }\n  };\n\n  // ============================================\n  // ALL USERS\n  // ============================================\n  window.loadAllUsers = async function() {\n  var container = document.getElementById('usersContent');\n  container.innerHTML = '<div class=\"loading-spinner\"><div class=\"spinner\"></div></div>';\n\n  try {\n  var result = await window.getAllUsers();\n  if (!result.success) {\n  container.innerHTML = '<div class=\"empty-state\"><h4>' + result.message + '</h4></div>';\n  return;\n  }\n\n  if (result.users.length === 0) {\n  container.innerHTML = '<div class=\"empty-state\"><h4>No users found</h4></div>';\n  return;\n  }\n\n  var html = '<table class=\"data-table\"><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Last Login</th><th>OTP</th><th>Actions</th></tr></thead><tbody>';\n  result.users.forEach(function(u) {\n  var status = u.is_approved ? (u.is_active ? 'active' : 'inactive') : 'pending';\n  html += '<tr>';\n  html += '<td>' + u.full_name + '</td>';\n  html += '<td>' + u.email + '</td>';\n  html += '<td>' + u.role + '</td>';\n  html += '<td><span class=\"status ' + status + '\">' + status.charAt(0).toUpperCase() + status.slice(1) + '</span></td>';\n  html += '<td>' + (u.last_login === 'Never' ? 'Never' : u.last_login.split('T')[0]) + '</td>';\n  var om = (u.otp_method || '');\n  html += '<td><select class=\"otp-method-select\" data-email=\"' + (u.email || '').replace(/\"/g, '&quot;') + '\" onchange=\"updateUserOtpMethod(this)\" style=\"padding:6px;border:1px solid #ddd;border-radius:6px;font-size:13px;min-width:120px;\">';\n  html += '<option value=\"\"' + (om === '' ? ' selected' : '') + '>Default</option>';\n  html += '<option value=\"email\"' + (om === 'email' ? ' selected' : '') + '>Email</option>';\n  html += '<option value=\"sms\"' + (om === 'sms' ? ' selected' : '') + '>SMS</option>';\n  html += '<option value=\"whatsapp\"' + (om === 'whatsapp' ? ' selected' : '') + '>WhatsApp</option>';\n  html += '<option value=\"authenticator\"' + (om === 'authenticator' ? ' selected' : '') + '>Authenticator</option>';\n  html += '</select></td>';\n  html += '<td class=\"actions\">';\n  html += '<button class=\"btn-sm edit\" onclick=\"showRoleModal(\\'' + u.user_id + '\\', \\'' + u.role + '\\')\">Role</button>';\n  html += '<button class=\"btn-sm edit\" onclick=\"showPasswordModal(\\'' + u.user_id + '\\')\">Password</button>';\n  if (u.is_approved) {\n  html += '<button class=\"btn-sm ' + (u.is_active ? 'reject' : 'approve') + '\" onclick=\"toggleActive(\\'' + u.user_id + '\\')\">' + (u.is_active ? 'Disable' : 'Enable') + '</button>';\n  }\n  html += '<button class=\"btn-sm reject\" onclick=\"confirmDeleteUser(\\'' + u.user_id + '\\', \\'' + u.full_name + '\\')\">Delete</button>';\n  html += '</td></tr>';\n  });\n  html += '</tbody></table>';\n  container.innerHTML = html;\n  } catch (e) {\n  container.innerHTML = '<div class=\"empty-state\"><h4>Error loading users</h4></div>';\n  }\n  };\n\n  window.updateUserOtpMethod = async function(selectEl) {\n  var email = selectEl.getAttribute('data-email');\n  var method = (selectEl.value || '').trim();\n  if (!email) return;\n  if (!window.updateUserOtpMethodAPI) { if (window.showNotification) showNotification('error', 'Error', 'Bridge not ready'); return; }\n  try {\n  var r = await window.updateUserOtpMethodAPI(email, method);\n  if (r && r.success) { if (window.showNotification) showNotification('success', 'Saved', 'OTP method updated'); }\n  else { if (window.showNotification) showNotification('error', 'Error', r && r.message ? r.message : 'Failed'); }\n  } catch (e) { if (window.showNotification) showNotification('error', 'Error', e.message || 'Failed'); }\n  };\n\n  window.showRoleModal = function(userId, currentRole) {\n  selectedUserId = userId;\n  document.getElementById('newRole').value = currentRole;\n  document.getElementById('roleModal').classList.add('show');\n  };\n\n  window.showPasswordModal = function(userId) {\n  selectedUserId = userId;\n  document.getElementById('newPassword').value = '';\n  document.getElementById('passwordModal').classList.add('show');\n  };\n\n  window.closeModal = function(id) {\n  document.getElementById(id).classList.remove('show');\n  };\n\n  window.confirmRoleChange = async function() {\n  var role = document.getElementById('newRole').value;\n  var result = await window.updateUserRole(selectedUserId, role);\n  closeModal('roleModal');\n  if (result.success) {\n  loadAllUsers();\n  } else {\n  alert(result.message);\n  }\n  };\n\n  window.confirmPasswordReset = async function() {\n  var password = document.getElementById('newPassword').value;\n  if (password.length < 6) {\n  alert('Password must be at least 6 characters');\n  return;\n  }\n  var result = await window.resetUserPassword(selectedUserId, password);\n  closeModal('passwordModal');\n  if (result.success) {\n  alert('Password reset successfully');\n  } else {\n  alert(result.message);\n  }\n  };\n\n  window.toggleActive = async function(userId) {\n  var result = await window.toggleUserActive(userId);\n  if (result.success) {\n  loadAllUsers();\n  } else {\n  alert(result.message);\n  }\n  };\n\n  window.confirmDeleteUser = function(userId, userName) {\n  if (confirm('⚠️ Are you sure you want to DELETE user \"' + userName + '\"?\\\\n\\\\nThis will permanently remove the user and all their data. This action cannot be undone!')) {\n  deleteUserPermanently(userId);\n  }\n  };\n\n  window.deleteUserPermanently = async function(userId) {\n  try {\n  var result = await window.deleteUser(userId);\n  if (result.success) {\n  showNotification('success', 'User Deleted', 'User has been permanently deleted');\n  loadAllUsers();\n  loadDashboard();\n  } else {\n  alert(result.message);\n  }\n  } catch (e) {\n  alert('Error deleting user: ' + e.message);\n  }\n  };\n\n  // ============================================\n  // CLIENTS\n  // ============================================\n  window.loadClients = async function(page) {\n  clientsPage = page || 1;\n  var container = document.getElementById('clientsContent');\n  container.innerHTML = '<div class=\"loading-spinner\"><div class=\"spinner\"></div></div>';\n\n  var search = document.getElementById('clientSearch').value;\n  var showDeleted = document.getElementById('showDeletedClients').checked;\n\n  try {\n  var result = await window.getAllClients(clientsPage, 15, search, showDeleted);\n  renderClientsTable(result, container);\n  } catch (e) {\n  container.innerHTML = '<div class=\"empty-state\"><h4>Error loading clients</h4></div>';\n  }\n  };\n\n  function renderClientsTable(result, container) {\n  result.data.sort(function(a, b) {\n  return Number(a['Client Code']) - Number(b['Client Code']);\n  });\n  if (result.data.length === 0) {\n  container.innerHTML = '<div class=\"empty-state\"><h4>No clients found</h4></div>';\n  return;\n  }\n\n  var html = '<table class=\"data-table\"><thead><tr><th>Code</th><th>Name</th><th>Company</th><th>Phone</th><th>Country</th><th>Status</th><th>Actions</th></tr></thead><tbody>';\n  result.data.forEach(function(c) {\n  var status = c.is_deleted ? 'deleted' : 'active';\n  html += '<tr>';\n  html += '<td>' + c['Client Code'] + '</td>';\n  html += '<td>' + c['Client Name'] + '</td>';\n  html += '<td>' + c['Company'] + '</td>';\n  html += '<td>' + c['Phone'] + '</td>';\n  html += '<td>' + (c['Country'] || '-') + '</td>';\n  html += '<td><span class=\"status ' + status + '\">' + status.charAt(0).toUpperCase() + status.slice(1) + '</span></td>';\n  html += '<td class=\"actions\">';\n  if (c.is_deleted) {\n  html += '<button class=\"btn-sm restore\" onclick=\"restoreClient(\\'' + c['Client Code'] + '\\')\">Restore</button>';\n  } else {\n  html += '<button class=\"btn-sm delete\" onclick=\"deleteClient(\\'' + c['Client Code'] + '\\')\">Delete</button>';\n  }\n  html += '</td></tr>';\n  });\n  html += '</tbody></table>';\n\n  html += '<div class=\"pagination\">';\n  html += '<button ' + (result.page <= 1 ? 'disabled' : '') + ' onclick=\"loadClients(' + (result.page - 1) + ')\">Previous</button>';\n  html += '<span class=\"page-info\">Page ' + result.page + ' of ' + result.total_pages + ' (' + result.total + ' items)</span>';\n  html += '<button ' + (result.page >= result.total_pages ? 'd