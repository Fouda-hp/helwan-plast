container:
  properties:
    html: "<style>\n  #pricingModeModal {\n    position: fixed;\n    inset: 0;\n    z-index: 20000;\n  }\n\n  #pricingModeModal * {\n    transform: none !important;\n  }\n  .pricing-modal {\n    width: 420px;\n    max-width: 90vw;\n    padding: 24px;\n    border-radius: 14px;\n    background: #fff;\n    text-align: ; center\n  }\n\n  .pricing-modal h3 {\n    margin: 0 0 8px;\n    color: #1f4e79;\n  }\n\n  .pricing-modal p {\n    margin: 0 0 20px;\n    color: #374151;\n  }\n\n  .pricing-actions {\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 12px;\n  }\n\n  .pricing-actions button {\n    height: 44px;\n    border-radius: 10px;\n    background: #0078d7;\n    color: #fff;\n    font-weight: 600;\n    border: none;\n    cursor: pointer;\n  }\n\n  .pricing-actions button:hover {\n    filter: brightness(1.05);\n  }\n\n  .modal-backdrop {\n    position: fixed;\n    inset: 0;\n    background: rgba(0,0,0,.45);\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    z-index: 9999;\n  }\n\n  .modal-box {\n    background: #fff;\n    width: 420px;\n    padding: 15px;\n    border-radius: 6px;\n    box-shadow: 0 10px 30px rgba(0,0,0,.3);\n    text-align: ; center\n    justify-content: flex-start;\n  }\n\n  .modal-box h3 {\n    margin-top: 0;\n    color: #c00000;\n  }\n\n  .modal-box button {\n    margin-top: 16px;\n    border: none;\n    background: #0078d7;\n    color: #fff;\n    font-weight: bold;\n    cursor: pointer;\n  }\n\n  * {\n    box-sizing: border-box;\n    font-family: Arial, Helvetica, sans-serif;\n  }\n\n  body {\n    margin: 0;\n    height: 100%;\n    overflow-y: auto;\n    overflow-x: hidden;\n    background: #c9c9c9;\n  }\n\n  /* ================= HEADER ================= */\n  .header img {\n    height: 55px;\n  }\n  .header img {\n    height: 55px;\n    max-width: 100%;\n    object-fit: contain;\n  }\n\n  .header {\n    position: fixed;          /* 🔥 ده أهم سطر */\n    top: 0;\n    left: 0;\n    right: 0;\n    height: 70px;\n\n    z-index: 1000;\n\n    background: var(--ui-card);\n    box-shadow: var(--shadow-sm);\n\n    display: grid;\n    grid-template-columns: 180px 1fr 180px;\n    align-items: center;\n    padding: 8px 12px;\n  }\n\n\n\n\n\n\n  .header img {\n    height: 55px;\n  }\n\n  .header-title {\n    text-align: center;\n    \n    font-size: 28px;\n    font-weight: bold;\n    color: #1f4e79;\n  }\n\n  /* ================= LAYOUT ================= */\n  :root {\n    --header-height: 70px;\n  }\n\n  .main {\n    display: grid;\n    grid-template-columns: minmax(0, 1.35fr) minmax(0, 1fr);\n    gap: 16px;\n\n    margin-top: calc(var(--header-height) + 0px);\n    padding: 12px;\n\n    align-items: stretch;\n\n  }\n\n\n\n\n\n\n\n\n\n  /* ================= LEFT ================= */\n  .left {\n    border-right: none;\n    padding: 10px;\n  }\n  .title-only {\n    padding-left: 4px;\n    text-transform: uppercase;\n    letter-spacing: 0.3px;\n  }\n  .label.title-only {\n    font-weight: bold;\n    font-size: 20px;\n    padding-left: 2px;\n    color: #000;\n    \n  }\n\n  .row {\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    \n  }\n\n  .row > .label {\n    grid-column: 1;\n  }\n\n  .row > input,\n  .row > select,\n  .row > textarea,\n  .row > div:not(.label) {\n    grid-column: 2;\n  }\n\n\n  input[type=\"checkbox\"] {\n    width: 18px;\n    height: 18px;\n  }\n  .optional-block {\n    padding-left: 120px; /* اتحركت بعد Optional : */\n  }\n  \n  .row .label {\n    text-align: start;   /* 👈 أذكى من left */\n  }\n\n\n  .label {\n    background: #d9d9d9;\n    border: 1px solid #000;\n    padding: 6px;\n    font-weight: bold;\n    text-align: left;\n    font-size: 24\n  }\n\n  .label,\n  input,\n  input.readonly {\n    height: 28;\n    line-height: 12px;\n  }\n\n  input,\n  textarea {\n    border: 1px solid #000;\n    height: 32px;\n    padding: 4px 6px;\n    background: #fff;\n  }\n\n  input.readonly {\n    background: #e6e6e6;\n    font-weight: bold;\n    cursor: default;\n  }\n\n  .fixed-input {\n    width: 100%;\n    max-width: 100%;\n  }\n\n\n  /* divider */\n  .divider {\n    border-bottom: 2px dashed #000;\n    margin: 6px 0;\n  }\n\n  /* ================= OPTIONAL ================= */\n  .optional-title {\n    font-weight: bold;\n    text-align: ; center\n    justify-content: flex-start;\n    margin: 8px 0;\n  }\n\n  .title {\n    font-weight: bold;\n    text-align: ; center\n    justify-content: flex-start;\n    margin: 8px 0;\n  }\n\n  .optional-row {\n    display: grid;\n    grid-template-columns: 1fr 22px;\n    align-items: center;\n    height: 26px;\n  }\n\n  .optional-row input {\n    width: 18px;\n    height: 18px;\n  }\n\n  .red { color: #c00000; font-weight: bold; }\n  .blue { color: #0070c0; font-weight: bold; }\n\n  /* ================= PRICES ================= */\n  .green {\n    background: #92d050;\n  }\n\n  .bluebg {\n    background: #5b9bd5;\n    color: #fff;\n  }\n\n\n  .opt-check {\n    width: 18px;\n    height: 18px;\n  }\n\n  /* ================= CYLINDERS ================= */\n  .machine-grid {\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 16px;\n    align-items: start;\n  }\n\n  .cylinders th { text-align: center; }\n  .cylinders .total-row td { text-align: center; font-weight: bold; }\n\n  \n\n  .cylinders table {\n    width: 100%;\n    border-collapse: collapse;\n    font-size: 15px;\n    margin-top: 0px;\n  }\n\n  .cylinders th,\n  .cylinders td {\n    border: 1px solid #000;\n    height: 28px;\n    text-align: ; center\n    justify-content: flex-start;\n  }\n\n  .cylinders th {\n    background: #5b9bd5;\n    color: #fff;\n  }\n\n  .cylinders input {\n    width: 100%;\n    height: 100%;\n    border: none;\n    text-align: center;\n  }\n\n  .cylinders input.readonly {\n    background: #e6e6e6;\n  }\n\n  /* ================= RIGHT ================= */\n  .left,\n  .right {\n    min-width: 0;  \n    height: 100%;  \n    overflow-x: hidden;\n    padding-bottom: 8px;\n  }\n\n\n  .top-buttons {\n    display: grid;\n    grid-template-columns: repeat(4, 1fr);\n    gap: 10px;\n    margin-bottom: 20px;   /* ⭐ المسافة اللي انت طالبها */\n  }\n\n\n\n  .top-buttons button {\n    height: 36px;          /* ⬅️ رجّع الارتفاع الطبيعي */\n    font-size: 13px;       /* ⬅️ مقروء وواضح */\n    padding: 0 10px;       /* ⬅️ نفس مريح */\n    white-space: nowrap;  /* ⬅️ يمنع الكسر */\n  }\n\n  .save {\n    text-align: center;\n    margin-top: 20px;\n  }\n\n  .save button {\n    width: 120px;\n    height: 36px;\n    background: #0078d7;\n    color: #fff;\n    border: 1px solid #000;\n  }\n  .cylinders {\n    max-width: 100%;\n    overflow-x: auto;\n  }\n\n  .cylinders table {\n    min-width: 100%;\n  }\n\n  @media (max-width: 1024px) {\n    .main {\n      grid-template-columns: 1fr;\n    }\n\n    .left {\n      border-right: none;\n      border-bottom: 2px solid #000;\n    }\n  }\n\n\n  @media (max-width: 600px) {\n\n    .row {\n      grid-template-columns: 1fr;\n      height: auto;\n    }\n\n    .label {\n      height: auto;\n      line-height: normal;\n    }\n\n    .fixed-input {\n      width: 100%;\n    }\n\n    .machine-grid {\n      grid-template-columns: 1fr;\n    }\n\n    .optional-block {\n      padding-left: 0;\n    }\n    .optional-row:last-child {\n      margin-bottom: 0;\n    }\n    .top-buttons {\n      grid-template-columns: 1fr 1fr;\n    }\n  }\n  @media (max-width: 600px) {\n\n    .header {\n      grid-template-columns: auto 1fr auto;\n      padding: 6px 8px;\n    }\n\n    .header img {\n      height: 36px;\n    }\n\n    .header-title {\n      font-size: 16px;\n      line-height: 1.2;\n      padding: 0 6px;\n    }\n  }\n  @media (max-width: 600px) {\n    .header-title {\n      white-space: normal;\n      text-align: ; center\n      justify-content: flex-start;\n    }\n  }\n\n  /* ===== Overlay Backdrop ===== */\n  /* الخلفية اللي بتقفل الصفحة */\n  #quotationOverlay,\n  #clientOverlay {\n    position: fixed;\n    inset: 0;\n    z-index: 9999;\n\n    display: none;          /* يتحكم فيها JS */\n    pointer-events: all;\n  }\n\n  .qo-backdrop {\n    position: absolute;\n    inset: 0;\n\n    background: rgba(0,0,0,.45);\n    backdrop-filter: blur(2px);\n  }\n\n  /* ===== Search Box Styled Like Buttons ===== */\n  .search-box {\n    height: 36px;\n    display: flex;\n    align-items: center;\n    gap: 8px;\n\n    padding: 0 12px;\n    background: #fff;\n\n    border: 2px solid #1f4e79; /* لون الهيدر */\n    border-radius: 10px;\n\n    box-shadow: 0 2px 6px rgba(0,0,0,.08);\n    transition: all .2s ease;\n  }\n  .search-box {\n    width: 120px;\n  }\n  .search-box input {\n    width: 100%;\n  }\n  .search-box {\n    background: linear-gradient(180deg, #ffffff, #f3f6fa);\n  }\n\n  /* Hover */\n  .search-box:hover {\n    box-shadow: 0 4px 12px rgba(0,0,0,.15);\n  }\n\n  /* Focus */\n  .search-box:focus-within {\n    border-color: #0078d7;\n    box-shadow: 0 0 0 3px rgba(0,120,215,.2);\n  }\n\n  /* Icon */\n  .search-icon {\n    font-size: 14px;\n    color: #1f4e79;\n  }\n\n  /* Input */\n  .search-box input {\n    border: none;\n    outline: none;\n    background: transparent;\n\n    font-size: 13px;\n    font-weight: 500;\n    width: 160px;\n\n    color: #111827;\n  }\n\n  .search-box input::placeholder {\n    color: #6b7280;\n  }\n\n  /* ===== Modal ===== */\n  /* الصندوق اللي في النص */\n  .qo-modal {\n    position: fixed;\n\n    top: 50%;\n    left: 50%;\n    transform: translate(-50%, -50%);\n\n    width: 700px;           /* حجمك الطبيعي */\n    max-width: 90vw;\n    max-height: 70vh;\n\n    background: #fff;\n    border-radius: 12px;\n    overflow: visible !important;\n\n    box-shadow: 0 25px 60px rgba(0,0,0,.35);\n    z-index: 10000;\n\n    display: flex;\n    flex-direction: column;\n  }\n\n\n\n\n  /* ===== Header ===== */\n  .qo-header {\n    height: 42px;                 /* أصغر من قبل */\n    padding: 0 14px;\n\n    background: linear-gradient(90deg, #1f4e79, #2563eb);\n    color: #fff;\n\n    display: flex;\n    align-items: center;\n    justify-content: center;      /* العنوان في النص */\n\n    font-size: 18px;              /* أكبر سنة */\n    font-weight: 600;\n\n    position: relative;\n  }\n\n  /* Close Button */\n  .qo-close {\n    position: absolute;\n    right: 14px;              /* 👈 يمين */\n    top: 50%;\n    transform: translateY(-50%);\n\n    font-size: 16px;\n    cursor: pointer;\n    opacity: .9;\n  }\n  .qo-close:hover {\n    opacity: 1;\n    transform: translateY(-50%) scale(1.1);\n  }\n\n  .qo-table th:nth-child(1) { width: 120px; }\n  .qo-table th:nth-child(2) { width: 220px; }\n  .qo-table th:nth-child(3) { width: 200px; }\n  .qo-table th:nth-child(4) { width: 160px; text-align: center; }\n  .qo-table td:nth-child(4) { text-align: center; }\n\n  /* ===== Body ===== */\n  .qo-body {\n    background: #fff;\n    max-height: 65vh;\n    overflow-y: hidden;\n    padding: 16px;\n    display: flex;\n    justify-content: center;  \n  }\n\n\n  /* ===== Table ===== */\n  .qo-table {\n    width: auto;               /* مش 100% */\n    min-width: 520px;          /* حجم مريح */\n    font-size: 16px;          /* تكبير الفونت سنة */\n  }\n\n  /* Header cells */\n  .qo-table th,\n  .qo-table td {\n    text-align: center;\n    padding: 8px 12px;\n    white-space: nowrap;\n  }\n\n  /* Body cells */\n  .qo-table td {\n    text-align: center;           /* توسيط الكلام */\n    padding: 8px;\n    vertical-align: middle;\n  }\n\n  /* ===== ROW HOVER ===== */\n  .qo-table tbody tr:hover {\n    background: #e8f0ff;\n    cursor: pointer;\n  }    \n  .qo-table th {\n    position: sticky;\n    top: 0;\n    background: #f1f5f9;\n    font-weight: 600;\n    color: #374151;\n    z-index: 1;\n  }\n\n  .qo-table td {\n    color: #111827;\n  }\n\n  /* Zebra rows */\n  .qo-table tbody tr:nth-child(even) {\n    background: #f9fafb;\n  }\n\n  /* Hover */\n  .qo-table tbody tr:hover {\n    background: #e0ecff;\n    cursor: pointer;\n  }\n\n  /* Active (dbl click feedback) */\n  .qo-table tbody tr:active {\n    background: #bfdbfe;\n  }\n\n  :root {\n    --ui-bg: #f4f6f8;\n    --ui-card: #ffffff;\n    --ui-border: #d1d5db;\n    --ui-primary: #1f4e79;\n    --ui-primary-soft: #e6eef6;\n    --ui-accent: #0078d7;\n\n    --radius-sm: 6px;\n    --radius-md: 10px;\n    --radius-lg: 14px;\n\n    --shadow-sm: 0 2px 6px rgba(0,0,0,.08);\n    --shadow-md: 0 8px 24px rgba(0,0,0,.12);\n  }\n  body {\n    background: var(--ui-bg);\n  }\n  .left,\n  .right {\n    background: var(--ui-card);\n    border-radius: var(--radius-lg);\n    box-shadow: var(--shadow-md);\n    padding: 16px;\n  }\n  .main {\n    gap: 16px;\n    padding: 16px;\n  }\n  .row {\n    margin-bottom: 12px;\n    background: var(--ui-card);\n    border-radius: var(--radius-md);\n    box-shadow: var(--shadow-sm);\n    padding: 8px 10px;\n  }\n  .label {\n    background: transparent;\n    border: none;\n    font-weight: 600;\n    color: #374151;\n    padding: 6px 8px;\n  }\n  input,\n  select,\n  textarea {\n    border-radius: var(--radius-sm);\n    border: 1px solid var(--ui-border);\n    transition: .6s ease;\n    height: 28px;\n    font-size: 12px;\n  }\n  textarea#Notes {\n    height: auto;\n    min-height: 84px;   /* 3 × 28px */\n    resize: vertical;   /* المستخدم يزوّد لو حابب */\n    line-height: 1.4;\n  }\n\n  input:focus,\n  select:focus,\n  textarea:focus {\n    outline: none;\n    border-color: var(--ui-primary);\n    box-shadow: 0 0 0 2px var(--ui-primary-soft);\n  }\n  input.readonly {\n    background: #f1f5f9;\n    color: #111827;\n  }\n  .optional-row {\n    background: var(--ui-primary-soft);\n    border-radius: var(--radius-sm);\n    padding: 4px 8px;\n    margin-bottom: 6px;\n  }\n  .cylinders table {\n    border-radius: var(--radius-md);\n    overflow: visible !important;\n    box-shadow: var(--shadow-sm);\n  }\n\n  .cylinders th {\n    background: var(--ui-primary);\n    font-weight: 600;\n  }\n  button {\n    border-radius: var(--radius-sm);\n    border: none;\n    background: var(--ui-accent);\n    color: #fff;\n    font-weight: 600;\n    transition: .2s ease;\n  }\n\n  button:hover {\n    filter: brightness(1.05);\n  }\n  .header {\n    border-radius: 0 0 var(--radius-lg) var(--radius-lg);\n    box-shadow: var(--shadow-sm);\n  }\n  .modal-box,\n  .qo-modal {\n    border-radius: var(--radius-lg);\n    box-shadow: var(--shadow-md);\n  }\n  select {\n    appearance: none;\n    -webkit-appearance: none;\n    -moz-appearance: none;\n\n    background:\n      linear-gradient(180deg, #ffffff, #f3f4f6);\n    border: 1px solid var(--ui-border);\n    border-radius: 8px;\n\n    padding: 6px 36px 6px 10px;\n    height: 32px;\n    font-size: 13px;\n    font-weight: 500;\n    color: #111827;\n\n    box-shadow:\n      inset 0 1px 0 rgba(255,255,255,.8),\n      0 1px 2px rgba(0,0,0,.08);\n\n    cursor: pointer;\n    transition: all .15s ease;\n  }\n  select {\n    background-image:\n      linear-gradient(180deg, #ffffff, #f3f4f6),\n      url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M1 1l4 4 4-4' stroke='%236b7280' stroke-width='1.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>\");\n    background-repeat: no-repeat;\n    background-position: right 10px center;\n  }\n  select:hover {\n    border-color: #9ca3af;\n  }\n\n  select:focus {\n    outline: none;\n    border-color: var(--ui-primary);\n    box-shadow:\n      0 0 0 3px var(--ui-primary-soft),\n      inset 0 1px 0 rgba(255,255,255,.9);\n  }\n  /* ===== Custom Select ===== */\n  .ui-select {\n    position: relative;\n    width: 100%;\n    font-size: 13px;\n    user-select: none;\n  }\n\n  .ui-select-trigger {\n    height: 32px;\n    padding: 0 12px;\n    border: 1px solid var(--ui-border);\n    border-radius: 8px;\n    background: #fff;\n\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n\n    cursor: pointer;\n    transition: .15s ease;\n  }\n\n  .ui-select-trigger:hover {\n    border-color: #9ca3af;\n  }\n\n  .ui-select.open .ui-select-trigger {\n    border-color: #16a34a; /* أخضر SAP */\n    box-shadow: 0 0 0 3px rgba(22,163,74,.15);\n  }\n\n  .ui-select-value {\n    color: #111827;\n  }\n\n  .ui-select-arrow {\n    font-size: 11px;\n    color: #6b7280;\n  }\n\n  /* ===== Dropdown Menu ===== */\n  .ui-select-menu {\n    position: absolute;\n    top: calc(100% + 6px);\n    left: 0;\n    right: 0;\n\n    background: #fff;\n    border: 1px solid var(--ui-border);\n    border-radius: 10px;\n    box-shadow: 0 12px 30px rgba(0,0,0,.15);\n\n    max-height: 220px;\n    overflow-y: auto;\n\n    display: none;\n    z-index: 999;\n  }\n\n  .ui-select.open .ui-select-menu {\n    display: block;\n  }\n\n  /* ===== Options ===== */\n  .ui-option {\n    padding: 8px 12px;\n    cursor: pointer;\n    transition: .12s ease;\n  }\n\n  .ui-option:hover {\n    background: #dcfce7;       /* أخضر hover */\n    color: #166534;\n  }\n\n  .ui-option.selected {\n    background: #16a34a;\n    color: #fff;\n    font-weight: 600;\n  }\n  @media (max-width: 600px) {\n\n    .qo-modal {\n      top: auto;\n      bottom: 0;\n      left: 0;\n      transform: none;\n\n      width: 100%;\n      max-width: 100%;\n      height: 90vh;\n      max-height: 90vh;\n\n      border-radius: 16px 16px 0 0;\n      animation: slideUp .25s ease-out;\n    }\n\n    .qo-header {\n      font-size: 16px;\n      height: 44px;\n      justify-content: center;\n    }\n\n    .qo-body {\n      padding: 12px;\n    }\n\n    .qo-table {\n      min-width: 100%;\n      font-size: 14px;\n    }\n\n    .qo-close {\n      font-size: 20px;\n    }\n  }\n\n  @keyframes slideUp {\n    from {\n      transform: translateY(100%);\n      opacity: 0;\n    }\n    to {\n      transform: translateY(0);\n      opacity: 1;\n    }\n  }\n  /* ================= ALERT BOX ================= */\n\n  .alert-backdrop {\n    position: fixed;\n    inset: 0;\n    background: rgba(0,0,0,.45);\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    z-index: 20000;\n  }\n\n  .alert-modal {\n    width: 420px;\n    max-width: 90vw;\n    background: #fff;\n    border-radius: 12px;\n    overflow: visible !important;\n    box-shadow: 0 25px 60px rgba(0,0,0,.35);\n    animation: popIn .2s ease-out;\n  }\n\n  /* ===== HEADER ===== */\n  .alert-header {\n    height: 38px;\n    padding: 0 14px;\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n\n    font-size: 13px;\n    font-weight: 700;\n    letter-spacing: .5px;\n    color: #fff;\n    text-transform: uppercase;\n  }\n\n  .alert-close {\n    cursor: pointer;\n    font-size: 14px;\n    opacity: .9;\n  }\n  .alert-close:hover {\n    opacity: 1;\n  }\n\n  /* ===== BODY ===== */\n  .alert-body {\n    padding: 24px 20px;\n    text-align: ; center\n    font-size: 14px;\n    color: #111827;\n    line-height: 1.6;\n  }\n\n  /* ===== FOOTER ===== */\n  .alert-footer {\n    padding: 12px 16px 18px;\n    display: flex;\n    justify-content: center;\n  }\n\n  .alert-footer button {\n    min-width: 100px;\n    height: 36px;\n    border-radius: 8px;\n    border: none;\n    background: #2563eb;\n    color: #fff;\n    font-weight: 600;\n    cursor: pointer;\n  }\n\n  /* ===== TYPES ===== */\n  .alert-error .alert-header {\n    background: #dc2626;\n  }\n\n  .alert-info .alert-header {\n    background: #2563eb;\n  }\n\n  .alert-success .alert-header {\n    background: #16a34a;\n  }\n\n  /* ===== ANIMATION ===== */\n  @keyframes popIn {\n    from {\n      transform: scale(.92);\n      opacity: 0;\n    }\n    to {\n      transform: scale(1);\n      opacity: 1;\n    }\n  }\n\n  /* ===== MOBILE ===== */\n  @media (max-width: 600px) {\n    .alert-modal {\n      width: 95%;\n    }\n  }\n\n  }\n  /* ===== Desktop Auto Fit ===== */\n  @media (min-width: 1025px) {\n    html, body {\n      height: 100%;\n      overflow: hidden;\n    }\n\n    .main {\n      transition: transform 0.2s ease;\n      will-change: transform;\n    }\n  }\n\n  /* ===== Ensure elements don't overflow ===== */\n  .cylinders {\n    max-width: 100%;\n    overflow: visible;\n  }\n\n  .cylinders table {\n    width: 100%;\n    table-layout: fixed;\n  }\n\n  /* ===== Fine-tune for small laptops ===== */\n  @media (min-width: 1025px) and (max-height: 768px) {\n    .row {\n      margin-bottom: 4px;\n      padding: 3px 6px;\n    }\n\n    input, select, textarea {\n      height: 24px;\n      font-size: 11px;\n      padding: 2px 4px;\n    }\n\n    .optional-row {\n      height: 20px;\n      padding: 2px 6px;\n      margin-bottom: 3px;\n    }\n\n    .top-buttons {\n      gap: 6px;\n      margin-bottom: 10px;\n    }\n\n    .top-buttons button {\n      height: 28px;\n      font-size: 11px;\n      padding: 0 8px;\n    }\n\n    .save {\n      margin-top: 10px;\n    }\n\n    .save button {\n      height: 30px;\n    }\n  }\n\n\n\n  body {\n    overflow-x: hidden;\n    overflow-y: auto;\n  }\n\n  .blue-btn {\n    height: 42px;\n    border-radius: 10px;\n    background: #0078d7;\n    color: #fff;\n    font-weight: 600;\n    border: none;\n    cursor: pointer;\n  }\n\n  .blue-btn:hover {\n    filter: brightness(1.05);\n  }\n\n  /* ===== Search Wrapper ===== */\n  .search-wrapper {\n    display: flex;\n    justify-content: center;\n    margin-bottom: 16px;\n  }\n\n  /* ===== Search Box (Button Style) ===== */\n  .search-box {\n    height: 36px;\n    width: 260px;\n\n    display: flex;\n    align-items: center;\n    gap: 8px;\n\n    padding: 0 12px;\n    background: #fff;\n\n    border: 2px solid #1f4e79; /* نفس لون الهيدر */\n    border-radius: 10px;\n\n    box-shadow: 0 2px 6px rgba(0,0,0,.08);\n    transition: all .2s ease;\n  }\n\n  /* Hover */\n  .search-box:hover {\n    box-shadow: 0 4px 12px rgba(0,0,0,.15);\n  }\n\n  /* Focus */\n  .search-box:focus-within {\n    border-color: #0078d7;\n    box-shadow: 0 0 0 3px rgba(0,120,215,.2);\n  }\n\n  /* Icon */\n  .search-icon {\n    font-size: 14px;\n    color: #1f4e79;\n  }\n\n  /* Input */\n  .search-box input {\n    border: none;\n    outline: none;\n    background: transparent;\n\n    width: 100%;\n    font-size: 13px;\n    font-weight: 500;\n    color: #111827;\n  }\n\n  .search-box input::placeholder {\n    color: #6b7280;\n  }\n  .qo-title {\n    margin: 0 auto;\n  }\n\n</style>\n\n<div class=\"header\">\n  <img src=\"_/theme/helwan_logo.png\">\n  <div class=\"header-title\">Helwan Plast & Flexo CH - Calculator</div>\n  <img src=\"_/theme/flexo_logo.png\" style=\"justify-self:end;\">\n</div>\n<!-- ===== QUOTATION OVERLAY ===== -->\n<div id=\"quotationOverlay\" style=\"display:none;\">\n  <div class=\"qo-backdrop\">\n    <div class=\"qo-modal\">\n      <div class=\"qo-header\">\n        <span>Search Quotation</span>\n        <span id=\"btnCloseOverlay\" class=\"qo-close\">✖</span>\n      </div>\n\n      <div class=\"qo-body\">\n        <table class=\"qo-table\">\n          <thead>\n            <tr>\n              <th>Client Name</th>\n              <th>Quotation #</th>\n              <th>Date</th>\n            </tr>\n          </thead>\n          <tbody id=\"quotationList\">\n            <!-- rows injected here -->\n          </tbody>\n        </table>\n      </div>\n    </div>\n  </div>\n</div>\n\n<!-- ===== CLIENT SEARCH OVERLAY ===== -->\n<div id=\"clientOverlay\" style=\"display:none;\">\n  <div class=\"qo-backdrop\">\n    <div class=\"qo-modal\">\n      <div class=\"qo-header\">\n        <span>Search Client</span>\n        <span id=\"btnCloseClientOverlay\" class=\"qo-close\">✖</span>\n      </div>\n\n      <div class=\"qo-body\">\n        <table class=\"qo-table\">\n          <thead>\n            <tr>\n              <th>Client Code</th>\n              <th>Client Name</th>\n              <th>Company</th>\n              <th>Phone</th>\n            </tr>\n          </thead>\n          <tbody id=\"clientList\">\n            <!-- rows injected here -->\n          </tbody>\n        </table>\n      </div>\n    </div>\n  </div>\n</div>\n<div class=\"page-scale\">\n  <div class=\"main\" id=\"calculatorPage\">\n\n    <input type=\"hidden\" id=\"Pricing_Mode\" value=\"\">\n\n\n    <!-- ================= LEFT ================= -->\n    <div class=\"left\">\n\n      <div class=\"machine-grid\">\n\n        <!-- ===== MACHINE DATA (COLUMN 1) ===== -->\n        <div class=\"machine-data\"><div class=\"row\">\n          <div class=\"label\">Model</div>\n          <input class=\"readonly\" readonly id=\"model_code\">\n        </div>\n\n          <!-- ===== Machine Type ===== -->\n          <div class=\"row\">\n            <div class=\"label\">Select machine type</div>\n\n            <div class=\"ui-select\" data-target=\"machine_type\">\n              <div class=\"ui-select-trigger\" tabindex=\"0\">\n                <span class=\"ui-select-value\">Select machine type</span>\n                <span class=\"ui-select-arrow\">▾</span>\n              </div>\n\n              <div class=\"ui-select-menu\">\n                <div class=\"ui-option\" data-value=\"Metal anilox\">Metal anilox</div>\n                <div class=\"ui-option\" data-value=\"Ceramic anilox Single Doctor Blade\">\n                  Ceramic anilox Single Doctor Blade\n                </div>\n                <div class=\"ui-option\" data-value=\"Ceramic anilox Chamber Doctor Blade\">\n                  Ceramic anilox Chamber Doctor Blade\n                </div>\n              </div>\n            </div>\n\n            <select id=\"machine_type\" hidden>\n              <option value=\"\"></option>\n              <option value=\"Metal anilox\"></option>\n              <option value=\"Ceramic anilox Single Doctor Blade\"></option>\n              <option value=\"Ceramic anilox Chamber Doctor Blade\"></option>\n            </select>\n          </div>\n\n          <!-- ===== Number of colors ===== -->\n          <div class=\"row\">\n            <div class=\"label\">Number of colors</div>\n\n            <div class=\"ui-select\" data-target=\"Number of colors\">\n              <div class=\"ui-select-trigger\" tabindex=\"0\">\n                <span class=\"ui-select-value\">Select colors</span>\n                <span class=\"ui-select-arrow\">▾</span>\n              </div>\n\n              <div class=\"ui-select-menu\">\n                <div class=\"ui-option\" data-value=\"4\">4</div>\n                <div class=\"ui-option\" data-value=\"6\">6</div>\n                <div class=\"ui-option\" data-value=\"8\">8</div>\n              </div>\n            </div>\n\n            <select id=\"Number of colors\" hidden>\n              <option value=\"\"></option>\n              <option value=\"4\"></option>\n              <option value=\"6\"></option>\n              <option value=\"8\"></option>\n            </select>\n          </div>\n\n          <!-- ===== Machine width ===== -->\n          <div class=\"row\">\n            <div class=\"label\">Machine width</div>\n\n            <div class=\"ui-select\" data-target=\"Machine width\">\n              <div class=\"ui-select-trigger\" tabindex=\"0\">\n                <span class=\"ui-select-value\">Select width</span>\n                <span class=\"ui-select-arrow\">▾</span>\n              </div>\n\n              <div class=\"ui-select-menu\">\n                <div class=\"ui-option\" data-value=\"80\">80</div>\n                <div class=\"ui-option\" data-value=\"100\">100</div>\n                <div class=\"ui-option\" data-value=\"120\">120</div>\n              </div>\n            </div>\n\n            <select id=\"Machine width\" hidden>\n              <option value=\"\"></option>\n              <option value=\"80\"></option>\n              <option value=\"100\"></option>\n              <option value=\"120\"></option>\n            </select>\n          </div>\n\n          <!-- ===== Material ===== -->\n          <div class=\"row\">\n            <div class=\"label\">Material</div>\n\n            <div class=\"ui-select\" data-target=\"Material\">\n              <div class=\"ui-select-trigger\" tabindex=\"0\">\n                <span class=\"ui-select-value\">Select material</span>\n                <span class=\"ui-select-arrow\">▾</span>\n              </div>\n\n              <div class=\"ui-select-menu\">\n                <div class=\"ui-option\" data-value=\"PE\">PE</div>\n                <div class=\"ui-option\" data-value=\"PP\">PP</div>\n                <div class=\"ui-option\" data-value=\"Nonwoven\">Nonwoven</div>\n                <div class=\"ui-option\" data-value=\"Paper to 100g\">Paper to 100g</div>\n                <div class=\"ui-option\" data-value=\"Paper to 200g\">Paper to 200g</div>\n                <div class=\"ui-option\" data-value=\"Paper to 300g\">Paper to 300g</div>\n              </div>\n            </div>\n\n            <select id=\"Material\" hidden>\n              <option value=\"\"></option>\n              <option value=\"PE\"></option>\n              <option value=\"PP\"></option>\n              <option value=\"Nonwoven\"></option>\n              <option value=\"Paper to 100g\"></option>\n              <option value=\"Paper to 200g\"></option>\n              <option value=\"Paper to 300g\"></option>\n            </select>\n          </div>\n\n          <!-- ===== Winder ===== -->\n          <div class=\"row\">\n            <div class=\"label\">Winder</div>\n\n            <div class=\"ui-select\" data-target=\"Winder\">\n              <div class=\"ui-select-trigger\" tabindex=\"0\">\n                <span class=\"ui-select-value\">Select winder</span>\n                <span class=\"ui-select-arrow\">▾</span>\n              </div>\n\n              <div class=\"ui-select-menu\">\n                <div class=\"ui-option\" data-value=\"Single\">Single winder</div>\n                <div class=\"ui-option\" data-value=\"Double\">Double winder</div>\n              </div>\n            </div>\n\n            <select id=\"Winder\" hidden>\n              <option value=\"\"></option>\n              <option value=\"Single\"></option>\n              <option value=\"Double\"></option>\n            </select>\n          </div>\n\n          <div class=\"divider\"></div>\n\n          <div class=\"optional-title\">Optional :</div>\n          <div class=\"optional-block\">\n\n            <div class=\"optional-row\">\n              <span>Video inspection</span>\n              <input type=\"checkbox\" id=\"Video inspection\">\n            </div>\n\n            <div class=\"optional-row\">\n              <span>PLC</span>\n              <input type=\"checkbox\" id=\"PLC\">\n            </div>\n\n            <div class=\"optional-row\">\n              <span>Slitter</span>\n              <input type=\"checkbox\" id=\"Slitter\">\n            </div>\n\n            <div class=\"optional-row\">\n              <span class=\"red\">Pneumatic Unwind</span>\n              <input type=\"checkbox\" id=\"Pneumatic Unwind\">\n            </div>\n\n            <div class=\"optional-row\">\n              <span class=\"red\">Hydraulic Station Unwind</span>\n              <input type=\"checkbox\" id=\"Hydraulic Station Unwind\">\n            </div>\n\n            <div class=\"optional-row\">\n              <span class=\"blue\">Pneumatic Rewind</span>\n              <input type=\"checkbox\" id=\"Pneumatic Rewind\">\n            </div>\n\n            <div class=\"optional-row\">\n              <span class=\"blue\">Surface Rewind</span>\n              <input type=\"checkbox\" id=\"Surface Rewind\">\n            </div>\n\n          </div>\n\n          <div class=\"divider\"></div>\n\n          <div class=\"row\">\n            <div class=\"label\">Standard Machine FOB cost</div>\n            <input class=\"readonly\" readonly id=\"std_price\">\n          </div>\n\n          <div class=\"row\">\n            <div class=\"label\">Machine FOB cost With Cylinders</div>\n            <input class=\"readonly\" readonly id=\"price_with_cylinders\">\n          </div>\n\n\n          <div class=\"row\">\n            <div class=\"label\">FOB price for over seas</div>\n            <div style=\"display:flex; align-items:center; gap:8px;\">\n              <input class=\"fixed-input readonly\" readonly id=\"overseas_price\">\n              <input type=\"checkbox\" class=\"opt-check\" id=\"Overseas clients\">\n            </div>\n          </div>\n\n\n          <div class=\"row\">\n            <div class=\"label\">Exchange Rate</div>\n            <input class=\"readonly\" readonly id=\"exchange_rate\">\n          </div>\n\n          <div class=\"row\">\n            <div class=\"label green\">In Stock</div>\n            <input class=\"readonly\" readonly id=\"local_price\">\n          </div>\n\n          <div class=\"row\">\n            <div class=\"label bluebg\">New Order</div>\n            <input class=\"readonly\" readonly id=\"new_order_price\">\n          </div>\n\n        </div>\n\n\n\n        <!-- ===== CYLINDERS (COLUMN 2) ===== -->\n        <div class=\"cylinders\">\n          <table>\n            <tr>\n              <th>Type Size CM</th>\n              <th>Count</th>\n              <th>Cost</th>\n            </tr>\n\n            <tr><td><input type=\"text\" inputmode=\"decimal\" id=\"Size in CM1\"></td><td><input type=\"text\" inputmode=\"numeric\" id=\"Count1\"></td><td><input readonly id=\"Cost1\"></td></tr>\n            <tr><td><input type=\"text\" inputmode=\"decimal\" id=\"Size in CM2\"></td><td><input type=\"text\" inputmode=\"numeric\" id=\"Count2\"></td><td><input readonly id=\"Cost2\"></td></tr>\n            <tr><td><input type=\"text\" inputmode=\"decimal\" id=\"Size in CM3\"></td><td><input type=\"text\" inputmode=\"numeric\" id=\"Count3\"></td><td><input readonly id=\"Cost3\"></td></tr>\n            <tr><td><input type=\"text\" inputmode=\"decimal\" id=\"Size in CM4\"></td><td><input type=\"text\" inputmode=\"numeric\" id=\"Count4\"></td><td><input readonly id=\"Cost4\"></td></tr>\n            <tr><td><input type=\"text\" inputmode=\"decimal\" id=\"Size in CM5\"></td><td><input type=\"text\" inputmode=\"numeric\" id=\"Count5\"></td><td><input readonly id=\"Cost5\"></td></tr>\n            <tr><td><input type=\"text\" inputmode=\"decimal\" id=\"Size in CM6\"></td><td><input type=\"text\" inputmode=\"numeric\" id=\"Count6\"></td><td><input readonly id=\"Cost6\"></td></tr>\n            <tr><td><input type=\"text\" inputmode=\"decimal\" id=\"Size in CM7\"></td><td><input type=\"text\" inputmode=\"numeric\" id=\"Count7\"></td><td><input readonly id=\"Cost7\"></td></tr>\n            <tr><td><input type=\"text\" inputmode=\"decimal\" id=\"Size in CM8\"></td><td><input type=\"text\" inputmode=\"numeric\" id=\"Count8\"></td><td><input readonly id=\"Cost8\"></td></tr>\n            <tr><td><input type=\"text\" inputmode=\"decimal\" id=\"Size in CM9\"></td><td><input type=\"text\" inputmode=\"numeric\" id=\"Count9\"></td><td><input readonly id=\"Cost9\"></td></tr>\n            <tr><td><input type=\"text\" inputmode=\"decimal\" id=\"Size in CM10\"></td><td><input type=\"text\" inputmode=\"numeric\" id=\"Count10\"></td><td><input readonly id=\"Cost10\"></td></tr>\n            <tr><td><input type=\"text\" inputmode=\"decimal\" id=\"Size in CM11\"></td><td><input type=\"text\" inputmode=\"numeric\" id=\"Count11\"></td><td><input readonly id=\"Cost11\"></td></tr>\n            <tr><td><input type=\"text\" inputmode=\"decimal\" id=\"Size in CM12\"></td><td><input type=\"text\" inputmode=\"numeric\" id=\"Count12\"></td><td><input readonly id=\"Cost12\"></td></tr>\n\n            <tr class=\"total-row\">\n              <td>Total</td>\n              <td>-</td>\n              <td>-</td>\n            </tr>\n          </table>\n        </div>\n\n\n      </div>\n    </div>\n\n    <!-- ================= RIGHT ================= -->\n    <div class=\"right\">\n\n      <div class=\"top-buttons\">\n        <button id=\"btn_new\">New</button>\n        <button id=\"btn_search_quotation\">Search Quotation</button>\n        <button id=\"btn_search_client\">Search Client</button>\n        <button id=\"home_btn\">Home</button>\n      </div>\n\n      <div class=\"row\">\n        <div class=\"label\">Client Code</div>\n        <input id=\"client_code\" readonly />\n      </div>\n\n      <div class=\"row\">\n        <div class=\"label\">Quotation #</div>\n        <input id=\"Quotation#\" readonly />\n      </div>\n\n      <div class=\"row\">\n        <div class=\"label\">Date</div>\n        <input type=\"date\" id=\"Date\">\n      </div>\n\n      <div class=\"row\">\n        <div class=\"label\">Client Name</div>\n        <input id=\"Client Name\">\n      </div>\n\n      <div class=\"row\">\n        <div class=\"label\">Company</div>\n        <input id=\"Company\">\n      </div>\n\n      <div class=\"row\">\n        <div class=\"label\">Phone</div>\n        <input type=\"tel\" id=\"Phone\">\n      </div>\n\n      <div class=\"row\">\n        <div class=\"label\">Country</div>\n        <input id=\"Country\">\n      </div>\n\n      <div class=\"row\">\n        <div class=\"label\">Address</div>\n        <input id=\"Address\">\n      </div>\n\n      <div class=\"row\">\n        <div class=\"label\">Email</div>\n        <input type=\"email\" id=\"Email\">\n      </div>\n\n      <div class=\"row\">\n        <div class=\"label\">Sales Rep</div>\n        <select id=\"sales_rep\">\n          <option value=\"\">-- Select Sales Rep --</option>\n        </select>\n      </div>\n\n      <div class=\"row\">\n        <div class=\"label\">Source</div>\n        <input id=\"Source\">\n      </div>\n\n      <div class=\"row\">\n        <div class=\"label\">Given Price</div>\n        <input type=\"text\" inputmode=\"decimal\" id=\"Given Price\">\n      </div>\n\n      <div class=\"row\">\n        <div class=\"label\">Agreed Price</div>\n        <input type=\"text\" inputmode=\"decimal\" id=\"Agreed Price\">\n      </div>\n\n      <div class=\"row\">\n        <div class=\"label\">Notes</div>\n        <textarea id=\"Notes\"></textarea>\n      </div>\n\n      <div class=\"save\">\n        <button id=\"btn_save\">Save</button>\n      </div>\n\n    </div>\n  </div>\n</div>\n<div id=\"alertOverlay\" class=\"alert-backdrop\" style=\"display:none;\">\n  <div class=\"alert-modal alert-error\">\n\n    <!-- HEADER -->\n    <div class=\"alert-header\">\n      <span class=\"alert-type\">ERROR</span>\n      <span class=\"alert-close\" onclick=\"hideAlert()\">✖</span>\n    </div>\n\n    <!-- BODY -->\n    <div class=\"alert-body\" id=\"alertMessage\">\n      Message goes here\n    </div>\n\n    <!-- FOOTER -->\n    <div class=\"alert-footer\">\n      <button onclick=\"hideAlert()\">OK</button>\n    </div>\n\n  </div>\n</div>\n\n\n\n<!-- ===============================\nCalculator JS Loader\n=============================== -->\n<!-- 1️⃣ Core (لازم الأول) -->\n<script src=\"_/theme/Calculator/core_v2.js\"></scr&#105;pt>\n\n<!-- 2️⃣ Form helpers (collectFormData) -->\n<script src=\"_/theme/Calculator/form.js\"></scr&#105;pt>\n\n<!-- 3️⃣ UI & helpers -->\n<script src=\"_/theme/Calculator/ui.js\"></scr&#105;pt>\n\n<!-- 4️⃣ Clients -->\n<script src=\"_/theme/Calculator/clients.js\"></scr&#105;pt>\n\n<!-- 5️⃣ Cylinders -->\n<script src=\"_/theme/Calculator/cylinders.js\"></scr&#105;pt>\n\n<!-- 6️⃣ Machine pricing -->\n<script src=\"_/theme/Calculator/machine_pricing.js\"></scr&#105;pt>\n\n<!-- 🔥 NEW: Colors change patch -->\n<script src=\"_/theme/Calculator/colors_change_patch.js\"></scr&#105;pt>\n\n<!-- 7️⃣ Quotations (overlay + load/save) -->\n<script src=\"_/theme/Calculator/quotations.js\"></scr&#105;pt>\n\n<script>\n  // Debounce helper\n  function debounce(func, wait) {\n    let timeout;\n    return function executedFunction(...args) {\n      const later = () => {\n        clearTimeout(timeout);\n        func(...args);\n      };\n      clearTimeout(timeout);\n      timeout = setTimeout(later, wait);\n    };\n  }\n  (function() {\n    function applyResponsiveScale() {\n      const wrapper = document.querySelector('.main');\n      const header = document.querySelector('.header');\n\n      if (!wrapper || !header) return;\n\n      // Mobile/Tablet → no scaling\n      if (window.innerWidth <= 1024) {\n        wrapper.style.transform = 'scale(1)';\n        wrapper.style.transformOrigin = 'top left';\n        wrapper.style.width = '100%';\n        wrapper.style.height = 'auto';\n        document.body.style.overflow = 'auto';\n        return;\n      }\n\n      // Desktop → calculate scale\n      const viewportHeight = window.innerHeight;\n      const headerHeight = header.offsetHeight;\n      const availableHeight = viewportHeight - headerHeight - 24; // 24px = padding\n\n      // Reset transform to measure natural size\n      wrapper.style.transform = 'scale(1)';\n      const naturalHeight = wrapper.scrollHeight;\n\n      // Calculate scale factor\n      let scale = availableHeight / naturalHeight;\n\n      // Safety limits\n      scale = Math.max(0.65, Math.min(1, scale));\n\n      // Apply transform\n      wrapper.style.transform = `scale(${scale})`;\n      wrapper.style.transformOrigin = 'top left';\n      wrapper.style.width = `${100 / scale}%`;\n      wrapper.style.height = `${naturalHeight}px`;\n\n      // Lock body overflow on desktop\n      document.body.style.overflow = 'hidden';\n    }\n\n    // Run on load and resize\n    window.addEventListener('load', applyResponsiveScale);\n    window.addEventListener('resize', debounce(applyResponsiveScale, 150));\n\n    // Run after short delay to ensure everything is rendered\n    setTimeout(applyResponsiveScale, 100);\n  })();\n\n  // ===== Load Sales Rep Dropdown =====\n  window._pendingSalesRep = null;\n  window._salesRepLoaded = false;\n  \n  window.setSalesRepValue = function(value) {\n    const select = document.getElementById('sales_rep');\n    if (window._salesRepLoaded && select) {\n      select.value = value || '';\n    } else {\n      window._pendingSalesRep = value;\n    }\n  };\n  \n  (function loadSalesRepDropdown() {\n    async function populateSalesRep() {\n      if (typeof window.getActiveUsersForDropdown !== 'function') {\n        setTimeout(populateSalesRep, 200);\n        return;\n      }\n      try {\n        // Await the Promise from Anvil\n        const result = await window.getActiveUsersForDropdown();\n        console.log('Sales Rep result:', result);\n        if (result && result.success && result.users) {\n          const select = document.getElementById('sales_rep');\n          if (select) {\n            select.innerHTML = '<option value=\"\">-- Select Sales Rep --</option>';\n            result.users.forEach(user => {\n              const option = document.createElement('option');\n              option.value = user.name;\n              option.textContent = user.name;\n              select.appendChild(option);\n            });\n            window._salesRepLoaded = true;\n            console.log('Sales Rep dropdown loaded with', result.users.length, 'users');\n            // Apply pending value if any\n            if (window._pendingSalesRep) {\n              select.value = window._pendingSalesRep;\n              window._pendingSalesRep = null;\n            }\n          }\n        } else {\n          console.error('Failed to load sales reps:', result);\n        }\n      } catch (e) {\n        console.error('Error loading sales rep:', e);\n      }\n    }\n    setTimeout(populateSalesRep, 500);\n  })();\n</scr&#105;pt>"
