components: []
container:
  properties:
    html: |+
      <style>
        #pricingModeModal {
          position: fixed;
          inset: 0;
          z-index: 20000;
        }

        #pricingModeModal * {
          transform: none !important;
        }
        .pricing-modal {
          width: 420px;
          max-width: 90vw;
          padding: 24px;
          border-radius: 14px;
          background: #fff;
          text-align: center;
        }

        .pricing-modal h3 {
          margin: 0 0 8px;
          color: #1f4e79;
        }

        .pricing-modal p {
          margin: 0 0 20px;
          color: #374151;
        }

        .pricing-actions {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 12px;
        }

        .pricing-actions button {
          height: 44px;
          border-radius: 10px;
          background: #0078d7;
          color: #fff;
          font-weight: 600;
          border: none;
          cursor: pointer;
        }

        .pricing-actions button:hover {
          filter: brightness(1.05);
        }

        .modal-backdrop {
          position: fixed;
          inset: 0;
          background: rgba(0,0,0,.45);
          display: flex;
          align-items: center;
          justify-content: center;
          z-index: 9999;
        }

        .modal-box {
          background: #fff;
          width: 420px;
          padding: 15px;
          border-radius: 6px;
          box-shadow: 0 10px 30px rgba(0,0,0,.3);
          text-align: center;
        }

        .modal-box h3 {
          margin-top: 0;
          color: #c00000;
        }

        .modal-box button {
          margin-top: 16px;
          border: none;
          background: #0078d7;
          color: #fff;
          font-weight: bold;
          cursor: pointer;
        }

        * {
          box-sizing: border-box;
          font-family: Arial, Helvetica, sans-serif;
        }

        body {
          margin: 0;
          height: 100%;
          overflow-y: auto;
          overflow-x: hidden;
          background: #c9c9c9;
        }

        /* ================= HEADER ================= */
        .header img {
          height: 55px;
        }
        .header img {
          height: 55px;
          max-width: 100%;
          object-fit: contain;
        }

        .header {
          position: fixed;
          top: 0;
          left: 0;
          right: 0;
          height: 70px;

          z-index: 1000;

          background: var(--ui-card);
          box-shadow: var(--shadow-sm);

          display: grid;
          grid-template-columns: 180px 1fr 180px;
          align-items: center;
          padding: 8px 12px;
        }

        .header img {
          height: 55px;
        }

        .header-title {
          text-align: center;
          font-size: 22px;
          font-weight: bold;
          color: #1f4e79;
        }

        /* ================= LAYOUT ================= */
        :root {
          --header-height: 70px;
        }

        .main {
          display: grid;
          grid-template-columns: minmax(0, 1.35fr) minmax(0, 1fr);
          gap: 16px;

          margin-top: calc(var(--header-height) + 0px);
          padding: 12px;

          align-items: stretch;
        }

        /* ================= LEFT ================= */
        .left {
          border-right: none;
          padding: 10px;
        }
        .title-only {
          padding-left: 4px;
          text-transform: uppercase;
          letter-spacing: 0.3px;
        }
        .label.title-only {
          font-weight: bold;
          font-size: 14px;
          padding-left: 2px;
          color: #000;
        }

        /* unified row */
        .row {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 8px;
          align-items: center;
          margin-bottom: 10px;
          padding: 4px;
        }

        input[type="checkbox"] {
          width: 18px;
          height: 18px;
        }
        .optional-block {
          padding-left: 120px;
        }

        .label {
          background: #d9d9d9;
          border: 1px solid #000;
          padding: 6px;
          font-weight: bold;
        }

        .label,
        input,
        input.readonly {
          height: 28;
          line-height: 12px;
        }

        input,
        textarea {
          border: 1px solid #000;
          height: 32px;
          padding: 4px 6px;
          background: #fff;
        }

        input.readonly {
          background: #e6e6e6;
          font-weight: bold;
          cursor: default;
        }

        .fixed-input {
          width: 100%;
          max-width: 100%;
        }

        /* divider */
        .divider {
          border-bottom: 2px dashed #000;
          margin: 6px 0;
        }

        /* ================= OPTIONAL ================= */
        .optional-title {
          font-weight: bold;
          text-align: left;
          margin: 8px 0;
        }

        .title {
          font-weight: bold;
          text-align: left;
          margin: 8px 0;
        }

        .optional-row {
          display: grid;
          grid-template-columns: 1fr 22px;
          align-items: center;
          height: 26px;
        }

        .optional-row input {
          width: 18px;
          height: 18px;
        }

        .red { color: #c00000; font-weight: bold; }
        .blue { color: #0070c0; font-weight: bold; }

        /* ================= PRICES ================= */
        .green {
          background: #92d050;
        }

        .bluebg {
          background: #5b9bd5;
          color: #fff;
        }

        .opt-check {
          width: 18px;
          height: 18px;
        }

        /* ================= CYLINDERS ================= */
        .machine-grid {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 16px;
          align-items: start;
        }

        .cylinders table {
          width: 100%;
          border-collapse: collapse;
          font-size: 13px;
          margin-top: 0px;
        }

        .cylinders th,
        .cylinders td {
          border: 1px solid #000;
          height: 28px;
          text-align: center;
        }

        .cylinders th {
          background: #5b9bd5;
          color: #fff;
        }

        .cylinders input {
          width: 100%;
          height: 100%;
          border: none;
          text-align: center;
        }

        .cylinders input.readonly {
          background: #e6e6e6;
        }

        /* ================= RIGHT ================= */
        .left,
        .right {
          min-width: 0;
          height: 100%;
          overflow-x: hidden;
          padding-bottom: 8px;
        }

        .top-buttons {
          display: grid;
          grid-template-columns: repeat(4, 1fr);
          gap: 10px;
          margin-bottom: 20px;
        }

        .top-buttons button {
          height: 36px;
          font-size: 13px;
          padding: 0 10px;
          white-space: nowrap;
        }

        .save {
          text-align: center;
          margin-top: 20px;
        }

        .save button {
          width: 120px;
          height: 36px;
          background: #0078d7;
          color: #fff;
          border: 1px solid #000;
        }
        .cylinders {
          max-width: 100%;
          overflow-x: auto;
        }

        .cylinders table {
          min-width: 100%;
        }

        @media (max-width: 1024px) {
          .main {
            grid-template-columns: 1fr;
          }

          .left {
            border-right: none;
            border-bottom: 2px solid #000;
          }
        }

        @media (max-width: 600px) {

          .row {
            grid-template-columns: 1fr;
            height: auto;
          }

          .label {
            height: auto;
            line-height: normal;
          }

          .fixed-input {
            width: 100%;
          }

          .machine-grid {
            grid-template-columns: 1fr;
          }

          .optional-block {
            padding-left: 0;
          }
          .optional-row:last-child {
            margin-bottom: 0;
          }
          .top-buttons {
            grid-template-columns: 1fr 1fr;
          }
        }
        @media (max-width: 600px) {

          .header {
            grid-template-columns: auto 1fr auto;
            padding: 6px 8px;
          }

          .header img {
            height: 36px;
          }

          .header-title {
            font-size: 16px;
            line-height: 1.2;
            padding: 0 6px;
          }
        }
        @media (max-width: 600px) {
          .header-title {
            white-space: normal;
            text-align: center;
          }
        }

        /* ===== Overlay Backdrop ===== */
        #quotationOverlay,
        #clientOverlay {
          position: fixed;
          inset: 0;
          z-index: 9999;

          display: none;
          pointer-events: all;
        }

        .qo-backdrop {
          position: absolute;
          inset: 0;

          background: rgba(0,0,0,.45);
          backdrop-filter: blur(2px);
        }

        /* ===== Modal ===== */
        .qo-modal {
          position: fixed;

          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);

          width: 700px;
          max-width: 90vw;
          max-height: 70vh;

          background: #fff;
          border-radius: 12px;
          overflow: visible !important;

          box-shadow: 0 25px 60px rgba(0,0,0,.35);
          z-index: 10000;

          display: flex;
          flex-direction: column;
        }

        /* ===== Header ===== */
        .qo-header {
          height: 42px;
          padding: 0 14px;

          background: linear-gradient(90deg, #1f4e79, #2563eb);
          color: #fff;

          display: flex;
          align-items: center;
          justify-content: center;

          font-size: 18px;
          font-weight: 600;

          position: relative;
        }

        /* Close Button */
        .qo-close {
          position: absolute;
          right: 14px;
          top: 50%;
          transform: translateY(-50%);

          font-size: 16px;
          cursor: pointer;
          opacity: .9;
        }
        .qo-close:hover {
          opacity: 1;
          transform: translateY(-50%) scale(1.1);
        }

        .qo-table th:nth-child(1) { width: 100px; }
        .qo-table th:nth-child(2) { width: 100px; }
        .qo-table th:nth-child(3) { width: 180px; }
        .qo-table th:nth-child(4) { width: 100px; text-align: center; }
        .qo-table td:nth-child(4) { text-align: center; }

        /* ===== Body ===== */
        .qo-body {
          background: #fff;
          max-height: 65vh;
          overflow-y: hidden;
          padding: 16px;
          display: flex;
          justify-content: center;
        }

        /* ===== Table ===== */
        .qo-table {
          width: auto;
          min-width: 520px;
          font-size: 16px;
        }

        /* Header cells */
        .qo-table th,
        .qo-table td {
          text-align: center;
          padding: 8px 12px;
          white-space: nowrap;
        }

        /* Body cells */
        .qo-table td {
          text-align: center;
          padding: 8px;
          vertical-align: middle;
        }

        /* ===== ROW HOVER ===== */
        .qo-table tbody tr:hover {
          background: #e8f0ff;
          cursor: pointer;
        }
        .qo-table th {
          position: sticky;
          top: 0;
          background: #f1f5f9;
          font-weight: 600;
          color: #374151;
          z-index: 1;
        }

        .qo-table td {
          color: #111827;
        }

        /* Zebra rows */
        .qo-table tbody tr:nth-child(even) {
          background: #f9fafb;
        }

        /* Hover */
        .qo-table tbody tr:hover {
          background: #e0ecff;
          cursor: pointer;
        }

        /* Active (dbl click feedback) */
        .qo-table tbody tr:active {
          background: #bfdbfe;
        }

        :root {
          --ui-bg: #f4f6f8;
          --ui-card: #ffffff;
          --ui-border: #d1d5db;
          --ui-primary: #1f4e79;
          --ui-primary-soft: #e6eef6;
          --ui-accent: #0078d7;

          --radius-sm: 6px;
          --radius-md: 10px;
          --radius-lg: 14px;

          --shadow-sm: 0 2px 6px rgba(0,0,0,.08);
          --shadow-md: 0 8px 24px rgba(0,0,0,.12);
        }
        body {
          background: var(--ui-bg);
        }
        .left,
        .right {
          background: var(--ui-card);
          border-radius: var(--radius-lg);
          box-shadow: var(--shadow-md);
          padding: 16px;
        }
        .main {
          gap: 16px;
          padding: 16px;
        }
        .row {
          margin-bottom: 12px;
          background: var(--ui-card);
          border-radius: var(--radius-md);
          box-shadow: var(--shadow-sm);
          padding: 8px 10px;
        }
        .label {
          background: transparent;
          border: none;
          font-weight: 600;
          color: #374151;
          padding: 6px 8px;
        }
        input,
        select,
        textarea {
          border-radius: var(--radius-sm);
          border: 1px solid var(--ui-border);
          transition: .6s ease;
          height: 28px;
          font-size: 12px;
        }
        textarea#Notes {
          height: auto;
          min-height: 84px;
          resize: vertical;
          line-height: 1.4;
        }

        input:focus,
        select:focus,
        textarea:focus {
          outline: none;
          border-color: var(--ui-primary);
          box-shadow: 0 0 0 2px var(--ui-primary-soft);
        }
        input.readonly {
          background: #f1f5f9;
          color: #111827;
        }
        .optional-row {
          background: var(--ui-primary-soft);
          border-radius: var(--radius-sm);
          padding: 4px 8px;
          margin-bottom: 6px;
        }
        .cylinders table {
          border-radius: var(--radius-md);
          overflow: visible !important;
          box-shadow: var(--shadow-sm);
        }

        .cylinders th {
          background: var(--ui-primary);
          font-weight: 600;
        }
        button {
          border-radius: var(--radius-sm);
          border: none;
          background: var(--ui-accent);
          color: #fff;
          font-weight: 600;
          transition: .2s ease;
        }

        button:hover {
          filter: brightness(1.05);
        }
        .header {
          border-radius: 0 0 var(--radius-lg) var(--radius-lg);
          box-shadow: var(--shadow-sm);
        }
        .modal-box,
        .qo-modal {
          border-radius: var(--radius-lg);
          box-shadow: var(--shadow-md);
        }
        select {
          appearance: none;
          -webkit-appearance: none;
          -moz-appearance: none;

          background:
            linear-gradient(180deg, #ffffff, #f3f4f6);
          border: 1px solid var(--ui-border);
          border-radius: 8px;

          padding: 6px 36px 6px 10px;
          height: 32px;
          font-size: 13px;
          font-weight: 500;
          color: #111827;

          box-shadow:
            inset 0 1px 0 rgba(255,255,255,.8),
            0 1px 2px rgba(0,0,0,.08);

          cursor: pointer;
          transition: all .15s ease;
        }
        select {
          background-image:
            linear-gradient(180deg, #ffffff, #f3f4f6),
            url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M1 1l4 4 4-4' stroke='%236b7280' stroke-width='1.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>");
          background-repeat: no-repeat;
          background-position: right 10px center;
        }
        select:hover {
          border-color: #9ca3af;
        }

        select:focus {
          outline: none;
          border-color: var(--ui-primary);
          box-shadow:
            0 0 0 3px var(--ui-primary-soft),
            inset 0 1px 0 rgba(255,255,255,.9);
        }
        /* ===== Custom Select ===== */
        .ui-select {
          position: relative;
          width: 100%;
          font-size: 13px;
          user-select: none;
        }

        .ui-select-trigger {
          height: 32px;
          padding: 0 12px;
          border: 1px solid var(--ui-border);
          border-radius: 8px;
          background: #fff;

          display: flex;
          align-items: center;
          justify-content: space-between;

          cursor: pointer;
          transition: .15s ease;
        }

        .ui-select-trigger:hover {
          border-color: #9ca3af;
        }

        .ui-select.open .ui-select-trigger {
          border-color: #16a34a;
          box-shadow: 0 0 0 3px rgba(22,163,74,.15);
        }

        .ui-select-value {
          color: #111827;
        }

        .ui-select-arrow {
          font-size: 11px;
          color: #6b7280;
        }

        /* ===== Dropdown Menu ===== */
        .ui-select-menu {
          position: absolute;
          top: calc(100% + 6px);
          left: 0;
          right: 0;

          background: #fff;
          border: 1px solid var(--ui-border);
          border-radius: 10px;
          box-shadow: 0 12px 30px rgba(0,0,0,.15);

          max-height: 220px;
          overflow-y: auto;

          display: none;
          z-index: 999;
        }

        .ui-select.open .ui-select-menu {
          display: block;
        }

        /* ===== Options ===== */
        .ui-option {
          padding: 8px 12px;
          cursor: pointer;
          transition: .12s ease;
        }

        .ui-option:hover {
          background: #dcfce7;
          color: #166534;
        }

        .ui-option.selected {
          background: #16a34a;
          color: #fff;
          font-weight: 600;
        }
        @media (max-width: 600px) {

          .qo-modal {
            top: auto;
            bottom: 0;
            left: 0;
            transform: none;

            width: 100%;
            max-width: 100%;
            height: 90vh;
            max-height: 90vh;

            border-radius: 16px 16px 0 0;
            animation: slideUp .25s ease-out;
          }

          .qo-header {
            font-size: 16px;
            height: 44px;
          }

          .qo-body {
            padding: 12px;
          }

          .qo-table {
            min-width: 100%;
            font-size: 14px;
          }

          .qo-close {
            font-size: 20px;
          }
        }

        @keyframes slideUp {
          from {
            transform: translateY(100%);
            opacity: 0;
          }
          to {
            transform: translateY(0);
            opacity: 1;
          }
        }
        /* ================= ALERT BOX ================= */

        .alert-backdrop {
          position: fixed;
          inset: 0;
          background: rgba(0,0,0,.45);
          display: flex;
          align-items: center;
          justify-content: center;
          z-index: 20000;
        }

        .alert-modal {
          width: 420px;
          max-width: 90vw;
          background: #fff;
          border-radius: 12px;
          overflow: visible !important;
          box-shadow: 0 25px 60px rgba(0,0,0,.35);
          animation: popIn .2s ease-out;
        }

        /* ===== HEADER ===== */
        .alert-header {
          height: 38px;
          padding: 0 14px;
          display: flex;
          align-items: center;
          justify-content: space-between;

          font-size: 13px;
          font-weight: 700;
          letter-spacing: .5px;
          color: #fff;
          text-transform: uppercase;
        }

        .alert-close {
          cursor: pointer;
          font-size: 14px;
          opacity: .9;
        }
        .alert-close:hover {
          opacity: 1;
        }

        /* ===== BODY ===== */
        .alert-body {
          padding: 24px 20px;
          text-align: center;
          font-size: 14px;
          color: #111827;
          line-height: 1.6;
        }

        /* ===== FOOTER ===== */
        .alert-footer {
          padding: 12px 16px 18px;
          display: flex;
          justify-content: center;
        }

        .alert-footer button {
          min-width: 100px;
          height: 36px;
          border-radius: 8px;
          border: none;
          background: #2563eb;
          color: #fff;
          font-weight: 600;
          cursor: pointer;
        }

        /* ===== TYPES ===== */
        .alert-error .alert-header {
          background: #dc2626;
        }

        .alert-info .alert-header {
          background: #2563eb;
        }

        .alert-success .alert-header {
          background: #16a34a;
        }

        /* ===== ANIMATION ===== */
        @keyframes popIn {
          from {
            transform: scale(.92);
            opacity: 0;
          }
          to {
            transform: scale(1);
            opacity: 1;
          }
        }

        /* ===== MOBILE ===== */
        @media (max-width: 600px) {
          .alert-modal {
            width: 95%;
          }
        }

        /* ===== Desktop Auto Fit ===== */
        @media (min-width: 1025px) {
          html, body {
            height: 100%;
            overflow: hidden;
          }

          .main {
            transition: transform 0.2s ease;
            will-change: transform;
          }
        }

        /* ===== Ensure elements don't overflow ===== */
        .cylinders {
          max-width: 100%;
          overflow: visible;
        }

        .cylinders table {
          width: 100%;
          table-layout: fixed;
        }

        /* ===== Fine-tune for small laptops ===== */
        @media (min-width: 1025px) and (max-height: 768px) {
          .row {
            margin-bottom: 4px;
            padding: 3px 6px;
          }

          input, select, textarea {
            height: 24px;
            font-size: 11px;
            padding: 2px 4px;
          }

          .optional-row {
            height: 20px;
            padding: 2px 6px;
            margin-bottom: 3px;
          }

          .top-buttons {
            gap: 6px;
            margin-bottom: 10px;
          }

          .top-buttons button {
            height: 28px;
            font-size: 11px;
            padding: 0 8px;
          }

          .save {
            margin-top: 10px;
          }

          .save button {
            height: 30px;
          }
        }

        body {
          overflow-x: hidden;
          overflow-y: auto;
        }

        .blue-btn {
          height: 42px;
          border-radius: 10px;
          background: #0078d7;
          color: #fff;
          font-weight: 600;
          border: none;
          cursor: pointer;
        }

        .blue-btn:hover {
          filter: brightness(1.05);
        }

      </style>

      <div class="header">
        <img src="_/theme/helwan_logo.png">
        <div class="header-title" id="calcHeaderTitle">Helwan Plast & Flexo CH - Calculator</div>
        <img src="_/theme/flexo_logo.png" style="justify-self:end;">
      </div>

      <!-- ===== QUOTATION OVERLAY ===== -->
      <div id="quotationOverlay" style="display:none;">
        <div class="qo-backdrop">
          <div class="qo-modal">
            <div class="qo-header">
              <span id="qo_title">Search Quotation</span>
              <span id="btnCloseOverlay" class="qo-close">✖</span>
            </div>

            <div class="qo-body">
              <table class="qo-table">
                <thead>
                  <tr>
                    <th id="qo_th_quotation">Quotation #</th>
                    <th id="qo_th_client_code">Client Code</th>
                    <th id="qo_th_client_name">Client Name</th>
                    <th id="qo_th_date">Date</th>
                  </tr>
                </thead>
                <tbody id="quotationList">
                  <!-- rows injected here -->
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

      <!-- ===== CLIENT SEARCH OVERLAY ===== -->
      <div id="clientOverlay" style="display:none;">
        <div class="qo-backdrop">
          <div class="qo-modal">
