components:
- name: title_label
  properties: {align: center, bold: true, font_size: 24, spacing_above: medium, spacing_below: medium, text: 📋 Clients List (Read Only)}
  type: Label
- components:
  - name: search_input
    properties: {placeholder: Search clients..., width: 300}
    type: TextBox
  - event_bindings: {click: btn_search_click}
    name: btn_search
    properties: {role: primary, text: 🔍 Search}
    type: Button
  - event_bindings: {click: btn_export_click}
    name: btn_export
    properties: {role: secondary, text: 📥 Export CSV}
    type: Button
  - event_bindings: {click: btn_back_click}
    name: btn_back
    properties: {text: 🔙 Back}
    type: Button
  name: search_panel
  properties: {spacing_above: small, spacing_below: small}
  type: FlowPanel
- name: table_container
  properties: {content: <p>Loading...</p>, enable_slots: false, spacing_above: medium}
  type: RichText
- components:
  - event_bindings: {click: btn_prev_click}
    name: btn_prev
    properties: {enabled: false, text: ◀ Previous}
    type: Button
  - name: page_info
    properties: {spacing_above: none, spacing_below: none, text: Page 1 of 1}
    type: Label
  - event_bindings: {click: btn_next_click}
    name: btn_next
    properties: {enabled: false, text: Next ▶}
    type: Button
  name: pagination_panel
  properties: {align: center, spacing_above: medium}
  type: FlowPanel
container: {type: ColumnPanel}
is_package: true
