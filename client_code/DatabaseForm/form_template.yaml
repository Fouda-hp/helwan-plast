components:
- name: title_label
  properties: {align: center, bold: true, font_size: 24, spacing_above: medium, spacing_below: medium, text: 🗄️ Database Viewer (Read Only)}
  type: Label
- components:
  - event_bindings: {click: btn_clients_click}
    name: btn_clients
    properties: {role: primary, text: 👥 Clients}
    type: Button
  - event_bindings: {click: btn_quotations_click}
    name: btn_quotations
    properties: {role: secondary, text: 📊 Quotations}
    type: Button
  name: table_selector
  properties: {align: center, spacing_below: medium}
  type: FlowPanel
- components:
  - name: search_input
    properties: {placeholder: Search..., width: 250}
    type: TextBox
  - event_bindings: {click: btn_search_click}
    name: btn_search
    properties: {text: 🔍 Search}
    type: Button
  - event_bindings: {click: btn_export_click}
    name: btn_export
    properties: {role: secondary, text: 📥 Export CSV}
    type: Button
  - event_bindings: {click: btn_back_click}
    name: btn_back
    properties: {text: 🔙 Back}
    type: Button
  name: toolbar
  properties: {spacing_below: small}
  type: FlowPanel
- name: table_container
  properties: {content: '<p style=''text-align:center;padding:40px;''>Loading data...</p>', enable_slots: false}
  type: RichText
- components:
  - event_bindings: {click: btn_prev_click}
    name: btn_prev
    properties: {enabled: false, text: ◀ Previous}
    type: Button
  - name: page_info
    properties: {text: Page 1 of 1}
    type: Label
  - event_bindings: {click: btn_next_click}
    name: btn_next
    properties: {enabled: false, text: Next ▶}
    type: Button
  name: pagination_panel
  properties: {align: center, spacing_above: medium}
  type: FlowPanel
container: {type: ColumnPanel}
custom_component: true
is_package: true
properties: {title: Database Viewer}
