# =========================================================
# DatabaseForm - صفحة عرض قاعدة البيانات (للقراءة فقط)
# =========================================================

components:
  # العنوان
  - type: Label
    name: title_label
    properties:
      text: "🗄️ Database Viewer (Read Only)"
      font_size: 24
      bold: true
      spacing_above: medium
      spacing_below: medium
      align: center

  # أزرار اختيار الجدول
  - type: FlowPanel
    name: table_selector
    properties:
      spacing_below: medium
      align: center
    components:
      - type: Button
        name: btn_clients
        properties:
          text: "👥 Clients"
          role: primary
        event_bindings:
          click: btn_clients_click

      - type: Button
        name: btn_quotations
        properties:
          text: "📊 Quotations"
          role: secondary
        event_bindings:
          click: btn_quotations_click

  # شريط البحث والأدوات
  - type: FlowPanel
    name: toolbar
    properties:
      spacing_below: small
    components:
      - type: TextBox
        name: search_input
        properties:
          placeholder: "Search..."
          width: 250

      - type: Button
        name: btn_search
        properties:
          text: "🔍 Search"
        event_bindings:
          click: btn_search_click

      - type: Button
        name: btn_export
        properties:
          text: "📥 Export CSV"
          role: secondary
        event_bindings:
          click: btn_export_click

      - type: Button
        name: btn_back
        properties:
          text: "🔙 Back"
        event_bindings:
          click: btn_back_click

  # حاوية الجدول
  - type: RichText
    name: table_container
    properties:
      content: "<p style='text-align:center;padding:40px;'>Loading data...</p>"
      enable_slots: false

  # شريط الترقيم
  - type: FlowPanel
    name: pagination_panel
    properties:
      spacing_above: medium
      align: center
    components:
      - type: Button
        name: btn_prev
        properties:
          text: "◀ Previous"
          enabled: false
        event_bindings:
          click: btn_prev_click

      - type: Label
        name: page_info
        properties:
          text: "Page 1 of 1"

      - type: Button
        name: btn_next
        properties:
          text: "Next ▶"
          enabled: false
        event_bindings:
          click: btn_next_click

container:
  type: ColumnPanel
properties:
  title: Database Viewer
custom_component: true
is_package: true
