container:
  properties:
    html: "<style>\n  /* ================= RESET ================= */\n  * {\n    box-sizing: border-box;\n    font-family: Arial, Helvetica, sans-serif;\n  }\n\n  body {\n    margin: 0;\n    background: radial-gradient(circle at top, #eef3f9, #dfe7f2);\n  }\n\n  /* ================= ANIMATIONS ================= */\n  @keyframes fadeUp {\n    from { opacity: 0; transform: translateY(30px); }\n    to   { opacity: 1; transform: translateY(0); }\n  }\n\n  @keyframes logoIn {\n    from { opacity: 0; transform: scale(0.9); }\n    to   { opacity: 1; transform: scale(1); }\n  }\n\n  @keyframes buttonIn {\n    from { opacity: 0; transform: translateY(20px); }\n    to   { opacity: 1; transform: translateY(0); }\n  }\n\n  @keyframes pulse {\n    0%   { box-shadow: 0 0 0 0 rgba(0,120,215,0.5); }\n    70%  { box-shadow: 0 0 0 14px rgba(0,120,215,0); }\n    100% { box-shadow: 0 0 0 0 rgba(0,120,215,0); }\n  }\n\n  /* ================= LAYOUT ================= */\n  .launcher {\n    min-height: 100vh;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    padding: 40px 20px;\n  }\n  .launcher,\n  .launcher-card {\n    direction: ltr;\n  }\n\n  .launcher-card {\n    width: 100%;\n    max-width: 1440px;\n    background: #ffffff;\n    border-radius: 30px;\n    padding: 90px 120px 82px;\n    box-shadow: 0 35px 80px rgba(0,0,0,0.2);\n    text-align: center;\n    animation: fadeUp 0.8s ease;\n    margin-left: auto;\n    margin-right: auto;\n    will-change: transform, opacity;\n  }\n\n  /* ================= TITLE ================= */\n  .title {\n    font-size: 42px;\n    font-weight: bold;\n    color: #0057a3;\n    margin-bottom: 45px;\n  }\n\n  /* ================= LOGOS ================= */\n  .logos {\n    display: flex;\n    justify-content: center;   /* 👈 في النص */\n    align-items: center;\n    gap: 120px;                 /* مسافة ثابتة */\n  }\n\n\n  .logos img {\n    height: 135px;\n    max-width: 330px;\n    object-fit: contain;\n    opacity: 0;\n    animation: logoIn 0.8s ease forwards;\n  }\n\n  .logos img:first-child { animation-delay: 0.2s; }\n  .logos img:last-child  { animation-delay: 0.4s; }\n\n  /* ================= BUTTONS ================= */\n  .buttons {\n    max-width: 1350px;\n    margin: 0 auto;\n    display: grid;\n    grid-template-columns: repeat(4, 1fr);\n    gap: 24px;\n  }\n\n  .btn-group {\n    display: flex;\n    flex-direction: column;\n    align-items: stretch;\n    gap: 12px;\n    padding: 18px;\n    background: rgba(0,0,0,0.02);\n    border-radius: 15px;\n    border: 1px solid rgba(0,0,0,0.06);\n  }\n\n  .group-label {\n    font-size: 24px;\n    font-weight: 700;\n    color: #8899aa;\n    text-transform: uppercase;\n    letter-spacing: 1px;\n    margin-bottom: 6px;\n    text-align: center;\n  }\n\n  .btn {\n    position: relative;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    gap: 4px;\n    width: 100%;\n    min-width: 240px;\n    height: 56px;\n    padding: 0 36px;\n    border: none !important;\n    background: transparent;\n    font-size: 18px;\n    font-weight: 600;\n    color: #fff;\n    border-radius: 66px !important;\n    cursor: pointer;\n    overflow: hidden;\n    opacity: 1;\n    animation: buttonIn 0.6s ease forwards;\n    transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);\n    -webkit-border-radius: 66px !important;\n    -moz-border-radius: 66px !important;\n  }\n\n  .btn svg {\n    position: absolute;\n    width: 24px;\n    height: 24px;\n    fill: currentColor;\n    z-index: 9;\n    transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);\n  }\n\n  .btn .arr-1 {\n    right: 16px;\n  }\n\n  .btn .arr-2 {\n    left: -25%;\n  }\n\n  .btn .circle {\n    position: absolute;\n    top: 50%;\n    left: 50%;\n    transform: translate(-50%, -50%);\n    width: 20px;\n    height: 20px;\n    background-color: currentColor;\n    border-radius: 50%;\n    opacity: 0;\n    transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);\n    will-change: width, height, opacity;\n  }\n\n  .btn .btn-text {\n    position: relative;\n    z-index: 1;\n    transform: translateX(-12px);\n    transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);\n  }\n\n  .btn-group:nth-child(1) { animation-delay: 0.2s; }\n  .btn-group:nth-child(2) { animation-delay: 0.35s; }\n  .btn-group:nth-child(3) { animation-delay: 0.5s; }\n  .btn-group:nth-child(4) { animation-delay: 0.65s; }\n  .btn-group { opacity: 0; animation: buttonIn 0.6s ease forwards; }
  \n\n  .btn:hover {\n    box-shadow: 0 0 0 12px transparent;\n    border-radius: 12px;\n  }\n\n  .btn:hover .arr-1 {\n    right: -25%;\n  }\n\n  .btn:hover .arr-2 {\n    left: 16px;\n  }\n\n  .btn:hover .btn-text {\n    transform: translateX(12px);\n    color: #fff;\n  }\n\n  .btn:hover .circle {\n    width: 300px;\n    height: 300px;\n    opacity: 1;\n  }\n\n  .btn:hover svg {\n    fill: #fff;\n  }\n\n  .btn:active {\n    scale: 0.95;\n  }\n\n  /* Colors - outlined style with fill on hover */\n  .blue   { background: transparent; color: #0078d7; box-shadow: 0 0 0 2px #0078d7; }\n  .blue .circle { background-color: #0078d7; }\n  .blue svg { fill: #0078d7; }\n  .blue:hover { color: #fff; }\n  .blue:hover svg { fill: #fff; }\n  .blue:active { box-shadow: 0 0 0 4px #0078d7; }\n\n  .green  { background: transparent; color: #00b050; box-shadow: 0 0 0 2px #00b050; }\n  .green .circle { background-color: #00b050; }\n  .green svg { fill: #00b050; }\n  .green:hover { color: #fff; }\n  .green:hover svg { fill: #fff; }\n  .green:active { box-shadow: 0 0 0 4px #00b050; }\n\n  .orange { background: transparent; color: #ed7d31; box-shadow: 0 0 0 2px #ed7d31; }\n  .orange .circle { background-color: #ed7d31; }\n  .orange svg { fill: #ed7d31; }\n  .orange:hover { color: #fff; }\n  .orange:hover svg { fill: #fff; }\n  .orange:active { box-shadow: 0 0 0 4px #ed7d31; }\n\n  .purple { background: transparent; color: #7030a0; box-shadow: 0 0 0 2px #7030a0; }\n  .purple .circle { background-color: #7030a0; }\n  .purple svg { fill: #7030a0; }\n  .purple:hover { color: #fff; }\n  .purple:hover svg { fill: #fff; }\n  .purple:active { box-shadow: 0 0 0 4px #7030a0; }\n\n  .red    { background: transparent; color: #c00000; box-shadow: 0 0 0 2px #c00000; }\n  .red .circle { background-color: #c00000; }\n  .red svg { fill: #c00000; }\n  .red:hover { color: #fff; }\n  .red:hover svg { fill: #fff; }\n  .red:active { box-shadow: 0 0 0 4px #c00000; }\n\n  .teal   { background: transparent; color: #00897b; box-shadow: 0 0 0 2px #00897b; }\n  .teal .circle { background-color: #00897b; }\n  .teal svg { fill: #00897b; }\n  .teal:hover { color: #fff; }\n  .teal:hover svg { fill: #fff; }\n  .teal:active { box-shadow: 0 0 0 4px #00897b; }\n\n  .indigo { background: transparent; color: #5c6bc0; box-shadow: 0 0 0 2px #5c6bc0; }\n  .indigo .circle { background-color: #5c6bc0; }\n  .indigo svg { fill: #5c6bc0; }\n  .indigo:hover { color: #fff; }\n  .indigo:hover svg { fill: #fff; }\n  .indigo:active { box-shadow: 0 0 0 4px #5c6bc0; }\n\n  .dblue  { background: transparent; color: #1976d2; box-shadow: 0 0 0 2px #1976d2; }\n  .dblue .circle { background-color: #1976d2; }\n  .dblue svg { fill: #1976d2; }\n  .dblue:hover { color: #fff; }\n  .dblue:hover svg { fill: #fff; }\n  .dblue:active { box-shadow: 0 0 0 4px #1976d2; }\n\n  .amber  { background: transparent; color: #ff9800; box-shadow: 0 0 0 2px #ff9800; }\n  .amber .circle { background-color: #ff9800; }\n  .amber svg { fill: #ff9800; }\n  .amber:hover { color: #fff; }\n  .amber:hover svg { fill: #fff; }\n  .amber:active { box-shadow: 0 0 0 4px #ff9800; }\n\n  /* ================= SECTION DIVIDER ================= */\n  .section-divider {\n    height: 1px;\n    background: linear-gradient(to right, transparent, #d0d8e0, transparent);\n    margin: 6px 0;\n  }\n\n  /* ================= FOOTER ================= */\n  .footer {\n    margin-top: 52px;\n    font-size: 18px;\n    color: #777;\n    display: flex;\n    justify-content: space-between;\n  }\n\n  /* ================= MODAL ================= */\n  .hp-modal {\n    position: fixed;\n    inset: 0;\n    background: rgba(0,0,0,0.45);\n    display: none;\n    align-items: center;\n    justify-content: center;\n    z-index: 9999;\n  }\n\n  .hp-modal-box {\n    background: #fff;\n    padding: 25px 30px;\n    border-radius: 15px;\n    text-align: center;\n    animation: fadeUp 0.4s ease;\n  }\n\n  .hp-modal-box h3 {\n    margin: 0 0 10px;\n    color: #0057a3;\n  }\n\n  .hp-modal-box button {\n    margin-top: 15px;\n    padding: 8px 22px;\n    border: none;\n    background: #0078d7;\n    color: #fff;\n    font-weight: bold;\n    cursor: pointer;\n  }\n\n  /* ================= ADMIN ICON ================= */\n  .admin-btn {\n    position: fixed;\n    bottom: 16px;\n    right: 20px;\n    cursor: pointer;\n  }\n\n  .admin-btn img {\n    width: 28px;\n  }\n\n  /* ================= LANGUAGE SWITCHER ================= */\n  .lang-row {\n    display: flex;\n    justify-content: center;\n    align-items: center;\n    gap: 30px;\n    margin-bottom: 45px;\n    direction: ltr;\n  }\n  body.rtl .lang-option label {\n    direction: rtl;\n  }\n\n  .lang-option {\n    display: flex;\n    align-items: center;\n    gap: 15px;\n    cursor: pointer;\n    padding: 12px 24px;\n    border-radius: 12px;\n    transition: all 0.3s ease;\n  }\n\n  .lang-option:hover {\n    background: #f0f4f8;\n  }\n\n  .lang-option.active {\n    background: #e6f0fa;\n  }\n\n  .lang-option input[type=\"radio\"] {\n    width: 27px;\n    height: 27px;\n    cursor: pointer;\n  }\n\n  .lang-option label {\n    font-size: 24px;\n    font-weight: 600;\n    color: #0057a3;\n    cursor: pointer;\n  }\n\n  /* ================= RTL SUPPORT ================= */\n  body.rtl .admin-btn {\n    right: auto;\n    left: 20px;\n  }\n\n  body.rtl .title,\n  body.rtl .buttons,\n  body.rtl .footer,\n  body.rtl .lang-row {\n    direction: rtl;\n  }\n\n  /* ================= PAGE TRANSITIONS ================= */\n  .page {\n    opacity: 0;\n    transform: translateY(20px);\n    transition: opacity 0.45s ease, transform 0.45s ease;\n  }\n\n  .page.show {\n    opacity: 1;\n    transform: translateY(0);\n  }\n\n  .page.hide {\n    opacity: 0;\n    transform: translateY(-20px);\n  }\n\n  /* ================= TABLET ================= */\n  @media (max-width: 900px) {\n    .launcher-card {\n      padding: 50px 40px;\n    }\n    .title {\n      font-size: 32px;\n    }\n    .logos {\n      gap: 60px;\n    }\n    .logos img {\n      height: 110px;\n    }\n    .buttons {\n      grid-template-columns: repeat(2, 1fr);\n      gap: 16px;\n    }\n    .group-label {\n      font-size: 18px;\n    }\n    .btn {\n      height: 48px;\n      font-size: 15px;\n      min-width: unset;\n      padding: 0 24px;\n    }\n  }\n\n  /* ================= MOBILE ================= */\n  @media (max-width: 600px) {\n    .launcher {\n      padding: 15px 10px;\n    }\n    .launcher-card {\n      padding: 30px 18px;\n      border-radius: 20px;\n    }\n    .title {\n      font-size: 22px;\n      margin-bottom: 25px;\n    }\n    .logos {\n      flex-direction: column;\n      gap: 14px;\n    }\n    .logos img {\n      height: 80px;\n      max-width: 200px;\n    }\n    .footer {\n      display: flex;\n      justify-content: center;\n      text-align: center;\n      font-size: 14px;\n      margin-top: 30px;\n    }\n    .buttons {\n      grid-template-columns: 1fr 1fr;\n      gap: 12px;\n    }\n    .btn-group {\n      padding: 12px;\n    }\n    .group-label {\n      font-size: 15px;\n      margin-bottom: 4px;\n    }\n    .btn {\n      height: 44px;\n      font-size: 13px;\n      min-width: unset;\n      padding: 0 16px;\n    }\n    .btn svg {\n      width: 18px;\n      height: 18px;\n    }\n    .lang-row {\n      flex-direction: column;\n      gap: 12px;\n      margin-bottom: 25px;\n    }\n    .lang-option {\n      padding: 10px 20px;\n    }\n    .lang-option label {\n      font-size: 18px;\n    }\n    .lang-option input[type=\\\"radio\\\"] {\n      width: 22px;\n      height: 22px;\n    }\n    .hp-modal-box {\n      width: 90vw;\n      max-width: 90vw;\n      padding: 20px;\n    }\n    html, body {\n      direction: ltr;\n    }\n    body.rtl {\n      direction: rtl;\n    }\n  }\n\n  /* ================= SMALL PHONE ================= */\n  @media (max-width: 400px) {\n    .launcher-card {\n      padding: 20px 12px;\n    }\n    .title {\n      font-size: 18px;\n      margin-bottom: 18px;\n    }\n    .logos img {\n      height: 65px;\n      max-width: 160px;\n    }\n    .buttons {\n      grid-template-columns: 1fr;\n      gap: 10px;\n    }\n    .btn-group {\n      padding: 10px;\n    }\n    .group-label {\n      font-size: 14px;\n    }\n    .btn {\n      height: 42px;\n      font-size: 12px;\n      padding: 0 14px;\n    }\n    .lang-row {\n      gap: 8px;\n      margin-bottom: 18px;\n    }\n  }\n</style>\n\n<div class=\"launcher page show\" anvil-slot=\"default\" id=\"launcherPage\">\n\n  <div class=\"launcher-card\">\n\n    <div class=\"title\" id=\"launcherTitle\">\n      Welcome To Helwan Plast & Flexo CH – Calculator\n    </div>\n\n    <div class=\"logos\">\n      <img src=\"_/theme/helwan_logo.png\" decoding=\"async\" alt=\"Helwan Plast\">\n      <img src=\"_/theme/flexo_logo.png\" decoding=\"async\" alt=\"Flexo CH\">\n    </div>\n\n    <!-- Language Selection Row -->\n    <div class=\"lang-row\">\n      <div class=\"lang-option\" id=\"langOptionAr\" onclick=\"selectLanguage('ar')\">\n        <label for=\"langAr\">العربية</label>\n        <input type=\"radio\" id=\"langAr\" name=\"language\" value=\"ar\">\n      </div>\n      <div class=\"lang-option\" id=\"langOptionEn\" onclick=\"selectLanguage('en')\">\n        <input type=\"radio\" id=\"langEn\" name=\"language\" value=\"en\">\n        <label for=\"langEn\">English</label>\n      </div>\n    </div>\n\n    <div class=\"buttons\">\n      <!-- Category 1: Machines -->\n      <div class=\"btn-group\">\n        <div class=\"group-label\" id=\"grp_machines\">Machines</div>\n        <button class=\"btn blue\" id=\"enter_btn\"><svg class=\"arr-2\" viewBox=\"0 0 24 24\" xmlns=\"http://www.w3.org/2000/svg\"><path d=\"M16.1716 10.9999L10.8076 5.63589L12.2218 4.22168L20 11.9999L12.2218 19.778L10.8076 18.3638L16.1716 12.9999H4V10.9999H16.1716Z\"></path></svg><span class=\"btn-text\">PRINTERS</span><span class=\"circle\"></span><svg class=\"arr-1\" viewBox=\"0 0 24 24\" xmlns=\"http://www.w3.org/2000/svg\"><path d=\"M16.1716 10.9999L10.8076 5.63589L12.2218 4.22168L20 11.9999L12.2218 19.778L10.8076 18.3638L16.1716 12.9999H4V10.9999H16.1716Z\"></path></svg></button>\n        <button class=\"btn teal\" id=\"btn_film\"><svg class=\"arr-2\" viewBox=\"0 0 24 24\" xmlns=\"http://www.w3.org/2000/svg\"><path d=\"M16.1716 10.9999L10.8076 5.63589L12.2218 4.22168L20 11.9999L12.2218 19.778L10.8076 18.3638L16.1716 12.9999H4V10.9999H16.1716Z\"></path></svg><span class=\"btn-text\">FILM</span><span class=\"circle\"></span><svg class=\"arr-1\" viewBox=\"0 0 24 24\" xmlns=\"http://www.w3.org/2000/svg\"><path d=\"M16.1716 10.9999L10.8076 5.63589L12.2218 4.22168L20 11.9999L12.2218 19.778L10.8076 18.3638L16.1716 12.9999H4V10.9999H16.1716Z\"></path></svg></button>\n        <button class=\"btn indigo\" id=\"btn_cutting\"><svg class=\"arr-2\" viewBox=\"0 0 24 24\" xmlns=\"http://www.w3.org/2000/svg\"><path d=\"M16.1716 10.9999L10.8076 5.63589L12.2218 4.22168L20 11.9999L12.2218 19.778L10.8076 18.3638L16.1716 12.9999H4V10.9999H16.1716Z\"></path></svg><span class=\"btn-text\">CUTTING MACHINE</span><span class=\"circle\"></span><svg class=\"arr-1\" viewBox=\"0 0 24 24\" xmlns=\"http://www.w3.org/2000/svg\"><path d=\"M16.1716 10.9999L10.8076 5.63589L12.2218 4.22168L20 11.9999L12.2218 19.778L10.8076 18.3638L16.1716 12.9999H4V10.9999H16.1716Z\"></path></svg></button>\n      </div>\n      <!-- Category 2: Sales -->\n      <div class=\"btn-group\">\n        <div class=\"group-label\" id=\"grp_sales\">Sales</div>\n        <button class=\"btn green\" id=\"btn_quotation\"><svg class=\"arr-2\" viewBox=\"0 0 24 24\" xmlns=\"http://www.w3.org/2000/svg\"><path d=\"M16.1716 10.9999L10.8076 5.63589L12.2218 4.22168L20 11.9999L12.2218 19.778L10.8076 18.3638L16.1716 12.9999H4V10.9999H16.1716Z\"></path></svg><span class=\"btn-text\">QUOTATION</span><span class=\"circle\"></span><svg class=\"arr-1\" viewBox=\"0 0 24 24\" xmlns=\"http://www.w3.org/2000/svg\"><path d=\"M16.1716 10.9999L10.8076 5.63589L12.2218 4.22168L20 11.9999L12.2218 19.778L10.8076 18.3638L16.1716 12.9999H4V10.9999H16.1716Z\"></path></svg></button>\n        <button class=\"btn orange\" id=\"btn_contract\"><svg class=\"arr-2\" viewBox=\"0 0 24 24\" xmlns=\"http://www.w3.org/2000/svg\"><path d=\"M16.1716 10.9999L10.8076 5.63589L12.2218 4.22168L20 11.9999L12.2218 19.778L10.8076 18.3638L16.1716 12.9999H4V10.9999H16.1716Z\"></path></svg><span class=\"btn-text\">CONTRACT</span><span class=\"circle\"></span><svg class=\"arr-1\" viewBox=\"0 0 24 24\" xmlns=\"http://www.w3.org/2000/svg\"><path d=\"M16.1716 10.9999L10.8076 5.63589L12.2218 4.22168L20 11.9999L12.2218 19.778L10.8076 18.3638L16.1716 12.9999H4V10.9999H16.1716Z\"></path></svg></button>\n      </div>\n      <!-- Category 3: Finance -->\n      <div class=\"btn-group\">\n        <div class=\"group-label\" id=\"grp_finance\">Finance</div>\n        <button class=\"btn dblue\" id=\"btn_payments\"><svg class=\"arr-2\" viewBox=\"0 0 24 24\" xmlns=\"http://www.w3.org/2000/svg\"><path d=\"M16.1716 10.9999L10.8076 5.63589L12.2218 4.22168L20 11.9999L12.2218 19.778L10.8076 18.3638L16.1716 12.9999H4V10.9999H16.1716Z\"></path></svg><span class=\"btn-text\">PAYMENT TRACKING</span><span class=\"circle\"></span><svg class=\"arr-1\" viewBox=\"0 0 24 24\" xmlns=\"http://www.w3.org/2000/svg\"><path d=\"M16.1716 10.9999L10.8076 5.63589L12.2218 4.22168L20 11.9999L12.2218 19.778L10.8076 18.3638L16.1716 12.9999H4V10.9999H16.1716Z\"></path></svg></button>\n        <button class=\"btn amber\" id=\"btn_followups\"><svg class=\"arr-2\" viewBox=\"0 0 24 24\" xmlns=\"http://www.w3.org/2000/svg\"><path d=\"M16.1716 10.9999L10.8076 5.63589L12.2218 4.22168L20 11.9999L12.2218 19.778L10.8076 18.3638L16.1716 12.9999H4V10.9999H16.1716Z\"></path></svg><span class=\"btn-text\">FOLLOW-UPS</span><span class=\"circle\"></span><svg class=\"arr-1\" viewBox=\"0 0 24 24\" xmlns=\"http://www.w3.org/2000/svg\"><path d=\"M16.1716 10.9999L10.8076 5.63589L12.2218 4.22168L20 11.9999L12.2218 19.778L10.8076 18.3638L16.1716 12.9999H4V10.9999H16.1716Z\"></path></svg></button>\n      </div>\n      <!-- Category 4: Data -->\n      <div class=\"btn-group\">\n        <div class=\"group-label\" id=\"grp_data\">Data</div>\n        <button class=\"btn purple\" id=\"database_btn\"><svg class=\"arr-2\" viewBox=\"0 0 24 24\" xmlns=\"http://www.w3.org/2000/svg\"><path d=\"M16.1716 10.9999L10.8076 5.63589L12.2218 4.22168L20 11.9999L12.2218 19.778L10.8076 18.3638L16.1716 12.9999H4V10.9999H16.1716Z\"></path></svg><span class=\"btn-text\">DATA BASE</span><span class=\"circle\"></span><svg class=\"arr-1\" viewBox=\"0 0 24 24\" xmlns=\"http://www.w3.org/2000/svg\"><path d=\"M16.1716 10.9999L10.8076 5.63589L12.2218 4.22168L20 11.9999L12.2218 19.778L10.8076 18.3638L16.1716 12.9999H4V10.9999H16.1716Z\"></path></svg></button>\n        <button class=\"btn red\" id=\"clients_btn\"><svg class=\"arr-2\" viewBox=\"0 0 24 24\" xmlns=\"http://www.w3.org/2000/svg\"><path d=\"M16.1716 10.9999L10.8076 5.63589L12.2218 4.22168L20 11.9999L12.2218 19.778L10.8076 18.3638L16.1716 12.9999H4V10.9999H16.1716Z\"></path></svg><span class=\"btn-text\">CLIENT LIST</span><span class=\"circle\"></span><svg class=\"arr-1\" viewBox=\"0 0 24 24\" xmlns=\"http://www.w3.org/2000/svg\"><path d=\"M16.1716 10.9999L10.8076 5.63589L12.2218 4.22168L20 11.9999L12.2218 19.778L10.8076 18.3638L16.1716 12.9999H4V10.9999H16.1716Z\"></path></svg></button>\n      </div>\n    </div>\n\n    <div id=\"totpLinkWrap\" style=\"text-align:center;margin-top:20px;padding-top:12px;border-top:1px solid #eee;\"><a href=\"javascript:void(0)\" id=\"launcherTotpLink\" onclick=\"window.launcherOpenTotpSetup && window.launcherOpenTotpSetup(); return false;\" style=\"display:inline-block;font-size:14px;color:#1976d2;text-decoration:underline;cursor:pointer;\"> Enable Authenticator App </a></div>\n\n    <div class=\"footer\">\n      <div id=\"footerText\">Designed & Developed by Helwan Plast</div>\n    </div>\n\n  </div>\n</div>\n\n<!-- MODAL -->\n<div class=\"hp-modal\" id=\"soonModal\">\n  <div class=\"hp-modal-box\">\n    <h3 id=\"modalTitle\">Coming Soon</h3>\n    <p id=\"modalText\">This section will be available in a future update.</p>\n    <button onclick=\"closeModal()\" id=\"modalBtn\">OK</button>\n  </div>\n</div>\n\n<!-- CONTRACTS CHOICE MODAL -->\n<div class=\"hp-modal\" id=\"contractsChoiceModal\">\n  <div class=\"hp-modal-box\">\n    <h3 id=\"contractChoiceTitle\">Contracts</h3>\n    <p id=\"contractChoiceText\">Choose an option</p>\n    <div style=\"display:flex;flex-direction:column;gap:10px;align-items:center;\">\n      <button type=\"button\" id=\"contractChoiceNew\">New contract</button>\n      <button type=\"button\" id=\"contractChoiceEdit\">Edit existing contract</button>\n    </div>\n  </div>\n</div>\n\n<!-- ADMIN ICON -->\n<div class=\"admin-btn\" id=\"adminBtn\" style=\"display:none;\">\n  <img src=\"_/theme/admin.png\" title=\"Admin Panel\">\n</div>\n\n<script>\n  (function() {\n    // ============================================\n    // LANGUAGE SYSTEM\n    // ============================================\n    var launcherLang = localStorage.getItem('hp_language') || 'en';\n\n    var launcherTranslations = {\n      en: {\n        launcherTitle: 'Welcome To Helwan Plast & Flexo CH – Calculator',\n        enter_btn: 'PRINTERS',\n        btn_film: 'FILM',\n        btn_cutting: 'CUTTING MACHINE',\n        btn_quotation: 'QUOTATION',\n        btn_contract: 'CONTRACT',\n        database_btn: 'DATA BASE',\n        clients_btn: 'CLIENT LIST',\n        btn_payments: 'PAYMENT TRACKING',\n        btn_followups: 'FOLLOW-UPS',\n        grp_machines: 'Machines',\n        grp_sales: 'Sales',\n        grp_finance: 'Finance',\n        grp_data: 'Data',\n        footerText: 'Designed & Developed by Helwan Plast',\n        modalTitle: 'Coming Soon',\n        modalText: 'This section will be available in a future update.',\n        modalBtn: 'OK',\n        contractChoiceTitle: 'Contracts',\n        contractChoiceText: 'Choose an option',\n        contractChoiceNew: 'New contract',\n        contractChoiceEdit: 'Edit existing contract'\n      },\n      ar: {\n        launcherTitle: 'مرحباً بكم في حلوان بلاست و فليكسو – الحاسبة',\n        enter_btn: 'طابعات',\n        btn_film: 'فيلم',\n        btn_cutting: 'ماكينة قطع',\n        btn_quotation: 'عرض سعر',\n        btn_contract: 'عقد',\n        database_btn: 'قاعدة البيانات',\n        clients_btn: 'قائمة العملاء',\n        btn_payments: 'تتبع المدفوعات',\n        btn_followups: 'المتابعات',\n        grp_machines: \"الماكينات\",\n        grp_sales: \"المبيعات\",\n        grp_finance: \"المالية\",\n        grp_data: \"البيانات\",\n        footerText: 'تصميم وتطوير حلوان بلاست',\n        modalTitle: 'قريباً',\n        modalText: 'هذا القسم سيكون متاحاً في تحديث قادم.',\n        modalBtn: 'حسناً',\n        contractChoiceTitle: 'العقود',\n        contractChoiceText: 'اختر إجراء',\n        contractChoiceNew: 'عقد جديد',\n        contractChoiceEdit: 'تعديل عقد قديم'\n      }\n    };\n\n    function tLauncher(key) {\n      return launcherTranslations[launcherLang][key] || launcherTranslations['en'][key] || key;\n    }\n\n    function applyLauncherTranslations() {\n      // Apply RTL/LTR\n      if (launcherLang === 'ar') {\n        document.body.classList.add('rtl');\n        document.documentElement.dir = 'rtl';\n      } else {\n        document.body.classList.remove('rtl');\n        document.documentElement.dir = 'ltr';\n      }\n\n      // Update text elements\n      var elements = ['launcherTitle', 'enter_btn', 'btn_film', 'btn_cutting', 'btn_quotation',\n        'btn_contract', 'database_btn', 'clients_btn', 'btn_payments', 'btn_followups', 'grp_machines', 'grp_sales', 'grp_finance', 'grp_data', 'footerText',\n        'modalTitle', 'modalText', 'modalBtn',\n        'contractChoiceTitle', 'contractChoiceText', 'contractChoiceNew', 'contractChoiceEdit'];\n\n      elements.forEach(function(id) {\n        var el = document.getElementById(id);\n        if (el) { var sp = el.querySelector('.btn-text'); if (sp) sp.textContent = tLauncher(id); else el.textContent = tLauncher(id); }\n      });\n\n      // Update radio button selection\n      document.getElementById('langAr').checked = (launcherLang === 'ar');\n      document.getElementById('langEn').checked = (launcherLang === 'en');\n\n      // Update active class\n      document.getElementById('langOptionAr').classList.toggle('active', launcherLang === 'ar');\n      document.getElementById('langOptionEn').classList.toggle('active', launcherLang === 'en');\n    }\n\n    window.selectLanguage = function(lang) {\n      launcherLang = lang;\n      localStorage.setItem('hp_language', launcherLang);\n      applyLauncherTranslations();\n    };\n\n    // Apply on load\n    setTimeout(applyLauncherTranslations, 100);\n\n    // ============================================\n    // EXISTING FUNCTIONALITY\n    // ============================================\n\n    // Check if user is admin and show admin button\n    var role = localStorage.getItem('user_role');\n    if (role === 'admin') {\n      document.getElementById('adminBtn').style.display = 'block';\n    }\n\n    // Admin button click handler\n    document.getElementById(\"adminBtn\").onclick = function() {\n      var role = localStorage.getItem('user_role');\n      if (role === 'admin') {\n        location.hash = '#admin';\n      } else {\n        if (window.showNotification) window.showNotification('error','','Admin access required');\n      }\n    };\n\n    document.getElementById(\"enter_btn\").onclick = function () {\n      const page = document.getElementById(\"launcherPage\");\n      page.classList.remove(\"show\");\n      page.classList.add(\"hide\");\n      setTimeout(function () {\n        location.hash = \"#calculator\";\n      }, 450);\n    };\n\n    // Film button - Coming Soon\n    document.getElementById(\"btn_film\").onclick = function () {\n      document.getElementById(\"soonModal\").style.display = \"flex\";\n    };\n\n    // Cutting Machine button - Coming Soon\n    document.getElementById(\"btn_cutting\").onclick = function () {\n      document.getElementById(\"soonModal\").style.display = \"flex\";\n    };\n\n    document.querySelectorAll(\".soon-btn\").forEach(function(btn) {\n      btn.onclick = function () {\n        document.getElementById(\"soonModal\").style.display = \"flex\";\n      };\n    });\n\n    window.closeModal = function() {\n      document.getElementById(\"soonModal\").style.display = \"none\";\n    };\n\n    // Database button\n    document.getElementById(\"database_btn\").onclick = function () {\n      const page = document.getElementById(\"launcherPage\");\n      page.classList.remove(\"show\");\n      page.classList.add(\"hide\");\n      setTimeout(function () {\n        location.hash = \"#database\";\n      }, 450);\n    };\n\n    // Clients button\n    document.getElementById(\"clients_btn\").onclick = function () {\n      const page = document.getElementById(\"launcherPage\");\n      page.classList.remove(\"show\");\n      page.classList.add(\"hide\");\n      setTimeout(function () {\n        location.hash = \"#clients\";\n      }, 450);\n    };\n\n    // Payments button\n    document.getElementById(\"btn_payments\").onclick = function () {\n      const page = document.getElementById(\"launcherPage\");\n      page.classList.remove(\"show\");\n      page.classList.add(\"hide\");\n      setTimeout(function () {\n        location.hash = \"#payment-dashboard\";\n      }, 450);\n    };\n\n    // Follow-ups button\n    document.getElementById(\"btn_followups\").onclick = function () {\n      const page = document.getElementById(\"launcherPage\");\n      page.classList.remove(\"show\");\n      page.classList.add(\"hide\");\n      setTimeout(function () {\n        location.hash = \"#follow-ups\";\n      }, 450);\n    };\n\n    // Quotation button\n    document.getElementById(\"btn_quotation\").onclick = function () {\n      const page = document.getElementById(\"launcherPage\");\n      page.classList.remove(\"show\");\n      page.classList.add(\"hide\");\n      setTimeout(function () {\n        location.hash = \"#quotation-print\";\n      }, 450);\n    };\n\n    // Contract button — show choice modal (new / edit)\n    document.getElementById(\"btn_contract\").onclick = function () {\n      document.getElementById(\"contractsChoiceModal\").style.display = \"flex\";\n    };\n    document.getElementById(\"contractChoiceNew\").onclick = function () {\n      document.getElementById(\"contractsChoiceModal\").style.display = \"none\";\n      location.hash = \"#contract-new\";\n    };\n    document.getElementById(\"contractChoiceEdit\").onclick = function () {\n      document.getElementById(\"contractsChoiceModal\").style.display = \"none\";\n      location.hash = \"#contract-edit\";\n    };\n\n    // TOTP / Authenticator link: open setup modal\n    window.launcherGetAuthToken = function() { try { var L = window.localStorage; var S = window.sessionStorage; if (L) { var t = L.getItem('auth_token'); if (t) return t; } if (S) { t = S.getItem('auth_token'); if (t) return t; } if (window.top && window.top !== window) { try { L = window.top.localStorage; S = window.top.sessionStorage; if (L) { t = L.getItem('auth_token'); if (t) return t; } if (S) { t = S.getItem('auth_token'); if (t) return t; } } catch(e) {} } } catch(e) {} return null; };\n    window.launcherOpenTotpSetup = function() {\n      if (typeof window.setupTotpStart !== \"function\") { if (window.showNotification) window.showNotification('error','','Please refresh the page.'); return; }\n      var _authTok = window.launcherGetAuthToken && window.launcherGetAuthToken();\n      if (!_authTok) { if (window.showNotification) window.showNotification('error','','يجب تسجيل الدخول أولاً. سيتم توجيهك لصفحة تسجيل الدخول. Please log in first.'); location.hash = \"#login\"; return; }\n      var p = window.setupTotpStart(_authTok);\n      if (!p || typeof p.then !== \"function\") { if (window.showNotification) window.showNotification('error','','Error. Refresh the page.'); return; }\n      p.then(function(r) {\n        if (!r || !r.success) { var msg = r && r.message ? r.message : \"Failed\"; if (msg === \"NO_TOKEN\") { if (window.showNotification) window.showNotification('error','','لم يتم العثور على الجلسة. حدّث الصفحة ثم سجّل الدخول مرة أخرى. Session not found.'); location.hash = \"#login\"; } else if (msg === \"SESSION_EXPIRED\" || msg.toLowerCase().indexOf(\"log in\") !== -1) { if (window.showNotification) window.showNotification('error','','انتهت الجلسة. سيتم توجيهك لصفحة تسجيل الدخول. Session expired.'); location.hash = \"#login\"; } else { if (window.showNotification) window.showNotification('error','',msg); } return; }\n        var m = document.getElementById(\"totpSetupModal\");\n        if (!m) {\n          m = document.createElement(\"div\");\n          m.id = \"totpSetupModal\";\n          m.style.cssText = \"position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:99999;\";\n          m.innerHTML = \"<div style=\\\"background:#fff;padding:24px;border-radius:12px;max-width:320px;text-align:center;\\\"><h4 style=\\\"margin:0 0 12px;\\\">Enable Authenticator</h4><p style=\\\"font-size:13px;color:#666;\\\">Scan QR with app</p><div id=\\\"totpQrContainer\\\"></div><p id=\\\"totpSecretText\\\" style=\\\"font-size:11px;word-break:break-all;\\\"></p><input type=\\\"text\\\" id=\\\"totpCodeInput\\\" placeholder=\\\"000000\\\" maxlength=\\\"6\\\" style=\\\"width:120px;padding:8px;margin:8px 0;\\\"><br><button id=\\\"totpConfirmBtn\\\" style=\\\"padding:8px 20px;background:#1976d2;color:#fff;border:none;border-radius:8px;cursor:pointer;\\\">Confirm</button> <button id=\\\"totpCancelBtn\\\" style=\\\"padding:8px 16px;background:#999;color:#fff;border:none;border-radius:8px;cursor:pointer;\\\">Cancel</button><p id=\\\"totpSetupMessage\\\"></p></div>\";\n          m.onclick = function(ev) { if (ev.target === m) m.style.display = \"none\"; };\n          document.body.appendChild(m);\n          document.getElementById(\"totpCancelBtn\").onclick = function() { m.style.display = \"none\"; };\n          document.getElementById(\"totpConfirmBtn\").onclick = function() {\n            var code = document.getElementById(\"totpCodeInput\").value.trim();\n            if (code.length !== 6) { document.getElementById(\"totpSetupMessage\").textContent = \"Enter 6 digits\"; return; }\n            var _tok = window.launcherGetAuthToken && window.launcherGetAuthToken();\n            var p2 = window.setupTotpConfirm && window.setupTotpConfirm(code, _tok);\n            if (p2 && typeof p2.then === \"function\") p2.then(function(res) {\n              var msg = document.getElementById(\"totpSetupMessage\");\n              msg.textContent = res && res.message ? res.message : \"\";\n              if (res && res.success) { msg.style.color = \"green\"; var w = document.getElementById(\"totpLinkWrap\"); if (w) w.style.display = \"none\"; setTimeout(function() { m.style.display = \"none\"; }, 1500); } else { msg.style.color = \"red\"; }\n            });\n          };\n        }\n        document.getElementById(\"totpQrContainer\").innerHTML = \"<img src=\\\"data:image/png;base64,\" + r.qr_base64 + \"\\\" alt=\\\"QR\\\" style=\\\"max-width:200px;\\\">\";\n        document.getElementById(\"totpSecretText\").textContent = \"Key: \" + (r.secret || \"\");\n        document.getElementById(\"totpCodeInput\").value = \"\";\n        document.getElementById(\"totpSetupMessage\").textContent = \"\";\n        m.style.display = \"flex\";\n      }).catch(function(err) { if (window.showNotification) window.showNotification('error','','Error: ' + (err && err.message ? err.message : err)); });\n    };\n    if (window.userHasTotpEnabled && typeof window.userHasTotpEnabled === \"function\") {\n      var _t = window.launcherGetAuthToken && window.launcherGetAuthToken();\n      window.userHasTotpEnabled(_t).then(function(hasTotp) { var w = document.getElementById(\"totpLinkWrap\"); if (w && hasTotp) w.style.display = \"none\"; }).catch(function() {});\n    }\n\n  })();\n</script>\n"
