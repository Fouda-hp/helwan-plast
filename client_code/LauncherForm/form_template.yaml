components: []
container:
  properties:
    html: |
      <style>
        /* ================= RESET ================= */
        * {
          box-sizing: border-box;
          font-family: Arial, Helvetica, sans-serif;
        }

        body {
          margin: 0;
          background: radial-gradient(circle at top, #eef3f9, #dfe7f2);
        }

        /* ================= ANIMATIONS ================= */
        @keyframes fadeUp {
          from { opacity: 0; transform: translateY(30px); }
          to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes logoIn {
          from { opacity: 0; transform: scale(0.9); }
          to   { opacity: 1; transform: scale(1); }
        }

        @keyframes buttonIn {
          from { opacity: 0; transform: translateY(20px); }
          to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
          0%   { box-shadow: 0 0 0 0 rgba(0,120,215,0.5); }
          70%  { box-shadow: 0 0 0 14px rgba(0,120,215,0); }
          100% { box-shadow: 0 0 0 0 rgba(0,120,215,0); }
        }

        /* ================= LAYOUT ================= */
        .launcher {
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 40px 20px;
        }

        .launcher-card {
          width: 100%;
          max-width: 1200px;
          background: #ffffff;
          border-radius: 20px;
          padding: 60px 80px 55px;
          box-shadow: 0 35px 80px rgba(0,0,0,0.2);
          text-align: center;
          animation: fadeUp 0.8s ease;
        }

        /* ================= TITLE ================= */
        .title {
          font-size: 28px;
          font-weight: bold;
          color: #0057a3;
          margin-bottom: 30px;
        }

        /* ================= LOGOS ================= */
        .logos {
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 60px;
        }

        .logos img {
          height: 90px;
          max-width: 220px;
          object-fit: contain;
          opacity: 0;
          animation: logoIn 0.8s ease forwards;
        }

        .logos img:first-child { animation-delay: 0.2s; }
        .logos img:last-child  { animation-delay: 0.4s; }

        /* ================= BUTTONS ================= */
        .buttons {
          max-width: 520px;
          margin: 0 auto;
          display: flex;
          flex-direction: column;
          gap: 14px;
        }

        .btn {
          height: 54px;
          font-size: 17px;
          font-weight: bold;
          border: none;
          color: #fff;
          cursor: pointer;
          border-radius: 6px;
          opacity: 1;
          animation: buttonIn 0.6s ease forwards;
          transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
        }

        .buttons .btn:nth-child(1) { animation-delay: 0.3s; }
        .buttons .btn:nth-child(2) { animation-delay: 0.45s; }
        .buttons .btn:nth-child(3) { animation-delay: 0.6s; }
        .buttons .btn:nth-child(4) { animation-delay: 0.75s; }
        .buttons .btn:nth-child(5) { animation-delay: 0.9s; }

        .btn:hover {
          transform: translateY(-2px);
          box-shadow: 0 10px 25px rgba(0,0,0,0.25);
          filter: brightness(1.05);
        }

        .btn:active {
          transform: translateY(0);
          box-shadow: 0 5px 12px rgba(0,0,0,0.2);
        }

        /* Colors */
        .blue   { background: #0078d7; animation: pulse 2.5s infinite; }
        .green  { background: #00b050; }
        .orange { background: #ed7d31; }
        .purple { background: #7030a0; }
        .red    { background: #c00000; }

        /* ================= FOOTER ================= */
        .footer {
          margin-top: 35px;
          font-size: 12px;
          color: #777;
          display: flex;
          justify-content: space-between;
        }

        /* ================= MODAL ================= */
        .modal {
          position: fixed;
          inset: 0;
          background: rgba(0,0,0,0.45);
          display: none;
          align-items: center;
          justify-content: center;
          z-index: 9999;
        }

        .modal-box {
          background: #fff;
          padding: 25px 30px;
          border-radius: 10px;
          text-align: center;
          animation: fadeUp 0.4s ease;
        }

        .modal-box h3 {
          margin: 0 0 10px;
          color: #0057a3;
        }

        .modal-box button {
          margin-top: 15px;
          padding: 8px 22px;
          border: none;
          background: #0078d7;
          color: #fff;
          font-weight: bold;
          cursor: pointer;
        }

        /* ================= ADMIN ICON ================= */
        .admin-btn {
          position: fixed;
          bottom: 16px;
          right: 20px;
          cursor: pointer;
        }

        .admin-btn img {
          width: 28px;
        }

        /* ================= LANGUAGE SWITCHER ================= */
        .launcher-lang-btn {
          position: fixed;
          top: 20px;
          right: 20px;
          display: flex;
          align-items: center;
          gap: 8px;
          padding: 10px 18px;
          background: rgba(0,87,163,0.9);
          border: none;
          border-radius: 10px;
          color: #fff;
          cursor: pointer;
          font-size: 14px;
          font-weight: 500;
          transition: all 0.3s ease;
          z-index: 100;
        }

        .launcher-lang-btn:hover {
          background: rgba(0,87,163,1);
          transform: translateY(-2px);
        }

        /* ================= RTL SUPPORT ================= */
        body.rtl .launcher-lang-btn {
          right: auto;
          left: 20px;
        }

        body.rtl .admin-btn {
          right: auto;
          left: 20px;
        }

        body.rtl .launcher-card {
          direction: rtl;
        }

        body.rtl .footer {
          flex-direction: row-reverse;
        }

        /* ================= PAGE TRANSITIONS ================= */
        .page {
          opacity: 0;
          transform: translateY(20px);
          transition: opacity 0.45s ease, transform 0.45s ease;
        }

        .page.show {
          opacity: 1;
          transform: translateY(0);
        }

        .page.hide {
          opacity: 0;
          transform: translateY(-20px);
        }

        /* ================= MOBILE ================= */
        @media (max-width: 700px) {

          .launcher-card {
            padding: 30px 22px;
          }

          .title {
            font-size: 20px;
          }

          .logos {
            flex-direction: column;
            gap: 14px;
          }

          .logos img {
            height: 70px;
          }

          .footer {
            flex-direction: column;
            gap: 6px;
            text-align: center;
          }
        }
      </style>

      <!-- Language Switcher -->
      <button class="launcher-lang-btn" id="launcherLangBtn" onclick="toggleLauncherLanguage()">
        <span>🌐</span>
        <span id="launcherLangText">العربية</span>
      </button>

      <div class="launcher page show" anvil-slot="default" id="launcherPage">

        <div class="launcher-card">

          <div class="title" id="launcherTitle">
            Welcome To Helwan Plast & Flexo CH – Calculator
          </div>

          <div class="logos">
            <img src="_/theme/helwan_logo.png">
            <img src="_/theme/flexo_logo.png">
          </div>

          <div class="buttons">
            <button class="btn blue" id="enter_btn">ENTER DATA</button>
            <button class="btn green soon-btn" id="btn_quotation">QUOTATION</button>
            <button class="btn orange soon-btn" id="btn_contract">CONTRACT</button>
            <button class="btn purple" id="database_btn">DATA BASE</button>
            <button class="btn red" id="clients_btn">CLIENT LIST</button>
          </div>

          <div class="footer">
            <div id="footerText">Designed & Developed by Helwan Plast</div>
          </div>

        </div>
      </div>

      <!-- MODAL -->
      <div class="modal" id="soonModal">
        <div class="modal-box">
          <h3 id="modalTitle">Coming Soon</h3>
          <p id="modalText">This section will be available in a future update.</p>
          <button onclick="closeModal()" id="modalBtn">OK</button>
        </div>
      </div>

      <!-- ADMIN ICON -->
      <div class="admin-btn" id="adminBtn" style="display:none;">
        <img src="_/theme/admin.png" title="Admin Panel">
      </div>

      <script>
        (function() {
          // ============================================
          // LANGUAGE SYSTEM
          // ============================================
          var launcherLang = localStorage.getItem('hp_language') || 'en';

          var launcherTranslations = {
            en: {
              launcherTitle: 'Welcome To Helwan Plast & Flexo CH – Calculator',
              launcherLangText: 'العربية',
              enter_btn: 'ENTER DATA',
              btn_quotation: 'QUOTATION',
              btn_contract: 'CONTRACT',
              database_btn: 'DATA BASE',
              clients_btn: 'CLIENT LIST',
              footerText: 'Designed & Developed by Helwan Plast',
              modalTitle: 'Coming Soon',
              modalText: 'This section will be available in a future update.',
              modalBtn: 'OK'
            },
            ar: {
              launcherTitle: 'مرحباً بكم في حلوان بلاست و فليكسو – الحاسبة',
              launcherLangText: 'English',
              enter_btn: 'إدخال البيانات',
              btn_quotation: 'عرض سعر',
              btn_contract: 'عقد',
              database_btn: 'قاعدة البيانات',
              clients_btn: 'قائمة العملاء',
              footerText: 'تصميم وتطوير حلوان بلاست',
              modalTitle: 'قريباً',
              modalText: 'هذا القسم سيكون متاحاً في تحديث قادم.',
              modalBtn: 'حسناً'
            }
          };

          function tLauncher(key) {
            return launcherTranslations[launcherLang][key] || launcherTranslations['en'][key] || key;
          }

          function applyLauncherTranslations() {
            // Apply RTL/LTR
            if (launcherLang === 'ar') {
              document.body.classList.add('rtl');
              document.documentElement.dir = 'rtl';
            } else {
              document.body.classList.remove('rtl');
              document.documentElement.dir = 'ltr';
            }

            // Update text elements
            var elements = ['launcherTitle', 'launcherLangText', 'enter_btn', 'btn_quotation',
              'btn_contract', 'database_btn', 'clients_btn', 'footerText',
              'modalTitle', 'modalText', 'modalBtn'];

            elements.forEach(function(id) {
              var el = document.getElementById(id);
              if (el) el.textContent = tLauncher(id);
            });
          }

          window.toggleLauncherLanguage = function() {
            launcherLang = launcherLang === 'en' ? 'ar' : 'en';
            localStorage.setItem('hp_language', launcherLang);
            applyLauncherTranslations();
          };

          // Apply on load
          setTimeout(applyLauncherTranslations, 100);

          // ============================================
          // EXISTING FUNCTIONALITY
          // ============================================

          // Check if user is admin and show admin button
          var role = sessionStorage.getItem('user_role');
          if (role === 'admin') {
            document.getElementById('adminBtn').style.display = 'block';
          }

          // Admin button click handler
          document.getElementById("adminBtn").onclick = function() {
            var role = sessionStorage.getItem('user_role');
            if (role === 'admin') {
              location.hash = '#admin';
            } else {
              alert('Admin access required');
            }
          };

          document.getElementById("enter_btn").onclick = function () {
            const page = document.getElementById("launcherPage");
            page.classList.remove("show");
            page.classList.add("hide");
            setTimeout(function () {
              location.hash = "#calculator";
            }, 450);
          };

          document.querySelectorAll(".soon-btn").forEach(function(btn) {
            btn.onclick = function () {
              document.getElementById("soonModal").style.display = "flex";
            };
          });

          window.closeModal = function() {
            document.getElementById("soonModal").style.display = "none";
          };

          // Database button
          document.getElementById("database_btn").onclick = function () {
            const page = document.getElementById("launcherPage");
            page.classList.remove("show");
            page.classList.add("hide");
            setTimeout(function () {
              location.hash = "#database";
            }, 450);
          };

          // Clients button
          document.getElementById("clients_btn").onclick = function () {
            const page = document.getElementById("launcherPage");
            page.classList.remove("show");
            page.classList.add("hide");
            setTimeout(function () {
              location.hash = "#clients";
            }, 450);
          };

        })();
      </script>
  type: HtmlTemplate
is_package: true
