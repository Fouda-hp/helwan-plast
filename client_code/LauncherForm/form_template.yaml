container:
  properties:
    html: "<style>\n  /* ================= RESET ================= */\n  * {\n    box-sizing: border-box;\n    font-family: Arial, Helvetica, sans-serif;\n  }\n\n  body {\n    margin: 0;\n    background: radial-gradient(circle at top, #eef3f9, #dfe7f2);\n  }\n\n  /* ================= ANIMATIONS ================= */\n  @keyframes fadeUp {\n    from { opacity: 0; transform: translateY(30px); }\n    to   { opacity: 1; transform: translateY(0); }\n  }\n\n  @keyframes logoIn {\n    from { opacity: 0; transform: scale(0.9); }\n    to   { opacity: 1; transform: scale(1); }\n  }\n\n  @keyframes buttonIn {\n    from { opacity: 0; transform: translateY(20px); }\n    to   { opacity: 1; transform: translateY(0); }\n  }\n\n  @keyframes pulse {\n    0%   { box-shadow: 0 0 0 0 rgba(0,120,215,0.5); }\n    70%  { box-shadow: 0 0 0 14px rgba(0,120,215,0); }\n    100% { box-shadow: 0 0 0 0 rgba(0,120,215,0); }\n  }\n\n  /* ================= LAYOUT ================= */\n  .launcher {\n    min-height: 100vh;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    padding: 40px 20px;\n  }\n\n  .launcher-card {\n    width: 100%;\n    max-width: 1200px;\n    background: #ffffff;\n    border-radius: 20px;\n    padding: 60px 80px 55px;\n    box-shadow: 0 35px 80px rgba(0,0,0,0.2);\n    text-align: center;\n    animation: fadeUp 0.8s ease;\n  }\n\n  /* ================= TITLE ================= */\n  .title {\n    font-size: 28px;\n    font-weight: bold;\n    color: #0057a3;\n    margin-bottom: 30px;\n  }\n\n  /* ================= LOGOS ================= */\n  .logos {\n    display: flex;\n    justify-content: space-between;\n    align-items: center;\n    margin-bottom: 60px;\n  }\n\n  .logos img {\n    height: 90px;\n    max-width: 220px;\n    object-fit: contain;\n    opacity: 0;\n    animation: logoIn 0.8s ease forwards;\n  }\n\n  .logos img:first-child { animation-delay: 0.2s; }\n  .logos img:last-child  { animation-delay: 0.4s; }\n\n  /* ================= BUTTONS ================= */\n  .buttons {\n    max-width: 520px;\n    margin: 0 auto;\n    display: flex;\n    flex-direction: column;\n    gap: 14px;\n  }\n\n  .btn {\n    height: 54px;\n    font-size: 17px;\n    font-weight: bold;\n    border: none;\n    color: #fff;\n    cursor: pointer;\n    border-radius: 6px;\n    opacity: 1;\n    animation: buttonIn 0.6s ease forwards;\n    transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;\n  }\n\n  .buttons .btn:nth-child(1) { animation-delay: 0.3s; }\n  .buttons .btn:nth-child(2) { animation-delay: 0.45s; }\n  .buttons .btn:nth-child(3) { animation-delay: 0.6s; }\n  .buttons .btn:nth-child(4) { animation-delay: 0.75s; }\n  .buttons .btn:nth-child(5) { animation-delay: 0.9s; }\n\n  .btn:hover {\n    transform: translateY(-2px);\n    box-shadow: 0 10px 25px rgba(0,0,0,0.25);\n    filter: brightness(1.05);\n  }\n\n  .btn:active {\n    transform: translateY(0);\n    box-shadow: 0 5px 12px rgba(0,0,0,0.2);\n  }\n\n  /* Colors */\n  .blue   { background: #0078d7; animation: pulse 2.5s infinite; }\n  .green  { background: #00b050; }\n  .orange { background: #ed7d31; }\n  .purple { background: #7030a0; }\n  .red    { background: #c00000; }\n\n  /* ================= FOOTER ================= */\n  .footer {\n    margin-top: 35px;\n    font-size: 12px;\n    color: #777;\n    display: flex;\n    justify-content: space-between;\n  }\n\n  /* ================= MODAL ================= */\n  .modal {\n    position: fixed;\n    inset: 0;\n    background: rgba(0,0,0,0.45);\n    display: none;\n    align-items: center;\n    justify-content: center;\n    z-index: 9999;\n  }\n\n  .modal-box {\n    background: #fff;\n    padding: 25px 30px;\n    border-radius: 10px;\n    text-align: center;\n    animation: fadeUp 0.4s ease;\n  }\n\n  .modal-box h3 {\n    margin: 0 0 10px;\n    color: #0057a3;\n  }\n\n  .modal-box button {\n    margin-top: 15px;\n    padding: 8px 22px;\n    border: none;\n    background: #0078d7;\n    color: #fff;\n    font-weight: bold;\n    cursor: pointer;\n  }\n\n  /* ================= ADMIN ICON ================= */\n  .admin-btn {\n    position: fixed;\n    bottom: 16px;\n    right: 20px;\n    cursor: pointer;\n  }\n\n  .admin-btn img {\n    width: 28px;\n  }\n\n  /* ================= MOBILE ================= */\n  @media (max-width: 700px) {\n\n    .launcher-card {\n      padding: 30px 22px;\n    }\n\n    .title {\n      font-size: 20px;\n    }\n\n    .logos {\n      flex-direction: column;\n      gap: 14px;\n    }\n\n    .logos img {\n      height: 70px;\n    }\n\n    .footer {\n      flex-direction: column;\n      gap: 6px;\n      text-align: center;\n    }\n    /* ================= PAGE TRANSITIONS ================= */\n    .page {\n      opacity: 0;\n      transform: translateY(20px);\n      transition: opacity 0.45s ease, transform 0.45s ease;\n    }\n\n    .page.show {\n      opacity: 1;\n      transform: translateY(0);\n    }\n\n    .page.hide {\n      opacity: 0;\n      transform: translateY(-20px);\n    }\n\n  }\n</style>\n\n<div class=\"launcher page show\" anvil-slot=\"default\" id=\"launcherPage\">\n\n  <div class=\"launcher-card\">\n\n    <div class=\"title\">\n      Welcome To Helwan Plast & Flexo CH – Calculator\n    </div>\n\n    <div class=\"logos\">\n      <img src=\"_/theme/helwan_logo.png\">\n      <img src=\"_/theme/flexo_logo.png\">\n    </div>\n\n    <div class=\"buttons\">\n  <button class=\"btn blue\" id=\"enter_btn\">ENTER DATA</button>\n      <button class=\"btn green soon-btn\">QUOTATION</button>\n      <button class=\"btn orange soon-btn\">CONTRACT</button>\n      <button class=\"btn purple\" id=\"database_btn\">DATA BASE</button>\n      <button class=\"btn red\" id=\"clients_btn\">CLIENT LIST</button>\n    </div>\n\n    <div class=\"footer\">\n      <div>Designed & Developed by Helwan Plast</div>\n\n    </div>\n\n  </div>\n</div>\n\n<!-- MODAL -->\n<div class=\"modal\" id=\"soonModal\">\n  <div class=\"modal-box\">\n    <h3>Coming Soon</h3>\n    <p>This section will be available in a future update.</p>\n    <button onclick=\"closeModal()\">OK</button>\n  </div>\n</div>\n\n<!-- ADMIN ICON -->\n<div class=\"admin-btn\" id=\"adminBtn\" style=\"display:none;\">\n  <img src=\"_/theme/admin.png\" title=\"Admin Panel\">\n</div>\n\n<script>\n  // Check if user is admin and show admin button\n  (function() {\n    var role = sessionStorage.getItem('user_role');\n    if (role === 'admin') {\n      document.getElementById('adminBtn').style.display = 'block';\n    }\n  })();\n\n  // Admin button click handler\n  document.getElementById(\"adminBtn\").onclick = function() {\n    var role = sessionStorage.getItem('user_role');\n    if (role === 'admin') {\n      location.hash = '#admin';\n    } else {\n      alert('Admin access required');\n    }\n  };\n\n  document.getElementById(\"enter_btn\").onclick = function () {\n\n    const page = document.getElementById(\"launcherPage\");\n\n    // Fade out\n    page.classList.remove(\"show\");\n    page.classList.add(\"hide\");\n\n    // Change route بعد الأنيميشن\n    setTimeout(function () {\n      location.hash = \"#calculator\";\n    }, 450);\n\n  };\n\n\n  document.querySelectorAll(\".soon-btn\").forEach(btn => {\n    btn.onclick = function () {\n      document.getElementById(\"soonModal\").style.display = \"flex\";\n    };\n  });\n\n  function closeModal() {\n    document.getElementById(\"soonModal\").style.display = \"none\";\n  }\n\n  // Database button - فتح صفحة قاعدة البيانات\n  document.getElementById(\"database_btn\").onclick = function () {\n    const page = document.getElementById(\"launcherPage\");\n    page.classList.remove(\"show\");\n    page.classList.add(\"hide\");\n    setTimeout(function () {\n      location.hash = \"#database\";\n    }, 450);\n  };\n\n  // Clients button - فتح قائمة العملاء\n  document.getElementById(\"clients_btn\").onclick = function () {\n    const page = document.getElementById(\"launcherPage\");\n    page.classList.remove(\"show\");\n    page.classList.add(\"hide\");\n    setTimeout(function () {\n      location.hash = \"#clients\";\n    }, 450);\n  };\n  \n</script>\n"
  type: HtmlTemplate
is_package: true
