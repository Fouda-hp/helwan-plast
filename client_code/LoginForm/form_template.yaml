              var secretKey = resetSecretKey.value;

              if (!email || !newPassword || !secretKey) {
                showMessage('resetMessage', 'error', t('errorFillAllFields'));
                return;
              }

              if (newPassword.length < 6) {
                showMessage('resetMessage', 'error', t('errorPasswordMin6'));
                return;
              }

              setLoading(resetBtn, true, t('loadingResetting'));

              try {
                var result = await window.resetAdminPassword(email, newPassword, secretKey);

                if (result.success) {
                  showMessage('resetMessage', 'success', result.message);

                  setTimeout(function() {
                    resetForm.classList.remove('active');
                    loginForm.classList.add('active');
                    document.querySelector('.auth-tabs').style.display = 'flex';
                    loginEmail.value = email;
                  }, 2000);

                } else {
                  showMessage('resetMessage', 'error', result.message);
                }

              } catch (e) {
                console.error('Reset password error:', e);
                var errorMsg = e.message || e.toString() || t('errorConnection');
                showMessage('resetMessage', 'error', 'Error: ' + errorMsg);
              }

              setLoading(resetBtn, false);
            };
          }

        })();
      </script>
