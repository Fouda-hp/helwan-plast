container:
  properties:
    html: |
      <style>
        * {
          box-sizing: border-box;
          font-family: Arial, Helvetica, sans-serif;
        }

        body {
          margin: 0;
          background: radial-gradient(circle at top, #eef3f9, #dfe7f2);
        }

        /* ================= WRAPPER ================= */
        .login-wrapper {
          min-height: 100vh;
          width: 100%;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 30px;
        }

        /* ================= BOX ================= */
        .login-box {
          width: 100%;
          max-width: 540px;              /* ⬅️ أكبر على الكمبيوتر */
          background: #ffffff;
          border-radius: 16px;
          padding: 55px 60px 50px;
          box-shadow:
            0 25px 60px rgba(0,0,0,0.18),
            0 0 0 1px rgba(0,0,0,0.03);
          animation: cardIn 0.9s cubic-bezier(.2,.8,.2,1);
        }

        @keyframes cardIn {
          from {
            opacity: 0;
            transform: translateY(30px) scale(0.96);
          }
          to {
            opacity: 1;
            transform: translateY(0) scale(1);
          }
        }

        /* ================= LOGO ================= */
        .logo {
          text-align: center;
          margin-bottom: 35px;
          animation: logoDrop 0.8s ease-out 0.3s both;
        }

        @keyframes logoDrop {
          from { opacity: 0; transform: translateY(-15px); }
          to   { opacity: 1; transform: translateY(0); }
        }

        .logo img {
          height: 110px;                 /* ⬅️ أكبر */
          margin-bottom: 14px;
        }

        .logo h2 {
          margin: 0;
          color: #0057a3;
          font-size: 28px;
          letter-spacing: 0.5px;
        }

        .logo p {
          margin: 8px 0 0;
          font-size: 15px;
          color: #666;
        }

        /* ================= FIELDS ================= */
        .field {
          margin-top: 26px;
          animation: fieldIn 0.6s ease both;
        }

        .field:nth-of-type(1) { animation-delay: 0.45s; }
        .field:nth-of-type(2) { animation-delay: 0.6s; }

        @keyframes fieldIn {
          from { opacity: 0; transform: translateY(10px); }
          to   { opacity: 1; transform: translateY(0); }
        }

        .field label {
          display: block;
          font-size: 15px;
          margin-bottom: 6px;
          color: #333;
          font-weight: bold;
        }

        .field input {
          width: 100%;
          height: 50px;                 /* ⬅️ أطول */
          padding: 0 14px;
          border: 1px solid #cfd6e0;
          border-radius: 8px;
          font-size: 16px;
          transition: border 0.2s ease, box-shadow 0.2s ease;
        }

        .field input:focus {
          outline: none;
          border-color: #0078d7;
          box-shadow: 0 0 0 3px rgba(0,120,215,0.18);
        }

        /* ================= BUTTON ================= */
        .login-btn {
          margin-top: 36px;
          width: 100%;
          height: 56px;                 /* ⬅️ أكبر */
          border: none;
          border-radius: 8px;
          background: linear-gradient(135deg, #0078d7, #005fa3);
          color: #fff;
          font-size: 18px;
          font-weight: bold;
          cursor: pointer;
          animation: buttonIn 0.6s ease 0.8s both;
          transition:
            transform 0.15s ease,
            box-shadow 0.15s ease,
            filter 0.15s ease;
        }

        @keyframes buttonIn {
          from { opacity: 0; transform: translateY(15px); }
          to   { opacity: 1; transform: translateY(0); }
        }

        .login-btn:hover {
          transform: translateY(-2px);
          box-shadow: 0 10px 25px rgba(0,0,0,0.25);
          filter: brightness(1.05);
        }

        .login-btn:active {
          transform: translateY(0);
          box-shadow: 0 5px 12px rgba(0,0,0,0.2);
        }

        /* ================= ERROR ================= */
        .error {
          margin-top: 22px;
          background: #fdecea;
          color: #b00020;
          font-size: 14px;
          padding: 12px;
          border-radius: 6px;
          display: none;
          text-align: center;
          animation: shake 0.4s ease;
        }

        @keyframes shake {
          0% { transform: translateX(0); }
          25% { transform: translateX(-5px); }
          50% { transform: translateX(5px); }
          75% { transform: translateX(-4px); }
          100% { transform: translateX(0); }
        }

        /* ================= FOOTER ================= */
        .footer {
          margin-top: 28px;
          font-size: 12px;
          color: #777;
          text-align: center;
          animation: fadeIn 0.6s ease 1s both;
        }

        @keyframes fadeIn {
          from { opacity: 0; }
          to   { opacity: 1; }
        }

        /* ================= MOBILE ================= */
        @media (max-width: 600px) {

          .login-wrapper {
            padding: 0;
          }

          .login-box {
            min-height: 100vh;
            border-radius: 0;
            padding: 40px 26px;
            max-width: none;
            box-shadow: none;
          }

          .logo img {
            height: 90px;
          }

          .logo h2 {
            font-size: 24px;
          }

          .field input {
            height: 48px;
            font-size: 16px;
          }

          .login-btn {
            height: 52px;
            font-size: 17px;
          }
          /* ================= LOADING ================= */
          .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
          }

          .loader-box {
            text-align: center;
            animation: fadeIn 0.3s ease;
          }

          .spinner {
            width: 52px;
            height: 52px;
            border: 4px solid #cfd6e0;
            border-top: 4px solid #0078d7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 14px;
          }

          .loading-text {
            font-size: 15px;
            font-weight: bold;
            color: #0057a3;
            letter-spacing: 0.4px;
          }

          @keyframes spin {
            to { transform: rotate(360deg); }
          }

        }
      </style>

      <div class="login-wrapper" anvil-slot="default">
        <div class="login-box">

          <div class="logo">
            <img src="_/theme/helwan_logo.png">
            <h2>Helwan Plast</h2>
            <p>Secure Login</p>
          </div>

          <div class="field">
            <label>Username</label>
            <input type="text" id="username">
          </div>

          <div class="field">
            <label>Password</label>
            <input type="password" id="password">
          </div>

          <button class="login-btn" id="loginBtn">LOGIN</button>

          <div class="error" id="errorBox"></div>

          <div class="footer">
            © Helwan Plast
          </div>
          <!-- LOADING OVERLAY -->
          <div class="loading-overlay" id="loading">
            <div class="loader-box">
              <div class="spinner"></div>
            </div>
          </div>

        </div>

      <script>
        (function () {

          var USERS = ["admin", "ahmed", "barsoum"];
          var PASSWORD = "1234";
          var attempts = 0;
          var maxAttempts = 3;

          var userInput = document.getElementById("username");
          var passInput = document.getElementById("password");
          var errorBox  = document.getElementById("errorBox");
          var loginBtn  = document.getElementById("loginBtn");

          loginBtn.onclick = function () {
            var user = userInput.value.trim().toLowerCase();
            var pass = passInput.value;

            if (!user || !pass) {
              showError("Please enter username and password");
              return;
            }

            if (USERS.indexOf(user) === -1 || pass !== PASSWORD) {
              attempts++;
              if (attempts >= maxAttempts) {
                showError("Maximum login attempts reached");
                loginBtn.disabled = true;
              } else {
                showError("Invalid username or password (" + (maxAttempts - attempts) + " attempts left)");
              }
              return;
            }

            showLoading();

            setTimeout(function () {
              location.hash = "#launcher";
            }, 600);

          };
          var loading = document.getElementById("loading");

          function showLoading() {
            loading.style.display = "flex";
          }

          function showError(msg) {
            errorBox.style.display = "block";
            errorBox.textContent = msg;
          }

        })();
      </script>
  type: HtmlTemplate
is_package: true
