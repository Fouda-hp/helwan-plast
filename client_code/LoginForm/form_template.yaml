          function t(key) {
            return translations[currentLang][key] || translations['en'][key] || key;
          }

          function applyTranslations() {
            // Apply RTL/LTR
            if (currentLang === 'ar') {
              document.body.classList.add('rtl');
              document.documentElement.dir = 'rtl';
            } else {
              document.body.classList.remove('rtl');
              document.documentElement.dir = 'ltr';
            }

            // Update text elements
            var elements = ['logoTitle', 'logoSubtitle', 'tabLogin', 'tabRegister',
              'lblLoginEmail', 'lblLoginPassword', 'btnLoginText', 'forgotPasswordLink',
              'setupAdminLink',
              'lblRegName', 'lblRegEmail', 'lblRegPhone', 'lblRegPassword',
              'lblRegConfirm', 'btnRegisterText', 'langBtnText',
              'otpLoginTitle', 'otpLoginSubtitle', 'lblOtpLoginCode', 'btnVerifyOtpLogin',
              'resendOtpLogin', 'backFromOtpLogin',
              'otpRegTitle', 'otpRegSubtitle', 'lblOtpRegCode', 'btnVerifyOtpReg',
              'resendOtpReg', 'backFromOtpReg',
              'forgotTitle', 'forgotSubtitle', 'lblForgotEmail', 'btnSendResetCode',
              'backFromForgot',
              'forgotOtpTitle', 'forgotOtpSubtitle', 'lblForgotOtp', 'btnVerifyForgotOtp',
              'resendForgotOtp', 'backFromForgotOtp',
              'newPasswordTitle', 'newPasswordSubtitle', 'lblNewPassword',
              'lblConfirmNewPassword', 'btnSetNewPassword', 'backFromNewPassword',
              'backToLogin', 'backFromReset'];

            elements.forEach(function(id) {
              var el = document.getElementById(id);
              if (el) el.textContent = t(id);
            });

            // Update placeholders
            var placeholders = {
              loginEmail: 'loginEmailPlaceholder',
              loginPassword: 'loginPasswordPlaceholder',
              regName: 'regNamePlaceholder',
              regEmail: 'regEmailPlaceholder',
              regPhone: 'regPhonePlaceholder',
              regPassword: 'regPasswordPlaceholder',
              regConfirm: 'regConfirmPlaceholder',
              newPassword: 'newPasswordPlaceholder',
              confirmNewPassword: 'confirmNewPasswordPlaceholder',
              forgotEmail: 'forgotEmailPlaceholder',
              adminName: 'setupAdminNamePlaceholder',
              adminEmail: 'setupAdminEmailPlaceholder',
              adminPhone: 'setupAdminPhonePlaceholder',
              adminPassword: 'setupAdminPasswordPlaceholder',
              resetEmail: 'resetAdminEmailPlaceholder',
              resetNewPassword: 'resetNewPasswordPlaceholder',
              resetSecretKey: 'resetSecretKeyPlaceholder'
            };
            Object.keys(placeholders).forEach(function(id) {
              var el = document.getElementById(id);
              if (el) el.placeholder = t(placeholders[id]);
            });

            // Update setup admin form labels
            var setupLabels = document.querySelectorAll('#setupForm .field label');
            var setupKeys = ['setupAdminName', 'setupAdminEmail', 'setupAdminPhone', 'setupAdminPassword'];
            setupLabels.forEach(function(lbl, i) {
              if (setupKeys[i]) lbl.textContent = t(setupKeys[i]);
            });

            // Update setup admin button
            var setupBtnText = document.querySelector('#setupBtn .btn-text');
            if (setupBtnText) setupBtnText.textContent = t('btnSetupAdmin');

            // Update emergency reset form labels
            var resetLabels = document.querySelectorAll('#resetForm .field label');
            var resetKeys = ['resetAdminEmail', 'resetNewPassword', 'resetSecretKey'];
            resetLabels.forEach(function(lbl, i) {
              if (resetKeys[i]) lbl.textContent = t(resetKeys[i]);
            });

            // Update emergency reset button
            var resetBtnText = document.querySelector('#resetBtn .btn-text');
            if (resetBtnText) resetBtnText.textContent = t('btnResetPassword');

            // Update emergency warning
            var warningDiv = document.querySelector('#resetForm div[style*=\'fff3cd\']');
            if (warningDiv) warningDiv.innerHTML = '\u26a0\ufe0f ' + t('emergencyWarning');

            // Update footer
            var footer = document.querySelector('.footer');
            if (footer) footer.textContent = t('footer');

            // Update lang flag
            var flag = document.getElementById('loginLangFlag');
            if (flag) flag.textContent = currentLang === 'ar' ? '\ud83c\uddec\ud83c\udde7' : '\ud83c\uddf8\ud83c\udde6';
          }

          window.toggleLanguage = function() {
            currentLang = currentLang === 'en' ? 'ar' : 'en';
            localStorage.setItem('hp_language', currentLang);
            applyTranslations();
          };

          // Apply on load
          setTimeout(applyTranslations, 100);

          // ============================================
          // CHECK IF ADMIN EXISTS (Hide setup link if admin exists)
          // ============================================
          async function checkAndHideSetupLink() {
            // Wait for bridge function
            if (!window.checkAdminExists) {
              setTimeout(checkAndHideSetupLink, 300);
              return;
            }

            try {
              var result = await window.checkAdminExists();
              if (result && result.exists) {
                // Hide setup admin link
                var setupLink = document.getElementById('setupLink');
                if (setupLink) setupLink.style.display = 'none';
              }
            } catch (e) {
              console.log('Error checking admin:', e);
              // Hide for safety
              var setupLink = document.getElementById('setupLink');
              if (setupLink) setupLink.style.display = 'none';
            }
          }

          // Run check after a short delay
          setTimeout(checkAndHideSetupLink, 500);

          // ============================================
          // TAB SWITCHING
          // ============================================
          var tabs = document.querySelectorAll('.auth-tab');
          var loginForm = document.getElementById('loginForm');
          var registerForm = document.getElementById('registerForm');
          var setupForm = document.getElementById('setupForm');

          tabs.forEach(function(tab) {
            tab.onclick = function() {
              tabs.forEach(function(t) { t.classList.remove('active'); });
              tab.classList.add('active');

              loginForm.classList.remove('active');
              registerForm.classList.remove('active');
              setupForm.classList.remove('active');

              if (tab.dataset.tab === 'login') {
                loginForm.classList.add('active');
              } else {
                registerForm.classList.add('active');
              }

              clearMessages();
            };
          });

          // Setup admin link
          var setupAdminLink = document.getElementById('setupAdminLink');
          if (setupAdminLink) {
            setupAdminLink.onclick = function() {
              loginForm.classList.remove('active');
              registerForm.classList.remove('active');
              setupForm.classList.add('active');
              document.querySelector('.auth-tabs').style.display = 'none';
            };
          }

          var backToLogin = document.getElementById('backToLogin');
          if (backToLogin) {
            backToLogin.onclick = function() {
              setupForm.classList.remove('active');
              loginForm.classList.add('active');
              document.querySelector('.auth-tabs').style.display = 'flex';
            };
          }

          // ============================================
          // MESSAGE HELPERS
          // ============================================
          function showMessage(id, type, text, isHtml) {
            var el = document.getElementById(id);
            if (!el) return;
            el.className = 'message ' + type + ' show';
            if (isHtml) {
              el.innerHTML = text;
            } else {
              el.textContent = text;
            }
          }

          function clearMessages() {
            document.querySelectorAll('.message').forEach(function(m) {
              m.classList.remove('show');
            });
          }

          var _overlay = document.getElementById('pageLoadingOverlay');
          var _loadingText = document.getElementById('loadingText');

          function setLoading(btn, loading, text) {
            if (loading) {
              btn.disabled = true;
              if (_loadingText) _loadingText.textContent = text || t('loadingDefault');
              if (_overlay) _overlay.classList.add('show');
            } else {
              btn.disabled = false;
              if (_overlay) _overlay.classList.remove('show');
            }
          }

          // ============================================
          // PASSWORD STRENGTH
          // ============================================
          var regPassword = document.getElementById('regPassword');
          var strengthBar = document.getElementById('strengthBar');

          regPassword.oninput = function() {
            var pass = regPassword.value;
            strengthBar.className = 'password-strength-bar';

            if (pass.length < 6) {
              strengthBar.classList.add('weak');
            } else if (pass.length < 10 || !/[A-Z]/.test(pass) || !/[0-9]/.test(pass)) {
              strengthBar.classList.add('medium');
            } else {
              strengthBar.classList.add('strong');
