container:
  properties:
    html: "<style>\n  * {\n    box-sizing: border-box;\n    font-family: 'Segoe UI', Arial, Helvetica, sans-serif;\n  }\n\n  body {\n    margin: 0;\n    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);\n    min-height: 100vh;\n  }\n\n  /* ================= WRAPPER ================= */\n  .login-wrapper {\n    min-height: 100vh;\n    width: 100%;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    padding: 30px;\n    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);\n  }\n\n  /* ================= BOX ================= */\n  .login-box {\n    width: 100%;\n    max-width: 440px;\n    background: rgba(255, 255, 255, 0.95);\n    border-radius: 20px;\n    padding: 50px 45px;\n    box-shadow:\n      0 25px 50px rgba(0,0,0,0.3),\n      0 0 0 1px rgba(255,255,255,0.1);\n    animation: cardIn 0.8s cubic-bezier(.2,.8,.2,1);\n    backdrop-filter: blur(10px);\n  }\n\n  @keyframes cardIn {\n    from {\n      opacity: 0;\n      transform: translateY(40px) scale(0.95);\n    }\n    to {\n      opacity: 1;\n      transform: translateY(0) scale(1);\n    }\n  }\n\n  /* ================= LOGO ================= */\n  .logo {\n    text-align: center;\n    margin-bottom: 35px;\n    animation: logoDrop 0.8s ease-out 0.3s both;\n  }\n\n  @keyframes logoDrop {\n    from { opacity: 0; transform: translateY(-20px); }\n    to   { opacity: 1; transform: translateY(0); }\n  }\n\n  .logo img {\n    height: 90px;\n    margin-bottom: 15px;\n    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));\n  }\n\n  .logo h2 {\n    margin: 0;\n    color: #1a1a2e;\n    font-size: 26px;\n    font-weight: 700;\n    letter-spacing: 0.5px;\n  }\n\n  .logo p {\n    margin: 8px 0 0;\n    font-size: 14px;\n    color: #666;\n  }\n\n  /* ================= TABS ================= */\n  .auth-tabs {\n    display: flex;\n    margin-bottom: 30px;\n    background: #f0f2f5;\n    border-radius: 12px;\n    padding: 4px;\n  }\n\n  .auth-tab {\n    flex: 1;\n    padding: 12px;\n    text-align: center;\n    border: none;\n    background: transparent;\n    color: #666;\n    font-size: 14px;\n    font-weight: 600;\n    cursor: pointer;\n    border-radius: 10px;\n    transition: all 0.3s ease;\n  }\n\n  .auth-tab.active {\n    background: #fff;\n    color: #1a1a2e;\n    box-shadow: 0 2px 8px rgba(0,0,0,0.1);\n  }\n\n  .auth-tab:hover:not(.active) {\n    color: #1a1a2e;\n  }\n\n  /* ================= FORMS ================= */\n  .auth-form {\n    display: none;\n  }\n\n  .auth-form.active {\n    display: block;\n    animation: fadeIn 0.4s ease;\n  }\n\n  @keyframes fadeIn {\n    from { opacity: 0; transform: translateY(10px); }\n    to { opacity: 1; transform: translateY(0); }\n  }\n\n  /* ================= FIELDS ================= */\n  .field {\n    margin-bottom: 20px;\n  }\n\n  .field label {\n    display: block;\n    font-size: 13px;\n    margin-bottom: 6px;\n    color: #444;\n    font-weight: 600;\n  }\n\n  .field input {\n    width: 100%;\n    height: 48px;\n    padding: 0 16px;\n    border: 2px solid #e0e0e0;\n    border-radius: 10px;\n    font-size: 15px;\n    transition: all 0.3s ease;\n    background: #fafafa;\n  }\n\n  .field input:focus {\n    outline: none;\n    border-color: #667eea;\n    background: #fff;\n    box-shadow: 0 0 0 4px rgba(102,126,234,0.15);\n  }\n\n  .field input::placeholder {\n    color: #aaa;\n  }\n\n  /* ================= BUTTON ================= */\n  .auth-btn {\n    width: 100%;\n    height: 52px;\n    border: none;\n    border-radius: 12px;\n    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);\n    color: #fff;\n    font-size: 16px;\n    font-weight: 600;\n    cursor: pointer;\n    transition: all 0.3s ease;\n    margin-top: 10px;\n    position: relative;\n    overflow: hidden;\n  }\n\n  .auth-btn:hover:not(:disabled) {\n    transform: translateY(-2px);\n    box-shadow: 0 10px 30px rgba(102,126,234,0.4);\n  }\n\n  .auth-btn:active:not(:disabled) {\n    transform: translateY(0);\n  }\n\n  .auth-btn:disabled {\n    opacity: 0.7;\n    cursor: not-allowed;\n  }\n\n  .auth-btn .btn-text {\n    transition: opacity 0.3s ease;\n  }\n\n  .auth-btn.loading .btn-text {\n    opacity: 0;\n  }\n\n  .auth-btn .btn-loader {\n    position: absolute;\n    inset: 0;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    opacity: 0;\n    pointer-events: none;\n  }\n\n  .btn-spinner {\n    width: 22px;\n    height: 22px;\n    border: 3px solid rgba(255,255,255,0.3);\n    border-top-color: #fff;\n    border-radius: 50%;\n    animation: btn-spin 0.6s linear infinite;\n  }\n  @keyframes btn-spin {\n    to { transform: rotate(360deg); }\n  }\n\n  .auth-btn.loading .btn-loader {\n    opacity: 1;\n  }\n\n  /* ================= MESSAGES ================= */\n  .message {\n    padding: 14px 16px;\n    border-radius: 10px;\n    font-size: 14px;\n    margin-bottom: 20px;\n    display: none;\n    animation: shake 0.4s ease;\n  }\n\n  .message.error {\n    background: #fdecea;\n    color: #d32f2f;\n    border: 1px solid #f5c6cb;\n  }\n\n  .message.success {\n    background: #e8f5e9;\n    color: #2e7d32;\n    border: 1px solid #c8e6c9;\n  }\n\n  .message.info {\n    background: #e3f2fd;\n    color: #1565c0;\n    border: 1px solid #bbdefb;\n  }\n\n  .message.show {\n    display: block;\n  }\n\n  @keyframes shake {\n    0%, 100% { transform: translateX(0); }\n    25% { transform: translateX(-5px); }\n    75% { transform: translateX(5px); }\n  }\n\n  /* ================= PASSWORD STRENGTH ================= */\n  .password-strength {\n    margin-top: 8px;\n    height: 4px;\n    background: #e0e0e0;\n    border-radius: 2px;\n    overflow: hidden;\n  }\n\n  .password-strength-bar {\n    height: 100%;\n    width: 0;\n    transition: all 0.3s ease;\n    border-radius: 2px;\n  }\n\n  .password-strength-bar.weak { width: 33%; background: #f44336; }\n  .password-strength-bar.medium { width: 66%; background: #ff9800; }\n  .password-strength-bar.strong { width: 100%; background: #4caf50; }\n\n  /* ================= FOOTER ================= */\n  .footer {\n    margin-top: 30px;\n    font-size: 12px;\n    color: #888;\n    text-align: center;\n  }\n\n  .footer a {\n    color: #667eea;\n    text-decoration: none;\n  }\n\n  /* ================= SETUP ADMIN LINK ================= */\n  .setup-link {\n    text-align: center;\n    margin-top: 20px;\n    font-size: 13px;\n  }\n\n  .setup-link a {\n    color: #667eea;\n    text-decoration: none;\n    cursor: pointer;\n  }\n\n  .setup-link a:hover {\n    text-decoration: underline;\n  }\n\n  /* Hand loader CSS removed - using code loader and btn-spinner instead */\n\n  /* ================= PAGE LOADING OVERLAY ================= */\n  .login-loading-overlay {\n    display: none;\n    position: fixed;\n    top: 0;\n    left: 0;\n    right: 0;\n    bottom: 0;\n    width: 100vw;\n    height: 100vh;\n    background: rgba(26, 26, 46, 0.55);\n    backdrop-filter: blur(4px);\n    z-index: 99999;\n    align-items: center;\n    justify-content: center;\n    flex-direction: column;\n    gap: 18px;\n  }\n  .login-loading-overlay.show {\n    display: flex;\n  }\n  /* محتوى اللودر في منتصف الصفحة (ثابت وسط الشاشة) */\n  .login-loading-overlay-inner {\n    position: absolute;\n    top: 50%;\n    left: 50%;\n    transform: translate(-50%, -50%);\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    gap: 18px;\n  }\n  .login-loading-overlay .hp-code-loader > * {\n    color: #fff;\n  }\n  .login-loading-overlay .hp-code-loader span {\n    display: inline-flex;\n  }\n  .login-loading-overlay .hp-code-loader span:nth-child(2) {\n    letter-spacing: -1em;\n    overflow: hidden;\n    animation: hp-code-reveal 2500ms cubic-bezier(0.645, 0.045, 0.355, 1) infinite alternate;\n  }\n  @keyframes hp-code-reveal {\n    0%, 100% { opacity: 0.5; letter-spacing: -1em; }\n    50% { opacity: 1; letter-spacing: 0em; }\n  }\n  .login-loading-overlay .loading-text {\n    color: #fff;\n    font-size: 16px;\n    font-weight: 600;\n    letter-spacing: 0.5px;\n  }\n\n  /* ================= MOBILE ================= */\n  @media (max-width: 600px) {\n    .login-wrapper {\n      padding: 0;\n    }\n\n    .login-box {\n      min-height: 100vh;\n      border-radius: 0;\n      padding: 40px 25px;\n      max-width: none;\n    }\n\n    .logo img {\n      height: 75px;\n    }\n\n    .logo h2 {\n      font-size: 22px;\n    }\n  }\n\n  /* ================= LANGUAGE SWITCHER ================= */\n  .login-lang-switcher {\n    position: absolute;\n    top: 20px;\n    right: 20px;\n    z-index: 100;\n  }\n\n  .lang-btn {\n    display: flex;\n    align-items: center;\n    gap: 10px;\n    padding: 12px 20px;\n    background: linear-gradient(135deg, rgba(102,126,234,0.8) 0%, rgba(118,75,162,0.8) 100%);\n    border: 1px solid rgba(255,255,255,0.2);\n    border-radius: 12px;\n    color: #fff;\n    cursor: pointer;\n    font-size: 15px;\n    font-weight: 600;\n    transition: all 0.3s ease;\n    backdrop-filter: blur(10px);\n    box-shadow: 0 4px 15px rgba(0,0,0,0.2);\n  }\n\n  .lang-btn:hover {\n    background: linear-gradient(135deg, rgba(102,126,234,1) 0%, rgba(118,75,162,1) 100%);\n    transform: translateY(-3px);\n    box-shadow: 0 8px 25px rgba(102,126,234,0.4);\n  }\n\n  .lang-btn .lang-flag {\n    font-size: 20px;\n  }\n\n  /* ================= RTL SUPPORT ================= */\n  body.rtl .login-lang-switcher {\n    right: auto;\n    left: 20px;\n  }\n\n  body.rtl .login-box {\n    direction: rtl;\n    text-align: right;\n  }\n\n  body.rtl .field label {\n    text-align: right;\n  }\n\n  body.rtl .field input {\n    text-align: right;\n  }\n\n  body.rtl .auth-tabs {\n    direction: rtl;\n  }\n\n  body.rtl .footer {\n    direction: rtl;\n  }\n</style>\n\n<div aria-hidden='true' data-note='disable-hand-loader' style='display:none'></div>\n<script>window.__hpLoadingInit = true;</script>\n<div aria-hidden='true' data-note='i18n-script' style='display:none'></div>\n<script>\n  // Inline i18n to avoid 404 issues\n  (function(){\n    'use strict';\n    if(window.i18n) return;\n    const translations={en:{save:'Save',cancel:'Cancel',delete:'Delete',edit:'Edit',add:'Add',search:'Search',loading:'Loading...',error:'Error',success:'Success',login_title:'Welcome Back',login_subtitle:'Sign in to your account',login_email_placeholder:'Enter your email',login_password_placeholder:'Enter your password',login_button:'Sign In',login_register_link:'Don\\'t have an account? Register',login_forgot_password:'Forgot Password?',register_title:'Create Account',register_subtitle:'Join Helwan Plast System',register_name_placeholder:'Full Name',register_email_placeholder:'Email Address',register_phone_placeholder:'Phone Number (optional)',register_password_placeholder:'Password (min 8 characters)',register_confirm_placeholder:'Confirm Password',register_button:'Create Account',register_login_link:'Already have an account? Sign In'},ar:{save:'حفظ',cancel:'إلغاء',delete:'حذف',edit:'تعديل',add:'إضافة',search:'بحث',loading:'جاري التحميل...',error:'خطأ',success:'نجاح',login_title:'مرحباً بعودتك',login_subtitle:'سجّل دخولك للمتابعة',login_email_placeholder:'أدخل بريدك الإلكتروني',login_password_placeholder:'أدخل كلمة المرور',login_button:'تسجيل الدخول',login_register_link:'ليس لديك حساب؟ سجّل الآن',login_forgot_password:'نسيت كلمة المرور؟',register_title:'إنشاء حساب',register_subtitle:'انضم لنظام حلوان بلاست',register_name_placeholder:'الاسم بالكامل',register_email_placeholder:'البريد الإلكتروني',register_phone_placeholder:'رقم الهاتف (اختياري)',register_password_placeholder:'كلمة المرور (8 أحرف على الأقل)',register_confirm_placeholder:'تأكيد كلمة المرور',register_button:'إنشاء الحساب',register_login_link:'لديك حساب بالفعل؟ سجّل دخولك'}};\n    class I18n{constructor(){this.currentLang=localStorage.getItem('hp_language')||'en';this.listeners=[]}getLang(){return this.currentLang}setLang(lang){if(lang!=='en'&&lang!=='ar')return;this.currentLang=lang;localStorage.setItem('hp_language',lang);document.documentElement.dir=lang==='ar'?'rtl':'ltr';document.documentElement.lang=lang;if(lang==='ar'){document.body.classList.add('rtl')}else{document.body.classList.remove('rtl')}this.listeners.forEach(fn=>fn(lang));window.dispatchEvent(new CustomEvent('languageChanged',{detail:{lang}}))}toggleLang(){this.setLang(this.currentLang==='en'?'ar':'en')}t(key,replacements={}){let text=translations[this.currentLang][key]||translations['en'][key]||key;Object.keys(replacements).forEach(k=>{text=text.replace(new RegExp(`\\\\{${k}\\\\}`,'g'),replacements[k])});return text}isRTL(){return this.currentLang==='ar'}onLangChange(callback){this.listeners.push(callback)}init(){this.setLang(this.currentLang)}}\n    window.i18n=new I18n();\n    if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',()=>window.i18n.init())}else{window.i18n.init()}\n  })();\n</script>\n\n<div aria-hidden='true' data-note='loading-overlay' style='display:none'></div>\n<div class='login-loading-overlay' id='pageLoadingOverlay'>\n  <div class='login-loading-overlay-inner'>\n    <div class='hp-code-loader' style='font-size:2.2em;font-weight:900;'>\n      <span>&lt;</span><span>LOADING...</span><span>/&gt;</span>\n    </div>\n    <div class='loading-text' id='loadingText'>Loading...</div>\n  </div>\n</div>\n\n<div class='login-wrapper'>\n  <!-- Language Switcher -->\n  <div class='login-lang-switcher'>\n    <button class='lang-btn' id='langSwitchBtn' onclick='toggleLanguage()'>\n      <span class='lang-flag' id='loginLangFlag'>🇸🇦</span>\n      <span id='langBtnText'>العربية</span>\n    </button>\n  </div>\n\n  <div class='login-box'>\n\n    <div class='logo'>\n      <img src='_/theme/helwan_logo.png' alt='Helwan Plast'>\n      <h2 id='logoTitle'>Helwan Plast</h2>\n      <p id='logoSubtitle'>Secure Authentication</p>\n    </div>\n\n    <!-- Auth Tabs -->\n    <div class='auth-tabs'>\n      <button class='auth-tab active' data-tab='login' id='tabLogin'>Login</button>\n      <button class='auth-tab' data-tab='register' id='tabRegister'>Register</button>\n    </div>\n\n    <!-- Login Form -->\n    <div id='loginForm' class='auth-form active'>\n      <div id='loginMessage' class='message'></div>\n\n      <div class='field'>\n        <label id='lblLoginEmail'>Email Address</label>\n        <input type='email' id='loginEmail' placeholder='Enter your email'>\n      </div>\n\n      <div class='field'>\n        <label id='lblLoginPassword'>Password</label>\n        <input type='password' id='loginPassword' placeholder='Enter your password'>\n      </div>\n\n      <button class='auth-btn' id='loginBtn'>\n        <span class='btn-text' id='btnLoginText'>LOGIN</span>\n        <div class='btn-loader'><div class='btn-spinner'></div></div>\n      </button>\n\n      <div class='setup-link'>\n        <a id='forgotPasswordLink'>Forgot Password?</a>\n      </div>\n\n\n\n    </div>\n\n    <!-- Register Form -->\n    <div id='registerForm' class='auth-form'>\n      <div id='registerMessage' class='message'></div>\n\n      <div class='field'>\n        <label id='lblRegName'>Full Name</label>\n        <input type='text' id='regName' placeholder='Enter your full name'>\n      </div>\n\n      <div class='field'>\n        <label id='lblRegEmail'>Email Address</label>\n        <input type='email' id='regEmail' placeholder='Enter your email'>\n      </div>\n\n      <div class='field'>\n        <label id='lblRegPhone'>Phone Number (Optional)</label>\n        <input type='tel' id='regPhone' placeholder='Enter your phone number'>\n      </div>\n\n      <div class='field'>\n        <label id='lblRegPassword'>Password</label>\n        <input type='password' id='regPassword' placeholder='Min 8 characters'>\n        <div class='password-strength'>\n          <div class='password-strength-bar' id='strengthBar'></div>\n        </div>\n      </div>\n\n      <div class='field'>\n        <label id='lblRegConfirm'>Confirm Password</label>\n        <input type='password' id='regConfirm' placeholder='Confirm your password'>\n      </div>\n\n      <button class='auth-btn' id='registerBtn'>\n        <span class='btn-text' id='btnRegisterText'>CREATE ACCOUNT</span>\n        <div class='btn-loader'><div class='btn-spinner'></div></div>\n      </button>\n    </div>\n\n    <!-- OTP Verification Form (for 2FA Login) -->\n    <div id='otpLoginForm' class='auth-form'>\n      <div id='otpLoginMessage' class='message'></div>\n\n      <div style='text-align:center;margin-bottom:20px;'>\n        <div style='font-size:48px;margin-bottom:10px;'>🔐</div>\n        <h3 style='color:#1976d2;margin:0 0 8px;' id='otpLoginTitle'>Two-Factor Authentication</h3>\n        <p style='color:#666;font-size:14px;' id='otpLoginSubtitle'>Enter the verification code sent to your email</p>\n      </div>\n\n      <div class='field'>\n        <label id='lblOtpLoginCode'>Verification Code</label>\n        <input type='text' id='otpLoginCode' placeholder='000000' maxlength='6' style='text-align:center;font-size:24px;letter-spacing:8px;font-weight:bold;'>\n      </div>\n\n      <button class='auth-btn' id='verifyOtpLoginBtn'>\n        <span class='btn-text' id='btnVerifyOtpLogin'>VERIFY & LOGIN</span>\n        <div class='btn-loader'><div class='btn-spinner'></div></div>\n      </button>\n\n      <div class='setup-link'>\n        <a id='resendOtpLogin'>Didn't receive code? Resend</a>\n      </div>\n\n      <div class='setup-link' style='margin-top:10px;'>\n        <a id='backFromOtpLogin'>← Back to Login</a>\n      </div>\n    </div>\n\n    <!-- OTP Verification Form (for Registration) -->\n    <div id='otpRegForm' class='auth-form'>\n      <div id='otpRegMessage' class='message'></div>\n\n      <div style='text-align:center;margin-bottom:20px;'>\n        <div style='font-size:48px;margin-bottom:10px;'>📧</div>\n        <h3 style='color:#1976d2;margin:0 0 8px;' id='otpRegTitle'>Verify Your Email</h3>\n        <p style='color:#666;font-size:14px;' id='otpRegSubtitle'>Enter the verification code sent to your email</p>\n      </div>\n\n      <div class='field'>\n        <label id='lblOtpRegCode'>Verification Code</label>\n        <input type='text' id='otpRegCode' placeholder='000000' maxlength='6' style='text-align:center;font-size:24px;letter-spacing:8px;font-weight:bold;'>\n      </div>\n\n      <button class='auth-btn' id='verifyOtpRegBtn' style='background:linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);'>\n        <span class='btn-text' id='btnVerifyOtpReg'>VERIFY EMAIL</span>\n        <div class='btn-loader'><div class='btn-spinner'></div></div>\n      </button>\n\n      <div class='setup-link'>\n        <a id='resendOtpReg'>Didn't receive code? Resend</a>\n      </div>\n\n      <div class='setup-link' style='margin-top:10px;'>\n        <a id='backFromOtpReg'>← Back to Registration</a>\n      </div>\n    </div>\n\n    <!-- Setup Admin Form (Hidden) -->\n    <div id='setupForm' class='auth-form'>\n      <div id='setupMessage' class='message'></div>\n\n      <div class='field'>\n        <label>Admin Full Name</label>\n        <input type='text' id='adminName' placeholder='Administrator name'>\n      </div>\n\n      <div class='field'>\n        <label>Admin Email</label>\n        <input type='email' id='adminEmail' placeholder='admin@company.com'>\n      </div>\n\n      <div class='field'>\n        <label>Admin Phone (Optional)</label>\n        <input type='tel' id='adminPhone' placeholder='Admin phone number'>\n      </div>\n\n      <div class='field'>\n        <label>Admin Password</label>\n        <input type='password' id='adminPassword' placeholder='Strong password (min 6 chars)'>\n      </div>\n\n      <button class='auth-btn' id='setupBtn'>\n        <span class='btn-text'>CREATE ADMIN ACCOUNT</span>\n        <div class='btn-loader'><div class='btn-spinner'></div></div>\n      </button>\n\n      <div class='setup-link'>\n        <a id='backToLogin'>Back to Login</a>\n      </div>\n    </div>\n\n    <!-- Forgot Password Form (Step 1 - Enter Email) -->\n    <div id='forgotPasswordForm' class='auth-form'>\n      <div id='forgotMessage' class='message'></div>\n\n      <div style='text-align:center;margin-bottom:20px;'>\n        <div style='font-size:48px;margin-bottom:10px;'>🔑</div>\n        <h3 style='color:#1976d2;margin:0 0 8px;' id='forgotTitle'>Reset Password</h3>\n        <p style='color:#666;font-size:14px;' id='forgotSubtitle'>Enter your email to receive a verification code</p>\n      </div>\n\n      <div class='field'>\n        <label id='lblForgotEmail'>Email Address</label>\n        <input type='email' id='forgotEmail' placeholder='Enter your email'>\n      </div>\n\n      <button class='auth-btn' id='sendResetCodeBtn'>\n        <span class='btn-text' id='btnSendResetCode'>SEND VERIFICATION CODE</span>\n        <div class='btn-loader'><div class='btn-spinner'></div></div>\n      </button>\n\n      <div class='setup-link'>\n        <a id='backFromForgot'>← Back to Login</a>\n      </div>\n    </div>\n\n    <!-- Forgot Password OTP Form (Step 2 - Enter OTP) -->\n    <div id='forgotOtpForm' class='auth-form'>\n      <div id='forgotOtpMessage' class='message'></div>\n\n      <div style='text-align:center;margin-bottom:20px;'>\n        <div style='font-size:48px;margin-bottom:10px;'>🔐</div>\n        <h3 style='color:#1976d2;margin:0 0 8px;' id='forgotOtpTitle'>Enter Verification Code</h3>\n        <p style='color:#666;font-size:14px;' id='forgotOtpSubtitle'>Enter the code sent to your email</p>\n      </div>\n\n      <div class='field'>\n        <label id='lblForgotOtp'>Verification Code</label>\n        <input type='text' id='forgotOtpCode' placeholder='000000' maxlength='6' style='text-align:center;font-size:24px;letter-spacing:8px;font-weight:bold;'>\n      </div>\n\n      <button class='auth-btn' id='verifyForgotOtpBtn'>\n        <span class='btn-text' id='btnVerifyForgotOtp'>VERIFY CODE</span>\n        <div class='btn-loader'><div class='btn-spinner'></div></div>\n    