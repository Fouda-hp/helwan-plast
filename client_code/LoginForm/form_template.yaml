    html: |
      <style>
        * {
          box-sizing: border-box;
          font-family: 'Segoe UI', Arial, Helvetica, sans-serif;
        }

        body {
          margin: 0;
          background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
          min-height: 100vh;
        }

        /* ================= WRAPPER ================= */
        .login-wrapper {
          min-height: 100vh;
          width: 100%;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 30px;
          background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        }

        /* ================= BOX ================= */
        .login-box {
          width: 100%;
          max-width: 440px;
          background: rgba(255, 255, 255, 0.95);
          border-radius: 20px;
          padding: 50px 45px;
          box-shadow:
            0 25px 50px rgba(0,0,0,0.3),
            0 0 0 1px rgba(255,255,255,0.1);
          animation: cardIn 0.8s cubic-bezier(.2,.8,.2,1);
          backdrop-filter: blur(10px);
        }

        @keyframes cardIn {
          from {
            opacity: 0;
            transform: translateY(40px) scale(0.95);
          }
          to {
            opacity: 1;
            transform: translateY(0) scale(1);
          }
        }

        /* ================= LOGO ================= */
        .logo {
          text-align: center;
          margin-bottom: 35px;
          animation: logoDrop 0.8s ease-out 0.3s both;
        }

        @keyframes logoDrop {
          from { opacity: 0; transform: translateY(-20px); }
          to   { opacity: 1; transform: translateY(0); }
        }

        .logo img {
          height: 90px;
          margin-bottom: 15px;
          filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }

        .logo h2 {
          margin: 0;
          color: #1a1a2e;
          font-size: 26px;
          font-weight: 700;
          letter-spacing: 0.5px;
        }

        .logo p {
          margin: 8px 0 0;
          font-size: 14px;
          color: #666;
        }

        /* ================= TABS ================= */
        .auth-tabs {
          display: flex;
          margin-bottom: 30px;
          background: #f0f2f5;
          border-radius: 12px;
          padding: 4px;
        }

        .auth-tab {
          flex: 1;
          padding: 12px;
          text-align: center;
          border: none;
          background: transparent;
          color: #666;
          font-size: 14px;
          font-weight: 600;
          cursor: pointer;
          border-radius: 10px;
          transition: all 0.3s ease;
        }

        .auth-tab.active {
          background: #fff;
          color: #1a1a2e;
          box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .auth-tab:hover:not(.active) {
          color: #1a1a2e;
        }

        /* ================= FORMS ================= */
        .auth-form {
          display: none;
        }

        .auth-form.active {
          display: block;
          animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
          from { opacity: 0; transform: translateY(10px); }
          to { opacity: 1; transform: translateY(0); }
        }

        /* ================= FIELDS ================= */
        .field {
          margin-bottom: 20px;
        }

        .field label {
          display: block;
          font-size: 13px;
          margin-bottom: 6px;
          color: #444;
          font-weight: 600;
        }

        .field input {
          width: 100%;
          height: 48px;
          padding: 0 16px;
          border: 2px solid #e0e0e0;
          border-radius: 10px;
          font-size: 15px;
          transition: all 0.3s ease;
          background: #fafafa;
        }

        .field input:focus {
          outline: none;
          border-color: #667eea;
          background: #fff;
          box-shadow: 0 0 0 4px rgba(102,126,234,0.15);
        }

        .field input::placeholder {
          color: #aaa;
        }

        /* ================= BUTTON ================= */
        .auth-btn {
          width: 100%;
          height: 52px;
          border: none;
          border-radius: 12px;
          background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
          color: #fff;
          font-size: 16px;
          font-weight: 600;
          cursor: pointer;
          transition: all 0.3s ease;
          margin-top: 10px;
          position: relative;
          overflow: hidden;
        }

        .auth-btn:hover:not(:disabled) {
          transform: translateY(-2px);
          box-shadow: 0 10px 30px rgba(102,126,234,0.4);
        }

        .auth-btn:active:not(:disabled) {
          transform: translateY(0);
        }

        .auth-btn:disabled {
          opacity: 0.7;
          cursor: not-allowed;
        }

        .auth-btn .btn-text {
          transition: opacity 0.3s ease;
        }

        .auth-btn.loading .btn-text {
          opacity: 0;
        }

        .auth-btn .btn-loader {
          position: absolute;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
          width: 24px;
          height: 24px;
          border: 3px solid rgba(255,255,255,0.3);
          border-top-color: #fff;
          border-radius: 50%;
          opacity: 0;
          animation: none;
        }

        .auth-btn.loading .btn-loader {
          opacity: 1;
          animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
          to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* ================= MESSAGES ================= */
        .message {
          padding: 14px 16px;
          border-radius: 10px;
          font-size: 14px;
          margin-bottom: 20px;
          display: none;
          animation: shake 0.4s ease;
        }

        .message.error {
          background: #fdecea;
          color: #d32f2f;
          border: 1px solid #f5c6cb;
        }

        .message.success {
          background: #e8f5e9;
          color: #2e7d32;
          border: 1px solid #c8e6c9;
        }

        .message.info {
          background: #e3f2fd;
          color: #1565c0;
          border: 1px solid #bbdefb;
        }

        .message.show {
          display: block;
        }

        @keyframes shake {
          0%, 100% { transform: translateX(0); }
          25% { transform: translateX(-5px); }
          75% { transform: translateX(5px); }
        }

        /* ================= PASSWORD STRENGTH ================= */
        .password-strength {
          margin-top: 8px;
          height: 4px;
          background: #e0e0e0;
          border-radius: 2px;
          overflow: hidden;
        }

        .password-strength-bar {
          height: 100%;
          width: 0;
          transition: all 0.3s ease;
          border-radius: 2px;
        }

        .password-strength-bar.weak { width: 33%; background: #f44336; }
        .password-strength-bar.medium { width: 66%; background: #ff9800; }
        .password-strength-bar.strong { width: 100%; background: #4caf50; }

        /* ================= FOOTER ================= */
        .footer {
          margin-top: 30px;
          font-size: 12px;
          color: #888;
          text-align: center;
        }

        .footer a {
          color: #667eea;
          text-decoration: none;
        }

        /* ================= SETUP ADMIN LINK ================= */
        .setup-link {
          text-align: center;
          margin-top: 20px;
          font-size: 13px;
        }

        .setup-link a {
          color: #667eea;
          text-decoration: none;
          cursor: pointer;
        }

        .setup-link a:hover {
          text-decoration: underline;
        }

        /* ================= LOADING OVERLAY ================= */
        .loading-overlay {
          position: fixed;
          inset: 0;
          background: rgba(26,26,46,0.9);
          backdrop-filter: blur(8px);
          display: none;
          align-items: center;
          justify-content: center;
          z-index: 9999;
        }

        .loading-overlay.show {
          display: flex;
        }

        .loader-box {
          text-align: center;
          color: #fff;
        }

        .loader-spinner {
          width: 50px;
          height: 50px;
          border: 4px solid rgba(255,255,255,0.2);
          border-top-color: #667eea;
          border-radius: 50%;
          animation: spin 0.8s linear infinite;
          margin: 0 auto 16px;
        }

        .loader-text {
          font-size: 15px;
          font-weight: 500;
        }

        /* ================= MOBILE ================= */
        @media (max-width: 600px) {
          .login-wrapper {
            padding: 0;
          }

          .login-box {
            min-height: 100vh;
            border-radius: 0;
            padding: 40px 25px;
            max-width: none;
          }

          .logo img {
            height: 75px;
          }

          .logo h2 {
            font-size: 22px;
          }
        }
      </style>

      <div class="login-wrapper">
        <div class="login-box">

          <div class="logo">
            <img src="_/theme/helwan_logo.png" alt="Helwan Plast">
            <h2>Helwan Plast</h2>
            <p>Secure Authentication</p>
          </div>

          <!-- Auth Tabs -->
          <div class="auth-tabs">
            <button class="auth-tab active" data-tab="login">Login</button>
            <button class="auth-tab" data-tab="register">Register</button>
          </div>

          <!-- Login Form -->
          <div id="loginForm" class="auth-form active">
            <div id="loginMessage" class="message"></div>

            <div class="field">
              <label>Email Address</label>
              <input type="email" id="loginEmail" placeholder="Enter your email">
            </div>

            <div class="field">
              <label>Password</label>
              <input type="password" id="loginPassword" placeholder="Enter your password">
            </div>

            <button class="auth-btn" id="loginBtn">
              <span class="btn-text">LOGIN</span>
              <div class="btn-loader"></div>
            </button>


          </div>

          <!-- Register Form -->
          <div id="registerForm" class="auth-form">
            <div id="registerMessage" class="message"></div>

            <div class="field">
              <label>Full Name</label>
              <input type="text" id="regName" placeholder="Enter your full name">
            </div>

            <div class="field">
              <label>Email Address</label>
              <input type="email" id="regEmail" placeholder="Enter your email">
            </div>

            <div class="field">
              <label>Password</label>
              <input type="password" id="regPassword" placeholder="Min 6 characters">
              <div class="password-strength">
                <div class="password-strength-bar" id="strengthBar"></div>
              </div>
            </div>

            <div class="field">
              <label>Confirm Password</label>
              <input type="password" id="regConfirm" placeholder="Confirm your password">
            </div>

            <button class="auth-btn" id="registerBtn">
              <span class="btn-text">CREATE ACCOUNT</span>
              <div class="btn-loader"></div>
            </button>
          </div>

          <!-- Setup Admin Form (Hidden) -->
          <div id="setupForm" class="auth-form">
            <div id="setupMessage" class="message"></div>

            <div class="field">
              <label>Admin Full Name</label>
              <input type="text" id="adminName" placeholder="Administrator name">
            </div>

            <div class="field">
              <label>Admin Email</label>
              <input type="email" id="adminEmail" placeholder="admin@company.com">
            </div>

            <div class="field">
              <label>Admin Password</label>
              <input type="password" id="adminPassword" placeholder="Strong password (min 6 chars)">
            </div>

            <button class="auth-btn" id="setupBtn">
              <span class="btn-text">CREATE ADMIN ACCOUNT</span>
              <div class="btn-loader"></div>
            </button>

            <div class="setup-link">
              <a id="backToLogin">Back to Login</a>
            </div>
          </div>

          <div class="footer">
            Design And devloped By Helwan Plast
          </div>

        </div>
      </div>

      <!-- Loading Overlay -->
      <div class="loading-overlay" id="loadingOverlay">
        <div class="loader-box">
          <div class="loader-spinner"></div>
          <div class="loader-text">Please wait...</div>
        </div>
      </div>

      <script>
        (function() {

          // ============================================
          // CHECK IF ADMIN EXISTS (Hide setup link if admin exists)
          // ============================================
          async function checkAndHideSetupLink() {
            // Wait for bridge function
            if (!window.checkAdminExists) {
              setTimeout(checkAndHideSetupLink, 300);
              return;
            }

            try {
              var result = await window.checkAdminExists();
              if (result && result.exists) {
                // Hide setup admin link
                var setupLink = document.getElementById('setupLink');
                if (setupLink) setupLink.style.display = 'none';
              }
            } catch (e) {
              console.log('Error checking admin:', e);
              // Hide for safety
              var setupLink = document.getElementById('setupLink');
              if (setupLink) setupLink.style.display = 'none';
            }
          }

          // Run check after a short delay
          setTimeout(checkAndHideSetupLink, 500);

          // ============================================
          // TAB SWITCHING
          // ============================================
          var tabs = document.querySelectorAll('.auth-tab');
          var loginForm = document.getElementById('loginForm');
          var registerForm = document.getElementById('registerForm');
          var setupForm = document.getElementById('setupForm');

          tabs.forEach(function(tab) {
            tab.onclick = function() {
              tabs.forEach(function(t) { t.classList.remove('active'); });
              tab.classList.add('active');

              loginForm.classList.remove('active');
              registerForm.classList.remove('active');
              setupForm.classList.remove('active');

              if (tab.dataset.tab === 'login') {
                loginForm.classList.add('active');
              } else {
                registerForm.classList.add('active');
              }

              clearMessages();
            };
          });

          // Setup admin link
          var setupAdminLink = document.getElementById('setupAdminLink');
          if (setupAdminLink) {
            setupAdminLink.onclick = function() {
              loginForm.classList.remove('active');
              registerForm.classList.remove('active');
              setupForm.classList.add('active');
              document.querySelector('.auth-tabs').style.display = 'none';
            };
          }

          var backToLogin = document.getElementById('backToLogin');
          if (backToLogin) {
            backToLogin.onclick = function() {
              setupForm.classList.remove('active');
              loginForm.classList.add('active');
              document.querySelector('.auth-tabs').style.display = 'flex';
            };
          }

          // ============================================
          // MESSAGE HELPERS
          // ============================================
          function showMessage(id, type, text) {
            var el = document.getElementById(id);
            el.className = 'message ' + type + ' show';
            el.textContent = text;
          }

          function clearMessages() {
            document.querySelectorAll('.message').forEach(function(m) {
              m.classList.remove('show');
            });
          }

          function setLoading(btn, loading) {
            if (loading) {
              btn.classList.add('loading');
              btn.disabled = true;
            } else {
              btn.classList.remove('loading');
              btn.disabled = false;
            }
          }

          // ============================================
          // PASSWORD STRENGTH
          // ============================================
          var regPassword = document.getElementById('regPassword');
          var strengthBar = document.getElementById('strengthBar');

          regPassword.oninput = function() {
            var pass = regPassword.value;
            strengthBar.className = 'password-strength-bar';

            if (pass.length < 6) {
              strengthBar.classList.add('weak');
            } else if (pass.length < 10 || !/[A-Z]/.test(pass) || !/[0-9]/.test(pass)) {
              strengthBar.classList.add('medium');
            } else {
              strengthBar.classList.add('strong');
            }
          };

          // ============================================
          // LOGIN
          // ============================================
          var loginBtn = document.getElementById('loginBtn');
          var loginEmail = document.getElementById('loginEmail');
          var loginPassword = document.getElementById('loginPassword');

          loginBtn.onclick = async function() {
            clearMessages();

            var email = loginEmail.value.trim();
            var password = loginPassword.value;

            if (!email || !password) {
              showMessage('loginMessage', 'error', 'Please enter email and password');
              return;
            }

            setLoading(loginBtn, true);

            try {
              var result = await window.loginUser(email, password);

              if (result.success) {
                // Store session
                sessionStorage.setItem('auth_token', result.token);
                sessionStorage.setItem('user_email', result.user.email);
                sessionStorage.setItem('user_name', result.user.full_name);
                sessionStorage.setItem('user_role', result.user.role);

                showMessage('loginMessage', 'success', 'Login successful! Redirecting...');

                setTimeout(function() {
                  if (result.user.role === 'admin') {
                    location.hash = '#admin';
                  } else {
                    location.hash = '#launcher';
                  }
                }, 800);

              } else {
                showMessage('loginMessage', 'error', result.message);
                setLoading(loginBtn, false);
              }

            } catch (e) {
              console.error('Login error:', e);
              var errorMsg = e.message || e.toString() || 'Connection error';
              showMessage('loginMessage', 'error', 'Error: ' + errorMsg);
              setLoading(loginBtn, false);
            }
          };

          // Enter key for login
          loginPassword.onkeypress = function(e) {
            if (e.key === 'Enter') loginBtn.click();
          };

          // ============================================
          // REGISTER
          // ============================================
          var registerBtn = document.getElementById('registerBtn');
          var regName = document.getElementById('regName');
          var regEmail = document.getElementById('regEmail');
          var regConfirm = document.getElementById('regConfirm');

          registerBtn.onclick = async function() {
            clearMessages();

            var name = regName.value.trim();
            var email = regEmail.value.trim();
            var password = regPassword.value;
            var confirm = regConfirm.value;

            if (!name || !email || !password || !confirm) {
              showMessage('registerMessage', 'error', 'Please fill all fields');
              return;
            }

            if (password !== confirm) {
              showMessage('registerMessage', 'error', 'Passwords do not match');
              return;
            }

            if (password.length < 6) {
              showMessage('registerMessage', 'error', 'Password must be at least 6 characters');
              return;
            }

            setLoading(registerBtn, true);

            try {
              var result = await window.registerUser(email, password, name);

              if (result.success) {
                showMessage('registerMessage', 'success', result.message);
                regName.value = '';
                regEmail.value = '';
                regPassword.value = '';
                regConfirm.value = '';
                strengthBar.className = 'password-strength-bar';
              } else {
                showMessage('registerMessage', 'error', result.message);
              }

            } catch (e) {
              console.error('Register error:', e);
              var errorMsg = e.message || e.toString() || 'Connection error';
              showMessage('registerMessage', 'error', 'Error: ' + errorMsg);
            }

            setLoading(registerBtn, false);
          };

          // ============================================
          // SETUP ADMIN
          // ============================================
          var setupBtn = document.getElementById('setupBtn');
          var adminName = document.getElementById('adminName');
          var adminEmail = document.getElementById('adminEmail');
          var adminPassword = document.getElementById('adminPassword');

          setupBtn.onclick = async function() {
            clearMessages();

            var name = adminName.value.trim();
            var email = adminEmail.value.trim();
            var password = adminPassword.value;

            if (!name || !email || !password) {
              showMessage('setupMessage', 'error', 'Please fill all fields');
              return;
            }

            if (password.length < 6) {
              showMessage('setupMessage', 'error', 'Password must be at least 6 characters');
              return;
            }

            setLoading(setupBtn, true);

            try {
              var result = await window.setupAdmin(email, password, name);

              if (result.success) {
                showMessage('setupMessage', 'success', result.message + ' You can now login.');

                setTimeout(function() {
                  setupForm.classList.remove('active');
                  loginForm.classList.add('active');
                  document.querySelector('.auth-tabs').style.display = 'flex';
                  document.getElementById('setupLink').style.display = 'none';
                  loginEmail.value = email;
                }, 2000);

              } else {
                showMessage('setupMessage', 'error', result.message);
              }

            } catch (e) {
              console.error('Setup admin error:', e);
              var errorMsg = e.message || e.toString() || 'Connection error';
              showMessage('setupMessage', 'error', 'Error: ' + errorMsg);
            }

            setLoading(setupBtn, false);
          };

        })();
      </script>
  type: HtmlTemplate
