components: []
container:
  properties:
    html: |
      <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
      <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #f0f2f5; }

        .pi-wrapper { max-width: 900px; margin: 0 auto; padding: 20px; font-family: 'Cairo', 'Segoe UI', Arial, sans-serif; }

        /* Controls bar */
        .pi-controls { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; background: #fff; padding: 16px 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 20px; }
        .pi-controls button { padding: 8px 20px; border-radius: 8px; border: none; font-weight: 700; font-size: 13px; cursor: pointer; transition: all 0.2s; }
        .pi-back-btn { background: #546e7a; color: #fff; }
        .pi-back-btn:hover { background: #37474f; }
        .pi-lang-btn { background: #e3f2fd; color: #1565c0; border: 2px solid #90caf9 !important; }
        .pi-lang-btn:hover { background: #bbdefb; }
        .pi-lang-btn.active { background: #2196f3; color: #fff; }
        .pi-print-btn { background: #4caf50; color: #fff; }
        .pi-print-btn:hover { background: #388e3c; }
        .pi-pdf-btn { background: #c62828; color: #fff; }
        .pi-pdf-btn:hover { background: #b71c1c; }
        .pi-save-btn { background: #ff6f00; color: #fff; font-size: 14px; padding: 10px 28px; }
        .pi-save-btn:hover { background: #e65100; }
        .pi-save-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .pi-convert-btn { background: #1565c0; color: #fff; font-size: 14px; padding: 10px 28px; }
        .pi-convert-btn:hover { background: #0d47a1; }
        .pi-convert-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Invoice page */
        .pi-page { background: #fff; padding: 40px; border-radius: 4px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); position: relative; }
        .pi-page.rtl { direction: rtl; text-align: right; }
        .pi-page.ltr { direction: ltr; text-align: left; }

        /* Proforma watermark */
        .pi-proforma-watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); font-size: 80px; font-weight: 900; color: rgba(255, 111, 0, 0.08); pointer-events: none; z-index: 1; white-space: nowrap; letter-spacing: 10px; }

        /* Header */
        .pi-header { display: flex; justify-content: space-between; align-items: flex-start; padding-bottom: 20px; border-bottom: 3px solid #1a1a2e; margin-bottom: 24px; }
        .pi-header-info { max-width: 55%; }
        .pi-header-brand { text-align: center; }
        .pi-page.rtl .pi-header-brand { text-align: left; }
        .pi-page.ltr .pi-header-brand { text-align: right; }
        .pi-logo { width: 120px; height: auto; margin-bottom: 6px; }
        .pi-company-name { font-size: 16px; font-weight: 800; color: #1a1a2e; }
        .pi-company-detail { font-size: 11px; color: #666; }
        .pi-header-info .pi-addr { font-size: 12px; color: #555; margin-bottom: 4px; }

        /* Title */
        .pi-title-bar { text-align: center; padding: 16px; background: linear-gradient(135deg, #1a1a2e, #2d2d54); color: #fff; border-radius: 8px; margin-bottom: 24px; }
        .pi-title-bar h2 { font-size: 24px; font-weight: 800; }
        .pi-page.ltr .pi-title-bar h2 { letter-spacing: 2px; }
        .pi-title-bar .pi-inv-num { font-size: 14px; margin-top: 6px; opacity: 0.9; }

        /* Badge */
        .pi-badge { display: inline-block; padding: 4px 14px; border-radius: 20px; font-weight: 700; font-size: 12px; }
        .pi-badge.proforma { background: #fff3e0; color: #ff6f00; border: 2px solid #ff6f00; font-size: 14px; padding: 4px 18px; }
        .pi-badge.draft { background: #fff3e0; color: #ff6f00; }
        .pi-badge.posted { background: #e3f2fd; color: #1565c0; }
        .pi-badge.paid { background: #e8f5e9; color: #2e7d32; }
        .pi-badge.partial { background: #fff3e0; color: #e65100; }

        /* Info grid */
        .pi-info-section { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
        .pi-info-card { padding: 14px 18px; background: #f8f9fa; border-radius: 8px; border-left: 4px solid #ff6f00; }
        .pi-page.rtl .pi-info-card { border-left: none; border-right: 4px solid #ff6f00; }
        .pi-info-card h4 { font-size: 13px; color: #888; margin-bottom: 8px; text-transform: uppercase; font-weight: 700; }
        .pi-info-row { display: flex; justify-content: space-between; padding: 3px 0; font-size: 13px; }
        .pi-info-row .label { color: #666; }
        .pi-info-row .value { font-weight: 700; color: #1a1a2e; }

        /* Editable fields in proforma */
        .pi-edit-input { padding: 6px 10px; border: 2px solid #ff6f00; border-radius: 6px; font-size: 13px; font-weight: 700; color: #1a1a2e; width: 100%; max-width: 200px; font-family: inherit; }
        .pi-edit-input:focus { outline: none; border-color: #e65100; }
        .pi-edit-select { padding: 6px 10px; border: 2px solid #ff6f00; border-radius: 6px; font-size: 13px; font-weight: 700; color: #1a1a2e; font-family: inherit; max-width: 250px; width: 100%; }

        /* Machine config form */
        .pi-config-section { background: #f0f4ff; border: 1px solid #c5cae9; border-radius: 10px; padding: 16px; margin-bottom: 24px; }
        .pi-config-section h4 { margin: 0 0 12px; color: #3949ab; font-size: 15px; font-weight: 700; }
        .pi-config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        .pi-config-grid4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; margin-bottom: 12px; }
        .pi-cfg-group label { display: block; font-weight: 600; color: #333; margin-bottom: 4px; font-size: 12px; }
        .pi-cfg-group select, .pi-cfg-group input { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; font-family: inherit; }
        .pi-cfg-group select:focus, .pi-cfg-group input:focus { outline: none; border-color: #3949ab; }
        .pi-cfg-optionals { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 12px; }
        .pi-cfg-optionals label { font-size: 13px; display: flex; align-items: center; gap: 4px; cursor: pointer; }
        .pi-cfg-fob-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
        .pi-cfg-fob-group label { display: block; font-weight: 600; color: #333; margin-bottom: 4px; font-size: 12px; }
        .pi-cfg-fob-group input { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 15px; font-weight: 700; }
        .pi-cfg-fob-group input.fob-std { background: #e8f5e9; color: #2e7d32; }
        .pi-cfg-fob-group input.fob-cyl { background: #e3f2fd; color: #1565c0; }

        /* Cylinders section */
        .pi-cyl-section { background: #fff8e1; border: 1px solid #ffd54f; border-radius: 10px; padding: 16px; margin-bottom: 24px; }
        .pi-cyl-section h4 { margin: 0 0 10px; color: #f57f17; font-size: 15px; font-weight: 700; }
        .pi-cyl-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .pi-cyl-table th { background: #f5f5f5; padding: 6px 8px; text-align: center; border: 1px solid #ddd; color: #333; font-weight: 600; }
        .pi-cyl-table td { padding: 4px; border: 1px solid #ddd; text-align: center; }
        .pi-cyl-table input { width: 100%; padding: 5px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; text-align: center; }
        .pi-cyl-table input.cyl-cost { background: #f9f9f9; }
        .pi-cyl-total-row { font-weight: 700; background: #f0f4ff; }

        /* Machine code display */
        .pi-machine-code { background: #e8eaf6; padding: 8px 14px; border-radius: 6px; font-family: 'Courier New', monospace; font-size: 16px; font-weight: 800; color: #1a1a2e; text-align: center; margin-top: 10px; letter-spacing: 1px; }

        /* Pricing section */
        .pi-pricing { padding: 20px; background: #fafafa; border-radius: 10px; border: 1px solid #e0e0e0; margin-bottom: 24px; }
        .pi-pricing-title { font-size: 15px; font-weight: 700; color: #1a1a2e; margin-bottom: 12px; padding-bottom: 6px; border-bottom: 2px solid #e8eaf6; }
        .pi-pricing-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; font-size: 14px; }
        .pi-pricing-row .label { color: #666; font-weight: 600; }
        .pi-pricing-row .value { font-weight: 800; color: #1a1a2e; font-size: 16px; }
        .pi-pricing-row.discount .value { color: #c62828; }
        .pi-pricing-row.total { padding-top: 12px; margin-top: 8px; border-top: 2px solid #1a1a2e; }
        .pi-pricing-row.total .label { font-size: 16px; font-weight: 800; color: #1a1a2e; }
        .pi-pricing-row.total .value { font-size: 22px; color: #2e7d32; }

        /* Machine summary (saved view) */
        .pi-machine-summary { background: #f0f4ff; padding: 12px 18px; border-radius: 8px; border-left: 4px solid #3949ab; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; }
        .pi-page.rtl .pi-machine-summary { border-left: none; border-right: 4px solid #3949ab; }
        .pi-machine-summary .mc-code { font-family: 'Courier New', monospace; font-size: 18px; font-weight: 800; color: #1a1a2e; }
        .pi-machine-summary .mc-desc { font-size: 12px; color: #666; margin-top: 2px; }

        /* Footer */
        .pi-footer { margin-top: 30px; padding-top: 16px; border-top: 2px solid #1a1a2e; display: flex; justify-content: space-between; font-size: 11px; color: #999; }

        /* Internal EGP section — hidden from print/PDF */
        .pi-egp-section { background: #fff8e1; border: 1px solid #ffd54f; border-radius: 8px; padding: 14px 18px; margin-bottom: 24px; }
        .pi-egp-section h4 { font-size: 13px; color: #f57f17; margin-bottom: 10px; font-weight: 700; }
        .pi-egp-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; font-size: 13px; }
        .pi-egp-row .label { color: #666; font-weight: 600; }
        .pi-egp-row .value { font-weight: 800; color: #1a1a2e; font-size: 15px; }
        .pi-egp-input { padding: 6px 10px; border: 2px solid #ffd54f; border-radius: 6px; font-size: 13px; font-weight: 700; width: 120px; text-align: center; font-family: inherit; }

        /* Convert modal */
        .pi-modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .pi-modal { background: #fff; border-radius: 16px; padding: 30px; max-width: 450px; width: 90%; box-shadow: 0 8px 30px rgba(0,0,0,0.2); }
        .pi-modal h3 { font-size: 18px; font-weight: 800; color: #1a1a2e; margin-bottom: 20px; text-align: center; }
        .pi-modal-field { margin-bottom: 16px; }
        .pi-modal-field label { display: block; font-weight: 600; color: #333; margin-bottom: 6px; font-size: 13px; }
        .pi-modal-field input { width: 100%; padding: 10px 14px; border: 2px solid #ddd; border-radius: 8px; font-size: 15px; font-weight: 700; font-family: inherit; }
        .pi-modal-field input:focus { outline: none; border-color: #1565c0; }
        .pi-modal-actions { display: flex; gap: 10px; margin-top: 20px; }
        .pi-modal-actions button { flex: 1; padding: 10px; border: none; border-radius: 8px; font-weight: 700; font-size: 14px; cursor: pointer; }
        .pi-modal-confirm { background: #1565c0; color: #fff; }
        .pi-modal-confirm:hover { background: #0d47a1; }
        .pi-modal-cancel { background: #e0e0e0; color: #333; }
        .pi-modal-cancel:hover { background: #bdbdbd; }

        /* Loading */
        .pi-loading { text-align: center; padding: 60px; color: #888; font-size: 16px; }

        /* Print */
        @media print {
          .pi-controls { display: none !important; }
          .pi-config-section { display: none !important; }
          .pi-cyl-section { display: none !important; }
          .pi-egp-section { display: none !important; }
          .pi-wrapper { padding: 0; max-width: 100%; }
          .pi-page { box-shadow: none; padding: 10mm; }
          .pi-proforma-watermark { display: none !important; }
          .pi-edit-input, .pi-edit-select { border: none !important; background: transparent !important; }
          * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }

        @media (max-width: 768px) {
          .pi-wrapper { padding: 10px; }
          .pi-page { padding: 20px; }
          .pi-info-section { grid-template-columns: 1fr; }
          .pi-config-grid, .pi-cfg-fob-grid { grid-template-columns: 1fr; }
          .pi-config-grid4 { grid-template-columns: 1fr 1fr; }
          .pi-machine-summary { flex-direction: column; gap: 8px; }
        }
      </style>

      <div class="pi-wrapper">
        <!-- Controls -->
        <div class="pi-controls" id="piControls">
          <button class="pi-back-btn" onclick="window.pyPurchaseGoBack()">Back</button>
          <div style="flex:1;"></div>
          <button class="pi-save-btn" id="piSaveBtn" style="display:none;" onclick="saveProforma()">Save Proforma</button>
          <button class="pi-convert-btn" id="piConvertBtn" style="display:none;" onclick="showConvertModal()">Convert to Invoice</button>
          <button class="pi-lang-btn active" id="piBtnAr" onclick="piSwitchLang('ar')">عربي</button>
          <button class="pi-lang-btn" id="piBtnEn" onclick="piSwitchLang('en')">English</button>
          <button class="pi-print-btn" onclick="window.print()">Print</button>
          <button class="pi-pdf-btn" onclick="piExportPDF()">Export PDF</button>
        </div>

        <!-- Content -->
        <div id="piContent">
          <div class="pi-loading" id="piLoading">Loading...</div>
        </div>
      </div>

      <script>
      (function() {
        var invoiceData = null;
        var companyData = null;
        var supplierData = null;
        var contractsList = [];
        var currentLang = 'ar';
        var isProforma = false;
        var supplierId = null;
        var contractLinked = false;

        /* ============================================================
           Calculator Pricing Data — same as PurchaseInvoicesForm
           ============================================================ */
        var INV_MACHINE_PRICES = {
          "Metal anilox": {"4":{"80":15000,"100":16000,"120":17500},"6":{"80":25000,"100":26000,"120":29000},"8":{"80":29000,"100":32000,"120":33000}},
          "Ceramic anilox Single Doctor Blade": {"4":{"80":18000,"100":19000,"120":20500},"6":{"80":28000,"100":29000,"120":32000},"8":{"80":32000,"100":35000,"120":36000}},
          "Ceramic anilox Chamber Doctor Blade": {"4":{"80":21168,"100":22960,"120":25252},"6":{"80":32752,"100":34940,"120":39128},"8":{"80":38336,"100":42920,"120":45504}}
        };
        var INV_MATERIAL_ADJ = {"PP":9000,"Nonwoven":4000,"Paper to 100g":1500,"Paper to 200g":4750,"Paper to 300g":11050};
        var INV_WINDER_ADJ = {"Single":-4000};
        var INV_OPTIONAL_ADJ = {"Video inspection":4000,"PLC":1800,"Slitter":800,"Pneumatic Unwind":750,"Hydraulic Station Unwind":1500,"Pneumatic Rewind":750,"Surface Rewind":3250};
        var INV_CYL_PRICES = {80:3.49, 100:3.59, 120:4.05, 130:4.50, 140:5.026, 160:5.40};
        var INV_DEFAULT_CYL_SIZES = [25,30,35,40,45,50,60];
        var PI_CYL_ROWS = 12;

        function fmtNum(v) {
          if (!v && v !== 0) return '0';
          var n = parseFloat(v);
          return isNaN(n) ? String(v) : n.toLocaleString('en-US', {minimumFractionDigits: 0, maximumFractionDigits: 2});
        }

        function todayStr() {
          var d = new Date();
          return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
        }

        function parseHash() {
          var hash = location.hash || '';
          var nm = hash.match(/#purchase-invoice-new-(.+)/);
          if (nm) return { mode: 'new', supplierId: decodeURIComponent(nm[1]) };
          var sm = hash.match(/#purchase-invoice-(.+)/);
          if (sm) return { mode: 'saved', invoiceNumber: decodeURIComponent(sm[1]) };
          return null;
        }

        window.piSwitchLang = function(lang) {
          currentLang = lang;
          document.getElementById('piBtnAr').classList.toggle('active', lang === 'ar');
          document.getElementById('piBtnEn').classList.toggle('active', lang === 'en');
          if (invoiceData || isProforma) renderInvoice();
        };

        /* ============================================================
           Model Code Builders (same as calculator)
           ============================================================ */
        function invGetAniloxCode(type) {
          if (type === "Metal anilox") return "M";
          if (type === "Ceramic anilox Single Doctor Blade") return "C";
          if (type === "Ceramic anilox Chamber Doctor Blade") return "CC";
          return "";
        }

        function invGetMaterialWinderCode(mat, wind) {
          if (mat === "PE" && wind === "Single") return "S";
          if (mat === "PE" && wind === "Double") return "D";
          if (mat === "PP" && wind === "Single") return "PS";
          if (mat === "Nonwoven" && wind === "Single") return "PS";
          if (mat === "Paper to 100g") return "PP";
          if (mat === "Paper to 200g") return "HS";
          if (mat === "Paper to 300g") return "SS";
          return "";
        }

        function invGetUnwindRewindCode() {
          var u = "", r = "";
          var pu = document.getElementById("piOptPneuUnwind");
          var hu = document.getElementById("piOptHydUnwind");
          var pr = document.getElementById("piOptPneuRewind");
          var sr = document.getElementById("piOptSurfRewind");
          if (pu && pu.checked) u = "P";
          if (hu && hu.checked) u = "H";
          if (pr && pr.checked) r = "P";
          if (sr && sr.checked) r = "S";
          return u + r;
        }

        /* ============================================================
           Build machine code + calculate FOB from config
           ============================================================ */
        window.piBuildModelCode = function() {
          if (!isProforma || contractLinked) return;

          var condition = document.getElementById("piCondition").value;
          var mType = document.getElementById("piMachineType").value;
          var cols = document.getElementById("piColors").value;
          var wid = document.getElementById("piWidth").value;
          var mat = document.getElementById("piMaterial").value;
          var wind = document.getElementById("piWinder").value;

          var codeEl = document.getElementById("piMachineCodeDisplay");

          if (!condition || !mType || !cols || !wid || !mat || !wind) {
            if (codeEl) codeEl.textContent = '—';
            var fobStdEl = document.getElementById("piFobStd");
            if (fobStdEl) fobStdEl.value = 0;
            piCalcCylindersProforma();
            return;
          }

          // Build code
          var prefix = condition === "used" ? "U" : "S";
          var an = invGetAniloxCode(mType);
          var mw = invGetMaterialWinderCode(mat, wind);
          var ex = invGetUnwindRewindCode();
          var suffix = ex.length === 2 ? ex : mw + ex;
          var machineCode = prefix + "H" + cols + "-" + (parseInt(wid) * 10) + an + "/" + suffix;
          if (codeEl) codeEl.textContent = machineCode;

          // Store in invoiceData
          invoiceData.machine_config = invoiceData.machine_config || {};
          invoiceData.machine_config.model_code = machineCode;
          invoiceData.machine_config.condition = condition;
          invoiceData.machine_config.machine_type = mType;
          invoiceData.machine_config.colors = cols;
          invoiceData.machine_config.machine_width = wid;
          invoiceData.machine_config.material = mat;
          invoiceData.machine_config.winder = wind;

          // Collect optionals
          var optList = [];
          if (document.getElementById("piOptVideo") && document.getElementById("piOptVideo").checked) optList.push("Video inspection");
          if (document.getElementById("piOptPLC") && document.getElementById("piOptPLC").checked) optList.push("PLC");
          if (document.getElementById("piOptSlitter") && document.getElementById("piOptSlitter").checked) optList.push("Slitter");
          if (document.getElementById("piOptPneuUnwind") && document.getElementById("piOptPneuUnwind").checked) optList.push("Pneumatic Unwind");
          if (document.getElementById("piOptHydUnwind") && document.getElementById("piOptHydUnwind").checked) optList.push("Hydraulic Station Unwind");
          if (document.getElementById("piOptPneuRewind") && document.getElementById("piOptPneuRewind").checked) optList.push("Pneumatic Rewind");
          if (document.getElementById("piOptSurfRewind") && document.getElementById("piOptSurfRewind").checked) optList.push("Surface Rewind");
          invoiceData.machine_config.optionals = optList;

          // Calculate FOB — same as Calculator:
          // Slitter is NOT included in Standard FOB or FOB With Cylinders
          // It only affects selling prices (overseas, local) which are not on this invoice
          var basePrice = 0;
          var byType = INV_MACHINE_PRICES[mType];
          if (byType && byType[cols] && byType[cols][wid] !== undefined) {
            basePrice = parseFloat(byType[cols][wid]);
          }
          var matAdj = INV_MATERIAL_ADJ[mat] || 0;
          var windAdj = INV_WINDER_ADJ[wind] || 0;
          var optAdj = 0;
          optList.forEach(function(o) {
            if (o === "Slitter") return; // Slitter excluded from FOB (same as calculator)
            optAdj += (INV_OPTIONAL_ADJ[o] || 0);
          });

          var stdFob = basePrice + matAdj + windAdj + optAdj;
          var fobStdEl = document.getElementById("piFobStd");
          if (fobStdEl) fobStdEl.value = stdFob;

          // Init cylinder table with defaults
          piInitCylTable(cols);
          piCalcCylindersProforma();
        };

        /* ============================================================
           Cylinder table init & calc
           ============================================================ */
        function piInitCylTable(colorsVal) {
          var tbody = document.getElementById("piCylBody");
          if (!tbody) return;
          var defaultSizes = INV_DEFAULT_CYL_SIZES;
          var html = "";
          for (var i = 1; i <= PI_CYL_ROWS; i++) {
            var defSize = (i <= defaultSizes.length) ? defaultSizes[i-1] : "";
            var defCount = (i <= defaultSizes.length && colorsVal) ? colorsVal : "";
            html += '<tr><td>' + i + '</td>';
            html += '<td><input type="number" id="piCylSize' + i + '" value="' + defSize + '" oninput="piCalcCylindersProforma()"></td>';
            html += '<td><input type="number" id="piCylCount' + i + '" value="' + defCount + '" oninput="piCalcCylindersProforma()"></td>';
            html += '<td><input type="text" id="piCylCost' + i + '" class="cyl-cost" readonly></td></tr>';
          }
          tbody.innerHTML = html;
        }

        window.piCalcCylindersProforma = function() {
          var widthEl = document.getElementById("piWidth");
          var colorsEl = document.getElementById("piColors");
          if (!widthEl || !colorsEl) { recalcTotal(); return; }

          var widthVal = parseInt(widthEl.value) || 0;
          var colorsVal = parseInt(colorsEl.value) || 0;
          var pricePerCM = INV_CYL_PRICES[widthVal] || 0;
          var totalCost = 0, totalCount = 0;

          for (var i = 1; i <= PI_CYL_ROWS; i++) {
            var sizeEl = document.getElementById("piCylSize" + i);
            var countEl = document.getElementById("piCylCount" + i);
            var costEl = document.getElementById("piCylCost" + i);
            if (!sizeEl || !countEl || !costEl) continue;
            var size = parseFloat(sizeEl.value) || 0;
            var count = parseInt(countEl.value) || 0;
            if (!size || !count) { costEl.value = ""; continue; }
            totalCount += count;
            if (size === 40 && count <= colorsVal) {
              costEl.value = "FREE";
              costEl.style.color = "#2e7d32"; costEl.style.fontWeight = "600";
            } else if (size === 40 && count > colorsVal) {
              var excess = count - colorsVal;
              var c40 = Math.round(size * excess * pricePerCM);
              costEl.value = c40.toFixed(2);
              costEl.style.color = ""; costEl.style.fontWeight = "";
              totalCost += c40;
            } else {
              var rc = Math.round(size * count * pricePerCM);
              costEl.value = rc.toFixed(2);
              costEl.style.color = ""; costEl.style.fontWeight = "";
              totalCost += rc;
            }
          }

          var totalCountEl = document.getElementById("piCylTotalCount");
          var totalCostEl = document.getElementById("piCylTotalCost");
          if (totalCountEl) totalCountEl.textContent = totalCount || "0";
          if (totalCostEl) totalCostEl.textContent = "$" + totalCost.toLocaleString("en-US");

          // Collect cylinder data into machine_config
          var cyls = [];
          for (var j = 1; j <= PI_CYL_ROWS; j++) {
            var cs = document.getElementById("piCylSize" + j);
            var cc = document.getElementById("piCylCount" + j);
            var co = document.getElementById("piCylCost" + j);
            if (cs && cc && cs.value && cc.value) {
              cyls.push({ size: parseFloat(cs.value), count: parseInt(cc.value), cost: co ? co.value : '' });
            }
          }
          if (invoiceData && invoiceData.machine_config) {
            invoiceData.machine_config.cylinders = cyls;
          }

          // Update FOB With Cylinders = Standard FOB + cylinder cost
          var stdFob = parseFloat(document.getElementById("piFobStd") ? document.getElementById("piFobStd").value : 0) || 0;
          var fobCylEl = document.getElementById("piFobCyl");
          if (fobCylEl) fobCylEl.value = stdFob + totalCost;

          recalcTotal();
        };

        /* ============================================================
           Load dynamic calculator settings
           ============================================================ */
        async function loadCalcSettings() {
          try {
            if (!window.pyGetCalculatorSettings) return;
            var res = await window.pyGetCalculatorSettings();
            if (res && res.success && res.data) {
              var d = res.data;
              if (d.machinePrices && typeof d.machinePrices === 'object') INV_MACHINE_PRICES = d.machinePrices;
              if (d.materialAdjustments && typeof d.materialAdjustments === 'object') INV_MATERIAL_ADJ = d.materialAdjustments;
              if (d.winderAdjustment && typeof d.winderAdjustment === 'object') INV_WINDER_ADJ = d.winderAdjustment;
              if (d.optionalAdjustments && typeof d.optionalAdjustments === 'object') INV_OPTIONAL_ADJ = d.optionalAdjustments;
              if (d.cylinderPrices && typeof d.cylinderPrices === 'object') {
                Object.keys(d.cylinderPrices).forEach(function(k) {
                  var num = parseInt(k, 10);
                  if (!isNaN(num) && d.cylinderPrices[k] != null) {
                    INV_CYL_PRICES[num] = parseFloat(d.cylinderPrices[k]);
                  }
                });
              }
              // Update machine type dropdown if dynamic options exist
              if (d.priceOptions && d.priceOptions.types && d.priceOptions.types.length) {
                var typeSelect = document.getElementById("piMachineType");
                if (typeSelect) {
                  var current = typeSelect.value;
                  typeSelect.innerHTML = '<option value="">-- Select --</option>';
                  d.priceOptions.types.forEach(function(tp) {
                    var opt = document.createElement("option");
                    opt.value = tp;
                    if (tp === "Metal anilox") opt.textContent = "Metal anilox";
                    else if (tp === "Ceramic anilox Single Doctor Blade") opt.textContent = "Ceramic Single";
                    else if (tp === "Ceramic anilox Chamber Doctor Blade") opt.textContent = "Ceramic Chamber";
                    else opt.textContent = tp;
                    typeSelect.appendChild(opt);
                  });
                  if (current) typeSelect.value = current;
                }
              }
            }
          } catch (err) { /* use defaults */ }
        }

        /* ============================================================
           Load Invoice
           ============================================================ */
        async function loadInvoice() {
          var parsed = parseHash();
          if (!parsed) {
            document.getElementById('piContent').innerHTML = '<div class="pi-loading" style="color:#c62828;">No invoice specified</div>';
            return;
          }

          try {
            if (parsed.mode === 'new') {
              isProforma = true;
              supplierId = parsed.supplierId;
              document.getElementById('piSaveBtn').style.display = '';

              var result = await window.pyGetNewPurchaseInvoiceData(supplierId);
              if (!result || !result.success) {
                document.getElementById('piContent').innerHTML = '<div class="pi-loading" style="color:#c62828;">' + (result && result.message ? result.message : 'Failed to load data') + '</div>';
                return;
              }
              supplierData = result.supplier;
              contractsList = result.contracts || [];
              companyData = result.company;
              invoiceData = {
                acid_number: '',
                contract_number: '',
                date: todayStr(),
                fob_standard: 0,
                fob_with_cylinders: 0,
                discount: 0,
                amount_due: 0,
                machine_config: {},
                notes: '',
              };
              contractLinked = false;
              renderInvoice();
              await loadCalcSettings();

            } else {
              isProforma = false;
              supplierId = null;
              document.getElementById('piSaveBtn').style.display = 'none';

              var result = await window.pyGetPurchaseInvoiceViewData(parsed.invoiceNumber);
              if (!result || !result.success) {
                document.getElementById('piContent').innerHTML = '<div class="pi-loading" style="color:#c62828;">' + (result && result.message ? result.message : 'Failed to load invoice') + '</div>';
                return;
              }
              invoiceData = result.data;
              companyData = result.company;
              supplierData = {
                name: invoiceData.supplier_name,
                company: invoiceData.supplier_company,
                phone: invoiceData.supplier_phone,
                country: invoiceData.supplier_country,
              };

              // Show Convert button if this is a proforma (not yet converted)
              if (invoiceData.status === 'proforma') {
                document.getElementById('piConvertBtn').style.display = '';
              } else {
                document.getElementById('piConvertBtn').style.display = 'none';
              }

              renderInvoice();
            }
          } catch(e) {
            document.getElementById('piContent').innerHTML = '<div class="pi-loading" style="color:#c62828;">Error: ' + (e.message || e) + '</div>';
          }
        }

        /* ============================================================
           Contract selection → load FOB costs or switch to free mode
           ============================================================ */
        window.piOnContractChange = async function(selectEl) {
          var val = selectEl.value;
          if (!val) {
            // Free invoice — show machine config
            contractLinked = false;
            invoiceData.contract_number = '';
            invoiceData.fob_standard = 0;
            invoiceData.fob_with_cylinders = 0;
            invoiceData.quotation_number = null;
            renderInvoice();
            await loadCalcSettings();
            return;
          }
          // Find quotation_number for selected contract
          var qNum = null;
          for (var i = 0; i < contractsList.length; i++) {
            if (contractsList[i].contract_number === val) {
              qNum = contractsList[i].quotation_number;
              break;
            }
          }
          invoiceData.contract_number = val;
          contractLinked = true;

          if (qNum) {
            try {
              var costs = await window.pyGetQuotationCosts(qNum);
              if (costs && costs.success) {
                invoiceData.fob_standard = costs.fob_standard || 0;
                invoiceData.fob_with_cylinders = costs.fob_with_cylinders || 0;
                invoiceData.quotation_number = qNum;
                invoiceData.machine_config = costs.machine_config || {};
              }
            } catch(e) { /* ignore */ }
          }
          renderInvoice();
        };

        window.piRecalcTotal = function() { recalcTotal(); };

        function recalcTotal() {
          var fobEl = document.getElementById('piFobStd');
          var cylEl = document.getElementById('piFobCyl');
          var discEl = document.getElementById('piDiscount');

          var fob = parseFloat(fobEl ? fobEl.value : 0) || 0;
          var cyl = parseFloat(cylEl ? cylEl.value : 0) || 0;
          var disc = parseFloat(discEl ? discEl.value : 0) || 0;

          // Amount Due = FOB With Cylinders - Discount (NOT fob+cyl)
          // fob_with_cylinders already includes fob_standard + cylinder_cost
          var total = cyl - disc;
          var el = document.getElementById('piAmountDue');
          if (el) el.textContent = fmtNum(total > 0 ? total : 0);

          invoiceData.fob_standard = fob;
          invoiceData.fob_with_cylinders = cyl;
          invoiceData.discount = disc;
          invoiceData.amount_due = total > 0 ? total : 0;
        }

        /* ============================================================
           Save proforma
           ============================================================ */
        window.saveProforma = async function() {
          if (!isProforma) return;

          var dateEl = document.getElementById('piDate');
          recalcTotal();

          // Collect machine config for free invoices
          var mc = invoiceData.machine_config || {};
          if (!contractLinked) {
            // Gather optionals from checkboxes
            var optList = [];
            var optIds = ["piOptVideo","piOptPLC","piOptSlitter","piOptPneuUnwind","piOptHydUnwind","piOptPneuRewind","piOptSurfRewind"];
            var optNames = ["Video inspection","PLC","Slitter","Pneumatic Unwind","Hydraulic Station Unwind","Pneumatic Rewind","Surface Rewind"];
            optIds.forEach(function(id, idx) {
              var el = document.getElementById(id);
              if (el && el.checked) optList.push(optNames[idx]);
            });

            mc.condition = (document.getElementById("piCondition") || {}).value || '';
            mc.machine_type = (document.getElementById("piMachineType") || {}).value || '';
            mc.colors = (document.getElementById("piColors") || {}).value || '';
            mc.machine_width = (document.getElementById("piWidth") || {}).value || '';
            mc.material = (document.getElementById("piMaterial") || {}).value || '';
            mc.winder = (document.getElementById("piWinder") || {}).value || '';
            mc.optionals = optList;

            // Collect cylinders
            var cyls = [];
            for (var ci = 1; ci <= PI_CYL_ROWS; ci++) {
              var cs = document.getElementById("piCylSize" + ci);
              var cc = document.getElementById("piCylCount" + ci);
              var co = document.getElementById("piCylCost" + ci);
              if (cs && cc && cs.value && cc.value) {
                cyls.push({ size: parseFloat(cs.value), count: parseInt(cc.value), cost: co ? co.value : '' });
              }
            }
            mc.cylinders = cyls;

            // Model code
            var codeEl = document.getElementById("piMachineCodeDisplay");
            mc.model_code = codeEl ? codeEl.textContent : '';
          }

          var data = {
            supplier_id: supplierId,
            acid_number: '',
            contract_number: invoiceData.contract_number || '',
            quotation_number: invoiceData.quotation_number || null,
            fob_standard: invoiceData.fob_standard,
            fob_with_cylinders: invoiceData.fob_with_cylinders,
            discount: invoiceData.discount,
            date: dateEl ? dateEl.value : todayStr(),
            notes: '',
            machine_config: mc,
          };

          var btn = document.getElementById('piSaveBtn');
          if (btn) { btn.disabled = true; btn.textContent = 'Saving...'; }

          try {
            var result = await window.pySavePurchaseInvoiceProforma(data);
            if (result && result.success) {
              location.hash = '#purchase-invoice-' + encodeURIComponent(result.invoice_number);
            } else {
              alert(result.message || 'Failed to save');
              if (btn) { btn.disabled = false; btn.textContent = 'Save Invoice'; }
            }
          } catch(e) {
            alert('Error: ' + (e.message || e));
            if (btn) { btn.disabled = false; btn.textContent = 'Save Invoice'; }
          }
        };

        /* ============================================================
           Build machine summary line for saved view
           ============================================================ */
        function buildMachineSummaryLine(mc) {
          if (!mc) return '';
          var parts = [];
          if (mc.model_code) parts.push(mc.model_code);
          else {
            // Build from components
            var desc = [];
            if (mc.condition) desc.push(mc.condition === 'used' ? 'Used' : 'New');
            if (mc.machine_type) {
              if (mc.machine_type === "Metal anilox") desc.push("Metal");
              else if (mc.machine_type === "Ceramic anilox Single Doctor Blade") desc.push("Ceramic Single");
              else if (mc.machine_type === "Ceramic anilox Chamber Doctor Blade") desc.push("Ceramic Chamber");
              else desc.push(mc.machine_type);
            }
            if (mc.colors) desc.push(mc.colors + ' Colors');
            if (mc.machine_width) desc.push(mc.machine_width + 'cm');
            if (mc.material) desc.push(mc.material);
            if (mc.winder) desc.push(mc.winder + ' Winder');
            if (desc.length > 0) parts.push(desc.join(' / '));
          }
          if (mc.optionals && mc.optionals.length > 0) {
            parts.push(mc.optionals.join(', '));
          }
          return parts.join(' — ');
        }

        /* ============================================================
           Render Invoice
           ============================================================ */
        function renderInvoice() {
          var d = invoiceData;
          var c = companyData || {};
          var s = supplierData || {};
          var isAr = currentLang === 'ar';
          var cls = isAr ? 'rtl' : 'ltr';

          var companyName = isAr ? (c.company_name_ar || '') : (c.company_name_en || '');
          var companyAddr = isAr ? (c.company_address_ar || '') : (c.company_address_en || '');
          var location_str = isAr ? (c.quotation_location_ar || '') : (c.quotation_location_en || '');

          var invDate = d.date || todayStr();
          var invNumDisplay = d.invoice_number || '';
          var statusCls, statusTxt;

          if (isProforma) {
            statusCls = 'proforma';
            statusTxt = 'PROFORMA';
            invNumDisplay = isAr ? 'بروفورما' : 'PROFORMA';
          } else {
            var st = (d.status || 'proforma').toLowerCase();
            statusCls = st;
            if (st === 'proforma') { statusTxt = isAr ? 'بروفورما' : 'Proforma'; statusCls = 'proforma'; }
