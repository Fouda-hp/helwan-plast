            html += '<option value="Double"' + ((d.machine_config && d.machine_config.winder === 'Double') ? ' selected' : '') + '>Double</option>';
            html += '</select></div>';

            html += '</div>';

            // Optionals
            var mcOpts = (d.machine_config && d.machine_config.optionals) || [];
            html += '<div style="margin:8px 0;"><label style="font-weight:600;color:#333;font-size:12px;display:block;margin-bottom:6px;">' + (isAr ? 'اضافات اختيارية' : 'Optional Features') + '</label>';
            html += '<div class="pi-cfg-optionals">';
            html += '<label><input type="checkbox" id="piOptVideo" onchange="piBuildModelCode()"' + (mcOpts.indexOf("Video inspection") >= 0 ? ' checked' : '') + '> Video inspection</label>';
            html += '<label><input type="checkbox" id="piOptPLC" onchange="piBuildModelCode()"' + (mcOpts.indexOf("PLC") >= 0 ? ' checked' : '') + '> PLC</label>';
            html += '<label><input type="checkbox" id="piOptSlitter" onchange="piBuildModelCode()"' + (mcOpts.indexOf("Slitter") >= 0 ? ' checked' : '') + '> Slitter</label>';
            html += '<label><input type="checkbox" id="piOptPneuUnwind" onchange="piBuildModelCode()"' + (mcOpts.indexOf("Pneumatic Unwind") >= 0 ? ' checked' : '') + '> Pneumatic Unwind</label>';
            html += '<label><input type="checkbox" id="piOptHydUnwind" onchange="piBuildModelCode()"' + (mcOpts.indexOf("Hydraulic Station Unwind") >= 0 ? ' checked' : '') + '> Hydraulic Station Unwind</label>';
            html += '<label><input type="checkbox" id="piOptPneuRewind" onchange="piBuildModelCode()"' + (mcOpts.indexOf("Pneumatic Rewind") >= 0 ? ' checked' : '') + '> Pneumatic Rewind</label>';
            html += '<label><input type="checkbox" id="piOptSurfRewind" onchange="piBuildModelCode()"' + (mcOpts.indexOf("Surface Rewind") >= 0 ? ' checked' : '') + '> Surface Rewind</label>';
            html += '</div></div>';

            // FOB fields (readonly, auto-calculated)
            html += '<div class="pi-cfg-fob-grid">';
            html += '<div class="pi-cfg-fob-group"><label>' + (isAr ? 'سعر FOB القياسي ($)' : 'Standard Machine FOB ($)') + '</label>';
            html += '<input type="number" id="piFobStd" class="fob-std" value="' + (d.fob_standard || 0) + '" step="any" readonly style="cursor:not-allowed;"></div>';
            html += '<div class="pi-cfg-fob-group"><label>' + (isAr ? 'FOB مع السلندرات ($)' : 'FOB With Cylinders ($)') + '</label>';
            html += '<input type="number" id="piFobCyl" class="fob-cyl" value="' + (d.fob_with_cylinders || 0) + '" step="any" readonly style="cursor:not-allowed;"></div>';
            html += '</div>';

            // Machine code display
            html += '<div class="pi-machine-code" id="piMachineCodeDisplay">' + ((d.machine_config && d.machine_config.model_code) || '—') + '</div>';

            html += '</div>'; // end pi-config-section

            // Cylinders table
            html += '<div class="pi-cyl-section" id="piCylSection">';
            html += '<h4>' + (isAr ? '🔧 السلندرات' : '🔧 Cylinders') + '</h4>';
            html += '<table class="pi-cyl-table">';
            html += '<thead><tr>';
            html += '<th style="width:10%;">#</th>';
            html += '<th style="width:30%;">' + (isAr ? 'المقاس (سم)' : 'Size (CM)') + '</th>';
            html += '<th style="width:25%;">' + (isAr ? 'العدد' : 'Count') + '</th>';
            html += '<th style="width:35%;">' + (isAr ? 'التكلفة ($)' : 'Cost ($)') + '</th>';
            html += '</tr></thead>';
            html += '<tbody id="piCylBody"></tbody>';
            html += '<tfoot><tr class="pi-cyl-total-row">';
            html += '<td></td>';
            html += '<td>' + (isAr ? 'الاجمالي' : 'Total') + '</td>';
            html += '<td id="piCylTotalCount">0</td>';
            html += '<td id="piCylTotalCost">$0</td>';
            html += '</tr></tfoot>';
            html += '</table>';
            html += '</div>'; // end pi-cyl-section
          }

          /* ============================================================
             Machine Summary (saved view — one line)
             ============================================================ */
          if (!isProforma && d.machine_config && (d.machine_config.model_code || d.machine_config.machine_type)) {
            var summaryLine = buildMachineSummaryLine(d.machine_config);
            if (summaryLine) {
              html += '<div class="pi-machine-summary">';
              html += '<div>';
              html += '<div class="mc-code">' + (d.machine_config.model_code || '') + '</div>';
              var descParts = [];
              if (d.machine_config.condition) descParts.push(d.machine_config.condition === 'used' ? (isAr ? 'مستعملة' : 'Used') : (isAr ? 'جديدة' : 'New'));
              if (d.machine_config.machine_type) {
                var mt = d.machine_config.machine_type;
                if (mt === "Metal anilox") descParts.push("Metal");
                else if (mt === "Ceramic anilox Single Doctor Blade") descParts.push("Ceramic Single");
                else if (mt === "Ceramic anilox Chamber Doctor Blade") descParts.push("Ceramic Chamber");
                else descParts.push(mt);
              }
              if (d.machine_config.colors) descParts.push(d.machine_config.colors + (isAr ? ' لون' : ' Colors'));
              if (d.machine_config.machine_width) descParts.push(d.machine_config.machine_width + 'cm');
              if (d.machine_config.material) descParts.push(d.machine_config.material);
              if (d.machine_config.winder) descParts.push(d.machine_config.winder);
              if (d.machine_config.optionals && d.machine_config.optionals.length > 0) descParts.push(d.machine_config.optionals.join(', '));
              html += '<div class="mc-desc">' + descParts.join(' / ') + '</div>';
              html += '</div>';
              html += '<div style="font-size:13px;color:#3949ab;font-weight:700;">' + (isAr ? 'إعداد الماكينة' : 'Machine Config') + '</div>';
              html += '</div>';
            }
          }

          /* ============================================================
             Pricing section
             ============================================================ */
          html += '<div class="pi-pricing">';
          html += '<div class="pi-pricing-title">' + (isAr ? 'التسعير ($)' : 'Pricing ($)') + '</div>';

          var fobStd = d.fob_standard || 0;
          var fobCyl = d.fob_with_cylinders || 0;
          var disc = d.discount || 0;
          var amtDue = fobCyl - disc;
          if (amtDue < 0) amtDue = 0;

          if (isProforma && contractLinked) {
            // Contract-linked: readonly pricing
            html += '<div class="pi-pricing-row">';
            html += '<span class="label">' + (isAr ? 'تكلفة الماكينة FOB' : 'Standard Machine FOB') + '</span>';
            html += '<input type="number" class="pi-edit-input" id="piFobStd" value="' + fobStd + '" readonly style="text-align:right;border-color:#ccc;background:#f5f5f5;">';
            html += '</div>';

            html += '<div class="pi-pricing-row">';
            html += '<span class="label">' + (isAr ? 'FOB مع السلندرات' : 'FOB With Cylinders') + '</span>';
            html += '<input type="number" class="pi-edit-input" id="piFobCyl" value="' + fobCyl + '" readonly style="text-align:right;border-color:#ccc;background:#f5f5f5;">';
            html += '</div>';

            html += '<div class="pi-pricing-row discount">';
            html += '<span class="label">' + (isAr ? 'خصم' : 'Discount') + '</span>';
            html += '<input type="number" class="pi-edit-input" id="piDiscount" value="' + disc + '" step="any" min="0" oninput="piRecalcTotal()" style="text-align:right;border-color:#c62828;">';
            html += '</div>';

            html += '<div class="pi-pricing-row total">';
            html += '<span class="label">' + (isAr ? 'المبلغ المستحق' : 'Amount Due') + '</span>';
            html += '<span class="value" id="piAmountDue">' + fmtNum(amtDue) + '</span>';
            html += '</div>';

          } else if (isProforma && !contractLinked) {
            // Free mode: FOB is auto-calculated from config, shown here as readonly summary
            // (actual FOB inputs are in the config section above)
            html += '<div class="pi-pricing-row">';
            html += '<span class="label">' + (isAr ? 'تكلفة الماكينة FOB' : 'Standard Machine FOB') + '</span>';
            html += '<span class="value" id="piPriceFobStd">' + fmtNum(fobStd) + '</span>';
            html += '</div>';

            html += '<div class="pi-pricing-row">';
            html += '<span class="label">' + (isAr ? 'FOB مع السلندرات' : 'FOB With Cylinders') + '</span>';
            html += '<span class="value" id="piPriceFobCyl">' + fmtNum(fobCyl) + '</span>';
            html += '</div>';

            html += '<div class="pi-pricing-row discount">';
            html += '<span class="label">' + (isAr ? 'خصم' : 'Discount') + '</span>';
            html += '<input type="number" class="pi-edit-input" id="piDiscount" value="' + disc + '" step="any" min="0" oninput="piRecalcTotal()" style="text-align:right;border-color:#c62828;">';
            html += '</div>';

            html += '<div class="pi-pricing-row total">';
            html += '<span class="label">' + (isAr ? 'المبلغ المستحق' : 'Amount Due') + '</span>';
            html += '<span class="value" id="piAmountDue">' + fmtNum(amtDue) + '</span>';
            html += '</div>';

          } else {
            // Saved readonly pricing
            html += '<div class="pi-pricing-row">';
            html += '<span class="label">' + (isAr ? 'تكلفة الماكينة FOB' : 'Standard Machine FOB') + '</span>';
            html += '<span class="value">' + fmtNum(fobStd) + '</span>';
            html += '</div>';

            html += '<div class="pi-pricing-row">';
            html += '<span class="label">' + (isAr ? 'FOB مع السلندرات' : 'FOB With Cylinders') + '</span>';
            html += '<span class="value">' + fmtNum(fobCyl) + '</span>';
            html += '</div>';

            if (disc > 0) {
              html += '<div class="pi-pricing-row discount">';
              html += '<span class="label">' + (isAr ? 'خصم' : 'Discount') + '</span>';
              html += '<span class="value">-' + fmtNum(disc) + '</span>';
              html += '</div>';
            }

            html += '<div class="pi-pricing-row total">';
            html += '<span class="label">' + (isAr ? 'المبلغ المستحق' : 'Amount Due') + '</span>';
            html += '<span class="value">' + fmtNum(d.amount_due || amtDue) + '</span>';
            html += '</div>';

            if (d.paid_amount > 0) {
              html += '<div class="pi-pricing-row">';
              html += '<span class="label">' + (isAr ? 'المدفوع' : 'Paid') + '</span>';
              html += '<span class="value" style="color:#2e7d32;">' + fmtNum(d.paid_amount) + '</span>';
              html += '</div>';

              var rem = (d.amount_due || amtDue) - (d.paid_amount || 0);
              html += '<div class="pi-pricing-row">';
              html += '<span class="label">' + (isAr ? 'الباقي' : 'Remaining') + '</span>';
              html += '<span class="value" style="color:#c62828;">' + fmtNum(rem > 0 ? rem : 0) + '</span>';
              html += '</div>';
            }
          }

          html += '</div>'; // end pricing

          /* ============================================================
             Internal EGP Section — System only, hidden from print/PDF
             ============================================================ */
          if (!isProforma) {
            var exchRate = d.exchange_rate || 0;
            var totalEgp = d.total_egp || 0;
            var totalUsd = d.amount_due || amtDue;

            html += '<div class="pi-egp-section" id="piEgpSection">';
            html += '<h4>' + (isAr ? '💱 تحويل العملة (داخلي فقط)' : '💱 Currency Conversion (Internal Only)') + '</h4>';

            html += '<div class="pi-egp-row">';
            html += '<span class="label">' + (isAr ? 'سعر الصرف (USD → EGP)' : 'Exchange Rate (USD → EGP)') + '</span>';
            html += '<input type="number" class="pi-egp-input" id="piExchangeRate" value="' + (exchRate || '') + '" step="any" min="0" placeholder="0.00" oninput="piCalcEgp()">';
            html += '</div>';

            html += '<div class="pi-egp-row">';
            html += '<span class="label">' + (isAr ? 'المبلغ بالدولار' : 'Total USD') + '</span>';
            html += '<span class="value">$' + fmtNum(totalUsd) + '</span>';
            html += '</div>';

            html += '<div class="pi-egp-row">';
            html += '<span class="label">' + (isAr ? 'المبلغ بالجنيه المصري' : 'Total EGP') + '</span>';
            html += '<span class="value" id="piTotalEgp" style="color:#1565c0;">' + (totalEgp > 0 ? fmtNum(totalEgp) + ' EGP' : '—') + '</span>';
            html += '</div>';

            html += '<button style="margin-top:8px;padding:6px 16px;background:#ffd54f;border:none;border-radius:6px;font-weight:700;font-size:12px;cursor:pointer;" onclick="piSaveExchangeRate()">' + (isAr ? 'حفظ سعر الصرف' : 'Save Rate') + '</button>';
            html += '</div>'; // end pi-egp-section
          }

          // Notes
          if (d.notes && !isProforma) {
            html += '<div style="padding:10px;font-size:13px;color:#555;margin-bottom:20px;">' + d.notes + '</div>';
          }

          // Footer
          html += '<div class="pi-footer">';
          html += '<div>' + companyName + ' - ' + companyAddr + '</div>';
          html += '<div>' + (isProforma ? (isAr ? 'بروفورما' : 'PROFORMA') : (d.invoice_number || '')) + '</div>';
          html += '</div>';

          html += '</div>'; // end pi-page

          document.getElementById('piContent').innerHTML = html;

          // After rendering, init cylinders if in free proforma mode
          if (isProforma && !contractLinked) {
            var colorsVal = (d.machine_config && d.machine_config.colors) || '';
            var savedCyls = (d.machine_config && d.machine_config.cylinders) || [];
            piInitCylTable(colorsVal);
            if (savedCyls.length > 0) {
              for (var ci = 0; ci < savedCyls.length && ci < PI_CYL_ROWS; ci++) {
                var sEl = document.getElementById('piCylSize' + (ci + 1));
                var cEl = document.getElementById('piCylCount' + (ci + 1));
                if (sEl) sEl.value = savedCyls[ci].size || '';
                if (cEl) cEl.value = savedCyls[ci].count || '';
              }
            }
            piCalcCylindersProforma();
          }
        }

        function piInfoRow(label, value) {
          return '<div class="pi-info-row"><span class="label">' + label + '</span><span class="value">' + (value || '—') + '</span></div>';
        }

        // Override recalcTotal to also update the pricing display in free mode
        var _origRecalcTotal = recalcTotal;
        recalcTotal = function() {
          var fobEl = document.getElementById('piFobStd');
          var cylEl = document.getElementById('piFobCyl');
          var discEl = document.getElementById('piDiscount');

          var fob = parseFloat(fobEl ? fobEl.value : 0) || 0;
          var cyl = parseFloat(cylEl ? cylEl.value : 0) || 0;
          var disc = parseFloat(discEl ? discEl.value : 0) || 0;

          var total = cyl - disc;
          var el = document.getElementById('piAmountDue');
          if (el) el.textContent = fmtNum(total > 0 ? total : 0);

          // Update pricing display spans (free mode)
          var psFob = document.getElementById('piPriceFobStd');
          var psCyl = document.getElementById('piPriceFobCyl');
          if (psFob) psFob.textContent = fmtNum(fob);
          if (psCyl) psCyl.textContent = fmtNum(cyl);

          invoiceData.fob_standard = fob;
          invoiceData.fob_with_cylinders = cyl;
          invoiceData.discount = disc;
          invoiceData.amount_due = total > 0 ? total : 0;
        };

        /* ============================================================
           EGP Conversion (internal only)
           ============================================================ */
        window.piCalcEgp = function() {
          var rateEl = document.getElementById('piExchangeRate');
          var egpEl = document.getElementById('piTotalEgp');
          if (!rateEl || !egpEl) return;
          var rate = parseFloat(rateEl.value) || 0;
          var totalUsd = invoiceData.amount_due || 0;
          if (rate > 0 && totalUsd > 0) {
            egpEl.textContent = fmtNum(totalUsd * rate) + ' EGP';
          } else {
            egpEl.textContent = '—';
          }
        };

        window.piSaveExchangeRate = async function() {
          var rateEl = document.getElementById('piExchangeRate');
          if (!rateEl) return;
          var rate = parseFloat(rateEl.value) || 0;
          if (rate <= 0) { alert('Please enter a valid exchange rate'); return; }
          if (!invoiceData || !invoiceData.invoice_number) return;

          try {
            var res = await window.pyUpdateInvoiceExchangeRate(invoiceData.invoice_number, rate);
            if (res && res.success) {
              invoiceData.exchange_rate = rate;
              invoiceData.total_egp = res.total_egp;
              var egpEl = document.getElementById('piTotalEgp');
              if (egpEl) egpEl.textContent = fmtNum(res.total_egp) + ' EGP';
              alert('Exchange rate saved');
            } else {
              alert(res.message || 'Failed to save');
            }
          } catch(e) { alert('Error: ' + (e.message || e)); }
        };

        /* ============================================================
           Convert Proforma → Purchase Invoice
           ============================================================ */
        window.showConvertModal = function() {
          var overlay = document.createElement('div');
          overlay.className = 'pi-modal-overlay';
          overlay.id = 'piConvertOverlay';

          var isAr = currentLang === 'ar';
          var html = '<div class="pi-modal">';
          html += '<h3>' + (isAr ? 'تحويل إلى فاتورة شراء' : 'Convert to Purchase Invoice') + '</h3>';

          html += '<div class="pi-modal-field">';
          html += '<label>ACID Number</label>';
          html += '<input type="text" id="piConvertAcid" placeholder="Enter ACID Number" autofocus>';
          html += '</div>';

          html += '<div class="pi-modal-field">';
          html += '<label>' + (isAr ? 'سعر الصرف (اختياري)' : 'Exchange Rate (optional)') + '</label>';
          html += '<input type="number" id="piConvertRate" placeholder="USD → EGP" step="any" min="0" value="' + (invoiceData.exchange_rate || '') + '">';
          html += '</div>';

          html += '<div class="pi-modal-actions">';
          html += '<button class="pi-modal-confirm" onclick="doConvert()">' + (isAr ? 'تحويل' : 'Convert') + '</button>';
          html += '<button class="pi-modal-cancel" onclick="closeConvertModal()">' + (isAr ? 'إلغاء' : 'Cancel') + '</button>';
          html += '</div>';
          html += '</div>';

          overlay.innerHTML = html;
          document.body.appendChild(overlay);
          setTimeout(function() { var el = document.getElementById('piConvertAcid'); if (el) el.focus(); }, 100);
        };

        window.closeConvertModal = function() {
          var overlay = document.getElementById('piConvertOverlay');
          if (overlay) overlay.remove();
        };

        window.doConvert = async function() {
          var acidEl = document.getElementById('piConvertAcid');
          var rateEl = document.getElementById('piConvertRate');
          var acid = acidEl ? acidEl.value.trim() : '';
          var rate = rateEl ? (parseFloat(rateEl.value) || null) : null;

          if (!acid) { alert('ACID Number is required'); return; }
          if (!invoiceData || !invoiceData.invoice_number) return;

          try {
            var res = await window.pyConvertProformaToInvoice(invoiceData.invoice_number, acid, rate);
            if (res && res.success) {
              closeConvertModal();
              // Reload the invoice to show updated data
              // Force re-render by temporarily changing hash then back
              var target = '#purchase-invoice-' + encodeURIComponent(res.invoice_number);
              if (location.hash === target) {
                // Same hash — reload manually
                isProforma = false;
                var viewResult = await window.pyGetPurchaseInvoiceViewData(res.invoice_number);
                if (viewResult && viewResult.success) {
                  invoiceData = viewResult.data;
                  companyData = viewResult.company;
                  document.getElementById('piConvertBtn').style.display = 'none';
                  renderInvoice();
                }
              } else {
                location.hash = target;
              }
            } else {
              alert(res.message || 'Failed to convert');
            }
          } catch(e) { alert('Error: ' + (e.message || e)); }
        };

        /* ============================================================
           PDF export
           ============================================================ */
        window.piExportPDF = async function() {
          var page = document.getElementById('piPage');
          if (!page) return alert('No invoice to export');

          var controls = document.getElementById('piControls');
          var configSection = document.getElementById('piConfigSection');
          var cylSection = document.getElementById('piCylSection');
          var egpSection = document.getElementById('piEgpSection');
          if (controls) controls.style.display = 'none';
          if (configSection) configSection.style.display = 'none';
          if (cylSection) cylSection.style.display = 'none';
          if (egpSection) egpSection.style.display = 'none';

          try {
            if (!window.html2canvas) {
              await new Promise(function(resolve, reject) {
                var s = document.createElement('script');
                s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
                s.onload = resolve; s.onerror = reject;
                document.head.appendChild(s);
              });
            }
            if (!window.jspdf) {
              await new Promise(function(resolve, reject) {
                var s = document.createElement('script');
                s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
                s.onload = resolve; s.onerror = reject;
                document.head.appendChild(s);
              });
            }

            var canvas = await html2canvas(page, { scale: 2, useCORS: true, backgroundColor: '#ffffff' });
            var imgData = canvas.toDataURL('image/jpeg', 0.95);
            var pdf = new jspdf.jsPDF('p', 'mm', 'a4');
            var pdfW = 210;
            var pdfH = (canvas.height * pdfW) / canvas.width;

            if (pdfH > 297) {
              var pageH = 297;
              var srcH = Math.floor(canvas.height * (pageH / pdfH) * (pdfW / canvas.width));
              var srcY = 0;
              var pageNum = 0;
              while (srcY < canvas.height) {
                if (pageNum > 0) pdf.addPage();
                var tempCanvas = document.createElement('canvas');
                tempCanvas.width = canvas.width;
                tempCanvas.height = Math.min(srcH, canvas.height - srcY);
                var ctx = tempCanvas.getContext('2d');
                ctx.drawImage(canvas, 0, srcY, canvas.width, tempCanvas.height, 0, 0, canvas.width, tempCanvas.height);
                var pageImg = tempCanvas.toDataURL('image/jpeg', 0.95);
                var h = (tempCanvas.height * pdfW) / tempCanvas.width;
                pdf.addImage(pageImg, 'JPEG', 0, 0, pdfW, h);
                srcY += srcH;
                pageNum++;
              }
            } else {
              pdf.addImage(imgData, 'JPEG', 0, 0, pdfW, pdfH);
            }

            var sName = (supplierData && supplierData.name) ? supplierData.name : '';
            var filename = (invoiceData.invoice_number || 'proforma') + ' - ' + sName + '.pdf';
            pdf.save(filename.replace(/[\/\\:*?"<>|]/g, '_'));

          } catch(e) {
            alert('PDF export failed: ' + (e.message || e));
          } finally {
            if (controls) controls.style.display = '';
            if (configSection) configSection.style.display = '';
            if (cylSection) cylSection.style.display = '';
            if (egpSection) egpSection.style.display = '';
          }
        };

        // Init
        setTimeout(function() { loadInvoice(); }, 200);
      })();
      </script>
