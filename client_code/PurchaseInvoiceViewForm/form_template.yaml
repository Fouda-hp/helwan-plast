            html += '<option value="PE"' + ((d.machine_config && d.machine_config.material === 'PE') ? ' selected' : '') + '>PE</option>';
            html += '<option value="PP"' + ((d.machine_config && d.machine_config.material === 'PP') ? ' selected' : '') + '>PP</option>';
            html += '<option value="Nonwoven"' + ((d.machine_config && d.machine_config.material === 'Nonwoven') ? ' selected' : '') + '>Nonwoven</option>';
            html += '<option value="Paper to 100g"' + ((d.machine_config && d.machine_config.material === 'Paper to 100g') ? ' selected' : '') + '>Paper 100g</option>';
            html += '<option value="Paper to 200g"' + ((d.machine_config && d.machine_config.material === 'Paper to 200g') ? ' selected' : '') + '>Paper 200g</option>';
            html += '<option value="Paper to 300g"' + ((d.machine_config && d.machine_config.material === 'Paper to 300g') ? ' selected' : '') + '>Paper 300g</option>';
            html += '</select></div>';

            html += '<div class="pi-cfg-group"><label>' + (isAr ? 'اللفاف' : 'Winder') + '</label>';
            html += '<select id="piWinder" onchange="piBuildModelCode()">';
            html += '<option value="">--</option>';
