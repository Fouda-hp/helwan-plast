              // Restore import costs
              var icosts = inv.import_costs || [];
              var icContainer = document.getElementById('importCostRows');
              if (icosts.length > 0) {
                var icHtml = '';
                icosts.forEach(function(ic) {
                  var icCur = (ic.currency || 'USD').toUpperCase();
                  icHtml += '<div class="form-row import-cost-row" style="margin-bottom:8px;"><div class="form-group" style="margin-bottom:0;"><select class="ic-type" style="padding:8px;"><option value="shipping"' + (ic.cost_type === 'shipping' ? ' selected' : '') + '>' + t('Shipping', 'شحن') + '</option><option value="customs"' + (ic.cost_type === 'customs' ? ' selected' : '') + '>' + t('Customs', 'جمارك') + '</option><option value="insurance"' + (ic.cost_type === 'insurance' ? ' selected' : '') + '>' + t('Insurance', 'تامين') + '</option><option value="clearance"' + (ic.cost_type === 'clearance' ? ' selected' : '') + '>' + t('Clearance', 'تخليص') + '</option><option value="vat"' + (ic.cost_type === 'vat' ? ' selected' : '') + '>' + t('VAT', 'ضريبة القيمة المضافة') + '</option><option value="other"' + (ic.cost_type === 'other' ? ' selected' : '') + '>' + t('Other', 'اخرى') + '</option></select></div><div class="form-group" style="margin-bottom:0;"><input type="number" class="ic-amount" placeholder="Amount" step="0.01" value="' + (ic.amount || 0) + '" oninput="calcInvoiceTotals()"></div><div class="form-group" style="margin-bottom:0;"><select class="ic-currency" style="padding:8px;" onchange="calcInvoiceTotals()"><option value="USD"' + (icCur === 'USD' ? ' selected' : '') + '>USD</option><option value="EGP"' + (icCur === 'EGP' ? ' selected' : '') + '>EGP</option></select></div><div style="display:flex;align-items:center;"><button class="btn-remove-row" onclick="removeImportCostRow(this)">X</button></div></div>';
                });
                icContainer.innerHTML = icHtml;
              } else {
                icContainer.innerHTML = '<div class="form-row import-cost-row" style="margin-bottom:8px;"><div class="form-group" style="margin-bottom:0;"><select class="ic-type" style="padding:8px;"><option value="shipping">Shipping</option><option value="customs">Customs</option><option value="insurance">Insurance</option><option value="clearance">Clearance</option><option value="vat">VAT</option><option value="other">Other</option></select></div><div class="form-group" style="margin-bottom:0;"><input type="number" class="ic-amount" placeholder="Amount" step="0.01" value="0" oninput="calcInvoiceTotals()"></div><div class="form-group" style="margin-bottom:0;"><select class="ic-currency" style="padding:8px;"><option value="USD">USD</option><option value="EGP">EGP</option></select></div><div style="display:flex;align-items:center;"><button class="btn-remove-row" onclick="removeImportCostRow(this)">X</button></div></div>';
              }
              calcInvoiceTotals();
              document.getElementById('invoiceModal').classList.add('show');
            } catch (err) {
              if (window.showNotification) window.showNotification('error', '', String(err));
            }
