                  if (mc.material) html += '<div><strong>' + t('Material', 'الخامة') + ':</strong> ' + mc.material + '</div>';
                  if (mc.winder) html += '<div><strong>' + t('Winder', 'اللفاف') + ':</strong> ' + mc.winder + '</div>';
