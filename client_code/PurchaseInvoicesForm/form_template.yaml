                  if (mc.fob_standard) html += '<div><strong>FOB:</strong> $' + fmt(mc.fob_standard) + (rateMc > 0 ? ' = ' + fmt(toEgpMc(mc.fob_standard)) + egpSuffixMc : '') + '</div>';
                  if (mc.fob_with_cylinders) html += '<div><strong>FOB+Cyl:</strong> $' + fmt(mc.fob_with_cylinders) + (rateMc > 0 ? ' = ' + fmt(toEgpMc(mc.fob_with_cylinders)) + egpSuffixMc : '') + '</div>';
                  html += '</div></div>';
                }
                var rate = parseFloat(inv.exchange_rate_usd_to_egp) || usdRateToEgp || 0;
