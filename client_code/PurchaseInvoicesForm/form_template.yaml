          window.editInvoice = async function(id) {
            // Load invoice details from server
            try {
              var res = await window.pyGetInvoiceDetails(id);
              if (!res || !res.success) {
                if (window.showNotification) window.showNotification('error', '', res ? res.message : 'Error');
                return;
              }
              var inv = res.data;
              var rateEl = document.getElementById('fInvExchangeRate');
              if (rateEl) rateEl.value = parseFloat(inv.exchange_rate_usd_to_egp) || usdRateToEgp || '';
              document.getElementById('invoiceModalTitle').textContent = t('Edit Purchase Invoice', 'تعديل فاتورة شراء');
              document.getElementById('editInvoiceId').value = inv.id;
              await loadSuppliers();
              await loadCalcSettings();
              document.getElementById('fSupplier').value = inv.supplier_id || '';
              document.getElementById('fDate').value = (inv.date || '').substring(0, 10);
              document.getElementById('fContractNo').value = inv.contract_number || '';
              document.getElementById('fMachineCode').value = inv.machine_code || '';
              document.getElementById('fInvNotes').value = inv.notes || '';
              // Restore machine config
              var mc = inv.machine_config || {};
              document.getElementById('fCondition').value = mc.condition || '';
              document.getElementById('fMachineType').value = mc.machine_type || '';
              document.getElementById('fColors').value = mc.colors || '';
              document.getElementById('fWidth').value = mc.machine_width || '';
              document.getElementById('fMaterial').value = mc.material || '';
              document.getElementById('fWinder').value = mc.winder || '';
              // Restore optionals
              var opts = mc.optionals || [];
              document.getElementById('optVideo').checked = opts.indexOf('Video inspection') >= 0;
              document.getElementById('optPLC').checked = opts.indexOf('PLC') >= 0;
              document.getElementById('optSlitter').checked = opts.indexOf('Slitter') >= 0;
              document.getElementById('optPneuUnwind').checked = opts.indexOf('Pneumatic Unwind') >= 0;
              document.getElementById('optHydUnwind').checked = opts.indexOf('Hydraulic Station Unwind') >= 0;
              document.getElementById('optPneuRewind').checked = opts.indexOf('Pneumatic Rewind') >= 0;
              document.getElementById('optSurfRewind').checked = opts.indexOf('Surface Rewind') >= 0;
              // Restore FOB values
              document.getElementById('fFobStd').value = mc.fob_standard || '';
              document.getElementById('fFobCyl').value = mc.fob_with_cylinders || '';
              // Restore cylinders
              var savedCyls = mc.cylinders || [];
              piInitCylTable(mc.colors || '');
