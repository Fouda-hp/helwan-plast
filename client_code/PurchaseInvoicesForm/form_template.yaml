          </table>
          <div id="importCostsAddSection" style="margin-top:16px;padding:12px;background:#f0f7ff;border:1px solid #90caf9;border-radius:8px;">
            <h4 style="margin:0 0 10px;color:#1565c0;" id="lblAddImportCost">Add Import Cost</h4>
            <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;align-items:end;margin-bottom:10px;">
              <div><label style="font-size:12px;color:#555;" id="lblAddIcType">Type</label><select id="fAddIcType" style="width:100%;padding:6px;"><option value="shipping">Shipping</option><option value="customs">Customs</option><option value="insurance">Insurance</option><option value="clearance">Clearance</option><option value="vat">VAT</option><option value="other">Other</option></select></div>
              <div><label style="font-size:12px;color:#555;" id="lblAddIcAmount">Amount (EGP)</label><input type="number" id="fAddIcAmount" step="0.01" min="0" value="0" style="width:100%;padding:6px;"><span id="addIcPreviewEgp" style="font-size:11px;color:#666;display:block;margin-top:2px;"></span></div>
              <div><label style="font-size:12px;color:#555;" id="lblAddIcCurrency">Currency</label><select id="fAddIcCurrency" style="width:100%;padding:6px;"><option value="EGP">EGP</option><option value="USD">USD</option></select></div>
              <div><label style="font-size:12px;color:#555;" id="lblAddIcRate">Exchange rate (USD→EGP)</label><input type="number" id="fAddIcRate" step="0.01" min="0" placeholder="1" style="width:100%;padding:6px;"></div>
              <div><label style="font-size:12px;color:#555;" id="lblAddIcPayFrom">Pay from</label><select id="fAddIcPayFrom" style="width:100%;padding:6px;"><option value="1000">Cash (1000)</option></select></div>
              <div><label style="font-size:12px;color:#555;" id="lblAddIcDate">Date</label><input type="date" id="fAddIcDate" style="width:100%;padding:6px;"></div>
              <div><button type="button" class="btn btn-save" id="btnAddImportCostInModal" style="padding:8px 14px;">Add</button></div>
            </div>
