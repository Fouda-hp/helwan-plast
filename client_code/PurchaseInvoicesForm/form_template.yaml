          function updateAddIcAmountLabelAndPreview() {
            var cur = document.getElementById('fAddIcCurrency');
            var amt = document.getElementById('fAddIcAmount');
            var rate = document.getElementById('fAddIcRate');
            var lbl = document.getElementById('lblAddIcAmount');
            var preview = document.getElementById('addIcPreviewEgp');
            if (!cur || !lbl) return;
            var currency = (cur.value || 'EGP').toUpperCase();
            lbl.textContent = currency === 'USD' ? (t('Amount (USD)', 'المبلغ (دولار)')) : (t('Amount (EGP)', 'المبلغ (جنيه)'));
            if (preview) {
              var a = parseFloat(amt && amt.value) || 0;
              var r = parseFloat(rate && rate.value) || 0;
              if (currency === 'USD' && r > 0 && a > 0) preview.textContent = '= ' + (a * r).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}) + ' EGP';
              else if (currency === 'EGP' && a > 0) preview.textContent = '= ' + a.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}) + ' EGP';
              else preview.textContent = '';
            }
          }
          (function setupAddIcCurrencyPreview() {
            ['fAddIcCurrency', 'fAddIcAmount', 'fAddIcRate'].forEach(function(id) {
              var el = document.getElementById(id);
              if (el) { el.addEventListener('change', updateAddIcAmountLabelAndPreview); el.addEventListener('input', updateAddIcAmountLabelAndPreview); }
            });
          })();
          window.addImportCostInModal = async function() {
            var invoiceId = document.getElementById('importCostsInvoiceId').value;
            var costType = document.getElementById('fAddIcType').value;
            var amount = parseFloat(document.getElementById('fAddIcAmount').value) || 0;
            var currency = document.getElementById('fAddIcCurrency').value || 'EGP';
            var rateInput = document.getElementById('fAddIcRate');
            var exchangeRate = currency === 'EGP' ? null : (parseFloat(rateInput.value) || null);
            var payFrom = document.getElementById('fAddIcPayFrom').value;
            var costDate = document.getElementById('fAddIcDate').value;
            if (!invoiceId) { if (window.showNotification) window.showNotification('error', '', t('Invoice missing', 'الفاتورة غير محددة')); return; }
            if (amount <= 0) { if (window.showNotification) window.showNotification('error', '', t('Enter amount', 'أدخل المبلغ')); return; }
            if (currency !== 'EGP' && (!exchangeRate || exchangeRate <= 0)) { if (window.showNotification) window.showNotification('error', '', t('Exchange rate required for non-EGP', 'سعر الصرف مطلوب لغير الجنيه')); return; }
            if (!costDate) { if (window.showNotification) window.showNotification('error', '', t('Select date', 'اختر التاريخ')); return; }
            try {
              var res = await window.pyAddImportCost(invoiceId, costType, amount, '', costDate, null, null, currency, exchangeRate, payFrom);
              if (res && res.success) {
                if (window.showNotification) window.showNotification('success', '', t('Import cost added', 'تمت إضافة تكلفة الاستيراد'));
                var res2 = await window.pyGetImportCostsForPayment(invoiceId);
                var tbody = document.getElementById('importCostsPayBody');
                var isAr = (localStorage.getItem('hp_language') || 'en') === 'ar';
                var egpSuffix = isAr ? ' ج.م' : ' EGP';
                if (!res2 || !res2.success) return;
                var costs = res2.costs || [];
                if (costs.length === 0) {
                  tbody.innerHTML = '<tr><td colspan="6" style="padding:12px;color:#666;">' + t('No import costs yet. Add one below.', 'لا توجد تكاليف استيراد بعد. أضف من الأسفل.') + '</td></tr>';
                } else {
                  var html = '';
                  costs.forEach(function(c) {
                    var rem = parseFloat(c.remaining_egp) || 0;
                    var desc = (c.description || '').trim() || '—';
                    html += '<tr data-ic-id="' + (c.id || '') + '" data-remaining="' + rem + '"><td style="padding:8px;border:1px solid #ddd;">' + (c.cost_type || '') + '</td><td style="padding:8px;border:1px solid #ddd;color:#555;">' + desc + '</td><td style="padding:8px;border:1px solid #ddd;text-align:right;">' + fmt(c.amount_egp) + egpSuffix + '</td><td style="padding:8px;border:1px solid #ddd;text-align:right;">' + fmt(c.paid_amount) + egpSuffix + '</td><td style="padding:8px;border:1px solid #ddd;text-align:right;font-weight:600;">' + fmt(rem) + egpSuffix + '</td><td style="padding:8px;border:1px solid #ddd;"><input type="number" class="ic-pay-amount" step="0.01" min="0" max="' + rem + '" value="' + (rem || 0) + '" placeholder="' + fmt(rem) + '" style="width:100px;padding:6px;text-align:right;"></td></tr>';
                  });
                  tbody.innerHTML = html;
                }
                document.getElementById('fAddIcAmount').value = '0';
              } else {
                if (window.showNotification) window.showNotification('error', '', res ? res.message : 'Error');
              }
            } catch (err) {
              if (window.showNotification) window.showNotification('error', '', String(err));
