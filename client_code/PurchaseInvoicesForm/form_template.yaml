          window.goBack = function() {
            if (window.pyGoBack) window.pyGoBack();
            else window.location.hash = '#admin';
          };

          /* ============================================================
             Machine Configuration — Calculator-style code + FOB pricing
             ============================================================ */
          var INV_MACHINE_PRICES = {
            "Metal anilox": {"4":{"80":15000,"100":16000,"120":17500},"6":{"80":25000,"100":26000,"120":29000},"8":{"80":29000,"100":32000,"120":33000}},
            "Ceramic anilox Single Doctor Blade": {"4":{"80":18000,"100":19000,"120":20500},"6":{"80":28000,"100":29000,"120":32000},"8":{"80":32000,"100":35000,"120":36000}},
            "Ceramic anilox Chamber Doctor Blade": {"4":{"80":21168,"100":22960,"120":25252},"6":{"80":32752,"100":34940,"120":39128},"8":{"80":38336,"100":42920,"120":45504}}
          };
          var INV_MATERIAL_ADJ = {"PP":9000,"Nonwoven":4000,"Paper to 100g":1500,"Paper to 200g":4750,"Paper to 300g":11050};
          var INV_WINDER_ADJ = {"Single":-4000};
          var INV_OPTIONAL_ADJ = {"Video inspection":4000,"PLC":1800,"Slitter":800,"Pneumatic Unwind":750,"Hydraulic Station Unwind":1500,"Pneumatic Rewind":750,"Surface Rewind":3250};
          var INV_CYL_PRICES = {80:3.49, 100:3.59, 120:4.05, 130:4.50, 140:5.026, 160:5.40};
          var INV_DEFAULT_CYL_SIZES = [25,30,35,40,45,50,60];

          function invGetAniloxCode(type) {
            if (type === "Metal anilox") return "M";
            if (type === "Ceramic anilox Single Doctor Blade") return "C";
            if (type === "Ceramic anilox Chamber Doctor Blade") return "CC";
            return "";
          }

          function invGetMaterialWinderCode(mat, wind) {
            if (mat === "PE" && wind === "Single") return "S";
            if (mat === "PE" && wind === "Double") return "D";
            if (mat === "PP" && wind === "Single") return "PS";
            if (mat === "Nonwoven" && wind === "Single") return "PS";
            if (mat === "Paper to 100g") return "PP";
            if (mat === "Paper to 200g") return "HS";
            if (mat === "Paper to 300g") return "SS";
            return "";
          }

          function invGetUnwindRewindCode() {
            var u = "", r = "";
            if (document.getElementById("optPneuUnwind").checked) u = "P";
            if (document.getElementById("optHydUnwind").checked) u = "H";
            if (document.getElementById("optPneuRewind").checked) r = "P";
            if (document.getElementById("optSurfRewind").checked) r = "S";
            return u + r;
          }

          function invCalcCylinderCost(widthVal, colorsVal) {
            var pricePerCM = INV_CYL_PRICES[widthVal] || 0;
            if (!pricePerCM || !colorsVal) return 0;
            var total = 0;
            INV_DEFAULT_CYL_SIZES.forEach(function(size) {
              var count = colorsVal; // each size gets {colors} cylinders
              if (size === 40) {
                // 40cm cylinders FREE up to color count
                // with default: count == colorsVal so all FREE
                return;
              }
              total += Math.round(size * count * pricePerCM);
            });
            return total;
          }

          window.buildInvoiceModelCode = function() {
            var condition = document.getElementById("fCondition").value;
            var mType = document.getElementById("fMachineType").value;
            var cols = document.getElementById("fColors").value;
            var wid = document.getElementById("fWidth").value;
            var mat = document.getElementById("fMaterial").value;
            var wind = document.getElementById("fWinder").value;

            if (!condition || !mType || !cols || !wid || !mat || !wind) {
              document.getElementById("fMachineCode").value = "";
              document.getElementById("fFobStd").value = "";
              document.getElementById("fFobCyl").value = "";
              return;
            }

            // Build code
            var prefix = condition === "used" ? "U" : "S";
            var an = invGetAniloxCode(mType);
            var mw = invGetMaterialWinderCode(mat, wind);
            var ex = invGetUnwindRewindCode();
            var suffix = ex.length === 2 ? ex : mw + ex;
            document.getElementById("fMachineCode").value = prefix + "H" + cols + "-" + (parseInt(wid) * 10) + an + "/" + suffix;

            // Calculate FOB
            var basePrice = 0;
            var byType = INV_MACHINE_PRICES[mType];
            if (byType && byType[cols] && byType[cols][wid] !== undefined) {
              basePrice = parseFloat(byType[cols][wid]);
            }
            var matAdj = INV_MATERIAL_ADJ[mat] || 0;
            var windAdj = INV_WINDER_ADJ[wind] || 0;
            var optAdj = 0;
            if (document.getElementById("optVideo").checked) optAdj += (INV_OPTIONAL_ADJ["Video inspection"] || 0);
            if (document.getElementById("optPLC").checked) optAdj += (INV_OPTIONAL_ADJ["PLC"] || 0);
            if (document.getElementById("optSlitter").checked) optAdj += (INV_OPTIONAL_ADJ["Slitter"] || 0);
            if (document.getElementById("optPneuUnwind").checked) optAdj += (INV_OPTIONAL_ADJ["Pneumatic Unwind"] || 0);
            if (document.getElementById("optHydUnwind").checked) optAdj += (INV_OPTIONAL_ADJ["Hydraulic Station Unwind"] || 0);
            if (document.getElementById("optPneuRewind").checked) optAdj += (INV_OPTIONAL_ADJ["Pneumatic Rewind"] || 0);
            if (document.getElementById("optSurfRewind").checked) optAdj += (INV_OPTIONAL_ADJ["Surface Rewind"] || 0);

            var stdFob = basePrice + matAdj + windAdj + optAdj;
            var cylCost = invCalcCylinderCost(parseInt(wid), parseInt(cols));
            var fobWithCyl = stdFob + cylCost;

            document.getElementById("fFobStd").value = stdFob;
            // Only reinitialize cylinders if creating new (not editing)
            if (!document.getElementById('editInvoiceId').value) {
              piInitCylTable(cols);
            }
            piCalcCylinders(); // this also sets fFobCyl and calls calcInvoiceTotals
          };

          // When user manually edits Standard FOB, recalculate via cylinders
          window.onFobManualEdit = function() {
            piCalcCylinders(); // recalcs FOB with Cyl from fFobStd + cylinder costs
          };

          // FOB With Cylinders edited directly - just recalc totals
          window.onFobCylManualEdit = function() {
            calcInvoiceTotals();
          };

          // Load dynamic pricing from server settings (if available)
          async function loadCalcSettings() {
            try {
              if (!window.pyGetCalculatorSettings) return;
              var res = await window.pyGetCalculatorSettings();
              if (res && res.success && res.data) {
                var d = res.data;
                if (d.machinePrices && typeof d.machinePrices === 'object') {
                  INV_MACHINE_PRICES = d.machinePrices;
                }
                if (d.materialAdjustments && typeof d.materialAdjustments === 'object') {
                  INV_MATERIAL_ADJ = d.materialAdjustments;
                }
                if (d.winderAdjustment && typeof d.winderAdjustment === 'object') {
                  INV_WINDER_ADJ = d.winderAdjustment;
                }
                if (d.optionalAdjustments && typeof d.optionalAdjustments === 'object') {
                  INV_OPTIONAL_ADJ = d.optionalAdjustments;
                }
                if (d.cylinderPrices && typeof d.cylinderPrices === 'object') {
                  Object.keys(d.cylinderPrices).forEach(function(k) {
                    var num = parseInt(k, 10);
                    if (!isNaN(num) && d.cylinderPrices[k] != null) {
                      INV_CYL_PRICES[num] = parseFloat(d.cylinderPrices[k]);
                    }
                  });
                }
                // Update dropdowns from dynamic price options
                if (d.priceOptions && d.priceOptions.types && d.priceOptions.types.length) {
                  var typeSelect = document.getElementById("fMachineType");
                  var current = typeSelect.value;
                  typeSelect.innerHTML = '<option value="">-- Select --</option>';
                  d.priceOptions.types.forEach(function(tp) {
                    var opt = document.createElement("option");
                    opt.value = tp;
                    // Friendly display names
                    if (tp === "Metal anilox") opt.textContent = "Metal anilox";
                    else if (tp === "Ceramic anilox Single Doctor Blade") opt.textContent = "Ceramic Single";
                    else if (tp === "Ceramic anilox Chamber Doctor Blade") opt.textContent = "Ceramic Chamber";
                    else opt.textContent = tp;
                    typeSelect.appendChild(opt);
                  });
                  if (current) typeSelect.value = current;
                }
              }
            } catch (err) { /* settings not available, use defaults */ }
          }

          // RBAC permissions
          var userPerms = {can_view:true, can_create:true, can_edit:true, can_delete:true, can_export:true, is_admin:true};

          async function applyPermissions() {
            try {
              if (window.pyGetPermissions) {
                var p = await window.pyGetPermissions();
                if (p && p.success) userPerms = p;
              }
            } catch(e) { console.log('Permissions load error:', e); }
            // Hide buttons based on permissions
            var btnCreate = document.getElementById('btnCreate');
            if (btnCreate && !userPerms.can_create) btnCreate.style.display = 'none';
          }

          async function loadExchangeRates() {
            try {
              if (!window.pyGetExchangeRates) return;
              var res = await window.pyGetExchangeRates();
              var list = (res && (res.data || res.rates)) ? (res.data || res.rates) : [];
              var usd = list.find(function(r) { return (r.currency_code || r.code || '').toUpperCase() === 'USD'; });
              if (usd && (usd.rate_to_egp != null)) usdRateToEgp = parseFloat(usd.rate_to_egp) || 0;
              window.usdRateToEgp = usdRateToEgp;
              if (allInvoices.length > 0) { renderSummary(allInvoices); renderTable(allInvoices); }
            } catch (e) { }
          }

          function waitForBridge() {
            if (window.pyGetPurchaseInvoices) {
              applyI18n();
              applyPermissions();
              loadInvoices();
              loadExchangeRates();
            } else {
              setTimeout(waitForBridge, 200);
            }
          }
          setTimeout(waitForBridge, 300);
        })();
      </script>
