                for (var ci = 0; ci < savedCyls.length && ci < PI_CYL_ROWS; ci++) {
                  var sEl = document.getElementById('piCylSize' + (ci + 1));
                  var cEl = document.getElementById('piCylCount' + (ci + 1));
                  if (sEl) sEl.value = savedCyls[ci].size || '';
                  if (cEl) cEl.value = savedCyls[ci].count || '';
                }
                piCalcCylinders();
              }
              // Restore line items
              var items = inv.line_items || inv.items || [];
              var liBody = document.getElementById('lineItemsBody');
              if (items.length > 0) {
                var liHtml = '';
                items.forEach(function(li) {
                  liHtml += '<tr class="line-row"><td><input type="text" class="li-desc" value="' + (li.description || '').replace(/"/g, '&quot;') + '"></td><td><input type="number" class="li-qty" value="' + (li.quantity || 1) + '" min="1" oninput="calcInvoiceTotals()"></td><td><input type="number" class="li-price" value="' + (li.unit_price || 0) + '" step="0.01" oninput="calcInvoiceTotals()"></td><td class="li-total" style="text-align:right;font-weight:600;">' + fmt(li.total || 0) + '</td><td><button class="btn-remove-row" onclick="removeLineRow(this)">X</button></td></tr>';
                });
                liBody.innerHTML = liHtml;
              } else {
                liBody.innerHTML = '<tr class="line-row"><td><input type="text" class="li-desc"></td><td><input type="number" class="li-qty" value="1" min="1" oninput="calcInvoiceTotals()"></td><td><input type="number" class="li-price" value="0" step="0.01" oninput="calcInvoiceTotals()"></td><td class="li-total" style="text-align:right;font-weight:600;">0.00</td><td><button class="btn-remove-row" onclick="removeLineRow(this)">X</button></td></tr>';
