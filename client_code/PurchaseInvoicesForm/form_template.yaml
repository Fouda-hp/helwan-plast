      <!-- Invoice Details Modal -->
      <div class="hp-modal-overlay" id="detailsModal">
        <div class="hp-modal" style="max-width:700px;">
          <h2 id="detailsTitle">Invoice Details</h2>
          <div id="detailsContent" style="font-size:14px;"></div>
          <div class="hp-modal-actions">
            <button class="btn btn-cancel" onclick="closeDetailsModal()">Close</button>
          </div>
        </div>
      </div>

      <script src="_/theme/i18n.js"></script>
      <script>
        (function() {
          if (!window.withButtonLock) {
            window.withButtonLock = function(btn, fn) {
              if (!btn || btn.disabled) return Promise.resolve();
              var orig = btn.textContent || btn.value || ''; var loading = btn.getAttribute('data-loading-text') || '...';
              btn.disabled = true; if (btn.textContent !== undefined) btn.textContent = loading; else if (btn.value !== undefined) btn.value = loading;
              return Promise.resolve(typeof fn === 'function' ? fn() : fn).finally(function() { btn.disabled = false; if (btn.textContent !== undefined) btn.textContent = orig; else if (btn.value !== undefined) btn.value = orig; });
            };
          }
          var lang = localStorage.getItem('hp_language') || 'en';
          var isAr = lang === 'ar';
          var currentFilter = '';
          var searchTimer = null;
          var allInvoices = [];
          var usdRateToEgp = 0;
          var currentInvoiceRate = 0;

          function t(en, ar) { return isAr ? ar : en; }
          function fmt(n) { return (n || 0).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}); }
          function setText(id, text) { var el = document.getElementById(id); if (el) el.textContent = text; }
          function setPlaceholder(id, text) { var el = document.getElementById(id); if (el) el.placeholder = text; }

          function applyI18n() {
            setText('pageTitle', t('Purchase Invoices', 'فواتير الشراء'));
            setText('btnCreate', t('+ New Invoice', '+ فاتورة جديدة'));
            setText('btnBack', t('Back', 'رجوع'));
            setPlaceholder('searchInput', t('Search invoices...', 'بحث في الفواتير...'));
            setText('thInvNo', t('Invoice #', 'رقم الفاتورة'));
            setText('thSupplier', t('Supplier', 'المورد'));
            setText('thDate', t('Date', 'التاريخ'));
            setText('thMachine', t('Machine Code', 'كود الماكينة'));
            setText('thTotal', t('Total', 'الاجمالي'));
            setText('thPaid', t('Paid', 'المدفوع'));
            setText('thBalance', t('Balance', 'المتبقي'));
            setText('thStatus', t('Status', 'الحالة'));
            setText('thActions', t('Actions', 'اجراءات'));
            // Machine config i18n
            setText('lblMachineConfig', t('⚙ Machine Configuration', '⚙ إعداد الماكينة'));
            setText('lblCondition', t('Condition', 'الحالة'));
            setText('lblMachineType', t('Machine Type', 'نوع الماكينة'));
            setText('lblColors', t('Colors', 'الألوان'));
            setText('lblWidth', t('Width (cm)', 'العرض (سم)'));
            setText('lblMaterial', t('Material', 'الخامة'));
            setText('lblWinder', t('Winder', 'اللفاف'));
            setText('lblOptionals', t('Optional Features', 'اضافات اختيارية'));
            setText('lblFobStd', t('Standard Machine FOB ($)', 'سعر FOB القياسي ($)'));
            setText('lblFobCyl', t('FOB With Cylinders ($)', 'FOB مع السلندرات ($)'));
            setText('lblMachineCode', t('Machine Code (auto)', 'كود الماكينة (تلقائي)'));
            // Cylinder i18n
            setText('lblPiCylinders', t('🔧 Cylinders', '🔧 السلندرات'));
            setText('piCylThSize', t('Size (CM)', 'المقاس (سم)'));
            setText('piCylThCount', t('Count', 'العدد'));
            setText('piCylThCost', t('Cost ($)', 'التكلفة ($)'));
            setText('lblPiCylTotal', t('Total', 'الاجمالي'));
            // Form labels i18n
            setText('lblSupplier', t('Supplier *', '* المورد'));
            setText('lblDate', t('Date *', '* التاريخ'));
            setText('lblContractNo', t('Contract Number', 'رقم العقد'));
            setText('lblLineItems', t('Additional Items / Spare Parts', 'اصناف اضافية / قطع غيار'));
            setText('liDesc', t('Description', 'الوصف'));
            setText('liQty', t('Qty', 'الكمية'));
            setText('liPrice', t('Unit Price', 'سعر الوحدة'));
            setText('liTotal', t('Total', 'الاجمالي'));
            setText('btnAddRow', t('+ Add Row', '+ اضافة سطر'));
            setText('lblImportCosts', t('Import Costs', 'تكاليف الاستيراد'));
            setText('lblFobLine', t('FOB With Cylinders:', 'FOB مع السلندرات:'));
            setText('lblAddItems', t('Additional Items:', 'الاصناف الاضافية:'));
            setText('lblImportTotal', t('Import Costs (EGP):', 'تكاليف الاستيراد (ج.م):'));
            setText('lblGrandTotal', t('Grand Total (EGP):', 'الاجمالي الكلي (ج.م):'));
            setText('lblInvRate', t('Exchange rate (1 USD = X EGP)', 'سعر الصرف (1 دولار = X جنيه)'));
            setText('lblInvNotes', t('Notes', 'ملاحظات'));
            // Payment modal i18n
            setText('payModalTitle', t('Record Payment', 'تسجيل دفعة'));
            setText('lblPayAmount', t('Amount *', '* المبلغ'));
            setText('lblPayCurrency', t('Currency', 'العملة'));
            setText('lblPayRemaining', t('Remaining (EGP)', 'المتبقي (ج.م)'));
            setText('lblPayBy', t('Pay by', 'الدفع بـ'));
            setText('lblPayByAmount', t('Amount', 'مبلغ'));
            setText('lblPayByPct', t('Percentage', 'نسبة'));
            setText('lblPayRate', t('Payment exchange rate (at payment)', 'سعر الصرف عند الدفع'));
            setText('lblPayInFull', t('Paid in full (settlement)', 'تسوية كاملة'));
            setText('lblPayDate', t('Date', 'التاريخ'));
            setText('lblPayMethod', t('Payment method (Cash / Bank)', 'طريقة الدفع (كاش / بنك)'));
            setText('lblPayBankFee', t('Bank fees (EGP)', 'رسوم البنك (ج.م)'));
            var feeHint = document.getElementById('payBankFeeHint'); if (feeHint) feeHint.textContent = t('Added to cost from bank; does not reduce supplier balance.', 'تضاف على التكلفة من البنك ولا تؤثر على رصيد المورد.');
            setText('lblPayNotes', t('Notes', 'ملاحظات'));
            setText('detailsTitle', t('Invoice Details', 'تفاصيل الفاتورة'));
            setText('importCostsPayTitle', t('Pay Import Costs', 'دفع تكاليف الاستيراد'));
            setText('lblImportPayMethod', t('Payment from (Cash / Bank)', 'الدفع من (كاش / بنك)'));
            setText('lblImportPayDate', t('Date', 'التاريخ'));
            setText('icThType', t('Type', 'النوع'));
            setText('icThDesc', t('Description', 'الوصف'));
            setText('icThAmount', t('Amount (EGP)', 'المبلغ (ج.م)'));
            setText('icThPaid', t('Paid', 'المدفوع'));
            setText('icThRemaining', t('Remaining', 'المتبقي'));
            setText('icThPay', t('Pay (EGP)', 'دفع (ج.م)'));
            setText('lblAddImportCost', t('Add Import Cost', 'إضافة تكلفة استيراد'));
            setText('lblAddIcType', t('Type', 'النوع'));
            setText('lblAddIcAmount', t('Amount', 'المبلغ'));
            setText('lblAddIcCurrency', t('Currency', 'العملة'));
            setText('lblAddIcRate', t('Exchange rate', 'سعر الصرف'));
            setText('lblAddIcPayFrom', t('Pay from', 'الدفع من'));
            setText('lblAddIcDate', t('Date', 'التاريخ'));
            var addBtn = document.getElementById('btnAddImportCostInModal');
            if (addBtn) addBtn.textContent = t('Add', 'إضافة');
            var piWrapper = document.querySelector('.pi-wrapper');
            if (isAr && piWrapper) piWrapper.style.direction = 'rtl';
          }

          function renderSummary(data) {
            var totalAmt = 0, totalPaid = 0, count = data.length;
            data.forEach(function(inv) {
              totalAmt += parseFloat(inv.total || 0);
              totalPaid += parseFloat(inv.paid || 0);
            });
            var rate = usdRateToEgp || 0;
            var egpSuffix = (isAr ? ' ج.م' : ' EGP');
            var dispAmt = function(usd) { return rate > 0 ? fmt(usd * rate) + egpSuffix : fmt(usd) + ' $'; };
            var html = '';
            html += '<div class="summary-card"><div class="num" style="color:#667eea;">' + count + '</div><div class="lbl">' + t('Total Invoices', 'اجمالي الفواتير') + '</div></div>';
            html += '<div class="summary-card"><div class="num" style="color:#1565c0;">' + dispAmt(totalAmt) + '</div><div class="lbl">' + t('Total Amount', 'اجمالي المبلغ') + (rate > 0 ? ' (ج.م)' : '') + '</div></div>';
            html += '<div class="summary-card"><div class="num" style="color:#2e7d32;">' + dispAmt(totalPaid) + '</div><div class="lbl">' + t('Total Paid', 'اجمالي المدفوع') + '</div></div>';
            html += '<div class="summary-card"><div class="num" style="color:#c62828;">' + dispAmt(totalAmt - totalPaid) + '</div><div class="lbl">' + t('Outstanding', 'المتبقي') + '</div></div>';
            document.getElementById('summaryCards').innerHTML = html;
          }

          window.setFilter = function(el) {
            document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
            el.classList.add('active');
            currentFilter = el.getAttribute('data-status');
            loadInvoices();
          };

          window.debounceSearch = function() {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(function() { loadInvoices(); }, 300);
          };

          async function loadInvoices() {
            var search = document.getElementById('searchInput').value.trim();
            var tbody = document.getElementById('invoicesBody');
            tbody.innerHTML = '<tr><td colspan="9" class="empty-msg">' + t('Loading...', 'جاري التحميل...') + '</td></tr>';
            try {
              var res = await window.pyGetPurchaseInvoices(currentFilter, search);
              if (res && res.success) {
                allInvoices = res.data || [];
                renderSummary(allInvoices);
                renderTable(allInvoices);
              } else {
                tbody.innerHTML = '<tr><td colspan="9" class="empty-msg">' + (res ? res.message : 'Error') + '</td></tr>';
              }
            } catch (err) {
              tbody.innerHTML = '<tr><td colspan="9" class="empty-msg">' + err + '</td></tr>';
            }
          }

          function renderTable(data) {
            var tbody = document.getElementById('invoicesBody');
            if (!data || data.length === 0) {
              tbody.innerHTML = '<tr><td colspan="9" class="empty-msg">' + t('No invoices found', 'لا توجد فواتير') + '</td></tr>';
              return;
            }
            var html = '';
            var rate = usdRateToEgp || 0;
            var egpSuffix = isAr ? ' ج.م' : ' EGP';
            var disp = function(usd) { return rate > 0 ? fmt(parseFloat(usd) * rate) + egpSuffix : fmt(usd) + ' $'; };
            data.forEach(function(inv) {
              var total = parseFloat(inv.total || 0);
              var paid = parseFloat(inv.paid || 0);
              var balance = total - paid;
              var statusKey = (inv.status || 'draft').toLowerCase();
              var statusLabels = { draft: t('Draft', 'مسودة'), posted: t('Posted', 'مرحلة'), paid: t('Paid', 'مدفوعة'), partial: t('Partial', 'جزئي') };
              html += '<tr>';
              html += '<td><strong>' + (inv.invoice_number || '') + '</strong></td>';
              html += '<td>' + (inv.supplier_name || '') + '</td>';
              html += '<td>' + (inv.date || '').substring(0, 10) + '</td>';
              html += '<td>' + (inv.machine_code || '') + '</td>';
              html += '<td>' + disp(total) + '</td>';
              html += '<td>' + disp(paid) + '</td>';
              html += '<td style="font-weight:600;color:' + (balance > 0 ? '#c62828' : '#2e7d32') + ';">' + disp(balance) + '</td>';
              html += '<td><span class="status-badge status-' + statusKey + '">' + (statusLabels[statusKey] || statusKey) + '</span></td>';
              html += '<td style="white-space:nowrap;">';
              html += '<button class="btn-sm btn-view" onclick="withButtonLock(this, function(){ return viewInvoice(\'' + inv.id + '\'); })" data-loading-text="...">' + t('View', 'عرض') + '</button> ';
              if (statusKey === 'draft' && userPerms.can_edit) {
                html += '<button class="btn-sm" style="background:#ff9800;color:#fff;" onclick="withButtonLock(this, function(){ return editInvoice(\'' + inv.id + '\'); })" data-loading-text="...">' + t('Edit', 'تعديل') + '</button> ';
                html += '<button class="btn-sm" style="background:#2196f3;color:#fff;" onclick="withButtonLock(this, function(){ return postInvoice(\'' + inv.id + '\'); })" data-loading-text="...">' + t('Post', 'ترحيل') + '</button> ';
              }
              if (statusKey === 'posted' && !inv.inventory_moved && userPerms.can_edit && window.pyMovePurchaseToInventory) {
                html += '<button class="btn-sm" style="background:#2e7d32;color:#fff;" onclick="withButtonLock(this, function(){ return moveToInventory(\'' + inv.id + '\'); })" data-loading-text="...">' + t('Move to inventory', 'نقل للمخزون') + '</button> ';
              }
              if (statusKey !== 'paid' && userPerms.can_edit) {
                var invRate = parseFloat(inv.exchange_rate_usd_to_egp) || rate || 0;
                html += '<button class="btn-sm btn-pay" onclick="withButtonLock(this, function(){ openPaymentModal(\'' + inv.id + '\', ' + balance + ', ' + (invRate || 0) + '); })">' + t('Pay', 'دفع') + '</button> ';
              }
              if (userPerms.can_edit) {
                html += '<button class="btn-sm" style="background:#00838f;color:#fff;" onclick="withButtonLock(this, function(){ return openImportCostsPayModal(\'' + inv.id + '\'); })" data-loading-text="...">' + t('Import costs', 'تكاليف الاستيراد') + '</button> ';
              }
              html += '<button class="btn-sm" style="background:#9c27b0;color:#fff;" onclick="withButtonLock(this, function(){ return printInvoicePDF(\'' + inv.id + '\'); })" data-loading-text="...">' + t('PDF', 'PDF') + '</button> ';
              if (userPerms.can_delete) {
                html += '<button class="btn-sm btn-delete" onclick="withButtonLock(this, function(){ return deleteInvoice(\'' + inv.id + '\'); })" data-loading-text="...">' + t('Del', 'حذف') + '</button>';
              }
              html += '</td></tr>';
            });
            tbody.innerHTML = html;
          }

          var PI_CYL_ROWS = 12;

          // Initialize cylinder table in invoice modal
          function piInitCylTable(colorsVal) {
            var tbody = document.getElementById("piCylBody");
            var defaultSizes = [25,30,35,40,45,50,60];
            var html = "";
            for (var i = 1; i <= PI_CYL_ROWS; i++) {
              var defSize = (i <= defaultSizes.length) ? defaultSizes[i-1] : "";
              var defCount = (i <= defaultSizes.length && colorsVal) ? colorsVal : "";
              html += '<tr><td>' + i + '</td>';
              html += '<td><input type="number" id="piCylSize' + i + '" value="' + defSize + '" oninput="piCalcCylinders()"></td>';
              html += '<td><input type="number" id="piCylCount' + i + '" value="' + defCount + '" oninput="piCalcCylinders()"></td>';
              html += '<td><input type="text" id="piCylCost' + i + '" class="cyl-cost" readonly></td></tr>';
            }
            tbody.innerHTML = html;
          }

          // Calculate cylinder costs in invoice
          window.piCalcCylinders = function() {
            var widthVal = parseInt(document.getElementById("fWidth").value) || 0;
            var colorsVal = parseInt(document.getElementById("fColors").value) || 0;
            var pricePerCM = INV_CYL_PRICES[widthVal] || 0;
            var totalCost = 0, totalCount = 0;
            for (var i = 1; i <= PI_CYL_ROWS; i++) {
              var sizeEl = document.getElementById("piCylSize" + i);
              var countEl = document.getElementById("piCylCount" + i);
              var costEl = document.getElementById("piCylCost" + i);
              if (!sizeEl || !countEl || !costEl) continue;
              var size = parseFloat(sizeEl.value) || 0;
              var count = parseInt(countEl.value) || 0;
              if (!size || !count) { costEl.value = ""; continue; }
              totalCount += count;
              if (size === 40 && count <= colorsVal) {
                costEl.value = "FREE";
                costEl.style.color = "#2e7d32"; costEl.style.fontWeight = "600";
              } else if (size === 40 && count > colorsVal) {
                var excess = count - colorsVal;
                var c40 = Math.round(size * excess * pricePerCM);
                costEl.value = c40.toFixed(2);
                costEl.style.color = ""; costEl.style.fontWeight = "";
                totalCost += c40;
              } else {
                var rc = Math.round(size * count * pricePerCM);
                costEl.value = rc.toFixed(2);
                costEl.style.color = ""; costEl.style.fontWeight = "";
                totalCost += rc;
              }
            }
            document.getElementById("piCylTotalCount").textContent = totalCount || "0";
            document.getElementById("piCylTotalCost").textContent = "$" + totalCost.toLocaleString("en-US");
            // Update FOB With Cylinders from Standard FOB + cylinder cost
            var stdFob = parseFloat(document.getElementById("fFobStd").value) || 0;
            document.getElementById("fFobCyl").value = stdFob + totalCost;
            // Recalc totals
            calcInvoiceTotals();
          };

          // Grand totals: rate from user input. FOB + AddItems in USD → EGP. Import costs: EGP as-is, USD → *rate. Grand Total = EGP only.
          window.calcInvoiceTotals = function() {
            var rate = parseFloat(document.getElementById('fInvExchangeRate').value) || 0;
            var fobCyl = parseFloat(document.getElementById('fFobCyl').value) || 0;
            var addItems = 0;
            document.querySelectorAll('#lineItemsBody .line-row').forEach(function(row) {
              var qty = parseFloat(row.querySelector('.li-qty').value) || 0;
              var price = parseFloat(row.querySelector('.li-price').value) || 0;
              var lineTotal = qty * price;
              row.querySelector('.li-total').textContent = fmt(lineTotal);
              addItems += lineTotal;
            });
            var importTotalEgp = 0;
            document.querySelectorAll('.import-cost-row').forEach(function(row) {
              var amount = parseFloat(row.querySelector('.ic-amount').value) || 0;
              var currency = (row.querySelector('.ic-currency') && row.querySelector('.ic-currency').value) || 'USD';
              if (currency === 'EGP') {
                importTotalEgp += amount;
              } else {
                importTotalEgp += rate > 0 ? amount * rate : amount;
              }
            });
            var grandTotalEgp = (fobCyl * (rate || 0)) + (addItems * (rate || 0)) + importTotalEgp;
            document.getElementById('valFobLine').textContent = fmt(fobCyl) + ' $';
            document.getElementById('valAddItems').textContent = fmt(addItems) + ' $';
            if (rate > 0) {
              document.getElementById('valFobLineEgp').textContent = '= ' + fmt(fobCyl * rate) + (isAr ? ' ج.م' : ' EGP');
              document.getElementById('valAddItemsEgp').textContent = '= ' + fmt(addItems * rate) + (isAr ? ' ج.م' : ' EGP');
            } else {
              document.getElementById('valFobLineEgp').textContent = '';
              document.getElementById('valAddItemsEgp').textContent = '';
            }
            document.getElementById('valImportTotalEgp').textContent = fmt(importTotalEgp) + (isAr ? ' ج.م' : ' EGP');
            document.getElementById('valGrandTotalEgp').textContent = fmt(grandTotalEgp) + (isAr ? ' ج.م' : ' EGP');
          };

          window.addLineRow = function() {
            var tbody = document.getElementById('lineItemsBody');
            var tr = document.createElement('tr');
            tr.className = 'line-row';
            tr.innerHTML = '<td><input type="text" class="li-desc"></td><td><input type="number" class="li-qty" value="1" min="1" oninput="calcInvoiceTotals()"></td><td><input type="number" class="li-price" value="0" step="0.01" oninput="calcInvoiceTotals()"></td><td class="li-total" style="text-align:right;font-weight:600;">0.00</td><td><button class="btn-remove-row" onclick="removeLineRow(this)">X</button></td>';
            tbody.appendChild(tr);
          };

          window.removeLineRow = function(btn) {
            var rows = document.querySelectorAll('#lineItemsBody .line-row');
            if (rows.length <= 1) return;
            btn.closest('tr').remove();
            calcInvoiceTotals();
          };

          window.addImportCostRow = function() {
            var container = document.getElementById('importCostRows');
            var div = document.createElement('div');
            div.className = 'form-row import-cost-row';
            div.style.marginBottom = '8px';
