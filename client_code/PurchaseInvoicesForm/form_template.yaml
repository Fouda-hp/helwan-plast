                html += '<div style="display:flex;justify-content:space-between;"><span>' + t('Balance', 'المتبقي') + '</span><span style="color:#c62828;">' + fmt(toEgp((inv.total || 0) - (inv.paid || 0))) + egpSuffix + '</span></div>';
