          window.submitImportCostsPay = async function() {
            var invoiceId = document.getElementById('importCostsInvoiceId').value;
            var method = document.getElementById('fImportPayMethod').value;
            var paymentDate = document.getElementById('fImportPayDate').value;
            if (!paymentDate) {
              if (window.showNotification) window.showNotification('error', '', t('Select date', 'اختر التاريخ'));
              return;
            }
            var rows = document.querySelectorAll('#importCostsPayBody tr[data-ic-id]');
            var toPay = [];
            rows.forEach(function(tr) {
              var id = tr.getAttribute('data-ic-id');
              var amount = parseFloat(tr.querySelector('.ic-pay-amount') && tr.querySelector('.ic-pay-amount').value) || 0;
              if (id && amount > 0) toPay.push({ id: id, amount: amount });
            });
            if (toPay.length === 0) {
              if (window.showNotification) window.showNotification('error', '', t('Enter at least one pay amount', 'أدخل مبلغ دفع واحد على الأقل'));
              return;
            }
            try {
              for (var i = 0; i < toPay.length; i++) {
                var res = await window.pyPayImportCost(toPay[i].id, toPay[i].amount, method, paymentDate);
                if (!res || !res.success) {
                  if (window.showNotification) window.showNotification('error', '', res ? res.message : 'Error');
                  return;
                }
              }
              if (window.showNotification) window.showNotification('success', '', t('Payment(s) recorded', 'تم تسجيل الدفعة/الدفعات'));
              closeImportCostsPayModal();
              loadInvoices();
            } catch (err) {
              if (window.showNotification) window.showNotification('error', '', String(err));
            }
          };

          window.submitPayment = async function() {
            var invoiceId = document.getElementById('payInvoiceId').value;
            var payByAmount = document.getElementById('payByAmount').checked;
            var amount = parseFloat(document.getElementById('fPayAmount').value) || 0;
            var pct = document.getElementById('payByPct').checked ? (parseFloat(document.getElementById('fPayPct').value) || 0) : null;
            if (!payByAmount && (pct == null || pct <= 0)) {
              if (window.showNotification) window.showNotification('error', '', t('Enter amount or percentage', 'أدخل المبلغ أو النسبة'));
              return;
            }
            if (payByAmount && amount <= 0) {
              if (window.showNotification) window.showNotification('error', '', t('Enter a valid amount', 'ادخل مبلغ صحيح'));
              return;
            }
            var method = document.getElementById('fPayMethod').value;
            var paymentDate = document.getElementById('fPayDate').value;
            var currencyCode = document.getElementById('fPayCurrency').value || 'EGP';
            var exchangeRate = currencyCode === 'EGP' ? null : (parseFloat(document.getElementById('fPayExchangeRate').value) || null);
            var notes = document.getElementById('fPayNotes').value.trim();
            var isPaidInFull = document.getElementById('fPayInFull').checked;
            var bankFeeEl = document.getElementById('fPayBankFee');
            var bankFeeEgp = bankFeeEl ? (parseFloat(bankFeeEl.value) || 0) : 0;
            if (bankFeeEgp < 0) bankFeeEgp = 0;
            if (!paymentDate) {
              if (window.showNotification) window.showNotification('error', '', t('Select date', 'اختر التاريخ'));
              return;
            }
            var sendAmount = amount;
            var sendPct = null;
            if (!payByAmount && pct != null) {
              sendPct = pct;
              sendAmount = 0;
            }
            if (isPaidInFull && payByAmount && amount <= 0) {
              if (window.showNotification) window.showNotification('error', '', t('Enter the actual payment amount for full settlement', 'أدخل المبلغ الفعلي للدفع عند التسوية الكاملة'));
              return;
            }
            try {
              var res = await window.pyRecordSupplierPayment(invoiceId, sendAmount, method, paymentDate, currencyCode, exchangeRate, notes, sendPct, isPaidInFull, bankFeeEgp);
              if (res && res.success) {
                if (window.showNotification) window.showNotification('success', '', t('Payment recorded', 'تم تسجيل الدفع'));
                closePaymentModal();
                loadInvoices();
              } else {
                if (window.showNotification) window.showNotification('error', '', res ? res.message : 'Error');
              }
            } catch (err) {
              if (window.showNotification) window.showNotification('error', '', String(err));
            }
          };

