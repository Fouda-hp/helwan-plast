          window.removeImportCostRow = function(btn) {
            var rows = document.querySelectorAll('#importCostRows .import-cost-row');
            if (rows.length <= 1) return;
            btn.closest('.import-cost-row').remove();
            calcInvoiceTotals();
          };

          window.closeInvoiceModal = function() {
            document.getElementById('invoiceModal').classList.remove('show');
          };

          window.saveInvoice = async function() {
            var supplierId = document.getElementById('fSupplier').value;
            var date = document.getElementById('fDate').value;
            if (!supplierId || !date) {
              if (window.showNotification) window.showNotification('error', '', t('Supplier and date are required', 'المورد والتاريخ مطلوبين'));
              return;
            }
            var lineItems = [];
            document.querySelectorAll('#lineItemsBody .line-row').forEach(function(row) {
              var desc = row.querySelector('.li-desc').value.trim();
              var qty = parseFloat(row.querySelector('.li-qty').value) || 0;
              var price = parseFloat(row.querySelector('.li-price').value) || 0;
              if (desc || qty > 0 || price > 0) {
                lineItems.push({ description: desc, quantity: qty, unit_price: price, total: qty * price });
              }
            });
            var importCosts = [];
            document.querySelectorAll('.import-cost-row').forEach(function(row) {
              var type = row.querySelector('.ic-type').value;
              var amount = parseFloat(row.querySelector('.ic-amount').value) || 0;
              var currency = (row.querySelector('.ic-currency') && row.querySelector('.ic-currency').value) || 'USD';
              if (amount > 0) {
                importCosts.push({ cost_type: type, amount: amount, currency: currency });
              }
            });
            var exchangeRate = parseFloat(document.getElementById('fInvExchangeRate').value) || 0;
            // Collect machine config optionals
            var optionalsList = [];
            if (document.getElementById('optVideo').checked) optionalsList.push('Video inspection');
            if (document.getElementById('optPLC').checked) optionalsList.push('PLC');
            if (document.getElementById('optSlitter').checked) optionalsList.push('Slitter');
            if (document.getElementById('optPneuUnwind').checked) optionalsList.push('Pneumatic Unwind');
            if (document.getElementById('optHydUnwind').checked) optionalsList.push('Hydraulic Station Unwind');
            if (document.getElementById('optPneuRewind').checked) optionalsList.push('Pneumatic Rewind');
            if (document.getElementById('optSurfRewind').checked) optionalsList.push('Surface Rewind');
            // Collect cylinders
            var cylinders = [];
            for (var ci = 1; ci <= PI_CYL_ROWS; ci++) {
              var cs = document.getElementById('piCylSize' + ci);
              var cc = document.getElementById('piCylCount' + ci);
              var co = document.getElementById('piCylCost' + ci);
              if (cs && cc && cs.value && cc.value) {
                cylinders.push({ size: parseFloat(cs.value), count: parseInt(cc.value), cost: co ? co.value : '' });
              }
            }
            // FOB values (numeric inputs)
            var fobStdVal = document.getElementById('fFobStd').value;
            var fobCylVal = document.getElementById('fFobCyl').value;
            var data = {
              supplier_id: supplierId,
              date: date,
              machine_code: document.getElementById('fMachineCode').value.trim(),
              contract_number: document.getElementById('fContractNo').value.trim(),
              condition: document.getElementById('fCondition').value,
              machine_type: document.getElementById('fMachineType').value,
              colors: document.getElementById('fColors').value,
              machine_width: document.getElementById('fWidth').value,
              material: document.getElementById('fMaterial').value,
              winder: document.getElementById('fWinder').value,
              optionals: optionalsList,
              cylinders: cylinders,
              fob_standard: parseFloat(fobStdVal) || 0,
              fob_with_cylinders: parseFloat(fobCylVal) || 0,
              line_items: lineItems,
              import_costs: importCosts,
              currency_code: (exchangeRate && exchangeRate > 0) ? 'USD' : 'EGP',
              exchange_rate_usd_to_egp: exchangeRate,
              notes: document.getElementById('fInvNotes').value.trim()
            };
            var editId = document.getElementById('editInvoiceId').value;
            try {
              var res;
              if (editId) {
                res = await window.pyUpdatePurchaseInvoice(editId, data);
              } else {
                res = await window.pyCreatePurchaseInvoice(data);
              }
              if (res && res.success) {
                if (window.showNotification) window.showNotification('success', '', t('Invoice saved', 'تم حفظ الفاتورة'));
                closeInvoiceModal();
                loadInvoices();
              } else {
                if (window.showNotification) window.showNotification('error', '', res ? res.message : 'Error');
              }
            } catch (err) {
              if (window.showNotification) window.showNotification('error', '', String(err));
            }
          };

          var paymentDropdownsReady = false;
          async function ensurePaymentDropdowns() {
            if (paymentDropdownsReady) return;
            try {
              var bankRes = window.pyGetBankAccounts && await window.pyGetBankAccounts();
              var methodSel = document.getElementById('fPayMethod');
              if (bankRes && bankRes.success && bankRes.accounts && methodSel) {
                methodSel.innerHTML = '';
                var isAr = (localStorage.getItem('hp_language') || 'en') === 'ar';
                bankRes.accounts.forEach(function(a) {
                  var opt = document.createElement('option');
                  opt.value = a.code || a.id;
                  var name = isAr ? (a.name_ar || a.name_en) : (a.name_en || a.name_ar);
                  opt.textContent = (name || a.code || '') + ' (' + (a.code || '') + ')';
                  methodSel.appendChild(opt);
                });
              }
              var rateRes = window.pyGetExchangeRates && await window.pyGetExchangeRates();
              var currSel = document.getElementById('fPayCurrency');
              if (rateRes && rateRes.success && currSel) {
                var ratesList = rateRes.data || rateRes.rates || [];
                var usdRow = ratesList.find(function(r) { return (r.currency_code || r.code || '').toUpperCase() === 'USD'; });
                if (usdRow && usdRow.rate_to_egp != null) {
                  window.usdRateToEgp = parseFloat(usdRow.rate_to_egp) || 0;
                }
                currSel.innerHTML = '';
                var hasEgp = ratesList.some(function(r) { return (r.currency_code || r.code || '') === 'EGP'; });
                if (!hasEgp) {
                  var o = document.createElement('option'); o.value = 'EGP'; o.textContent = 'EGP'; currSel.appendChild(o);
                }
                ratesList.forEach(function(r) {
                  var code = r.currency_code || r.code || '';
                  var opt = document.createElement('option');
                  opt.value = code;
                  opt.textContent = code + (r.rate_to_egp ? ' (1 = ' + r.rate_to_egp + ' EGP)' : '');
                  currSel.appendChild(opt);
                });
              }
              paymentDropdownsReady = true;
            } catch (e) { /* ignore */ }
          }

          window.openPaymentModal = async function(id, balance, rateUsdToEgp) {
            await ensurePaymentDropdowns();
            document.getElementById('payInvoiceId').value = id;
            var rate = parseFloat(rateUsdToEgp) || parseFloat(window.usdRateToEgp) || 0;
            document.getElementById('fPayExchangeRate').value = rate > 0 ? rate.toFixed(2) : '1';
            var remainingEgp = 0;
            try {
              var remRes = window.pyGetSupplierRemainingEgp && await window.pyGetSupplierRemainingEgp(id);
              if (remRes && remRes.success && remRes.remaining_egp != null) remainingEgp = parseFloat(remRes.remaining_egp) || 0;
            } catch (e) { /* use 0 or balance*rate */ }
            if (remainingEgp <= 0 && rate > 0) remainingEgp = Math.round(balance * rate * 100) / 100;
            if (remainingEgp <= 0) remainingEgp = balance;
            var egpSuffix = (localStorage.getItem('hp_language') || 'en') === 'ar' ? ' ج.م' : ' EGP';
            document.getElementById('payRemainingValue').textContent = fmt(remainingEgp) + egpSuffix;
            document.getElementById('payByAmount').checked = true;
            document.getElementById('fPayAmount').value = remainingEgp > 0 ? remainingEgp.toFixed(2) : '0';
            document.getElementById('fPayPct').value = '100';
            document.getElementById('fPayCurrency').value = 'EGP';
            document.getElementById('payExchangeRateGroup').style.display = 'none';
            document.getElementById('fPayInFull').checked = false;
            var hintEl = document.getElementById('payAmountHint');
            if (hintEl) hintEl.style.display = 'none';
            var today = new Date().toISOString().slice(0, 10);
            document.getElementById('fPayDate').value = today;
            document.getElementById('fPayNotes').value = '';
            document.getElementById('paymentModal').classList.add('show');
          };

          document.addEventListener('DOMContentLoaded', function() {
            var fPayCurrency = document.getElementById('fPayCurrency');
            if (fPayCurrency) {
              fPayCurrency.addEventListener('change', function() {
                var isEgp = (fPayCurrency.value === 'EGP');
                document.getElementById('payExchangeRateGroup').style.display = isEgp ? 'none' : 'block';
              });
            }
            var payInFullCb = document.getElementById('fPayInFull');
            var payInFullHint = document.getElementById('payInFullHint');
            if (payInFullCb && payInFullHint) {
              payInFullCb.addEventListener('change', function() {
                payInFullHint.textContent = payInFullCb.checked ? (isAr ? 'سيتم تسوية كامل المستحق وترحيل الفرق إلى أرباح/خسائر فروق العملة (4110/6110)' : 'Full liability will be cleared; difference posted to exchange gain/loss (4110/6110)') : '';
              });
            }
          });

          window.closePaymentModal = function() {
            document.getElementById('paymentModal').classList.remove('show');
          };

          window.openImportCostsPayModal = async function(invoiceId) {
            document.getElementById('importCostsInvoiceId').value = invoiceId || '';
            var dateEl = document.getElementById('fImportPayDate');
            if (dateEl) dateEl.value = new Date().toISOString().substring(0, 10);
            var bankRes = window.pyGetBankAccounts && await window.pyGetBankAccounts();
            var methodSel = document.getElementById('fImportPayMethod');
            if (bankRes && bankRes.success && bankRes.accounts && methodSel) {
              methodSel.innerHTML = '';
              var isArBank = (localStorage.getItem('hp_language') || 'en') === 'ar';
              bankRes.accounts.forEach(function(acc) {
                var opt = document.createElement('option');
                opt.value = acc.code || acc.id;
                var name = isArBank ? (acc.name_ar || acc.name_en) : (acc.name_en || acc.name_ar);
                opt.textContent = (name || acc.code || '') + ' (' + (acc.code || '') + ')';
                methodSel.appendChild(opt);
              });
            }
            document.getElementById('importCostsPayModal').classList.add('show');
            document.getElementById('importCostsPayBody').innerHTML = '<tr><td colspan="6" style="padding:12px;text-align:center;color:#666;">' + t('Loading...', 'جاري التحميل...') + '</td></tr>';
            try {
              var res = await window.pyGetImportCostsForPayment(invoiceId);
              var tbody = document.getElementById('importCostsPayBody');
              if (!res || !res.success) {
                tbody.innerHTML = '<tr><td colspan="6" style="padding:12px;color:#c62828;">' + (res ? res.message : 'Error') + '</td></tr>';
                return;
              }
              var costs = res.costs || [];
              var isAr = (localStorage.getItem('hp_language') || 'en') === 'ar';
              if (costs.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="padding:12px;color:#666;">' + t('No import costs yet. Add one below.', 'لا توجد تكاليف استيراد بعد. أضف من الأسفل.') + '</td></tr>';
                populateAddIcPayFrom(bankRes);
                setAddIcDateToday();
                document.getElementById('importCostsAddSection').style.display = 'block';
                document.getElementById('importCostsPayHint').textContent = t('Add import costs (currency, rate, pay from) then pay when needed.', 'أضف تكاليف الاستيراد (عملة، سعر صرف، الدفع من) ثم ادفع عند الحاجة.');
                return;
              }
              var egpSuffix = isAr ? ' ج.م' : ' EGP';
              var html = '';
              costs.forEach(function(c) {
                var rem = parseFloat(c.remaining_egp) || 0;
                var desc = (c.description || '').trim() || '—';
                html += '<tr data-ic-id="' + (c.id || '') + '" data-remaining="' + rem + '">';
                html += '<td style="padding:8px;border:1px solid #ddd;">' + (c.cost_type || '') + '</td>';
                html += '<td style="padding:8px;border:1px solid #ddd;color:#555;">' + desc + '</td>';
                html += '<td style="padding:8px;border:1px solid #ddd;text-align:right;">' + fmt(c.amount_egp) + egpSuffix + '</td>';
                html += '<td style="padding:8px;border:1px solid #ddd;text-align:right;">' + fmt(c.paid_amount) + egpSuffix + '</td>';
                html += '<td style="padding:8px;border:1px solid #ddd;text-align:right;font-weight:600;">' + fmt(rem) + egpSuffix + '</td>';
                html += '<td style="padding:8px;border:1px solid #ddd;"><input type="number" class="ic-pay-amount" step="0.01" min="0" max="' + rem + '" value="' + (rem || 0) + '" placeholder="' + fmt(rem) + '" style="width:100px;padding:6px;text-align:right;"></td></tr>';
              });
              tbody.innerHTML = html;
              populateAddIcPayFrom(bankRes);
              setAddIcDateToday();
              if (typeof updateAddIcAmountLabelAndPreview === 'function') updateAddIcAmountLabelAndPreview();
              document.getElementById('importCostsAddSection').style.display = 'block';
