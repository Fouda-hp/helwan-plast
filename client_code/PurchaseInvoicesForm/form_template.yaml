          <div class="hp-modal-actions">
            <button class="btn btn-cancel" onclick="closeImportCostsPayModal()">Cancel</button>
            <button class="btn btn-save" id="btnSubmitImportCostsPay" onclick="withButtonLock(this, function(){ return submitImportCostsPay(); })" data-loading-text="...">Pay</button>
          </div>
