components: []
container:
  properties:
    html: |
      <div class="row-item">
        <div>{{ item['Client Name'] }}</div>
        <div>{{ item['Quotation#'] }}</div>
        <div>{{ item['Date'] }}</div>
      </div>

      <style>
        .row-item {
          display: grid;
          grid-template-columns: 1fr 140px 120px;
          padding: 8px 10px;
          border-bottom: 1px solid #ddd;
          cursor: pointer;
        }

        .row-item:hover {
          background: #eef4ff;
        }
      </style>
  type: HtmlTemplate
is_package: true
