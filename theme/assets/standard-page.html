<style>
  /* ================= ANIMATIONS ================= */
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes logoFade {
    from { opacity: 0; transform: scale(0.95); }
    to   { opacity: 1; transform: scale(1); }
  }

  @keyframes buttonIn {
    from { opacity: 0; transform: translateY(15px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeInFooter {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(0,120,215,0.5); }
    70%  { box-shadow: 0 0 0 12px rgba(0,120,215,0); }
    100% { box-shadow: 0 0 0 0 rgba(0,120,215,0); }
  }

  /* ================= BASE ================= */
  * {
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
  }

  .launcher {
    width: 100%;
    height: 100vh;
    background: #ffffff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 25px 30px;
    animation: fadeSlide 0.8s ease-out;
  }

  /* ================= TITLE ================= */
  .title {
    font-size: 24px;
    font-weight: bold;
    color: #0057a3;
    margin-bottom: 10px;
  }

  /* ================= LOGOS (Excel Style) ================= */
  .logos {
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 40px;
    align-items: center;
  }

  .logos img {
    height: 90px;
    max-width: 220px;
    object-fit: contain;
    opacity: 0;
    animation: logoFade 0.8s ease forwards;
  }

  .logos img:first-child { animation-delay: 0.3s; }
  .logos img:last-child  { animation-delay: 0.6s; }

  /* ================= BUTTONS ================= */
  .buttons {
    width: 420px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .btn {
    height: 52px;
    color: #fff;
    font-size: 17px;
    font-weight: bold;
    border: none;
    cursor: pointer;
    animation: buttonIn 0.6s ease forwards;
    transition: transform 0.15s ease,
      box-shadow 0.15s ease,
      filter 0.15s ease;
  }

  .buttons .btn:nth-child(1) { animation-delay: 0.2s; }
  .buttons .btn:nth-child(2) { animation-delay: 0.35s; }
  .buttons .btn:nth-child(3) { animation-delay: 0.5s; }
  .buttons .btn:nth-child(4) { animation-delay: 0.65s; }
  .buttons .btn:nth-child(5) { animation-delay: 0.8s; }

  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(0,0,0,0.2);
    filter: brightness(1.05);
  }

  .btn:active {
    transform: translateY(0);
    box-shadow: 0 3px 8px rgba(0,0,0,0.2);
  }

  /* Colors */
  .blue   { background: #0078d7; animation: pulse 2.5s infinite; }
  .green  { background: #00b050; }
  .orange { background: #ed7d31; }
  .purple { background: #7030a0; }
  .red    { background: #c00000; }

  /* ================= FOOTER ================= */
  .footer {
    width: 100%;
    font-size: 12px;
    color: #666;
    display: flex;
    justify-content: space-between;
    align-items: center;
    opacity: 0;
    animation: fadeInFooter 1s ease forwards;
    animation-delay: 1.2s;
  }

  /* ================= ADMIN BUTTON ================= */
  .admin-btn {
    position: fixed;
    bottom: 15px;
    right: 20px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #333;
    cursor: pointer;
  }

  .admin-btn img {
    width: 28px;
    height: 28px;
  }
</style>

<div class="launcher" anvil-slot="default">

  <div class="title">
    Welcome To Helwan Plast & Flexo CH - Calculator
  </div>

  <div class="logos">
    <img src="_/theme/helwan_logo.png">
    <img src="_/theme/flexo_logo.png">
  </div>

  <div class="buttons">
    <button class="btn blue" id="enter_btn">
      ENTER DATA
    </button>

    <button class="btn green" id="quotation_btn">QUOTATION</button>
    <button class="btn orange" id="contract_btn">CONTRACT</button>
    <button class="btn purple" id="database_btn">DATA BASE</button>
    <button class="btn red" id="client_btn">CLIENT LIST</button>
  </div>

  <div class="footer">
    <div>Designed & Developed by Helwan Plast</div>
    <div>Admin</div>
  </div>

</div>

<!-- ADMIN ICON (UI فقط) -->
<div class="admin-btn" id="admin_btn">
  <img src="_/theme/admin.png">
</div>

<script>
  // انتظر تحميل الصفحة
  window.addEventListener('load', function() {

    // اربط الأزرار
    document.getElementById('enter_btn').addEventListener('click', function() {
      if (window.anvilForm) {
        window.anvilForm.open_calculator();
      }
    });

    document.getElementById('quotation_btn').addEventListener('click', function() {
      if (window.showNotification) window.showNotification('info', '', 'Quotation feature coming soon!');
    });

    document.getElementById('contract_btn').addEventListener('click', function() {
      if (window.showNotification) window.showNotification('info', '', 'Contract feature coming soon!');
    });

    document.getElementById('database_btn').addEventListener('click', function() {
      if (window.showNotification) window.showNotification('info', '', 'Database feature coming soon!');
    });

    document.getElementById('client_btn').addEventListener('click', function() {
      if (window.showNotification) window.showNotification('info', '', 'Client List feature coming soon!');
    });

    document.getElementById('admin_btn').addEventListener('click', function() {
      if (window.showNotification) window.showNotification('info', '', 'Admin panel coming soon!');
    });

  });
</script>
